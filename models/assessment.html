<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instant Assessment - Student Eligibility</title>
</head>
<body style="font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 30px;">
    <div style="max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
        <h2 style="color: #1a73e8; text-align: center; margin-bottom: 25px;">Student Eligibility Checker</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div><label>GPA:</label><input type="number" id="stdGPA" step="0.01" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;"></div>
            <div><label>IELTS:</label><input type="number" id="stdIELTS" step="0.5" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;"></div>
            <div><label>Study Gap (Yrs):</label><input type="number" id="stdGap" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;"></div>
            <div><label>Bank Balance:</label><input type="number" id="stdBank" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;"></div>
        </div>

        <button onclick="checkEligibility()" style="width:100%; margin-top:25px; padding:15px; background:#1a73e8; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:16px;">Check Matching Options</button>

        <div id="results" style="margin-top:30px;"></div>
    </div>

    <script>
        async function checkEligibility() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<p style='text-align:center;'>Searching for best matches...</p>";

            const payload = {
                gpa: parseFloat(document.getElementById('stdGPA').value) || 0,
                ielts: parseFloat(document.getElementById('stdIELTS').value) || 0,
                studyGap: parseInt(document.getElementById('stdGap').value) || 0,
                bankBalance: parseFloat(document.getElementById('stdBank').value) || 0
            };

            try {
                const response = await fetch('http://localhost:5000/assess-student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                resultsDiv.innerHTML = "<h3 style='border-bottom: 2px solid #1a73e8; padding-bottom: 10px;'>Recommended Universities:</h3>";

                if (data.length === 0) {
                    resultsDiv.innerHTML += "<div style='padding:20px; background:#fff3cd; border-radius:8px;'>No matching universities found for this profile.</div>";
                } else {
                    data.forEach(uni => {
                        resultsDiv.innerHTML += `
                            <div style="border: 1px solid #e0e0e0; padding: 20px; border-radius: 12px; margin-bottom: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                                <div style="display: flex; justify-content: space-between;">
                                    <strong style="font-size: 20px; color: #1a73e8;">${uni.universityName}</strong>
                                    <span style="background: #e8f0fe; color: #1a73e8; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">${uni.country}</span>
                                </div>
                                <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; color: #444;">
                                    <div><strong>📚 Course:</strong> ${uni.courseName}</div>
                                    <div><strong>📅 Intake:</strong> ${uni.intake}</div>
                                    <div><strong>💰 Tuition:</strong> ${uni.tuitionFees}</div>
                                    <div><strong>⏳ Max Gap:</strong> ${uni.maxStudyGap} Years</div>
                                    <div style="grid-column: span 2;"><strong>🏦 Min Bank Balance:</strong> ${uni.minBankBalance}</div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                resultsDiv.innerHTML = "<p style='color:red;'>Connection Error. Is the server running?</p>";
            }
        }
    </script>
</body>
</html>
