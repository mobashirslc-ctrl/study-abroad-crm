<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login - Study Abroad CRM</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        #message { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Partner Login</h2>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="handleLogin()">Login</button>
    <p id="message"></p>
</div>

<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        if (!email || !password) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Please fill in all fields.";
            return;
        }

        messageDiv.style.color = "blue";
        messageDiv.innerText = "Checking credentials...";

        try {
            // আপনার রেন্ডার ব্যাকএন্ড লিঙ্কে রিকোয়েস্ট পাঠানো হচ্ছে
            const response = await fetch('https://study-abroad-crm.onrender.com/api/partners/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Login Successful! Redirecting...";
                
                // লগইন সফল হলে ডাটা লোকাল স্টোরেজে সেভ করা হচ্ছে
                localStorage.setItem('partnerId', data.partnerId);
                localStorage.setItem('partnerName', data.name);
                
                // ড্যাশবোর্ডে রিডাইরেক্ট
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                messageDiv.style.color = "red";
                messageDiv.innerText = data.message || "Invalid email or password.";
            }
        } catch (error) {
            console.error('Error:', error);
            messageDiv.style.color = "red";
            messageDiv.innerText = "Server error. Please try again later.";
        }
    }
</script>

</body>
</html>
