<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login - Global Edu CRM</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #errorMsg { color: red; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Partner Login</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <div id="errorMsg"></div>
    <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
    const API_URL = "https://study-abroad-crm.onrender.com"; // আপনার রেন্ডার ইউআরএল

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');

        errorMsg.innerText = "Logging in...";

        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await res.json();

            if (result.success) {
                // ব্রাউজারের মেমোরিতে ইউজার ডাটা সেভ করা
                localStorage.setItem('user', JSON.stringify(result.user));
                // ড্যাশবোর্ডে পাঠানো
                window.location.href = "dashboard.html";
            } else {
                errorMsg.innerText = result.message || "Login failed!";
            }
        } catch (err) {
            errorMsg.innerText = "Server error. Please try again later.";
            console.error(err);
        }
    });
</script>

</body>
</html>
