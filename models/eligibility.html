<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal - Search</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
        .card { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .uni-card { border-left: 5px solid #0052cc; padding: 15px; margin-top: 15px; background: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0052cc; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Student Assessment Tool</h2>
        <div class="grid">
            <select id="sCountry">
                <option value="All">All Countries</option>
                <option value="UK">UK</option>
                <option value="Canada">Canada</option>
                <option value="Australia">Australia</option>
            </select>
            <select id="marital">
                <option value="Single">Single</option>
                <option value="Married">Married</option>
            </select>
        </div>
        <div class="grid">
            <select id="sDegree">
                <option value="UG">Undergraduate (UG)</option>
                <option value="PG">Postgraduate (PG)</option>
            </select>
            <input type="number" id="budget" placeholder="Max Tuition Budget">
        </div>
        <div class="grid">
            <input type="number" step="0.01" id="sScore" placeholder="GPA/CGPA">
            <input type="number" id="sGap" placeholder="Your Study Gap">
        </div>
        <div class="grid">
            <select id="sLType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="Duolingo">Duolingo</option>
            </select>
            <input type="number" step="0.1" id="sLScore" placeholder="Your Score">
        </div>
        <button onclick="search()">Search Matching Programs</button>
        <div id="results"></div>
    </div>

    <script>
        async function search() {
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Processing...";
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                const country = document.getElementById('sCountry').value;
                const budget = document.getElementById('budget').value;
                const degree = document.getElementById('sDegree').value;
                const score = document.getElementById('sScore').value;
                const gap = document.getElementById('sGap').value;
                const lType = document.getElementById('sLType').value;
                const lScore = document.getElementById('sLScore').value;

                let cMatch = (country === "All" || country === u.country);
                let bMatch = (!budget || u.tutionFee <= budget);
                let dMatch = (degree === u.degreeLevel);
                let sMatch = (degree === 'UG') ? (score >= u.minGPA) : (score >= u.minCGPA);
                let gMatch = (gap <= u.maxStudyGap);
                let lMatch = (lType === u.languageType && lScore >= u.minLangScore);

                return cMatch && bMatch && dMatch && sMatch && gMatch && lMatch;
            });

            resDiv.innerHTML = matches.length ? matches.map(u => `
                <div class="uni-card">
                    <h3>${u.name} - ${u.location}, ${u.country}</h3>
                    <p><strong>Course:</strong> ${u.courseName} | <strong>Fee:</strong> ${u.tutionFee}</p>
                    <p style="color: green;"><strong>Scholarship:</strong> ${u.scholarship || 'N/A'}</p>
                    <p><small>Bank: ${u.requiredBankAmount} (${u.bankType})</small></p>
                </div>
            `).join('') : "No Matching University Found.";
        }
    </script>
</body>
</html>
