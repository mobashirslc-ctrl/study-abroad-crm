<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal - Assessment Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0052cc; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .uni-card { border-left: 6px solid #0052cc; padding: 20px; margin-top: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 4px; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; margin-top: 10px; color: #444; }
        .scholarship { color: #28a745; font-weight: bold; margin-top: 12px; padding: 8px; background: #e8f5e9; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #003366; text-align: center;">Student Assessment Portal</h2>
        
        <div class="grid">
            <select id="sCountry">
                <option value="All">All Preferred Countries</option>
                <option value="UK">United Kingdom</option>
                <option value="Australia">Australia</option>
                <option value="Canada">Canada</option>
                <option value="USA">USA</option>
            </select>
            <select id="sMarital">
                <option value="Single">Single Student</option>
                <option value="Married">Married (With Spouse)</option>
            </select>
        </div>

        <div class="grid">
            <select id="sDegree">
                <option value="UG">Undergraduate (UG)</option>
                <option value="PG">Postgraduate (PG)</option>
            </select>
            <input type="number" id="sScore" placeholder="Enter GPA/CGPA">
        </div>

        <div class="grid">
            <select id="sLType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="Duolingo">Duolingo</option>
            </select>
            <input type="number" step="0.1" id="sLScore" placeholder="Student's Lang Score">
        </div>

        <div class="grid">
            <input type="number" id="sGap" placeholder="Study Gap (Years)">
            <input type="number" id="budget" placeholder="Max Tuition Budget">
        </div>

        <button onclick="performSearch()">Search Matching Universities</button>
        <div id="resultsArea"></div>
    </div>

    <script>
        async function performSearch() {
            const resArea = document.getElementById('resultsArea');
            resArea.innerHTML = "<p style='text-align:center;'>Scanning database...</p>";
            
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                const country = document.getElementById('sCountry').value;
                const marital = document.getElementById('sMarital').value;
                const degree = document.getElementById('sDegree').value;
                const score = document.getElementById('sScore').value;
                const langScore = document.getElementById('sLScore').value;
                const gap = document.getElementById('sGap').value;
                const budget = document.getElementById('budget').value;

                let cMatch = (country === "All" || u.country === country);
                let mMatch = (marital === "Single" || u.maritalStatus === "Allowed");
                let sMatch = (degree === 'UG') ? (score >= u.minGPA) : (score >= u.minCGPA);
                let lMatch = (langScore >= u.minLangScore);
                let gMatch = (gap <= u.maxStudyGap);
                let bMatch = (!budget || u.tutionFee <= budget);

                return cMatch && mMatch && sMatch && lMatch && gMatch && bMatch;
            });

            resArea.innerHTML = matches.length ? matches.map(u => `
                <div class="uni-card">
                    <h2 style="margin:0; color:#003366;">${u.name}</h2>
                    <p style="margin: 5px 0; color:#666;">📍 ${u.location}, ${u.country}</p>
                    
                    <div class="details-grid">
                        <span><strong>🎓 Degree:</strong> ${u.degreeLevel} - ${u.courseName}</span>
                        <span><strong>💰 Tuition:</strong> ${u.currency} ${u.tutionFee}</span>
                        <span><strong>🌐 Language:</strong> ${u.languageType} ${u.minLangScore}</span>
                        <span><strong>🏦 Bank:</strong> ${u.requiredBankAmount} (${u.bankType})</span>
                        <span><strong>👨‍👩‍👧 Spouse:</strong> ${u.maritalStatus}</span>
                        <span><strong>⏳ Max Gap:</strong> ${u.maxStudyGap} Years</span>
                    </div>
                    
                    <div class="scholarship">🎁 Scholarship: ${u.scholarship || 'Standard Terms Apply'}</div>
                </div>
            `).join('') : "<p style='text-align:center; color:red; margin-top:20px;'>No university found matching these criteria.</p>";
        }
    </script>
</body>
</html>
