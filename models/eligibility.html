<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eligibility Check</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
        .card { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .uni-res { border-left: 6px solid #0052cc; background: #fff; padding: 15px; margin-top: 15px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #0052cc; color: white; border: none; cursor: pointer; font-weight: bold; }
        .scholar { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Partner Portal - Search Universities</h2>
        <select id="sDegree">
            <option value="UG">Undergraduate (UG)</option>
            <option value="PG">Postgraduate (PG)</option>
            <option value="PhD">PhD</option>
            <option value="Diploma">Diploma</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <input type="number" step="0.01" id="sScore" placeholder="GPA/CGPA">
            <input type="number" id="sGap" placeholder="Study Gap">
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="sLType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="Duolingo">Duolingo</option>
            </select>
            <input type="number" step="0.1" id="sLScore" placeholder="Lang Score">
        </div>
        <button onclick="find()">Search Programs</button>
        <div id="display"></div>
    </div>

    <script>
        async function find() {
            const disp = document.getElementById('display');
            disp.innerHTML = "Processing...";
            
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                const degree = document.getElementById('sDegree').value;
                const score = document.getElementById('sScore').value;
                const gap = document.getElementById('sGap').value;
                const lType = document.getElementById('sLType').value;
                const lScore = document.getElementById('sLScore').value;

                let sMatch = (degree === 'UG') ? (score >= u.minGPA) : (score >= u.minCGPA);
                let dMatch = (degree === u.degreeLevel);
                let lMatch = (lType === u.languageType) && (lScore >= u.minLangScore);
                
                return dMatch && sMatch && (gap <= u.maxStudyGap) && lMatch;
            });

            disp.innerHTML = matches.length ? matches.map(u => `
                <div class="uni-res">
                    <h3>${u.name}</h3>
                    <p><strong>Location:</strong> ${u.location}, ${u.country}</p>
                    <p><strong>Course:</strong> ${u.courseName} (${u.degreeLevel})</p>
                    <p><strong>Fee:</strong> ${u.currency} ${u.tutionFee} | <strong>Intake:</strong> ${u.intake}</p>
                    <p class="scholar">Scholarship: ${u.scholarship || 'N/A'}</p>
                    <p><small>Bank: ${u.requiredBankAmount} (${u.bankType})</small></p>
                </div>
            `).join('') : "No matching programs found for this criteria.";
        }
    </script>
</body>
</html>
