<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal - Eligibility Check</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #fdfbfb; }
        .card { max-width: 500px; background: white; padding: 25px; border-top: 5px solid #27ae60; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Check Student Eligibility</h2>
        <input type="number" step="0.1" id="studentCGPA" placeholder="Enter Student CGPA">
        <input type="number" step="0.5" id="studentIELTS" placeholder="Enter Student IELTS Score">
        <button onclick="checkEligibility()" style="width:100%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer;">Search Universities</button>
        
        <div id="resultArea" class="result"></div>
    </div>

    <script>
        const API_URL = "https://study-abroad-crm.onrender.com";
        async function checkEligibility() {
            const cgpa = document.getElementById('studentCGPA').value;
            const ielts = document.getElementById('studentIELTS').value;
            const resArea = document.getElementById('resultArea');
            
            resArea.style.display = "block";
            resArea.innerHTML = "Checking database...";

            try {
                const response = await fetch(`${API_URL}/api/universities`);
                const unis = await response.json();
                
                // Eligibility Logic
                const match = unis.filter(u => cgpa >= u.minCGPA && ielts >= u.minIELTS);
                
                if(match.length > 0) {
                    resArea.innerHTML = "<h3>Eligible for:</h3>" + match.map(u => `<p>✅ ${u.name} (${u.country})</p>`).join('');
                    resArea.style.backgroundColor = "#d4edda";
                } else {
                    resArea.innerHTML = "❌ No matching university found for this score.";
                    resArea.style.backgroundColor = "#f8d7da";
                }
            } catch(err) { resArea.innerHTML = "Server Error!"; }
        }
    </script>
</body>
</html>
