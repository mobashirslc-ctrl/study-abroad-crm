<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal - Assessment</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 750px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0052cc; color: white; border: none; font-weight: bold; cursor: pointer; }
        .uni-card { border-left: 6px solid #0052cc; padding: 20px; margin-top: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Assessment Tool</h2>
        <div class="grid">
            <select id="sDegree">
                <option value="UG">Undergraduate (UG)</option>
                <option value="PG">Postgraduate (PG)</option>
            </select>
            <select id="sBank">
                <option value="Any">Any Bank Type</option>
                <option value="FDR">FDR</option>
                <option value="Savings">Savings</option>
            </select>
        </div>
        <div class="grid">
            <input type="number" step="0.01" id="sScore" placeholder="GPA/CGPA Score">
            <input type="number" id="sGap" placeholder="Study Gap (Years)">
        </div>
        <div class="grid">
            <select id="sLType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
            </select>
            <input type="number" step="0.1" id="sLScore" placeholder="Lang Score">
        </div>
        <button onclick="search()">Find Best Match</button>
        <div id="results"></div>
    </div>

    <script>
        async function search() {
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "<p>Searching...</p>";
            
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                const degree = document.getElementById('sDegree').value;
                const bank = document.getElementById('sBank').value;
                const score = document.getElementById('sScore').value;
                const gap = document.getElementById('sGap').value;
                const lScore = document.getElementById('sLScore').value;

                // 🔴 BUG FIX: Strict Degree Matching
                let degreeMatch = (u.degreeLevel === degree); 
                
                // Bank Type Matching
                let bankMatch = (bank === "Any" || u.bankType === bank);
                
                // Score Matching
                let scoreMatch = (degree === 'UG') ? (score >= u.minGPA) : (score >= u.minCGPA);
                
                // Other Matches
                let gapMatch = (gap <= u.maxStudyGap);
                let langMatch = (lScore >= u.minLangScore);

                return degreeMatch && bankMatch && scoreMatch && gapMatch && langMatch;
            });

            resDiv.innerHTML = matches.length ? matches.map(u => `
                <div class="uni-card">
                    <h3>${u.name} - ${u.country}</h3>
                    <p><strong>Course:</strong> ${u.courseName} (${u.degreeLevel})</p>
                    <p><strong>Fee:</strong> ${u.currency} ${u.tutionFee} | <strong>Bank:</strong> ${u.requiredBankAmount} (${u.bankType})</p>
                    <p style="color: green;"><strong>Scholarship:</strong> ${u.scholarship || 'N/A'}</p>
                </div>
            `).join('') : "<p style='color:red;'>No matching university found for " + document.getElementById('sDegree').value + ".</p>";
        }
    </script>
</body>
</html>
