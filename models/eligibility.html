<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal - Check Eligibility</title>
    <style>
        body { font-family: sans-serif; background: #fdfbfb; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; border-top: 5px solid #00b09b; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .res { margin-top: 15px; padding: 10px; border-radius: 5px; }
        .uni-item { background: #f9f9f9; padding: 10px; margin: 5px 0; border-left: 4px solid #00b09b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Check Eligibility</h2>
        <select id="level">
            <option value="UG">Undergraduate (Apply with GPA)</option>
            <option value="MS">Masters (Apply with CGPA)</option>
        </select>
        <input type="number" step="0.01" id="sScore" placeholder="Enter GPA/CGPA Score">
        <input type="number" id="sGap" placeholder="Enter Study Gap (Years)">
        <input type="number" step="0.5" id="sIELTS" placeholder="Enter IELTS Score">
        <button onclick="check()" style="width:100%; padding:12px; background:#00b09b; color:white; border:none; margin-top:10px; cursor:pointer;">Search Programs</button>
        <div id="results"></div>
    </div>

    <script>
        async function check() {
            const level = document.getElementById('level').value;
            const score = document.getElementById('sScore').value;
            const gap = document.getElementById('sGap').value;
            const ielts = document.getElementById('sIELTS').value;
            const resDiv = document.getElementById('results');
            
            resDiv.innerHTML = "Searching...";
            
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                let sMatch = (level === 'UG') ? (score >= u.minGPA) : (score >= u.minCGPA);
                return sMatch && (gap <= u.maxStudyGap) && (ielts >= u.minIELTS);
            });

            if(matches.length > 0) {
                resDiv.innerHTML = "<h3>Eligible Programs:</h3>" + matches.map(u => `
                    <div class="uni-item">
                        <strong>${u.name}</strong> (${u.country})<br>
                        Course: ${u.courseName} | Intake: ${u.intake}<br>
                        <small>Bank: FDR ${u.requiredFDR} / Savings ${u.requiredSavings}</small>
                    </div>
                `).join('');
            } else { resDiv.innerHTML = "<p style='color:red;'>No matching programs found.</p>"; }
        }
    </script>
</body>
</html>
