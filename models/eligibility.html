<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner - Check Eligibility</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .card { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .uni-card { border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-left: 5px solid #28a745; background: #fff; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Student Eligibility Check</h2>
        <select id="level">
            <option value="UG">Applying for Undergraduate (GPA)</option>
            <option value="MS">Applying for Masters (CGPA)</option>
        </select>
        <input type="number" step="0.01" id="score" placeholder="Enter Score (GPA/CGPA)">
        <input type="number" id="gap" placeholder="Study Gap (Years)">
        <div style="display: flex; gap: 10px;">
            <select id="lType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="Duolingo">Duolingo</option>
                <option value="GRE">GRE</option>
            </select>
            <input type="number" step="0.1" id="lScore" placeholder="Score">
        </div>
        <button onclick="search()">Search Matching Universities</button>
        <div id="res"></div>
    </div>

    <script>
        async function search() {
            const resDiv = document.getElementById('res');
            resDiv.innerHTML = "Searching...";
            
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                const sType = document.getElementById('level').value;
                const sScore = document.getElementById('score').value;
                const sGap = document.getElementById('gap').value;
                const sLType = document.getElementById('lType').value;
                const sLScore = document.getElementById('lScore').value;

                let scoreMatch = (sType === 'UG') ? (sScore >= u.minGPA) : (sScore >= u.minCGPA);
                let langMatch = (sLType === u.languageType) && (sLScore >= u.minLangScore);
                
                return scoreMatch && (sGap <= u.maxStudyGap) && langMatch;
            });

            resDiv.innerHTML = matches.length ? matches.map(u => `
                <div class="uni-card">
                    <strong>${u.name}</strong> - ${u.country}<br>
                    Course: ${u.courseName} | Intake: ${u.intake}<br>
                    Tuition: ${u.tutionFee} | Bank: ${u.requiredBankAmount} (${u.bankType})
                </div>
            `).join('') : "No matching university found.";
        }
    </script>
</body>
</html>
