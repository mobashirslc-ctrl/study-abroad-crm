<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal - Assessment</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; }
        .card { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; }
        .uni-card { border-left: 5px solid #0052cc; padding: 15px; margin-top: 15px; background: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0052cc; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Student Eligibility Check</h2>
        <div class="grid">
            <select id="sCountry"><option value="All">All Countries</option><option value="UK">UK</option><option value="Australia">Australia</option></select>
            <select id="sMarital"><option value="Single">Single</option><option value="Married">Married (Spouse Required)</option></select>
        </div>
        <div class="grid">
            <select id="sDegree"><option value="UG">UG</option><option value="PG">PG</option></select>
            <input type="number" id="sScore" placeholder="GPA/CGPA">
        </div>
        <button onclick="search()">Search</button>
        <div id="results"></div>
    </div>

    <script>
        async function search() {
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Processing...";
            const response = await fetch("https://study-abroad-crm.onrender.com/api/universities");
            const unis = await response.json();
            
            const matches = unis.filter(u => {
                const marital = document.getElementById('sMarital').value;
                const degree = document.getElementById('sDegree').value;
                const score = document.getElementById('sScore').value;

                let mMatch = (marital === "Single" || u.maritalStatus === "Allowed");
                let dMatch = (degree === u.degreeLevel);
                let sMatch = (degree === 'UG') ? (score >= u.minGPA) : (score >= u.minCGPA);

                return mMatch && dMatch && sMatch;
            });

            resDiv.innerHTML = matches.map(u => `
                <div class="uni-card">
                    <h3>${u.name}</h3>
                    <p>Fee: ${u.currency} ${u.tutionFee} | Spouse: ${u.maritalStatus}</p>
                    <p style="color: green;">Scholarship: ${u.scholarship}</p>
                </div>
            `).join('') || "No Match Found";
        }
    </script>
</body>
</html>
