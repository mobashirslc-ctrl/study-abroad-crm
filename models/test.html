<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Test</title>
</head>
<body>
    <h2>Server Connection Test</h2>
    <button onclick="testConnection()">Check Server Status</button>
    <p id="status"></p>

    <script>
        async function testConnection() {
            const statusText = document.getElementById('status');
            statusText.innerText = "Checking...";
            
            try {
                const res = await fetch("https://study-abroad-crm.onrender.com/");
                const data = await res.text();
                statusText.innerHTML = `<b style="color: green;">Response: ${data}</b>`;
            } catch (err) {
                statusText.innerHTML = `<b style="color: red;">Error: Server is offline.</b>`;
            }
        }
    </script>
</body>
</html>
