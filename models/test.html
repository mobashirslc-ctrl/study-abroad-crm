<!DOCTYPE html>

<html>
<head>
<title>Student Data Entry</title>
</head>
<body style="font-family: Arial; margin: 50px;">
<h2>Add New Student</h2>
<form action="http://localhost:5000/add-student" method="POST" style="width: 300px;">
<input type="text" name="name" placeholder="Full Name" required style="width: 100%; margin: 5px 0; padding: 10px;">



<input type="email" name="email" placeholder="Email" required style="width: 100%; margin: 5px 0; padding: 10px;">



<input type="text" name="phone" placeholder="Phone" required style="width: 100%; margin: 5px 0; padding: 10px;">



<input type="text" name="course" placeholder="Course" required style="width: 100%; margin: 5px 0; padding: 10px;">



<input type="text" name="country" placeholder="Country" required style="width: 100%; margin: 5px 0; padding: 10px;">



<button type="submit" style="width: 100%; padding: 10px; background: green; color: white; border: none; cursor: pointer;">Save Student</button>
</form>
</body>
</html>
