<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard</title>
    <style>
        body { display: flex; margin: 0; font-family: sans-serif; height: 100vh; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding: 20px; }
        .main { flex: 1; padding: 30px; background: #f9f9f9; overflow-y: auto; }
        .card-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px; background: #3498db; color: white; border: none; cursor: pointer; margin-bottom: 10px; width: 100%; text-align: left; }
        input { padding: 10px; margin-right: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>StudyCRM</h2>
        <p>Welcome, <span id="partnerName">Partner</span></p>
        <button class="btn" onclick="showSection('overview')">Overview</button>
        <button class="btn" onclick="showSection('eligibility')">Eligibility Check</button>
        <button class="btn" onclick="localStorage.clear(); location.href='login.html'">Logout</button>
    </div>

    <div class="main">
        <div id="overview">
            <h1>Partner Overview</h1>
            <div class="card-row">
                <div class="card"><h3>Wallet</h3><p id="wallet">$0.00</p></div>
                <div class="card"><h3>Applications</h3><p id="appCount">0</p></div>
            </div>
        </div>

        <div id="eligibility" style="display:none;">
            <h1>Eligibility Checker</h1>
            <div class="card">
                <input type="number" id="gpa" placeholder="Student GPA" step="0.1">
                <input type="number" id="ielts" placeholder="IELTS Score" step="0.5">
                <button onclick="checkNow()" style="padding: 10px; background: #27ae60; color: white; border: none;">Search Universities</button>
                <div id="results" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // সেকশন পরিবর্তন করার ফাংশন
        function showSection(id) {
            document.getElementById('overview').style.display = id === 'overview' ? 'block' : 'none';
            document.getElementById('eligibility').style.display = id === 'eligibility' ? 'block' : 'none';
        }

        // এলিজিবিলিটি চেক করার ফাংশন
        async function checkNow() {
            const gpa = document.getElementById('gpa').value;
            const ielts = document.getElementById('ielts').value;
            const res = await fetch('https://study-abroad-crm.onrender.com/api/check-eligibility', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ gpa, ielts })
            });
            const data = await res.json();
            let html = '<h3>Eligible Universities:</h3><ul>';
            data.results.forEach(u => { html += `<li>${u.name}</li>`; });
            html += '</ul>';
            document.getElementById('results').innerHTML = data.results.length ? html : 'No universities match these scores.';
        }

        // ড্যাশবোর্ড ডাটা লোড করা
        async function loadDashboard() {
            const id = localStorage.getItem('partnerId');
            if(!id) window.location.href = 'login.html';
            const res = await fetch(`https://study-abroad-crm.onrender.com/api/partners/dashboard/${id}`);
            const partner = await res.json();
            document.getElementById('partnerName').innerText = partner.name;
            document.getElementById('wallet').innerText = `$${partner.walletBalance.toFixed(2)}`;
        }
        loadDashboard();
    </script>
</body>
</html>
