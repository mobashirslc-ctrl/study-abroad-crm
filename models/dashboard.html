<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard - Global Edu CRM</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main-content { margin-left: 270px; padding: 30px; width: calc(100% - 270px); }
        .wallet-card { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .search-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-search { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .uni-card { background: white; padding: 20px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .comm-tag { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Edu CRM</h2>
    <p>Partner:</p>
    <strong id="displayEmail">User</strong>
    <hr style="margin: 20px 0; opacity: 0.3;">
    <p style="cursor: pointer;">🏠 Dashboard</p>
    <p style="cursor: pointer;">📁 Student Files</p>
    <button onclick="logout()" style="margin-top: 50px; width: 100%; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Logout</button>
</div>

<div class="main-content">
    <div class="wallet-card">
        <p style="margin: 0; opacity: 0.9;">Wallet Balance</p>
        <h1 id="walletBalance" style="margin: 10px 0;">BDT 0.00</h1>
    </div>

    <div class="search-box">
        <h3>🔍 Search University</h3>
        <div class="grid-3">
            <input type="number" step="0.01" id="sGPA" placeholder="GPA">
            <input type="number" step="0.1" id="sIELTS" placeholder="IELTS">
            <select id="sCountry">
                <option value="UK">United Kingdom</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
            </select>
        </div>
        <div class="grid-3">
            <select id="sIntake">
                <option value="Sep 2026">Sep 2026</option>
                <option value="Jan 2027">Jan 2027</option>
            </select>
            <select id="sMarital">
                <option value="Single">Single</option>
                <option value="Married">Married</option>
            </select>
            <input type="number" id="sBank" placeholder="Bank Balance (BDT)">
        </div>
        <button class="btn-search" onclick="checkEligibility()">Check Eligibility</button>
    </div>

    <div id="results"></div>
</div>

<script>
    const API_URL = "https://study-abroad-crm.onrender.com";

    // পেজ লোড হলে ইউজার ডাটা চেক
    window.onload = () => {
        const userData = localStorage.getItem('user');
        if (!userData) {
            window.location.href = "index.html";
            return;
        }
        const user = JSON.parse(userData);
        document.getElementById('displayEmail').innerText = user.email;
        document.getElementById('walletBalance').innerText = `BDT ${user.walletBalance || 0}`;
    };

    async function checkEligibility() {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<p>Searching...</p>";

        const searchData = {
            gpa: document.getElementById('sGPA').value,
            ielts: document.getElementById('sIELTS').value,
            country: document.getElementById('sCountry').value,
            intake: document.getElementById('sIntake').value,
            maritalStatus: document.getElementById('sMarital').value,
            bankAmount: document.getElementById('sBank').value
        };

        try {
            const res = await fetch(`${API_URL}/api/check-eligibility`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(searchData)
            });
            const result = await res.json();

            resultsDiv.innerHTML = "";
            if (!result.data || result.data.length === 0) {
                resultsDiv.innerHTML = "<p>No matching universities found.</p>";
            } else {
                result.data.forEach(uni => {
                    resultsDiv.innerHTML += `
                        <div class="uni-card">
                            <span class="comm-tag">Comm: BDT ${uni.commissionAmount}</span>
                            <h4 style="margin:0;">${uni.name}</h4>
                            <p>📍 ${uni.country} | 🎓 GPA: ${uni.minGPA} | 📝 IELTS: ${uni.minIELTS}</p>
                            <button style="background:#27ae60; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Submit Application</button>
                        </div>
                    `;
                });
            }
        } catch (err) {
            resultsDiv.innerHTML = "<p style='color:red;'>Connection error!</p>";
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>

</body>
</html>
