<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f8f9fa; }
        .sidebar { width: 250px; height: 100vh; background: #2c3e50; color: white; position: fixed; padding: 20px; }
        .main-content { margin-left: 290px; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex: 1; border-top: 4px solid #1a73e8; }
        .card h3 { color: #777; font-size: 14px; margin: 0; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0 0; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 30px; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f4; color: #555; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>StudyCRM</h2>
        <p>Welcome, <b id="pName">Partner</b></p>
        <hr>
        <button onclick="localStorage.clear(); window.location.href='login.html'" style="background:none; color:white; border:1px solid white; cursor:pointer; padding:5px 10px;">Logout</button>
    </div>

    <div class="main-content">
        <div class="header"><h1>Partner Overview</h1></div>
        
        <div class="stats-grid">
            <div class="card"><h3>Total Earnings</h3><p id="wallet">$0.00</p></div>
            <div class="card"><h3>Active Applications</h3><p id="fileCount">0</p></div>
            <div class="card"><h3>Total Commission</h3><p id="totalComm">$0.00</p></div>
        </div>

        <h3>Recent Student File Tracking</h3>
        <table>
            <thead>
                <tr><th>Student Name</th><th>University</th><th>Status</th><th>Commission</th><th>Last Update</th></tr>
            </thead>
            <tbody id="fileList"></tbody>
        </table>
    </div>

    <script>
        async function fetchDashboard() {
            const partnerId = localStorage.getItem('partnerId');
            if (!partnerId) window.location.href = 'login.html';

            const response = await fetch(`https://study-abroad-crm.onrender.com/api/partners/dashboard/${partnerId}`);
            const data = await response.json();

            document.getElementById('pName').innerText = data.name;
            document.getElementById('wallet').innerText = `$${data.walletBalance}`;
            document.getElementById('fileCount').innerText = data.files.length;
            
            const list = document.getElementById('fileList');
            list.innerHTML = data.files.map(f => `
                <tr>
                    <td>${f.studentName}</td>
                    <td>${f.university}</td>
                    <td><span class="status-badge pending">${f.status}</span></td>
                    <td>$${f.commission}</td>
                    <td>${new Date(f.lastUpdate).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }
        fetchDashboard();
    </script>
</body>
</html>
