<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | StepUp CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 25px; }
        .nav-link { padding: 14px; color: #94a3b8; cursor: pointer; display: block; text-decoration: none; border-radius: 10px; margin-bottom: 10px; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--accent); }
        .main { margin-left: 290px; padding: 40px; width: calc(100% - 320px); }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #f1f5f9; color: #475569; font-size: 12px; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .chat-bar { display: flex; gap: 5px; background: #f8fafc; padding: 5px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .chat-input { border: none; background: none; outline: none; padding: 5px; flex: 1; font-size: 12px; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent);">StepUp CRM</h2>
    <div class="nav-link active" onclick="show('search')"><i class="fas fa-search"></i> Eligibility Search</div>
    <div class="nav-link" onclick="show('files')"><i class="fas fa-folder-open"></i> Existing Files</div>
</div>

<div class="main">
    <div style="margin-bottom: 30px;">
        <h1>Welcome, <span id="pName" style="color:var(--accent);">Partner</span>!</h1>
        <p id="dateDisplay"></p>
    </div>

    <div id="searchBox" class="card">
        <h3><i class="fas fa-university"></i> Find University & Check Commission</h3>
        <form id="sForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;">
            <input type="text" id="sCountry" placeholder="Country">
            <select id="sDegree"><option value="">Degree</option><option value="Undergraduate (UG)">UG</option><option value="Postgraduate (PG)">PG</option></select>
            <input type="number" step="0.01" id="sGPA" placeholder="GPA">
            <button type="submit" style="background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">Search</button>
        </form>
        <table>
            <thead><tr><th>University</th><th>Course</th><th>Fee (BDT)</th><th>Commission (BDT)</th><th>Action</th></tr></thead>
            <tbody id="uniResults"></tbody>
        </table>
    </div>

    <div id="fileBox" class="card" style="display:none;">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-history"></i> My Applied Files & Tracking</h3>
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Student Name</th>
                    <th>Status</th>
                    <th>Compliance Member</th>
                    <th>Communication Bar</th>
                </tr>
            </thead>
            <tbody id="fileResults"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com";
    const partnerName = localStorage.getItem('partnerName') || "Demo Partner";
    document.getElementById('pName').innerText = partnerName;
    document.getElementById('dateDisplay').innerText = new Date().toDateString();

    function show(id) {
        document.getElementById('searchBox').style.display = id === 'search' ? 'block' : 'none';
        document.getElementById('fileBox').style.display = id === 'files' ? 'block' : 'none';
        if(id === 'files') loadFiles();
    }

    // --- Search Logic ---
    document.getElementById('sForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch(`${API}/api/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ country: document.getElementById('sCountry').value, gpa: document.getElementById('sGPA').value })
        });
        const json = await res.json();
        const body = document.getElementById('uniResults');
        body.innerHTML = '';
        json.data.forEach(u => {
            body.innerHTML += `<tr>
                <td><b>${u.name}</b></td>
                <td>${u.course}</td>
                <td>৳ ${u.semesterFee}</td>
                <td style="color:var(--success); font-weight:bold;">৳ ${u.partnerCommission}</td>
                <td><button onclick="openFile('${u.name}', ${u.partnerCommission})" style="background:var(--accent); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Open File</button></td>
            </tr>`;
        });
    });

    async function openFile(uni, comm) {
        const student = prompt("Enter Student Full Name:");
        if(!student) return;
        await fetch(`${API}/api/applications`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ partnerName, studentName: student, universityName: uni, commission: comm })
        });
        alert("File Opened Successfully!");
    }

    // --- Tracking & Communication Logic ---
    async function loadFiles() {
        const res = await fetch(`${API}/api/applications/${partnerName}`);
        const data = await res.json();
        const body = document.getElementById('fileResults');
        body.innerHTML = '';

        data.forEach(f => {
            const date = new Date(f.createdAt);
            const formattedDate = `${date.toLocaleDateString()}<br><small style="color:#64748b;">${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>`;

            body.innerHTML += `
                <tr>
                    <td>${formattedDate}</td>
                    <td><b>${f.studentName}</b><br><small>${f.universityName}</small></td>
                    <td><span style="background:#e0f2fe; color:#0369a1; padding:4px 8px; border-radius:12px; font-size:11px; font-weight:bold;">${f.status}</span></td>
                    <td>
                        <div style="font-size:13px; font-weight:600;">${f.complianceOfficer.name}</div>
                        <div style="font-size:11px; color:#64748b;"><i class="fas fa-phone"></i> ${f.complianceOfficer.phone}</div>
                    </td>
                    <td>
                        <div class="chat-bar">
                            <input type="text" id="msg_${f._id}" class="chat-input" placeholder="Ask admin...">
                            <button class="send-btn" onclick="sendMsg('${f._id}')"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    async function sendMsg(appId) {
        const msg = document.getElementById(`msg_${appId}`).value;
        if(!msg) return;
        await fetch(`${API}/api/applications/message`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ appId, message: msg, sender: partnerName })
        });
        alert("Message Sent!");
        document.getElementById(`msg_${appId}`).value = '';
    }
</script>
</body>
</html>
