<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 280px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); display: flex; flex-direction: column; align-items: center; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 12px; margin-bottom: 5px; width: 100%; }
        .nav-item.active { background: #1e293b; color: white; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1100px; margin-bottom: 30px; }
        .stat-card { padding: 25px; border-radius: 20px; color: white; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 1100px; box-sizing: border-box; }
        .page { display: none; width: 100%; max-width: 1100px; } .page.active { display: block; }
        .search-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary);"><i class="fas fa-rocket"></i> IHP CRM</h2>
    <div class="nav-item active" onclick="showPage('search', this)"><i class="fas fa-search"></i> University Search</div>
    <div class="nav-item" onclick="showPage('tracking', this)"><i class="fas fa-file-invoice"></i> Student Tracking</div>
    <div class="nav-item" onclick="showPage('wallet', this)"><i class="fas fa-wallet"></i> Wallet</div>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="stat-card" style="background: #2563eb;">EARNINGS<br><h2>৳ 0</h2></div>
        <div class="stat-card" style="background: #10b981;">WITHDRAWN<br><h2>৳ 0</h2></div>
        <div class="stat-card" style="background: #d97706;">PENDING<br><h2>৳ 0</h2></div>
    </div>

    <div id="searchPage" class="page active">
        <div class="card">
            <h3>Assessment / Eligibility Check</h3>
            <div class="search-grid">
                <input type="text" id="sCountry" placeholder="Country">
                <select id="sDegree">
                    <option value="">Degree</option><option>UG</option><option>PG</option><option>Diploma</option><option>PhD</option>
                </select>
                <select id="sLang">
                    <option value="">Language</option><option>IELTS</option><option>PTE</option><option>Duolingo</option>
                </select>
                <input type="number" id="sGPA" placeholder="Your GPA" step="0.1">
            </div>
            <button class="btn" style="width:100%" onclick="checkEligibility()">Search Now</button>
            <table>
                <thead><tr><th>University</th><th>Fee</th><th>Bank Req.</th><th>Commission</th></tr></thead>
                <tbody id="results"></tbody>
            </table>
        </div>
    </div>

    <div id="trackingPage" class="page">
        <div class="card"><h3>Student Tracking</h3><table id="trackTable"><thead><tr><th>Student</th><th>University</th><th>Status</th></tr></thead><tbody id="trackData"></tbody></table></div>
    </div>
</div>

<script>
    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'tracking') loadTracking();
    }

    async function checkEligibility() {
        const res = await fetch('https://study-abroad-crm.onrender.com/api/check-eligibility', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ country: document.getElementById('sCountry').value, degree: document.getElementById('sDegree').value, language: document.getElementById('sLang').value, gpa: document.getElementById('sGPA').value })
        });
        const json = await res.json();
        document.getElementById('results').innerHTML = json.data.map(u => `
            <tr><td><b>${u.name}</b><br><small>${u.country}</small></td><td>${u.currency} ${u.semesterFee}</td><td>${u.bankBalance}</td><td style="color:green">৳${u.partnerCommission}</td></tr>
        `).join('');
    }

    async function loadTracking() {
        const res = await fetch('https://study-abroad-crm.onrender.com/api/admin/files');
        const data = await res.json();
        document.getElementById('trackData').innerHTML = data.map(f => `<tr><td>${f.studentName}</td><td>${f.university}</td><td>${f.status}</td></tr>`).join('');
    }
</script>
</body>
</html>
