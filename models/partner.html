<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .sidebar h2 { color: white; font-size: 22px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }

        /* Main Content */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Stats Cards */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; border-radius: 20px; color: white; position: relative; }
        .stat-card h2 { margin: 10px 0; font-size: 28px; }
        .withdraw-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; }

        /* Content Card */
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .page { display: none; }
        .page.active { display: block; }

        /* Search Form */
        .search-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }
        
        .apply-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> IHP CRM</h2>
    <div class="nav-item active" onclick="showPage('search', this)"><i class="fas fa-search"></i> University Search</div>
    <div class="nav-item" onclick="showPage('tracking', this)"><i class="fas fa-folder"></i> Student Tracking</div>
    <div class="nav-item" onclick="showPage('wallet', this)"><i class="fas fa-wallet"></i> Wallet & Sub</div>
</div>

<div class="main">
    <div class="header">
        <div>
            <h1 style="margin:0;">Partner Dashboard</h1>
            <p style="color:#64748b; margin-top:5px;">Welcome to IHP CRM Management</p>
        </div>
        <div id="currentTime" style="font-size: 14px; color: #64748b;"></div>
    </div>

    <div class="stat-grid">
        <div class="stat-card" style="background: #2563eb;">TOTAL EARNINGS<br><h2>৳ <span id="eTotal">0</span></h2></div>
