<style>
    /* নতুন অ্যাসেসমেন্ট সেকশনের জন্য স্টাইল */
    .assessment-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
    }
    .support-card {
        background: #eff6ff;
        border-left: 5px solid var(--primary);
        padding: 15px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 15px;
        margin-top: 20px;
    }
</style>

<div class="content">
    <div id="searchBox" class="card">
        <h3 style="margin-top:0;"><i class="fas fa-file-signature"></i> Student Eligibility Assessment</h3>
        <form id="assessmentForm">
            <div class="assessment-grid">
                <div>
                    <label style="font-size: 12px; font-weight: 600;">Preferred Country</label>
                    <input type="text" id="sCountry" placeholder="e.g. UK, Canada">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 600;">Degree Level</label>
                    <select id="sDegree">
                        <option value="UG">Undergraduate (UG)</option>
                        <option value="PG">Postgraduate (PG)</option>
                        <option value="DIPLOMA">Diploma</option>
                        <option value="PHD">PhD</option>
                        <option value="RESEARCH">Research</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 600;">Language Proficiency</label>
                    <select id="sLangType">
                        <option value="IELTS">IELTS</option>
                        <option value="PTE">PTE</option>
                        <option value="DUOLINGO">Duolingo</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 600;">Language Score</label>
                    <input type="number" step="0.1" id="sLangScore" placeholder="e.g. 6.5">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 600;">GPA / CGPA</label>
                    <input type="number" step="0.01" id="sGPA" placeholder="e.g. 3.50">
                </div>
            </div>
            <button type="submit" class="btn-submit" style="width: auto; padding: 12px 40px;">Check Eligibility</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

        <table id="uniTable">
            <thead>
                <tr><th>University</th><th>Scholarship</th><th>Commission</th><th>Action</th></tr>
            </thead>
            <tbody id="uniResults">
                </tbody>
        </table>
    </div>

    <div class="support-card">
        <div class="avatar" style="background: var(--primary); color: white; width: 50px; height: 50px;">
            <i class="fas fa-headset fa-lg"></i>
        </div>
        <div>
            <h4 style="margin: 0; color: var(--dark);">Team Support</h4>
            <p style="margin: 2px 0; font-size: 14px; color: #64748b;">For any queries, contact our customer care: <b>+880 1XXX XXXXXX</b></p>
        </div>
    </div>
</div>

<script>
    // সার্চ ফাংশনালিটি ফিক্স
    document.getElementById('assessmentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resultsBody = document.getElementById('uniResults');
        resultsBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Searching Universities...</td></tr>';

        const searchData = {
            country: document.getElementById('sCountry').value,
            degree: document.getElementById('sDegree').value,
            language: document.getElementById('sLangType').value,
            langScore: document.getElementById('sLangScore').value,
            gpa: document.getElementById('sGPA').value
        };

        try {
            const res = await fetch(`${API}/api/check-eligibility`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(searchData)
            });
            const json = await res.json();
            
            resultsBody.innerHTML = '';
            if(json.data.length === 0) {
                resultsBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">No matching university found for this criteria.</td></tr>';
                return;
            }

            json.data.forEach(u => {
                resultsBody.innerHTML += `
                    <tr>
                        <td><b>${u.name}</b><br><small>${u.location}, ${u.country}</small></td>
                        <td><span style="color:var(--warning); font-weight:700;">${u.scholarship}</span></td>
                        <td style="color:var(--success); font-weight:800;">৳ ${u.partnerCommission}</td>
                        <td><button class="btn-submit" style="padding: 8px 15px; font-size: 12px; width: auto;" onclick="openFile('${u.name}', ${u.partnerCommission})">Apply Now</button></td>
                    </tr>`;
            });
        } catch (err) {
            resultsBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Connection Error!</td></tr>';
        }
    });
</script>
