<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IHP CRM | Partner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 250px; background: #0f172a; color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 290px; padding: 40px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f1f5f9; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP CRM</h2>
    <div onclick="show('search')" style="cursor:pointer; margin-bottom:15px;"><i class="fas fa-search"></i> University Search</div>
    <div onclick="show('files')" style="cursor:pointer;"><i class="fas fa-folder"></i> Student Files</div>
</div>

<div class="main">
    <h1>Partner Portal</h1>
    
    <div id="searchBox" class="card">
        <h3><i class="fas fa-filter"></i> Search Universities</h3>
        <form id="sForm" class="grid">
            <input type="text" id="sCountry" placeholder="Country (e.g. Australia)">
            <select id="sDegree">
                <option value="UG">Undergraduate (UG)</option>
                <option value="PG">Postgraduate (PG)</option>
                <option value="Diploma">Diploma</option>
            </select>
            <select id="sLang">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="Duolingo">Duolingo</option>
            </select>
            <input type="number" step="0.1" id="sScore" placeholder="Score (e.g. 6.0)">
            <input type="number" step="0.01" id="sGPA" placeholder="Student GPA">
            <button type="submit" class="btn">Search</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>University & Location</th>
                    <th>Intake</th>
                    <th>Scholarship</th>
                    <th>Commission</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="uniResults"></tbody>
        </table>
    </div>

    <div id="fileBox" class="card" style="display:none;">
        <h3>My Files</h3>
        <table id="fileTable">
            <thead>
                <tr><th>Date</th><th>Student Name</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="fileResults"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com"; // আপনার রেন্ডার ইউআরএল
    const partnerName = "Demo Partner";

    function show(id) {
        document.getElementById('searchBox').style.display = id === 'search' ? 'block' : 'none';
        document.getElementById('fileBox').style.display = id === 'files' ? 'block' : 'none';
        if(id === 'files') loadFiles();
    }

    document.getElementById('sForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = document.getElementById('uniResults');
        body.innerHTML = 'Searching...';

        const res = await fetch(`${API}/api/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                country: document.getElementById('sCountry').value,
                degree: document.getElementById('sDegree').value,
                language: document.getElementById('sLang').value,
                langScore: document.getElementById('sScore').value,
                gpa: document.getElementById('sGPA').value
            })
        });
        const json = await res.json();
        body.innerHTML = '';
        if(json.data.length === 0) body.innerHTML = 'No University Found.';
        
        json.data.forEach(u => {
            body.innerHTML += `<tr>
                <td><b>${u.name}</b><br><small>${u.location}, ${u.country}</small></td>
                <td>${u.intake}</td>
                <td><span style="background:#fef3c7; padding:4px; border-radius:5px;">${u.scholarship}</span></td>
                <td style="color:green; font-weight:bold;">৳ ${u.partnerCommission}</td>
                <td><button onclick="openFile('${u.name}', ${u.partnerCommission})" class="btn" style="padding:5px 10px;">Open File</button></td>
            </tr>`;
        });
    });

    async function openFile(uni, comm) {
        const student = prompt("Enter Student Name:");
        if(!student) return;
        await fetch(`${API}/api/applications`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ partnerName, studentName: student, universityName: uni, commission: comm })
        });
        alert("Submitted!");
    }

    async function loadFiles() {
        const res = await fetch(`${API}/api/applications/${partnerName}`);
        const data = await res.json();
        const body = document.getElementById('fileResults');
        body.innerHTML = '';
        data.forEach(f => {
            body.innerHTML += `<tr>
                <td>${new Date(f.createdAt).toLocaleDateString()}</td>
                <td>${f.studentName}</td>
                <td style="color:blue;">${f.status}</td>
                <td><button class="btn" style="padding:5px;">Chat</button></td>
            </tr>`;
        });
    }
</script>
</body>
</html>
