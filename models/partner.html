<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--dark); height: 100vh; position: fixed; color: white; padding: 25px; }
        .content { margin-left: 260px; padding: 30px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>IHP CRM</h2>
    <div style="margin-top:30px"><i class="fas fa-search"></i> Assessment</div>
    <div style="margin-top:20px; color:gray"><i class="fas fa-file"></i> Student Files</div>
</div>
<div class="content">
    <div class="card">
        <h3>Student Eligibility Assessment</h3>
        <form id="searchForm">
            <div class="form-grid">
                <input type="text" id="sCountry" placeholder="Country">
                <select id="sDegree">
                    <option value="Undergraduate (UG)">UG</option>
                    <option value="Postgraduate (PG)">PG</option>
                </select>
                <select id="sLangType">
                    <option value="IELTS">IELTS</option>
                    <option value="PTE">PTE</option>
                    <option value="DUOLINGO">Duolingo</option>
                </select>
                <input type="number" step="0.1" id="sScore" placeholder="Score">
                <input type="number" step="0.1" id="sGPA" placeholder="GPA">
            </div>
            <button type="submit" class="btn">Check Eligibility</button>
        </form>
        <table style="margin-top:30px">
            <thead><tr><th>University</th><th>Intake</th><th>Scholarship</th><th>Commission</th><th>Spouse</th><th>Action</th></tr></thead>
            <tbody id="results"></tbody>
        </table>
    </div>
</div>
<script>
    document.getElementById('searchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "<tr><td colspan='6' style='text-align:center'>Searching...</td></tr>";

        const params = {
            country: document.getElementById('sCountry').value,
            degree: document.getElementById('sDegree').value,
            languageType: document.getElementById('sLangType').value,
            langScore: parseFloat(document.getElementById('sScore').value) || 0,
            gpa: parseFloat(document.getElementById('sGPA').value) || 0
        };

        const res = await fetch('https://study-abroad-crm.onrender.com/api/check-eligibility', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(params)
        });
        const json = await res.json();
        resDiv.innerHTML = json.data.map(u => `
            <tr>
                <td><b>${u.name}</b><br><small>${u.location}</small></td>
                <td>${u.intake}</td>
                <td style="color:orange">${u.scholarship}</td>
                <td style="color:green; font-weight:bold">৳ ${u.partnerCommission}</td>
                <td>${u.spouseAllowed}</td>
                <td><button class="btn" style="padding:5px 10px; font-size:12px">Apply</button></td>
            </tr>
        `).join('') || "<tr><td colspan='6' style='text-align:center'>No results found</td></tr>";
    });
</script>
</body>
</html>
