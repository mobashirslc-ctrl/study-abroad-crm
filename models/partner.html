<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 280px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); display: flex; flex-direction: column; align-items: center; }
        .nav-link { padding: 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 12px; margin-bottom: 5px; }
        .nav-link.active { background: #1e293b; color: white; }
        
        /* Stats Box Middle Fix */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1100px; margin-bottom: 30px; }
        .stat-card { padding: 25px; border-radius: 20px; color: white; min-width: 200px; }
        
        /* Search Card Middle Fix */
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 1100px; box-sizing: border-box; }
        
        .search-flex { display: flex; gap: 15px; margin-bottom: 25px; }
        input, select { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; flex: 1; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px 25px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary);"><i class="fas fa-rocket"></i> IHP CRM</h2>
    <div class="nav-link active"><i class="fas fa-search"></i> University Search</div>
    <div class="nav-link"><i class="fas fa-file-invoice"></i> Student Tracking</div>
    <div class="nav-link"><i class="fas fa-wallet"></i> Wallet & Sub</div>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="stat-card" style="background: #2563eb;">TOTAL EARNINGS<br><h2>৳ 0</h2></div>
        <div class="stat-card" style="background: #10b981;">WITHDRAWN<br><h2>৳ 0</h2></div>
        <div class="stat-card" style="background: #d97706;">PENDING BALANCE<br><h2>৳ 0</h2><button style="font-size:10px; cursor:pointer;">Withdraw Fund</button></div>
    </div>

    <div class="card">
        <h3><i class="fas fa-graduation-cap"></i> Quick University Finder</h3>
        <div class="search-flex">
            <input type="text" id="sCountry" placeholder="Preferred Country">
            <select id="sDegree"><option value="">Select Degree</option><option>UG</option><option>PG</option><option>Diploma</option></select>
            <select id="sLang"><option value="">Language</option><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
            <button class="btn" onclick="performSearch()">Search Now</button>
        </div>
        <table>
            <thead style="background:#f8fafc;">
                <tr><th>UNIVERSITY</th><th>INTAKE</th><th>BANK REQ.</th><th>COMMISSION</th><th>ACTION</th></tr>
            </thead>
            <tbody id="uniResults"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";
    async function performSearch() {
        const res = await fetch(`${API}/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                country: document.getElementById('sCountry').value,
                degree: document.getElementById('sDegree').value,
                language: document.getElementById('sLang').value
            })
        });
        const json = await res.json();
        document.getElementById('uniResults').innerHTML = json.data.map(u => `
            <tr>
                <td><b>${u.name}</b><br><small>${u.location}</small></td>
                <td>${u.intake}</td>
                <td>${u.bankBalance} (${u.bankType})</td>
                <td style="color:#10b981; font-weight:bold;">৳ ${u.partnerCommission}</td>
                <td><button class="btn" style="padding:8px 15px; font-size:12px;">Apply Now</button></td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
