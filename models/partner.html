<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); display: flex; color: var(--dark); }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--dark); height: 100vh; position: fixed; padding: 30px; color: white; box-sizing: border-box; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 50px; display: flex; align-items: center; gap: 12px; }
        .nav-item { padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; transition: 0.3s; color: #94a3b8; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }

        /* Main Content */
        .content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        #clock { color: var(--primary); font-weight: 600; font-size: 14px; background: white; padding: 8px 20px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        /* Wallet Section */
        .wallet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .wallet-card { padding: 25px; border-radius: 24px; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        .wallet-card small { opacity: 0.8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .wallet-card h2 { margin: 10px 0; font-size: 28px; font-weight: 800; }
        
        /* Assessment Card */
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 8px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 15px; width: 100%; transition: 0.3s; }
        .btn-search:hover { background: #1e40af; transform: translateY(-2px); }

        /* Table Style */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #f1f5f9; }

        /* Support Box */
        .support-card { background: #eff6ff; padding: 25px; border-radius: 20px; display: flex; align-items: center; gap: 20px; border: 1px dashed var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class="fas fa-graduation-cap"></i> IHP CRM</div>
    <div class="nav-item active" onclick="showTab('search')"><i class="fas fa-university"></i> Assessment</div>
    <div class="nav-item" onclick="showTab('files')"><i class="fas fa-file-invoice"></i> Student Files</div>
    <div class="nav-item" onclick="showTab('withdraw')"><i class="fas fa-wallet"></i> Wallet</div>
</div>

<div class="content">
    <div class="header">
        <div>
            <h1 style="margin:0;">
