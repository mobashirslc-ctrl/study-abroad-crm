<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f8fafc; }
        .sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; position: fixed; padding: 25px; }
        .main { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .search-bar { display: flex; gap: 10px; margin-bottom: 30px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; flex: 1; }
        .btn-search { background: #2563eb; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .logo { font-size: 24px; font-weight: bold; color: #2563eb; margin-bottom: 40px; display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class="fas fa-graduation-cap"></i> IHP CRM</div>
    <div style="color:#94a3b8; padding:10px;"><i class="fas fa-search"></i> Assessment</div>
    <div style="color:#94a3b8; padding:10px;"><i class="fas fa-file-upload"></i> Student Files</div>
    <div style="color:#94a3b8; padding:10px;"><i class="fas fa-wallet"></i> Wallet</div>
</div>

<div class="main">
    <div class="card">
        <h3>University Eligibility Search</h3>
        <div class="search-bar">
            <input type="text" id="sCountry" placeholder="Country">
            <input type="number" step="0.1" id="sGPA" placeholder="Your GPA">
            <input type="number" step="0.1" id="sScore" placeholder="Language Score">
            <button class="btn-search" onclick="searchUni()">Search</button>
        </div>
        <table>
            <thead><tr><th>University</th><th>Location</th><th>Intake</th><th>Commission</th><th>Action</th></tr></thead>
            <tbody id="results"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";

    async function searchUni() {
        const res = document.getElementById('results');
        res.innerHTML = "Searching...";
        const data = {
            country: document.getElementById('sCountry').value,
            gpa: document.getElementById('sGPA').value,
            langScore: document.getElementById('sScore').value
        };

        try {
            const response = await fetch(`${API}/check-eligibility`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const json = await response.json();
            res.innerHTML = json.data.map(u => `
                <tr>
                    <td><b>${u.name}</b></td>
                    <td>${u.location}, ${u.country}</td>
                    <td>${u.intake || 'Jan/Sept'}</td>
                    <td style="color:green; font-weight:bold">৳ ${u.partnerCommission}</td>
                    <td><button class="btn-search" style="padding:5px 10px">Apply</button></td>
                </tr>
            `).join('') || "<tr><td colspan='5' style='text-align:center'>No match found.</td></tr>";
        } catch (err) {
            res.innerHTML = "Error loading data.";
        }
    }
</script>
</body>
</html>
