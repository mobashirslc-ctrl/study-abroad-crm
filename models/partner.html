<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | StepUp CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 25px; }
        .nav-link { padding: 14px; color: #94a3b8; cursor: pointer; display: block; text-decoration: none; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid var(--accent); }
        .main { margin-left: 290px; padding: 40px; width: calc(100% - 320px); }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; align-items: end; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #f1f5f9; color: #475569; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .chat-btn { background: #e2e8f0; color: #475569; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent);">StepUp CRM</h2>
    <div class="nav-link active" onclick="show('search')"><i class="fas fa-search"></i> Eligibility Search</div>
    <div class="nav-link" onclick="show('files')"><i class="fas fa-tasks"></i> My Student Files</div>
</div>

<div class="main">
    <div style="margin-bottom: 30px;">
        <h1>Welcome, <span id="pName" style="color:var(--accent);">Partner</span>!</h1>
        <p id="date"></p>
    </div>

    <div id="searchBox" class="card">
        <h3 style="margin-top:0;">University Eligibility Check</h3>
        <form id="sForm" class="filter-grid">
            <div><label>Country</label><input type="text" id="sCountry" placeholder="Any"></div>
            <div><label>Degree</label>
                <select id="sDegree">
                    <option value="">All</option>
                    <option value="Undergraduate (UG)">UG</option>
                    <option value="Postgraduate (PG)">PG</option>
                </select>
            </div>
            <div><label>Language</label>
                <select id="sLang"><option value="IELTS">IELTS</option><option value="PTE">PTE</option><option value="Duolingo">Duolingo</option></select>
            </div>
            <div><label>Score</label><input type="number" step="0.1" id="sScore" value="6.0"></div>
            <div><label>GPA</label><input type="number" step="0.01" id="sGPA" value="3.5"></div>
            <button type="submit" class="btn-action">Search</button>
        </form>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>University</th>
                    <th>Course</th>
                    <th>Intake</th>
                    <th>Fee (BDT)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="uniResults">
                <tr><td colspan="5" style="text-align:center; padding:20px;">No search results yet.</td></tr>
            </tbody>
        </table>
    </div>

    <div id="fileBox" class="card" style="display:none;">
        <h3>My Student Applications</h3>
        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Status</th>
                    <th>Compliance Officer</th>
                    <th>Communication</th>
                </tr>
            </thead>
            <tbody id="fileResults"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com";
    const partnerName = localStorage.getItem('partnerName') || "Demo Partner";
    document.getElementById('pName').innerText = partnerName;
    document.getElementById('date').innerText = new Date().toDateString();

    function show(id) {
        document.getElementById('searchBox').style.display = id === 'search' ? 'block' : 'none';
        document.getElementById('fileBox').style.display = id === 'files' ? 'block' : 'none';
        if(id === 'files') loadFiles();
    }

    // --- Search Logic ---
    document.getElementById('sForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = document.getElementById('uniResults');
        body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Searching...</td></tr>';

        const payload = {
            country: document.getElementById('sCountry').value,
            degree: document.getElementById('sDegree').value,
            language: document.getElementById('sLang').value,
            langScore: document.getElementById('sScore').value,
            gpa: document.getElementById('sGPA').value
        };

        try {
            const res = await fetch(`${API}/api/check-eligibility`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const json = await res.json();

            if(json.success && json.data.length > 0) {
                body.innerHTML = '';
                json.data.forEach(u => {
                    body.innerHTML += `<tr>
                        <td><b>${u.name}</b><br><small>${u.country}</small></td>
                        <td>${u.course}</td>
                        <td>${u.intake}</td>
                        <td>৳${u.semesterFee}</td>
                        <td><button onclick="openFile('${u.name}', ${u.partnerCommission})" style="background:var(--success); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Open File</button></td>
                    </tr>`;
                });
            } else {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">No matching university found. Try lower GPA or Score.</td></tr>';
            }
        } catch (err) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Connection Error!</td></tr>';
        }
    });

    async function openFile(uni, comm) {
        const student = prompt("Enter Student Name:");
        if(!student) return;
        await fetch(`${API}/api/applications`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ partnerName, studentName: student, universityName: uni, commission: comm })
        });
        alert("Application Submitted!");
    }

    // --- Tracking & Chat Logic ---
    async function loadFiles() {
        const res = await fetch(`${API}/api/applications/${partnerName}`);
        const data = await res.json();
        const body = document.getElementById('fileResults');
        body.innerHTML = '';
        data.forEach(f => {
            body.innerHTML += `<tr>
                <td><b>${f.studentName}</b><br><small>${f.universityName}</small></td>
                <td><span style="color:var(--accent)">${f.status}</span></td>
                <td>${f.complianceOfficer.name}</td>
                <td>
                    <button class="chat-btn" onclick="chat('${f._id}')">
                        <i class="fas fa-comment"></i> Message Admin
                    </button>
                </td>
            </tr>`;
        });
    }

    async function chat(id) {
        const msg = prompt("Write your message to Compliance Team:");
        if(msg) {
            await fetch(`${API}/api/applications/message`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ appId: id, message: msg })
            });
            alert("Message Sent!");
        }
    }
</script>
</body>
</html>
