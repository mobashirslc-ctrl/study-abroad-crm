<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .sidebar h2 { color: white; font-size: 22px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 10px; margin-bottom: 8px; }
        .nav-item.active { background: #1e293b; color: white; }
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 30px; border-radius: 20px; color: white; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .search-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 25px; }
        input, select { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; width: 100%; box-sizing: border-box; outline: none; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; grid-column: span 5; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 18px; background: #f8fafc; color: #64748b; font-size: 13px; text-transform: uppercase; font-weight: 700; }
        td { padding: 18px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2><i class="fas fa-graduation-cap"></i> IHP CRM</h2>
    <div class="nav-item active" onclick="showPage('search', this)"><i class="fas fa-university"></i> University Search</div>
    <div class="nav-item" onclick="showPage('wallet', this)"><i class="fas fa-wallet"></i> Wallet & Sub</div>
</div>
<div class="main">
    <div class="stat-grid">
        <div class="stat-card" style="background:#3b82f6;"><span>TOTAL EARNINGS</span><h2>৳ 0</h2></div>
        <div class="stat-card" style="background:#10b981;"><span>WITHDRAWN</span><h2>৳ 0</h2></div>
        <div class="stat-card" style="background:#f59e0b;"><span>PENDING</span><h2>৳ 0</h2></div>
    </div>
    <div id="searchPage" class="page active">
        <div class="card">
            <h3>Assessment / Eligibility Check</h3>
            <div class="search-grid">
                <input type="text" id="sCountry" placeholder="Country">
                <select id="sDegree"><option value="">Degree</option><option>UG</option><option>PG</option></select>
                <select id="sLang"><option value="">Language</option><option>IELTS</option><option>PTE</option></select>
                <input type="number" id="sLScore" placeholder="Lang. Score">
                <input type="number" id="sGPA" placeholder="GPA">
                <button class="btn-search" onclick="performSearch()">Search Now</button>
            </div>
            <table>
                <thead><tr><th>University</th><th>Fee</th><th>Commission</th><th>Action</th></tr></thead>
                <tbody id="uniResults"></tbody>
            </table>
        </div>
    </div>
    <div id="walletPage" class="page">
        <div class="card"><h3>Wallet & Subscription Details</h3><p>Payments and Subscriptions will appear here.</p></div>
    </div>
</div>
<script>
    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
    }
    async function performSearch() {
        const query = { country: document.getElementById('sCountry').value, degree: document.getElementById('sDegree').value };
        const res = await fetch(`https://study-abroad-crm.onrender.com/api/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(query)
        });
        const result = await res.json();
        document.getElementById('uniResults').innerHTML = result.data.map(u => `
            <tr><td><strong>${u.name}</strong><br><small>${u.country}</small></td><td>${u.semesterFee}</td><td style="color:#10b981; font-weight:bold;">৳ ${u.partnerCommission}</td><td><button style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px;">Apply</button></td></tr>
        `).join('');
    }
</script>
</body>
</html>
