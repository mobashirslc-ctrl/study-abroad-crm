<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; border-radius: 15px; color: white; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; }
        .btn-search { grid-column: span 5; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>IHP CRM</h2>
    <div style="padding:10px; color:#94a3b8;"><i class="fas fa-university"></i> Assessment</div>
    <div style="padding:10px; color:#94a3b8;"><i class="fas fa-wallet"></i> Wallet</div>
</div>
<div class="main">
    <div class="stat-grid">
        <div class="stat-card" style="background:#3b82f6;"><span>EARNINGS</span><h2>৳ 0</h2></div>
        <div class="stat-card" style="background:#10b981;"><span>WITHDRAWN</span><h2>৳ 0</h2></div>
        <div class="stat-card" style="background:#f59e0b;"><span>PENDING</span><h2>৳ 0</h2></div>
    </div>
    <div class="card">
        <h3>Search Universities</h3>
        <div class="search-grid">
            <input type="text" id="sCountry" placeholder="Country">
            <select id="sDegree"><option value="">Degree</option><option>UG</option><option>PG</option></select>
            <input type="text" placeholder="Language">
            <input type="number" id="sLScore" placeholder="Lang. Score">
            <input type="number" id="sGPA" placeholder="GPA">
            <button class="btn-search" onclick="performSearch()">Search Now</button>
        </div>
        <table>
            <thead><tr><th>University</th><th>Fee</th><th>Commission</th><th>Action</th></tr></thead>
            <tbody id="uniResults"></tbody>
        </table>
    </div>
</div>
<script>
    async function performSearch() {
        const query = { country: document.getElementById('sCountry').value, degree: document.getElementById('sDegree').value };
        const res = await fetch(`https://study-abroad-crm.onrender.com/api/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(query)
        });
        const result = await res.json();
        document.getElementById('uniResults').innerHTML = result.data.map(u => `
            <tr><td><strong>${u.name}</strong><br><small>${u.country}</small></td><td>${u.semesterFee}</td><td style="color:#10b981; font-weight:bold;">৳ ${u.partnerCommission}</td><td><button>Apply</button></td></tr>
        `).join('');
    }
</script>
</body>
</html>
