<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 280px; background: var(--dark); height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 40px; display: block; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 10px; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .section { display: none; } .section.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        /* Modal Style */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class="fas fa-graduation-cap"></i> IHP CRM</div>
    <div class="nav-item active" onclick="show('assessment')"><i class="fas fa-search"></i> Assessment</div>
    <div class="nav-item" onclick="show('tracking')"><i class="fas fa-file-invoice"></i> File Tracking</div>
    <div class="nav-item" onclick="show('wallet')"><i class="fas fa-wallet"></i> Wallet & Subscription</div>
</div>

<div class="main">
    <div id="assessment" class="section active">
        <div class="card">
            <h2>University Eligibility Search</h2>
            <div style="display:flex; gap:10px;">
                <input type="text" id="sCountry" placeholder="Country">
                <input type="number" step="0.1" id="sGPA" placeholder="Min GPA">
                <input type="number" step="0.1" id="sScore" placeholder="Language Score">
                <button class="btn" onclick="searchUni()">Search</button>
            </div>
            <table id="uniTable">
                <thead><tr><th>University</th><th>Location</th><th>Commission</th><th>Action</th></tr></thead>
                <tbody id="results"></tbody>
            </table>
        </div>
    </div>

    <div id="wallet" class="section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="card" style="background:var(--primary); color:white;">
                <p>Wallet Balance</p>
                <h1>৳ 12,500</h1>
                <button class="btn" style="background:white; color:var(--primary)" onclick="document.getElementById('wModal').style.display='flex'">Withdraw Now</button>
            </div>
            <div class="card">
                <h3>Active Subscription</h3>
                <p style="color:green; font-weight:bold;">Premium Partner (Yearly)</p>
                <small>Expiry: 31 Dec 2026</small>
            </div>
        </div>
    </div>

    <div id="tracking" class="section">
        <div class="card">
            <h2>Track Student Files</h2>
            <table id="trackingTable">
                <thead><tr><th>Student Name</th><th>University</th><th>Status</th></tr></thead>
                <tbody id="trackResults"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="wModal" class="modal">
    <div class="card" style="width:400px;">
        <h3>Request Withdrawal</h3>
        <label>Payment Method</label>
        <select id="wMethod">
            <option value="bKash">bKash</option>
            <option value="Nagad">Nagad</option>
            <option value="Bank">Bank Transfer</option>
        </select>
        <input type="text" id="wAcc" placeholder="Account Number">
        <input type="number" id="wAmt" placeholder="Amount (৳)">
        <button class="btn" onclick="submitWithdraw()">Submit Request</button>
        <button class="btn" style="background:#64748b" onclick="document.getElementById('wModal').style.display='none'">Cancel</button>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function searchUni() {
        const res = await fetch(`${API}/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ country: document.getElementById('sCountry').value, gpa: document.getElementById('sGPA').value, langScore: document.getElementById('sScore').value })
        });
        const json = await res.json();
        document.getElementById('results').innerHTML = json.data.map(u => `
            <tr><td><b>${u.name}</b></td><td>${u.location}, ${u.country}</td><td>৳${u.partnerCommission}</td><td><button class="btn" style="padding:5px 10px">Apply</button></td></tr>
        `).join('');
    }

    async function submitWithdraw() {
        const data = { partnerName: "Stepup Partner", method: document.getElementById('wMethod').value, accountDetails: document.getElementById('wAcc').value, amount: document.getElementById('wAmt').value };
        await fetch(`${API}/partner/withdraw`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Withdraw Request Sent!");
        document.getElementById('wModal').style.display = 'none';
    }
</script>
</body>
</html>
