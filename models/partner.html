<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 280px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 280px; padding: 40px; width: calc(100% - 280px); display: flex; flex-direction: column; align-items: center; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 12px; margin-bottom: 5px; width: 100%; box-sizing: border-box; }
        .nav-item.active { background: #1e293b; color: white; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1100px; margin-bottom: 30px; }
        .stat-card { padding: 25px; border-radius: 20px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 1100px; }
        .page { display: none; width: 100%; } .page.active { display: block; }
        .search-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary);"><i class="fas fa-rocket"></i> IHP CRM</h2>
    <div class="nav-item active" onclick="show('search', this)"><i class="fas fa-search"></i> University Search</div>
    <div class="nav-item" onclick="show('tracking', this)"><i class="fas fa-file-invoice"></i> Student Tracking</div>
    <div class="nav-item" onclick="show('wallet', this)"><i class="fas fa-wallet"></i> Wallet & Sub</div>
</div>

<div class="main">
    <div class="stat-grid">
        <div class="stat-card" style="background: #2563eb;">EARNINGS<br><h2>৳ 0</h2></div>
        <div class="stat-card" style="background: #10b981;">WITHDRAWN<br><h2>৳ 0</h2></div>
        <div class="stat-card" style="background: #d97706;">PENDING<br><h2>৳ 0</h2></div>
    </div>

    <div id="searchPage" class="page active">
        <div class="card">
            <h3>Eligibility Assessment</h3>
            <div class="search-row">
                <input type="text" id="sCountry" placeholder="Country">
                <select id="sDegree"><option>UG</option><option>PG</option><option>Diploma</option></select>
                <select id="sLangType"><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
                <input type="number" id="sLangScore" placeholder="Score">
                <button class="btn" onclick="performSearch()">Search</button>
            </div>
            <table id="resTable">
                <thead><tr><th>University</th><th>Intake</th><th>Fee</th><th>Commission</th></tr></thead>
                <tbody id="resBody"></tbody>
            </table>
        </div>
    </div>

    <div id="trackingPage" class="page">
        <div class="card">
            <h3>Student Application Progress</h3>
            <table><thead><tr><th>Student</th><th>University</th><th>Status</th></tr></thead><tbody id="trackData"></tbody></table>
        </div>
    </div>

    <div id="walletPage" class="page">
        <div class="card">
            <h3>Subscription & Wallet</h3>
            <p><b>Current Plan:</b> Professional Plan (Lifetime)</p>
            <hr>
            <h4>Request Withdrawal</h4>
            <select id="wMethod"><option>bKash</option><option>Nagad</option><option>Bank Transfer</option></select>
            <input type="number" id="wAmt" placeholder="Amount">
            <input type="text" id="wAcc" placeholder="Account/Phone Number">
            <button class="btn" onclick="submitWithdraw()">Withdraw Now</button>
        </div>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";
    function show(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'tracking') loadTracking();
    }

    async function performSearch() {
        const res = await fetch(`${API}/check-eligibility`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ country: document.getElementById('sCountry').value, degree: document.getElementById('sDegree').value, languageType: document.getElementById('sLangType').value, langScore: document.getElementById('sLangScore').value })
        });
        const json = await res.json();
        document.getElementById('resBody').innerHTML = json.data.map(u => `<tr><td>${u.name}</td><td>${u.intake}</td><td>${u.currency} ${u.semesterFee}</td><td>৳${u.partnerCommission}</td></tr>`).join('');
    }

    async function submitWithdraw() {
        const data = { partnerName: "Test Partner", amount: document.getElementById('wAmt').value, method: document.getElementById('wMethod').value, account: document.getElementById('wAcc').value };
        await fetch(`${API}/partner/withdraw`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Withdrawal Request Sent!");
    }
</script>
</body>
</html>
