<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add University</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        form { max-width: 400px; background: white; padding: 20px; border-radius: 8px; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h2>Add New University</h2>
    <form id="universityForm">
        <input type="text" id="uniName" placeholder="University Name" required>
        <input type="text" id="country" placeholder="Country" required>
        <button type="submit" style="background: green; color: white;">Add University</button>
    </form>

    <script>
        const API_URL = "https://study-abroad-crm.onrender.com";

        document.getElementById('universityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('uniName').value,
                country: document.getElementById('country').value
            };

            try {
                const res = await fetch(`${API_URL}/api/universities`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) alert("University Added Successfully!");
                else alert("Failed to add university.");
            } catch (err) {
                alert("Could not connect to server.");
            }
        });
    </script>
</body>
</html>
