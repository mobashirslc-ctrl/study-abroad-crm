<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IHP Admin | CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .nav-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 8px; margin-bottom: 8px; }
        .nav-item.active { background: var(--primary); color: white; }
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .page { display: none; } .active { display: block; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="showPage('addUni', this)">Assessment (Add Uni)</div>
    <div class="nav-item" onclick="showPage('partners', this)">Partner List</div>
</div>
<div class="main">
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3>Assessment Setup</h3>
            <div class="grid-3">
                <input type="text" id="uName" placeholder="University Name">
                <input type="text" id="uCountry" placeholder="Country">
                <input type="text" id="uFee" placeholder="Fee">
                <input type="text" id="uBank" placeholder="Bank Req.">
                <input type="number" step="0.1" id="uLScore" placeholder="Min Lang Score">
                <input type="number" step="0.01" id="uAcademic" placeholder="Min GPA">
            </div>
            <button onclick="saveUniversity()" style="background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; width:100%;">Save University</button>
        </div>
    </div>
    <div id="partnersPage" class="page">
        <div class="card">
            <h3>Partner Management</h3>
            <table>
                <thead><tr><th>Name</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="partnerBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const API = "https://study-abroad-crm.onrender.com/api";
    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'partners') loadPartners();
    }
    async function loadPartners() {
        const res = await fetch(`${API}/admin/partners`);
        const data = await res.json();
        document.getElementById('partnerBody').innerHTML = data.map(p => `
            <tr><td>${p.name}</td><td>${p.status}</td><td><button onclick="toggleStatus('${p._id}', '${p.status}')">Toggle</button></td></tr>
        `).join('');
    }
    async function saveUniversity() {
        const data = { name: document.getElementById('uName').value, country: document.getElementById('uCountry').value, semesterFee: document.getElementById('uFee').value, bankReq: document.getElementById('uBank').value, langScore: document.getElementById('uLScore').value, academicScore: document.getElementById('uAcademic').value };
        await fetch(`${API}/admin/add-university`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Saved!");
    }
</script>
</body>
</html>
