<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Universities</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        h2 { text-align: center; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add University Data</h2>
        <form id="uniForm">
            <input type="text" id="name" placeholder="University Name" required>
            <input type="text" id="location" placeholder="City (e.g. London)" required>
            <select id="country">
                <option value="United Kingdom">United Kingdom</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
                <option value="Australia">Australia</option>
            </select>
            <input type="text" id="course" placeholder="Course Name (e.g. MSc in Data Science)" required>
            <select id="degree">
                <option value="UG">Undergraduate (UG)</option>
                <option value="PG">Postgraduate (PG)</option>
                <option value="Diploma">Diploma</option>
                <option value="PHD">PHD</option>
            </select>
            <input type="text" id="intake" placeholder="Intake (e.g. Sep 2026)" required>
            <input type="number" step="0.01" id="minGPA" placeholder="Minimum GPA Required" required>
            <select id="languageType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="DUOLINGO">DUOLINGO</option>
            </select>
            <input type="number" step="0.1" id="minScore" placeholder="Min Test Score" required>
            <input type="number" id="commission" placeholder="Commission Amount (BDT)" required>
            <button type="submit">Publish University</button>
        </form>
    </div>

    <script>
        const API_URL = "https://study-abroad-crm.onrender.com";
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                country: document.getElementById('country').value,
                course: document.getElementById('course').value,
                degree: document.getElementById('degree').value,
                intake: document.getElementById('intake').value,
                minGPA: parseFloat(document.getElementById('minGPA').value),
                languageType: document.getElementById('languageType').value,
                minLanguageScore: parseFloat(document.getElementById('minScore').value),
                commissionAmount: parseInt(document.getElementById('commission').value)
            };
            try {
                const res = await fetch(`${API_URL}/api/universities`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) { alert("Success! University added."); e.target.reset(); }
            } catch (err) { alert("Error adding data."); }
        });
    </script>
</body>
</html>
