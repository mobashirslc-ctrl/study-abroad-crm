<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Add University</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a252f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #status { margin-top: 15px; text-align: center; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center;">Add University Details</h2>
        <form id="uniForm">
            <label>University Name</label>
            <input type="text" id="name" required>

            <div class="grid">
                <div><label>Country</label><input type="text" id="country" required></div>
                <div><label>Location</label><input type="text" id="location" required></div>
            </div>

            <div class="grid">
                <div><label>Course</label><input type="text" id="course" required></div>
                <div><label>Degree</label>
                    <select id="degree">
                        <option value="Undergraduate (UG)">Undergraduate (UG)</option>
                        <option value="Postgraduate (PG)">Postgraduate (PG)</option>
                        <option value="Diploma">Diploma</option>
                        <option value="Research">Research</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Semester Fee</label><input type="number" id="semesterFee" required></div>
                <div><label>Currency</label>
                    <select id="currency">
                        <option value="GBP (£)">GBP (£)</option>
                        <option value="USD ($)">USD ($)</option>
                        <option value="CAD ($)">CAD ($)</option>
                        <option value="EURO (€)">EURO (€)</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Partner Commission</label><input type="number" id="partnerCommission" required></div>
                <div><label>Marital Status</label>
                    <select id="maritalStatus">
                        <option value="Single Only">Single Only</option>
                        <option value="Both Allowed">Both Allowed</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Required Bank Amount</label><input type="number" id="bankAmount" placeholder="e.g. 2500000" required></div>
                <div><label>Account Type</label>
                    <select id="accountType">
                        <option value="Savings">Savings</option>
                        <option value="FDR">FDR</option>
                        <option value="Both">Both (Savings/FDR)</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Min GPA</label><input type="number" step="0.01" id="minGPA" required></div>
                <div><label>Intake</label><input type="text" id="intake" placeholder="e.g. Sep, Jan" required></div>
            </div>

            <button type="submit" id="submitBtn">Save to Database</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const API_URL = "https://study-abroad-crm.onrender.com";
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            
            const data = {
                name: document.getElementById('name').value,
                country: document.getElementById('country').value,
                location: document.getElementById('location').value,
                course: document.getElementById('course').value,
                degree: document.getElementById('degree').value,
                semesterFee: parseFloat(document.getElementById('semesterFee').value),
                currency: document.getElementById('currency').value,
                partnerCommission: parseFloat(document.getElementById('partnerCommission').value),
                maritalStatus: document.getElementById('maritalStatus').value,
                bankAmount: parseFloat(document.getElementById('bankAmount').value),
                accountType: document.getElementById('accountType').value,
                minGPA: parseFloat(document.getElementById('minGPA').value),
                intake: document.getElementById('intake').value
            };

            try {
                const res = await fetch(`${API_URL}/api/universities`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) { alert("✅ Success!"); e.target.reset(); }
            } catch (err) { alert("❌ Error!"); }
            finally { btn.disabled = false; }
        });
    </script>
</body>
</html>
