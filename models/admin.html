<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; padding: 40px; }
        .form-card { background: white; max-width: 700px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { font-weight: 600; font-size: 13px; color: #444; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a252f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; text-align: center; display: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 style="text-align: center; color: #1a252f;">Add New University</h2>
        <form id="uniForm">
            <label>University Name</label>
            <input type="text" id="name" required>
            
            <div class="grid">
                <div><label>Country</label><input type="text" id="country" required></div>
                <div><label>Location</label><input type="text" id="location" required></div>
            </div>

            <div class="grid">
                <div><label>Course Name</label><input type="text" id="course" required></div>
                <div><label>Degree</label>
                    <select id="degree">
                        <option value="Undergraduate (UG)">Undergraduate (UG)</option>
                        <option value="Postgraduate (PG)">Postgraduate (PG)</option>
                        <option value="Diploma">Diploma</option>
                        <option value="PhD">PhD</option>
                        <option value="Research">Research</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Semester Fee</label><input type="number" id="fee" required></div>
                <div><label>Currency</label>
                    <select id="currency">
                        <option value="USD ($)">USD ($)</option>
                        <option value="GBP (£)">GBP (£)</option>
                        <option value="CAD ($)">CAD ($)</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Bank Amount</label><input type="number" id="bank" required></div>
                <div><label>Account Type</label>
                    <select id="accType">
                        <option value="Savings">Savings</option>
                        <option value="FDR">FDR</option>
                        <option value="Both">Both</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div><label>Language Type</label>
                    <select id="lType">
                        <option value="IELTS">IELTS</option>
                        <option value="PTE">PTE</option>
                        <option value="Duolingo">Duolingo</option>
                        <option value="MOI">MOI</option>
                    </select>
                </div>
                <div><label>Min Score</label><input type="number" step="0.1" id="lScore" required></div>
            </div>

            <div class="grid">
                <div><label>Min GPA</label><input type="number" step="0.01" id="gpa" required></div>
                <div><label>Partner Commission</label><input type="number" id="comm" required></div>
            </div>

            <button type="submit">Publish University</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const API = "https://study-abroad-crm.onrender.com";
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                country: document.getElementById('country').value,
                location: document.getElementById('location').value,
                course: document.getElementById('course').value,
                degree: document.getElementById('degree').value,
                semesterFee: document.getElementById('fee').value,
                currency: document.getElementById('currency').value,
                bankAmount: document.getElementById('bank').value,
                accountType: document.getElementById('accType').value,
                languageType: document.getElementById('lType').value,
                minLanguageScore: document.getElementById('lScore').value,
                minGPA: document.getElementById('gpa').value,
                partnerCommission: document.getElementById('comm').value,
                intake: "Jan, Sep, Oct"
            };
            const res = await fetch(`${API}/api/universities`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("✅ Added!"); e.target.reset(); }
        });
    </script>
</body>
</html>
