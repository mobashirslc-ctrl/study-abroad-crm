<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Data Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .box { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #003366; color: white; border: none; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h2>Admin Login</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="check()">Enter</button>
    </div>

    <div id="main" class="box" style="display:none;">
        <h2>Add University Details</h2>
        <form id="uniForm">
            <input type="text" id="uName" placeholder="University Name" required>
            <div class="grid">
                <input type="text" id="country" placeholder="Country" required>
                <input type="text" id="loc" placeholder="City/Campus Location">
            </div>
            <div class="grid">
                <select id="degree">
                    <option value="UG">Undergraduate (UG)</option>
                    <option value="PG">Postgraduate (PG)</option>
                    <option value="PhD">PhD</option>
                    <option value="Diploma">Diploma</option>
                    <option value="Research">Research</option>
                </select>
                <input type="text" id="course" placeholder="Course Name" required>
            </div>
            <div class="grid">
                <select id="curr">
                    <option value="USD">USD ($)</option>
                    <option value="GBP">GBP (£)</option>
                    <option value="AUD">AUD (A$)</option>
                    <option value="CAD">CAD (C$)</option>
                    <option value="EUR">EUR (€)</option>
                </select>
                <input type="text" id="fee" placeholder="Tuition Fee Amount">
            </div>
            <input type="text" id="scholar" placeholder="Scholarship Details (e.g. 20% or $5000)">
            <input type="text" id="intake" placeholder="Intakes (e.g. Jan, Sept)">
            <div class="grid">
                <input type="number" step="0.01" id="mGPA" placeholder="Min GPA (SSC/HSC)">
                <input type="number" step="0.01" id="mCGPA" placeholder="Min CGPA (Honours)">
            </div>
            <div class="grid">
                <input type="number" id="gap" placeholder="Max Study Gap (Years)">
                <select id="lType">
                    <option value="IELTS">IELTS</option>
                    <option value="PTE">PTE</option>
                    <option value="Duolingo">Duolingo</option>
                    <option value="GRE">GRE</option>
                </select>
            </div>
            <div class="grid">
                <input type="number" step="0.1" id="lScore" placeholder="Min Lang Score">
                <select id="bType">
                    <option value="FDR">FDR Required</option>
                    <option value="Savings">Savings Required</option>
                </select>
            </div>
            <input type="number" id="bAmt" placeholder="Required Bank Amount">
            <button type="submit">Save Information</button>
        </form>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value === "admin123") {
                document.getElementById('login').style.display='none';
                document.getElementById('main').style.display='block';
            } else { alert("Access Denied"); }
        }

        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('uName').value,
                country: document.getElementById('country').value,
                location: document.getElementById('loc').value,
                courseName: document.getElementById('course').value,
                degreeLevel: document.getElementById('degree').value,
                currency: document.getElementById('curr').value,
                tutionFee: document.getElementById('fee').value,
                scholarship: document.getElementById('scholar').value,
                intake: document.getElementById('intake').value,
                minGPA: document.getElementById('mGPA').value,
                minCGPA: document.getElementById('mCGPA').value,
                maxStudyGap: document.getElementById('gap').value,
                languageType: document.getElementById('lType').value,
                minLangScore: document.getElementById('lScore').value,
                bankType: document.getElementById('bType').value,
                requiredBankAmount: document.getElementById('bAmt').value
            };
            const res = await fetch("https://study-abroad-crm.onrender.com/api/universities", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("Successfully Saved!"); e.target.reset(); }
        });
    </script>
</body>
</html>
