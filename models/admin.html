<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; }
        h2 { text-align: center; color: #1a252f; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #1a252f; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Add University</h2>
        <form id="uniForm">
            <input type="text" id="name" placeholder="University Name" required>
            <input type="text" id="location" placeholder="City" required>
            <select id="country">
                <option value="United Kingdom">United Kingdom</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
            </select>
            <input type="text" id="course" placeholder="Course" required>
            <select id="degree">
                <option value="Undergraduate (UG)">Undergraduate (UG)</option>
                <option value="Postgraduate (PG)">Postgraduate (PG)</option>
            </select>
            <input type="text" id="intake" placeholder="Intake (e.g. Sep, Jan)" required>
            <input type="number" step="0.01" id="minGPA" placeholder="Min GPA" required>
            <select id="languageType">
                <option value="IELTS">IELTS</option>
                <option value="PTE">PTE</option>
                <option value="DUOLINGO">DUOLINGO</option>
            </select>
            <input type="number" step="0.1" id="minScore" placeholder="Min Language Score" required>
            <input type="number" id="commission" placeholder="Commission (BDT)" required>
            <button type="submit">Submit University</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const API_URL = "https://study-abroad-crm.onrender.com";
        const form = document.getElementById('uniForm');
        const statusBox = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusBox.style.display = "block";
            statusBox.style.background = "#eee";
            statusBox.innerText = "Adding... please wait.";

            const data = {
                name: document.getElementById('name').value,
                location: document.getElementById('location').value,
                country: document.getElementById('country').value,
                course: document.getElementById('course').value,
                degree: document.getElementById('degree').value,
                intake: document.getElementById('intake').value,
                minGPA: parseFloat(document.getElementById('minGPA').value),
                languageType: document.getElementById('languageType').value,
                minLanguageScore: parseFloat(document.getElementById('minScore').value),
                commissionAmount: parseInt(document.getElementById('commission').value)
            };

            try {
                const res = await fetch(`${API_URL}/api/universities`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                if(res.ok) {
                    statusBox.style.background = "#d4edda";
                    statusBox.innerText = "✅ Success! University added.";
                    form.reset();
                } else {
                    statusBox.style.background = "#f8d7da";
                    statusBox.innerText = "❌ Error: " + result.message;
                }
            } catch (err) {
                statusBox.style.background = "#f8d7da";
                statusBox.innerText = "❌ Server Connection Failed!";
            }
        });
    </script>
</body>
</html>
