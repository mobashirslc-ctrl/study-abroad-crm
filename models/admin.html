<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHP Admin | CRM Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .sidebar h2 { color: white; font-size: 22px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .page { display: none; }
        .page.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        input, select { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; width: 100%; box-sizing: border-box; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-user-shield"></i> IHP Admin</h2>
    <div class="nav-item active" onclick="showPage('addUni', this)"><i class="fas fa-plus-circle"></i> Assessment (Add Uni)</div>
    <div class="nav-item" onclick="showPage('files', this)"><i class="fas fa-file-alt"></i> Existing Files</div>
    <div class="nav-item" onclick="showPage('partners', this)"><i class="fas fa-users"></i> Partner List</div>
    <div class="nav-item" onclick="showPage('withdraw', this)"><i class="fas fa-money-check-alt"></i> Withdraw Requests</div>
</div>

<div class="main">
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3>Assessment Setup</h3>
            <div class="grid-3">
                <input type="text" id="uName" placeholder="University Name">
                <input type="text" id="uCountry" placeholder="Country">
                <input type="number" id="uLScore" placeholder="Min Lang Score">
                <input type="number" id="uAcademic" placeholder="Min GPA">
                <input type="number" id="uComm" placeholder="Commission (৳)">
            </div>
            <button onclick="saveUniversity()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; cursor:pointer;">Save University</button>
        </div>
    </div>

    <div id="filesPage" class="page">
        <div class="card">
            <h3>Existing Student Files</h3>
            <table>
                <thead><tr><th>Student Name</th><th>University</th><th>Partner</th><th>Status</th></tr></thead>
                <tbody id="fileTable"><tr><td colspan="4" style="text-align:center;">Loading files...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="partnersPage" class="page">
        <div class="card">
            <h3>Partner List</h3>
            <table>
                <thead><tr><th>Partner Name</th><th>Subscription</th><th>Status</th></tr></thead>
                <tbody id="partnerTable"></tbody>
            </table>
        </div>
    </div>

    <div id="withdrawPage" class="page">
        <div class="card">
            <h3>Withdrawal Requests</h3>
            <table>
                <thead><tr><th>Partner</th><th>Amount</th><th>Method</th><th>Account</th><th>Action</th></tr></thead>
                <tbody id="withdrawTable"><tr><td colspan="5" style="text-align:center;">Loading requests...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId + 'Page').classList.add('active');
        if(el) el.classList.add('active');

        // লোড ফাংশন কল করা
        if(pageId === 'files') loadFiles();
        if(pageId === 'partners') loadPartners();
        if(pageId === 'withdraw') loadWithdrawRequests();
    }

    async function loadFiles() {
        const tbody = document.getElementById('fileTable');
        try {
            const res = await fetch(`${API}/admin/files`); // আপনি যদি ফাইল এপিআই তৈরি করে থাকেন
            const data = await res.json();
            tbody.innerHTML = data.length > 0 ? data.map(f => `
                <tr><td>${f.studentName}</td><td>${f.uniName}</td><td>${f.partnerName}</td><td>${f.status}</td></tr>
            `).join('') : '<tr><td colspan="4" style="text-align:center;">No files found</td></tr>';
        } catch(e) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No Data Available</td></tr>'; }
    }

    async function loadWithdrawRequests() {
        const tbody = document.getElementById('withdrawTable');
        try {
            const res = await fetch(`${API}/admin/withdrawals`); // ব্যাকএন্ড থেকে উইথড্র লিস্ট
            const data = await res.json();
            tbody.innerHTML = data.length > 0 ? data.map(w => `
                <tr>
                    <td>${w.partnerName}</td>
                    <td>৳ ${w.amount}</td>
                    <td>${w.method}</td>
                    <td>${w.account}</td>
                    <td><button class="btn-approve" onclick="approveWithdraw('${w._id}')">Approve</button></td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align:center;">No pending requests</td></tr>';
        } catch(e) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No Requests Found</td></tr>'; }
    }

    async function loadPartners() {
        const res = await fetch(`${API}/admin/partners`);
        const data = await res.json();
        document.getElementById('partnerTable').innerHTML = data.map(p => `
            <tr><td>${p.name}</td><td>৳ ${p.subAmount}</td><td>${p.status}</td></tr>
        `).join('');
    }

    async function saveUniversity() {
        const data = {
            name: document.getElementById('uName').value,
            country: document.getElementById('uCountry').value,
            langScore: document.getElementById('uLScore').value,
            academicScore: document.getElementById('uAcademic').value,
            partnerCommission: document.getElementById('uComm').value
        };
        await fetch(`${API}/admin/add-university`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        alert("Saved!");
    }
</script>
</body>
</html>
