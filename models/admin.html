<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Full Management</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .box { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #003366; color: white; cursor: pointer; border: none; font-weight: bold; }
        .uni-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #cc0000; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Add University Details</h2>
        <form id="uForm">
            <input type="text" id="name" placeholder="University Name" required>
            <div class="grid">
                <input type="text" id="country" placeholder="Country" required>
                <input type="text" id="loc" placeholder="City/Campus">
            </div>
            <div class="grid">
                <select id="degree">
                    <option value="UG">Undergraduate (UG)</option>
                    <option value="PG">Postgraduate (PG)</option>
                </select>
                <input type="text" id="course" placeholder="Course Name" required>
            </div>
            <div class="grid">
                <select id="curr">
                    <option value="USD">USD ($)</option>
                    <option value="AUD">AUD (A$)</option>
                    <option value="CAD">CAD (C$)</option>
                    <option value="EUR">Euro (€)</option>
                </select>
                <input type="number" id="fee" placeholder="Tuition Fee Amount">
            </div>
            <div class="grid">
                <select id="marital">
                    <option value="Allowed">Spouse Allowed</option>
                    <option value="Not Allowed">Spouse Not Allowed</option>
                </select>
                <input type="text" id="scholar" placeholder="Scholarship Info">
            </div>
            <div class="grid">
                <input type="number" step="0.01" id="mGPA" placeholder="Min GPA">
                <input type="number" step="0.01" id="mCGPA" placeholder="Min CGPA">
            </div>
            <div class="grid">
                <select id="lType">
                    <option value="IELTS">IELTS</option>
                    <option value="PTE">PTE</option>
                </select>
                <input type="number" step="0.1" id="lScore" placeholder="Min Lang Score">
            </div>
            <div class="grid">
                <input type="number" id="bAmt" placeholder="Bank Amount">
                <input type="number" id="gap" placeholder="Max Gap (Years)">
            </div>
            <button type="submit">Save Information</button>
        </form>
        <hr>
        <div id="uniList"></div>
    </div>

    <script>
        const API = "https://study-abroad-crm.onrender.com/api/universities";
        async function loadUnis() {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('uniList').innerHTML = data.map(u => `
                <div class="uni-item">
                    <span><strong>${u.name}</strong> (${u.country})</span>
                    <button class="del-btn" onclick="deleteUni('${u._id}')">Delete</button>
                </div>
            `).join('');
        }
        async function deleteUni(id) {
            if(confirm("Delete this?")) { await fetch(`${API}/${id}`, {method:'DELETE'}); loadUnis(); }
        }
        document.getElementById('uForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                country: document.getElementById('country').value,
                location: document.getElementById('loc').value,
                degreeLevel: document.getElementById('degree').value,
                courseName: document.getElementById('course').value,
                currency: document.getElementById('curr').value,
                tutionFee: document.getElementById('fee').value,
                maritalStatus: document.getElementById('marital').value,
                scholarship: document.getElementById('scholar').value,
                minGPA: document.getElementById('mGPA').value,
                minCGPA: document.getElementById('mCGPA').value,
                languageType: document.getElementById('lType').value,
                minLangScore: document.getElementById('lScore').value,
                requiredBankAmount: document.getElementById('bAmt').value,
                maxStudyGap: document.getElementById('gap').value
            };
            await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            loadUnis(); e.target.reset();
        });
        loadUnis();
    </script>
</body>
</html>
