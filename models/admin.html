<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal | IHP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f1f5f9; }
        .sidebar { width: 260px; background: #0f172a; height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 260px; padding: 40px; width: 100%; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; border-radius: 10px; margin-bottom: 5px; }
        .nav-item.active { background: #2563eb; color: white; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .page { display: none; } .page.active { display: block; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="show('addUni', this)"><i class="fas fa-plus"></i> Assessment (Add)</div>
    <div class="nav-item" onclick="show('files', this)"><i class="fas fa-folder"></i> Existing Files</div>
</div>

<div class="main">
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3>Add University Details</h3>
            <div class="grid">
                <input type="text" id="name" placeholder="University Name">
                <input type="text" id="country" placeholder="Country">
                <select id="degree"><option>UG</option><option>PG</option><option>Diploma</option><option>PHD</option></select>
                <input type="text" id="intake" placeholder="Intake">
                <input type="text" id="fee" placeholder="Semester Fee">
                <select id="currency"><option>USD</option><option>AUD</option><option>EURO</option></select>
                <select id="lang"><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
                <input type="number" id="gpa" placeholder="Min GPA Required">
                <input type="number" id="comm" placeholder="Commission (৳)">
            </div>
            <button class="nav-item active" style="border:none; width:100%; margin-top:20px;" onclick="saveUni()">Save University</button>
        </div>
    </div>

    <div id="filesPage" class="page">
        <div class="card">
            <h3>Existing Student Files</h3>
            <table>
                <thead><tr><th>Student</th><th>Partner</th><th>University</th><th>Status</th></tr></thead>
                <tbody id="fileList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";
    function show(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'files') loadFiles();
    }

    async function saveUni() {
        const data = { name: document.getElementById('name').value, country: document.getElementById('country').value, degree: document.getElementById('degree').value, intake: document.getElementById('intake').value, semesterFee: document.getElementById('fee').value, currency: document.getElementById('currency').value, languageType: document.getElementById('lang').value, minGPA: document.getElementById('gpa').value, partnerCommission: document.getElementById('comm').value };
        await fetch(`${API}/admin/add-university`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Saved!");
    }

    async function loadFiles() {
        const res = await fetch(`${API}/admin/files`);
        const data = await res.json();
        document.getElementById('fileList').innerHTML = data.map(f => `<tr><td>${f.studentName}</td><td>${f.partnerName}</td><td>${f.university}</td><td>${f.status}</td></tr>`).join('');
    }
</script>
</body>
</html>
