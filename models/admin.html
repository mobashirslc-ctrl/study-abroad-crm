<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHP Admin | Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .sidebar h2 { font-size: 22px; color: white; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 8px; margin-bottom: 8px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .page { display: none; } .page.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; }
        .status-badge { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
        .active-status { background: #dcfce7; color: #166534; }
        .inactive-status { background: #fee2e2; color: #991b1b; }
        input[type="number"] { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 80px; text-align: center; }
        .btn-toggle { background: #fee2e2; color: #991b1b; padding: 6px 12px; border-radius: 6px; border: 1px solid #fecaca; cursor: pointer; transition: 0.2s; }
        .btn-toggle:hover { background: #fecaca; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-user-shield"></i> IHP Admin</h2>
    <div class="nav-item active" onclick="showPage('addUni', this)"><i class="fas fa-plus-circle"></i> Assessment (Add Uni)</div>
    <div class="nav-item" onclick="showPage('files', this)"><i class="fas fa-file-alt"></i> Existing Files</div>
    <div class="nav-item" onclick="showPage('partners', this)"><i class="fas fa-users"></i> Partner List</div>
    <div class="nav-item" onclick="showPage('withdraw', this)"><i class="fas fa-wallet"></i> Withdraw Requests</div>
</div>

<div class="main">
    <div id="partnersPage" class="page">
        <div class="card">
            <h3>Partner Management & Subscription</h3>
            <table>
                <thead>
                    <tr><th>Name</th><th>Subscription (৳)</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="partnerBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="addUniPage" class="page active"><div class="card"><h3>Assessment Setup</h3></div></div>
    <div id="filesPage" class="page"><div class="card"><h3>Student Files</h3><table id="fileBody"></table></div></div>
    <div id="withdrawPage" class="page"><div class="card"><h3>Withdrawal Requests</h3><table id="withdrawBody"></table></div></div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId + 'Page').classList.add('active');
        element.classList.add('active');
        if(pageId === 'partners') loadPartners();
    }

    // LOAD PARTNERS
    async function loadPartners() {
        try {
            const res = await fetch(`${API}/admin/partners`);
            const data = await res.json();
            const tbody = document.getElementById('partnerBody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td><input type="number" value="${p.subAmount || 500}" onchange="updateSub('${p._id}', this.value)"></td>
                    <td><span class="status-badge ${p.status === 'Active' ? 'active-status' : 'inactive-status'}">${p.status}</span></td>
                    <td><button class="btn-toggle" onclick="togglePartner('${p._id}', '${p.status}')">Toggle Status</button></td>
                </tr>
            `).join('');
        } catch (e) { console.error("Load failed", e); }
    }

    // TOGGLE PARTNER STATUS (FIXED)
    async function togglePartner(id, currentStatus) {
        const newStatus = currentStatus === 'Active' ? 'Inactive' : 'Active';
        try {
            const res = await fetch(`${API}/admin/update-partner-status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status: newStatus })
            });
            const result = await res.json();
            if (result.success) {
                loadPartners(); // Refresh table immediately
            }
        } catch (e) { alert("Server error"); }
    }

    // UPDATE SUBSCRIPTION
    async function updateSub(id, amount) {
        await fetch(`${API}/admin/custom-sub`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, amount })
        });
        alert("Subscription Updated");
    }
</script>
</body>
</html>
