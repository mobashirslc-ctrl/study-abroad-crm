<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IHP Admin | Master Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--dark); height: 100vh; position: fixed; color: white; padding: 20px; }
        .main { margin-left: 260px; padding: 40px; width: 100%; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .active { background: #dcfce7; color: #166534; }
        .inactive { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Admin</h2>
    <hr>
    <p onclick="showTab('uni')"><i class="fas fa-university"></i> Add University</p>
    <p onclick="showTab('partners')"><i class="fas fa-users"></i> Partner Management</p>
</div>

<div class="main">
    <div id="uniTab" class="card">
        <h1>Add New University</h1>
        <div class="grid">
            <div><label>University Name</label><input type="text" id="name"></div>
            <div><label>Country</label><input type="text" id="country"></div>
            <div><label>Intake</label><input type="text" id="intake" placeholder="Jan/Sept 2026"></div>
            <div><label>Semester Fee ($)</label><input type="number" id="fee"></div>
            <div><label>Language Type</label>
                <select id="langType">
                    <option value="IELTS">IELTS</option>
                    <option value="PTE">PTE</option>
                    <option value="DUOLINGO">Duolingo</option>
                </select>
            </div>
            <div><label>Min. Lang Score</label><input type="number" step="0.1" id="score"></div>
            <div><label>Min. GPA</label><input type="number" step="0.1" id="gpa"></div>
            <div><label>Spouse Support</label>
                <select id="spouse">
                    <option value="With Spouse">With Spouse</option>
                    <option value="Without Spouse">Without Spouse</option>
                </select>
            </div>
            <div><label>Commission (৳)</label><input type="number" id="comm"></div>
            <div><label>Scholarship</label><input type="text" id="scholarship"></div>
        </div>
        <br>
        <button onclick="saveUniversity()">Submit University</button>
    </div>

    <div id="partnerTab" class="card" style="display:none;">
        <h1>Partner List & Subscription</h1>
        <table>
            <thead>
                <tr>
                    <th>Partner Name</th>
                    <th>Status</th>
                    <th>Sub. Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="partnerList"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api/admin";

    function showTab(tab) {
        document.getElementById('uniTab').style.display = tab === 'uni' ? 'block' : 'none';
        document.getElementById('partnerTab').style.display = tab === 'partners' ? 'block' : 'none';
        if(tab === 'partners') loadPartners();
    }

    async function saveUniversity() {
        const data = {
            name: document.getElementById('name').value,
            country: document.getElementById('country').value,
            intake: document.getElementById('intake').value,
            semesterFee: document.getElementById('fee').value,
            languageType: document.getElementById('langType').value,
            langScore: document.getElementById('score').value,
            minGPA: document.getElementById('gpa').value,
            spouseAllowed: document.getElementById('spouse').value,
            partnerCommission: document.getElementById('comm').value,
            scholarship: document.getElementById('scholarship').value
        };

        const res = await fetch(`${API}/add-university`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) alert("University Added Successfully!");
    }

    async function loadPartners() {
        const res = await fetch(`${API}/partners`);
        const data = await res.json();
        const list = document.getElementById('partnerList');
        list.innerHTML = '';
        data.forEach(p => {
            list.innerHTML += `
                <tr>
                    <td>${p.name}</td>
                    <td><span class="badge ${p.subscriptionStatus.toLowerCase()}">${p.subscriptionStatus}</span></td>
                    <td><input type="number" value="${p.subscriptionAmount}" id="amt-${p._id}" style="width:100px"></td>
                    <td>
                        <button onclick="updateSub('${p._id}', 'Active')" style="width:auto; padding:5px 10px; background:green">Active</button>
                        <button onclick="updateSub('${p._id}', 'Inactive')" style="width:auto; padding:5px 10px; background:red">Inactive</button>
                    </td>
                </tr>`;
        });
    }

    async function updateSub(id, status) {
        const amount = document.getElementById(`amt-${id}`).value;
        await fetch(`${API}/update-subscription`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, status, amount })
        });
        alert("Updated!");
        loadPartners();
    }
</script>
</body>
</html>
