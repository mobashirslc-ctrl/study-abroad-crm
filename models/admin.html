<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IHP Admin | Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .nav-item { padding: 12px 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 10px; margin-bottom: 8px; }
        .nav-item.active { background: var(--primary); color: white; }
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .grid-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; width: 100%; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        .page { display: none; } .active { display: block; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="showPage('addUni', this)">Assessment Setup</div>
    <div class="nav-item" onclick="showPage('partners', this)">Partner List</div>
</div>
<div class="main">
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3>Add University Details</h3>
            <div class="grid-form">
                <input type="text" id="uName" placeholder="University Name">
                <input type="text" id="uCountry" placeholder="Country">
                <input type="text" id="uIntake" placeholder="Intake (Sept 2026)">
                <select id="uDegree"><option value="">Degree</option><option>UG</option><option>PG</option><option>PhD</option></select>
                <select id="uLang"><option value="">Language</option><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
                <input type="number" step="0.1" id="uLScore" placeholder="Min Lang Score">
                <input type="text" id="uCourse" placeholder="Course Name">
                <input type="text" id="uFee" placeholder="Semester Fee">
                <input type="text" id="uBank" placeholder="Bank Req.">
                <input type="number" id="uComm" placeholder="Commission (৳)">
                <input type="number" step="0.01" id="uGPA" placeholder="Min GPA">
            </div>
            <button class="btn-main" onclick="saveUniversity()">Save to Database</button>
        </div>
    </div>
    <div id="partnersPage" class="page">
        <div class="card">
            <h3>Partner Management</h3>
            <table>
                <thead><tr><th>Name</th><th>Subscription (৳)</th><th>Status</th></tr></thead>
                <tbody id="partnerTable"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const API = "https://study-abroad-crm.onrender.com/api";
    function showPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'partners') loadPartners();
    }
    async function saveUniversity() {
        const data = { name: document.getElementById('uName').value, country: document.getElementById('uCountry').value, intake: document.getElementById('uIntake').value, degree: document.getElementById('uDegree').value, languageType: document.getElementById('uLang').value, langScore: document.getElementById('uLScore').value, courseName: document.getElementById('uCourse').value, semesterFee: document.getElementById('uFee').value, bankReq: document.getElementById('uBank').value, partnerCommission: document.getElementById('uComm').value, academicScore: document.getElementById('uGPA').value };
        await fetch(`${API}/admin/add-university`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("Saved!");
    }
    async function loadPartners() {
        const res = await fetch(`${API}/admin/partners`);
        const data = await res.json();
        document.getElementById('partnerTable').innerHTML = data.map(p => `
            <tr>
                <td>${p.name}</td>
                <td><input type="number" value="${p.subAmount}" onchange="updateSub('${p._id}', this.value)" style="width:80px;"></td>
                <td><label class="switch"><input type="checkbox" ${p.status === 'Active' ? 'checked' : ''} onchange="toggleStatus('${p._id}', this.checked)"><span class="slider"></span></label></td>
            </tr>
        `).join('');
    }
    async function updateSub(id, val) { await fetch(`${API}/admin/update-partner-sub`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, subAmount: val}) }); }
    async function toggleStatus(id, chk) { await fetch(`${API}/admin/update-partner-status`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id, status: chk ? 'Active' : 'Inactive'}) }); }
</script>
</body>
</html>
