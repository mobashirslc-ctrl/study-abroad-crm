<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f1f5f9; }
        .sidebar { width: 260px; background: #0f172a; height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; border-radius: 10px; margin-bottom: 5px; }
        .nav-item.active { background: #2563eb; color: white; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .page { display: none; } .page.active { display: block; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; }
        .btn-save { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="show('addUni', this)"><i class="fas fa-plus"></i> Assessment (Add)</div>
    <div class="nav-item" onclick="show('files', this)"><i class="fas fa-folder"></i> Student Files</div>
    <div class="nav-item" onclick="show('partners', this)"><i class="fas fa-users"></i> Partner List</div>
</div>

<div class="main">
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3>Add New University Details</h3>
            <div class="grid">
                <input type="text" id="name" placeholder="University Name">
                <input type="text" id="country" placeholder="Country">
                <select id="degree"><option>UG</option><option>PG</option><option>Diploma</option><option>Research</option><option>PhD</option></select>
                <input type="text" id="intake" placeholder="Intake (e.g. Sept 2026)">
                <input type="text" id="fee" placeholder="Semester Fee">
                <select id="curr"><option>USD</option><option>GBP</option><option>EUR</option><option>AUD</option><option>CAD</option></select>
                <select id="lang"><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
                <input type="number" id="lScore" placeholder="Min Language Score">
                <input type="number" id="gpa" placeholder="Min GPA">
                <input type="number" id="comm" placeholder="Partner Commission (৳)">
            </div>
            <button class="btn-save" onclick="saveUniversity()">Add to Database</button>
        </div>
    </div>

    <div id="filesPage" class="page">
        <div class="card">
            <h3>Existing Student Application Tracking</h3>
            <table id="fileTable">
                <thead><tr><th>Student</th><th>University</th><th>Partner</th><th>Status</th></tr></thead>
                <tbody id="fileBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api/admin";

    function show(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'files') loadFiles();
    }

    async function saveUniversity() {
        const data = { name: document.getElementById('name').value, country: document.getElementById('country').value, degree: document.getElementById('degree').value, intake: document.getElementById('intake').value, semesterFee: document.getElementById('fee').value, currency: document.getElementById('curr').value, languageType: document.getElementById('lang').value, langScore: document.getElementById('lScore').value, minGPA: document.getElementById('gpa').value, partnerCommission: document.getElementById('comm').value };
        await fetch(`${API}/add-university`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        alert("University Added Successfully!");
    }

    async function loadFiles() {
        const res = await fetch(`${API}/all-files`);
        const data = await res.json();
        document.getElementById('fileBody').innerHTML = data.map(f => `<tr><td>${f.studentName}</td><td>${f.university}</td><td>${f.partnerName}</td><td>${f.status}</td></tr>`).join('');
    }
</script>
</body>
</html>
