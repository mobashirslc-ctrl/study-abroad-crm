<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Data Entry</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ececec; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #1a2a6c; color: white; border: none; cursor: pointer; font-weight: bold; }
        .row { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div id="loginBox" class="box">
        <h2>Admin Security</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="login()">Enter Admin Panel</button>
    </div>

    <div id="formBox" class="box" style="display:none;">
        <h2>Add University Info</h2>
        <form id="uForm">
            <input type="text" id="name" placeholder="University Name" required>
            <div class="row">
                <input type="text" id="country" placeholder="Country" required>
                <input type="text" id="course" placeholder="Course Name" required>
            </div>
            <input type="text" id="intake" placeholder="Intake (e.g. Sept 2026)">
            <div class="row">
                <input type="number" step="0.01" id="mGPA" placeholder="Min GPA (UG)">
                <input type="number" step="0.01" id="mCGPA" placeholder="Min CGPA (Masters)">
            </div>
            <div class="row">
                <input type="number" id="gap" placeholder="Max Gap (Years)">
                <input type="number" step="0.1" id="ielts" placeholder="Min IELTS">
            </div>
            <div class="row">
                <input type="number" id="fdr" placeholder="Required FDR">
                <input type="number" id="savings" placeholder="Required Savings">
            </div>
            <button type="submit">Submit Data</button>
        </form>
    </div>

    <script>
        function login() {
            if(document.getElementById('pass').value === "admin123") {
                document.getElementById('loginBox').style.display='none';
                document.getElementById('formBox').style.display='block';
            } else { alert("Wrong!"); }
        }

        document.getElementById('uForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                country: document.getElementById('country').value,
                courseName: document.getElementById('course').value,
                intake: document.getElementById('intake').value,
                minGPA: document.getElementById('mGPA').value,
                minCGPA: document.getElementById('mCGPA').value,
                maxStudyGap: document.getElementById('gap').value,
                minIELTS: document.getElementById('ielts').value,
                requiredFDR: document.getElementById('fdr').value,
                requiredSavings: document.getElementById('savings').value
            };
            const res = await fetch("https://study-abroad-crm.onrender.com/api/universities", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("University Added!"); e.target.reset(); }
        });
    </script>
</body>
</html>
