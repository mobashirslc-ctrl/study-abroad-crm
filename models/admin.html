<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IHP Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f8fafc; color: #334155; }
        .sidebar { width: 260px; background: #0f172a; color: white; height: 100vh; position: fixed; padding: 25px; }
        .main { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 30px; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; }
        .nav-item:hover { color: white; background: #1e293b; border-radius: 8px; }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:#2563eb">IHP CRM</h2>
    <div class="nav-item" onclick="show('addUni')"><i class="fas fa-university"></i> Add University</div>
    <div class="nav-item" onclick="show('requests')"><i class="fas fa-money-bill"></i> Requests</div>
</div>

<div class="main">
    <div id="addUni" class="section active">
        <div class="card">
            <h2>Add New University</h2>
            <div class="grid">
                <div><label>University Name</label><input type="text" id="name"></div>
                <div><label>Country</label><input type="text" id="country"></div>
                <div><label>Location (City)</label><input type="text" id="location"></div>
                <div><label>Degree Level</label><select id="degree"><option>Undergraduate (UG)</option><option>Postgraduate (PG)</option></select></div>
                <div><label>Scholarship Details</label><input type="text" id="scholar"></div>
                <div><label>Partner Commission (৳)</label><input type="number" id="comm"></div>
                <div><label>Minimum GPA</label><input type="number" step="0.01" id="gpa"></div>
                <div><label>Min. Language Score</label><input type="number" step="0.1" id="score"></div>
            </div>
            <button class="btn" onclick="addUniversity()">Submit University</button>
            <p id="msg" style="text-align:center; margin-top:15px;"></p>
        </div>
    </div>

    <div id="requests" class="section">
        <div class="card">
            <h2>Withdrawal & Student Requests</h2>
            <div id="reqList">Loading...</div>
        </div>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api/admin";

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'requests') loadRequests();
    }

    async function addUniversity() {
        const msg = document.getElementById('msg');
        msg.innerText = "Processing...";
        const data = {
            name: document.getElementById('name').value,
            country: document.getElementById('country').value,
            location: document.getElementById('location').value,
            degree: document.getElementById('degree').value,
            scholarship: document.getElementById('scholar').value,
            partnerCommission: document.getElementById('comm').value,
            minGPA: document.getElementById('gpa').value,
            langScore: document.getElementById('score').value
        };

        try {
            const res = await fetch(`${API}/add-university`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.success) {
                msg.innerHTML = "✅ Added!";
                setTimeout(() => location.reload(), 1000);
            }
        } catch (err) {
            msg.innerHTML = "❌ Error Connecting Server.";
        }
    }

    async function loadRequests() {
        const res = await fetch(`${API}/withdraws`);
        const data = await res.json();
        document.getElementById('reqList').innerHTML = data.map(r => `
            <div style="border-bottom:1px solid #eee; padding:10px;">
                ${r.partnerName} requested ৳${r.amount} (${r.method}) - <b>${r.status}</b>
            </div>
        `).join('');
    }
</script>
</body>
</html>
