<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Study Abroad</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .box { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #003366; color: white; cursor: pointer; border: none; }
        .uni-item { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #cc0000; width: auto; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="admin" class="box">
        <h2>Add University</h2>
        <form id="uForm">
            <input type="text" id="name" placeholder="University Name" required>
            <div class="grid">
                <input type="text" id="country" placeholder="Country" required>
                <input type="text" id="location" placeholder="City/Campus">
            </div>
            <div class="grid">
                <select id="degree">
                    <option value="UG">Undergraduate (UG)</option>
                    <option value="PG">Postgraduate (PG)</option>
                </select>
                <input type="text" id="course" placeholder="Course Name" required>
            </div>
            <div class="grid">
                <input type="number" id="fee" placeholder="Tuition Fee (Total Amount)">
                <input type="text" id="scholar" placeholder="Scholarship (e.g. 20%)">
            </div>
            <button type="submit">Add University</button>
        </form>
        <hr>
        <h3>Existing Universities</h3>
        <div id="uniList"></div>
    </div>

    <script>
        const API = "https://study-abroad-crm.onrender.com/api/universities";

        async function loadUnis() {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('uniList').innerHTML = data.map(u => `
                <div class="uni-item">
                    <span><strong>${u.name}</strong> - ${u.courseName} (${u.country})</span>
                    <button class="del-btn" onclick="deleteUni('${u._id}')">Delete</button>
                </div>
            `).join('');
        }

        async function deleteUni(id) {
            if(confirm("Are you sure?")) {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                loadUnis();
            }
        }

        document.getElementById('uForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                country: document.getElementById('country').value,
                location: document.getElementById('location').value,
                degreeLevel: document.getElementById('degree').value,
                courseName: document.getElementById('course').value,
                tutionFee: document.getElementById('fee').value,
                scholarship: document.getElementById('scholar').value
            };
            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            loadUnis();
            e.target.reset();
        });

        loadUnis();
    </script>
</body>
</html>
