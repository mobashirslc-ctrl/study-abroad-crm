<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Add University</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 14px; background-color: #1a252f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2c3e50; }
        .status-msg { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-size: 14px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Add New University</h2>
    <form id="uniForm">
        <label>University Name</label>
        <input type="text" id="name" placeholder="e.g. University of Hertfordshire" required>

        <label>City / Location</label>
        <input type="text" id="location" placeholder="e.g. Hatfield, London" required>

        <label>Country</label>
        <select id="country">
            <option value="United Kingdom">United Kingdom</option>
            <option value="USA">USA</option>
            <option value="Canada">Canada</option>
            <option value="Australia">Australia</option>
        </select>

        <label>Course Name</label>
        <input type="text" id="course" placeholder="e.g. MSc Data Science" required>

        <label>Degree Level</label>
        <select id="degree">
            <option value="Undergraduate (UG)">Undergraduate (UG)</option>
            <option value="Postgraduate (PG)">Postgraduate (PG)</option>
            <option value="Foundation">Foundation</option>
        </select>

        <label>Intake Options</label>
        <input type="text" id="intake" placeholder="e.g. Jan, Sep, Oct" required>

        <label>Minimum GPA</label>
        <input type="number" step="0.01" id="minGPA" placeholder="e.g. 3.00" required>

        <label>Language Proficiency Test</label>
        <select id="languageType">
            <option value="IELTS">IELTS</option>
            <option value="PTE">PTE</option>
            <option value="DUOLINGO">DUOLINGO</option>
            <option value="MOI">MOI</option>
        </select>

        <label>Minimum Score</label>
        <input type="number" step="0.1" id="minScore" placeholder="e.g. 6.5" required>

        <label>Commission Amount (BDT)</label>
        <input type="number" id="commission" placeholder="e.g. 50000" required>

        <button type="submit" id="submitBtn">Submit University</button>
    </form>
    <div id="statusBox" class="status-msg"></div>
</div>

<script>
    // আপনার রেন্ডার সার্ভার লিঙ্ক
    const API_URL = "https://study-abroad-crm.onrender.com"; 

    const uniForm = document.getElementById('uniForm');
    const statusBox = document.getElementById('statusBox');
    const submitBtn = document.getElementById('submitBtn');

    uniForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // বাটন ডিজেবল করা যাতে ডাবল ক্লিক না হয়
        submitBtn.disabled = true;
        statusBox.style.display = "block";
        statusBox.className = "status-msg"; 
        statusBox.innerText = "Processing... Please wait.";

        // ফ্রন্টএন্ড থেকে ডেটা অবজেক্ট তৈরি
        const formData = {
            name: document.getElementById('name').value,
            location: document.getElementById('location').value,
            country: document.getElementById('country').value,
            course: document.getElementById('course').value,
            degree: document.getElementById('degree').value,
            intake: document.getElementById('intake').value,
            minGPA: parseFloat(document.getElementById('minGPA').value),
            languageType: document.getElementById('languageType').value,
            minLanguageScore: parseFloat(document.getElementById('minScore').value),
            commissionAmount: parseInt(document.getElementById('commission').value)
        };

        try {
            const response = await fetch(`${API_URL}/api/universities`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (response.ok) {
                statusBox.classList.add('success');
                statusBox.innerText = "✅ Success: University added to database!";
                uniForm.reset(); // ফর্ম ক্লিয়ার করা
            } else {
                statusBox.classList.add('error');
                statusBox.innerText = "❌ Error: " + (result.message || "Something went wrong");
            }
        } catch (error) {
            statusBox.classList.add('error');
            statusBox.innerText = "❌ Connection Failed: Server is not responding.";
            console.error("Fetch Error:", error);
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
