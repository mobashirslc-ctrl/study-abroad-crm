<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - CRM Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .box { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #003366; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #002244; }
        .uni-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .uni-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .del-btn { background: #d9534f; width: auto; padding: 6px 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Add New University Details</h2>
        <form id="uForm">
            <input type="text" id="name" placeholder="University Name" required>
            <div class="grid">
                <input type="text" id="country" placeholder="Country" required>
                <input type="text" id="loc" placeholder="City/Campus">
            </div>
            <div class="grid">
                <select id="degree">
                    <option value="UG">Undergraduate (UG)</option>
                    <option value="PG">Postgraduate (PG)</option>
                    <option value="Diploma">Diploma/Foundation</option>
                </select>
                <input type="text" id="course" placeholder="Course Name" required>
            </div>
            <div class="grid">
                <select id="curr">
                    <option value="USD">USD ($)</option>
                    <option value="AUD">AUD (A$)</option>
                    <option value="GBP">GBP (£)</option>
                    <option value="CAD">CAD (C$)</option>
                    <option value="EUR">Euro (€)</option>
                </select>
                <input type="number" id="fee" placeholder="Tuition Fee (Amount)">
            </div>
            <div class="grid">
                <select id="marital">
                    <option value="Allowed">Spouse Allowed</option>
                    <option value="Not Allowed">Single Only (No Spouse)</option>
                </select>
                <input type="text" id="scholar" placeholder="Scholarship Details">
            </div>
            <div class="grid">
                <input type="number" step="0.01" id="mGPA" placeholder="Min GPA (SSC/HSC)">
                <input type="number" step="0.01" id="mCGPA" placeholder="Min CGPA (Honours)">
            </div>
            <div class="grid">
                <select id="lType">
                    <option value="IELTS">IELTS</option>
                    <option value="PTE">PTE</option>
                    <option value="Duolingo">Duolingo</option>
                </select>
                <input type="number" step="0.1" id="lScore" placeholder="Min Language Score">
            </div>
            <div class="grid">
                <select id="bType">
                    <option value="FDR">FDR Required</option>
                    <option value="Savings">Savings Required</option>
                </select>
                <input type="number" id="bAmt" placeholder="Required Bank Amount">
            </div>
            <input type="number" id="gap" placeholder="Max Study Gap (Years)">
            <button type="submit">Save University Information</button>
        </form>

        <div class="uni-list">
            <h3>Manage Existing Data</h3>
            <div id="displayList"></div>
        </div>
    </div>

    <script>
        const API = "https://study-abroad-crm.onrender.com/api/universities";

        async function fetchUnis() {
            const r = await fetch(API);
            const data = await r.json();
            document.getElementById('displayList').innerHTML = data.map(u => `
                <div class="uni-item">
                    <span><strong>${u.name}</strong> - ${u.courseName} (${u.country})</span>
                    <button class="del-btn" onclick="deleteUni('${u._id}')">Delete</button>
                </div>
            `).join('');
        }

        async function deleteUni(id) {
            if(confirm("Are you sure you want to delete this university?")) {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                fetchUnis();
            }
        }

        document.getElementById('uForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                country: document.getElementById('country').value,
                location: document.getElementById('loc').value,
                degreeLevel: document.getElementById('degree').value,
                courseName: document.getElementById('course').value,
                currency: document.getElementById('curr').value,
                tutionFee: document.getElementById('fee').value,
                maritalStatus: document.getElementById('marital').value,
                scholarship: document.getElementById('scholar').value,
                minGPA: document.getElementById('mGPA').value,
                minCGPA: document.getElementById('mCGPA').value,
                languageType: document.getElementById('lType').value,
                minLangScore: document.getElementById('lScore').value,
                bankType: document.getElementById('bType').value,
                requiredBankAmount: document.getElementById('bAmt').value,
                maxStudyGap: document.getElementById('gap').value
            };
            await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            fetchUnis(); e.target.reset();
        });
        fetchUnis();
    </script>
</body>
</html>
