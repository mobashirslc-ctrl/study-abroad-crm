<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #0f172a; --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); height: 100vh; position: fixed; padding: 25px; color: white; box-sizing: border-box; }
        .sidebar h2 { color: var(--primary); margin-bottom: 30px; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* Form Grid */
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8fafc; color: #64748b; }

        /* Status Buttons */
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
        .active-btn { background: #dcfce7; color: #166534; }
        .inactive-btn { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="showPage('addUni', this)"><i class="fas fa-plus-circle"></i> Assessment (Add)</div>
    <div class="nav-item" onclick="showPage('files', this)"><i class="fas fa-folder-open"></i> Student Files</div>
    <div class="nav-item" onclick="showPage('partners', this)"><i class="fas fa-users"></i> Partner List</div>
    <div class="nav-item" onclick="showPage('withdraw', this)"><i class="fas fa-wallet"></i> Withdraw Requests</div>
</div>

<div class="main">
    
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3><i class="fas fa-university"></i> Add University for Assessment</h3>
            <div class="form-grid">
                <input type="text" id="uName" placeholder="University Name">
                <input type="text" id="uCountry" placeholder="Country">
                <select id="uDegree">
                    <option>Select Degree</option><option>UG</option><option>PG</option><option>Diploma</option><option>Research</option><option>PhD</option>
                </select>
                <input type="text" id="uIntake" placeholder="Intake (e.g., Sept 2026)">
                <input type="text" id="uFee" placeholder="Semester Fee">
                <select id="uCurrency"><option>USD</option><option>GBP</option><option>EUR</option><option>AUD</option><option>CAD</option></select>
                <select id="uLang"><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
                <input type="number" id="uLScore" placeholder="Min Lang Score">
                <input type="number" id="uAcademic" placeholder="Min Academic GPA">
                <input type="number" id="uComm" placeholder="Partner Commission (৳)">
            </div>
            <button class="btn-save" onclick="saveUniversity()">Add to Database</button>
        </div>
    </div>

    <div id="filesPage" class="page">
        <div class="card">
            <h3><i class="fas fa-file-pdf"></i> Student Tracking List</h3>
            <table>
                <thead><tr><th>Student</th><th>University</th><th>Partner</th><th>Status</th></tr></thead>
                <tbody id="fileBody"></tbody>
            </table>
        </div>
    </div>

    <div id="partnersPage" class="page">
        <div class="card">
            <h3><i class="fas fa-handshake"></i> Partner Management</h3>
            <table>
                <thead><tr><th>Partner Name</th><th>Subscription</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="partnerBody"></tbody>
            </table>
        </div>
    </div>

    <div id="withdrawPage" class="page">
        <div class="card">
            <h3><i class="fas fa-money-check-alt"></i> Withdrawal Requests</h3>
            <table>
                <thead><tr><th>Partner</th><th>Amount</th><th>Method</th><th>Account</th><th>Action</th></tr></thead>
                <tbody id="withdrawBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api";

    function showPage(pageId, element) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId + 'Page').classList.add('active');
        element.classList.add('active');

        if(pageId === 'files') loadFiles();
        if(pageId === 'partners') loadPartners();
        if(pageId === 'withdraw') loadWithdraws();
    }
