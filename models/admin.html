<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal | IHP CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f1f5f9; }
        .sidebar { width: 260px; background: #0f172a; height: 100vh; position: fixed; padding: 25px; color: white; }
        .main { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .nav-item { padding: 15px; cursor: pointer; color: #94a3b8; border-radius: 10px; margin-bottom: 5px; }
        .nav-item.active { background: #2563eb; color: white; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .page { display: none; } .page.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .status-btn { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="show('addUni', this)"><i class="fas fa-plus"></i> Assessment</div>
    <div class="nav-item" onclick="show('partners', this)"><i class="fas fa-users"></i> Partner List</div>
    <div class="nav-item" onclick="show('withdraw', this)"><i class="fas fa-wallet"></i> Withdraw Requests</div>
</div>

<div class="main">
    <div id="addUniPage" class="page active">
        <div class="card">
            <h3>Add University for Assessment</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" id="uName" placeholder="University Name">
                <input type="number" id="uLang" placeholder="Lang Score Req.">
                <input type="number" id="uComm" placeholder="Partner Commission">
            </div>
            <button class="nav-item active" style="border:none; width:100%; margin-top:10px;" onclick="saveUni()">Save University</button>
        </div>
    </div>

    <div id="partnersPage" class="page">
        <div class="card">
            <h3>All Registered Partners</h3>
            <table>
                <thead><tr><th>Name</th><th>Sub Amount</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="pData"></tbody>
            </table>
        </div>
    </div>

    <div id="withdrawPage" class="page">
        <div class="card">
            <h3>Pending Withdrawals</h3>
            <table>
                <thead><tr><th>Partner</th><th>Amount</th><th>Method</th><th>Status</th></tr></thead>
                <tbody id="wData"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://study-abroad-crm.onrender.com/api/admin";

    function show(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'partners') loadPartners();
        if(p === 'withdraw') loadWithdraws();
    }

    async function loadPartners() {
        const res = await fetch(`${API}/partners`);
        const data = await res.json();
        document.getElementById('pData').innerHTML = data.map(p => `
            <tr>
                <td>${p.name}</td>
                <td><input type="number" value="${p.subAmount}" onchange="updateSub('${p._id}', this.value)" style="width:60px">৳</td>
                <td>${p.status}</td>
                <td><button onclick="toggleP('${p._id}', '${p.status}')" class="status-btn" style="background:${p.status==='Active'?'red':'green'}">${p.status==='Active'?'Deactivate':'Activate'}</button></td>
            </tr>
        `).join('');
    }

    async function updateSub(id, amount) {
        await fetch(`${API}/custom-sub`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, amount }) });
        alert("Subscription Amount Updated!");
    }

    async function loadWithdraws() {
        const res = await fetch(`${API}/withdraw-requests`);
        const data = await res.json();
        document.getElementById('wData').innerHTML = data.map(w => `
            <tr><td>${w.partnerName}</td><td>৳${w.amount}</td><td>${w.method} (${w.account})</td><td>${w.status}</td></tr>
        `).join('');
    }
</script>
</body>
</html>
