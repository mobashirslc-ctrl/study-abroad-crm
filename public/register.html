<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Registration | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0b012d; font-family: 'Poppins', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; text-align: center; width: 90%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo-box { background: white; padding: 10px 20px; border-radius: 12px; display: inline-block; margin-bottom: 20px; }
        .logo-box img { height: 40px; }
        h2 { color: #ffcc00; margin-bottom: 20px; letter-spacing: 1px; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #ffcc00; }
        input { width: 100%; padding: 12px 12px 12px 45px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #ffcc00; color: #0b012d; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        p { color: #bdc3c7; font-size: 13px; margin-top: 15px; }
        a { color: #ffcc00; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box"><img src="logo.jpeg" alt="SCC Logo"></div>
        <h2>Partner Join</h2>
        <form id="regForm">
            <div class="input-group"><i class="fa-solid fa-user"></i><input type="text" id="fullName" placeholder="Full Name" required></div>
            <div class="input-group"><i class="fa-solid fa-envelope"></i><input type="email" id="email" placeholder="Email Address" required></div>
            <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="Password" required></div>
            <button type="submit" class="btn" id="regBtn">Register Now</button>
        </form>
        <p>Already have an account? <a href="index.html">Login here</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Config (আপনার প্রোজেক্টের ডিটেইলস)
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('regBtn');

            btn.innerText = "Registering...";
            btn.disabled = true;

            // ১. Firebase Auth-এ ইউজার তৈরি করা
            auth.createUserWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                const user = userCredential.user;

                // ২. Realtime Database-এ ইউজারের ডাটা সেভ করা
                return db.ref('users/' + user.uid).set({
                    fullName: name,
                    email: email,
                    role: "partner",
                    approved: false, // ডিফল্টভাবে এপ্রুভড থাকবে না
                    joinedAt: new Date().toLocaleString()
                });
            })
            .then(() => {
                alert("Registration Success! Wait for Admin Approval.");
                auth.signOut(); // এপ্রুভ হওয়ার আগ পর্যন্ত তাকে বের করে দিন
                window.location.href = "index.html"; // লগইন পেজে পাঠিয়ে দিন
            })
            .catch((error) => {
                alert(error.message);
                btn.innerText = "Register Now";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
