<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Registration | SCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Create Account</h2>
        <p class="text-gray-500 mb-6">Join as a partner to start submitting applications.</p>
        
        <div class="space-y-4">
            <input type="text" id="regName" placeholder="Full Name / Company Name" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="email" id="regEmail" placeholder="Email Address" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="regPass" placeholder="Create Password" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <button id="registerBtn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition">Register Now</button>
        </div>

        <p class="text-center text-gray-600 mt-4 text-sm">
            Already have an account? <a href="index.html" class="text-blue-600 font-bold hover:underline">Login here</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registerBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const btn = document.getElementById('registerBtn');

            if(!name || !email || !pass) return alert("Please fill all fields!");

            try {
                btn.disabled = true;
                btn.innerText = "Registering...";
                
                // ১. Firebase Auth এ ইউজার তৈরি করা
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // ২. Firestore এ ইউজারের এক্সট্রা ডাটা (নাম) সেভ করা
                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    role: "partner",
                    createdAt: new Date().toISOString()
                });

                alert("Registration Successful!");
                window.location.replace("partner.html");

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Register Now";
            }
        };
    </script>
</body>
</html>
