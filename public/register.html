<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | SCC Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b012d] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white/5 border border-white/10 p-8 rounded-2xl shadow-2xl w-full max-w-md backdrop-blur-lg">
        <h2 class="text-3xl font-extrabold text-white mb-2 text-center">Join SCC</h2>
        <p class="text-gray-400 mb-6 text-center">Create your portal account</p>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-[#ffcc00] font-bold uppercase ml-1">Full Name</label>
                <input type="text" id="regName" placeholder="John Doe" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] font-bold uppercase ml-1">Email</label>
                <input type="email" id="regEmail" placeholder="email@example.com" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] font-bold uppercase ml-1">Password</label>
                <input type="password" id="regPass" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] font-bold uppercase ml-1">Join As</label>
                <select id="regRole" class="w-full p-4 bg-[#1a0b45] border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
                    <option value="partner">Partner (Agent)</option>
                    <option value="compliance">Compliance Team (Staff)</option>
                </select>
            </div>
            <button id="registerBtn" class="w-full bg-[#ffcc00] text-black p-4 rounded-xl font-bold hover:bg-[#e6b800] transition transform active:scale-95">Submit Application</button>
        </div>

        <p class="text-center text-gray-400 mt-6 text-sm">
            Already registered? <a href="index.html" class="text-[#ffcc00] font-bold hover:underline">Login here</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registerBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;
            const btn = document.getElementById('registerBtn');

            if(!name || !email || !pass) return alert("Fill all fields!");

            try {
                btn.disabled = true;
                btn.innerText = "Processing...";
                
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    role: role,
                    status: "pending", 
                    createdAt: new Date().toISOString()
                });

                alert("Registration Successful! Please wait for Admin Approval.");
                await signOut(auth);
                window.location.replace("index.html");

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Submit Application";
            }
        };
    </script>
</body>
</html>
