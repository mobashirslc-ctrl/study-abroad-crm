<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Registration | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-blue-700 mb-6 text-center">Partner Sign Up</h2>
        <form id="regForm" class="space-y-4">
            <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border rounded-lg" required>
            <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border rounded-lg" required>
            <input type="text" id="contact" placeholder="Contact Number" class="w-full p-3 border rounded-lg" required>
            <input type="password" id="password" placeholder="Create Password" class="w-full p-3 border rounded-lg" required>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">REGISTER NOW</button>
        </form>
        <p class="mt-4 text-center text-sm">Already approved? <a href="/login" class="text-blue-600 font-bold">Login Here</a></p>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { name: document.getElementById('name').value, email: document.getElementById('email').value, contactNo: document.getElementById('contact').value, password: document.getElementById('password').value };
            const res = await fetch('/api/partner/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if(res.ok) { alert("Registration Done! Wait for admin approval."); window.location.href = '/login'; }
        };
    </script>
</body>
</html>
