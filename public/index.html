<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Georun Ltd. | Portal Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --purple: #0b012d; --glass: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1a0b4d, var(--purple)); color: white; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; width: 420px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .reg-input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; outline: none; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,204,0,0.3); }
        .hidden { display: none; }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gold); cursor: pointer; }
        label { font-size: 12px; color: #aaa; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div id="loginSection">
            <h2 style="text-align:center; color:var(--gold);"><i class="fas fa-lock"></i> Login</h2>
            <input type="email" id="loginEmail" placeholder="Email Address" class="reg-input">
            <input type="password" id="loginPass" placeholder="Password" class="reg-input">
            <button class="btn-gold" id="loginBtn">ACCESS PORTAL</button>
            <p class="toggle-link" onclick="toggleView('register')">Don't have an account? Register</p>
        </div>

        <div id="registerSection" class="hidden">
            <h2 style="text-align:center; color:var(--gold);"><i class="fas fa-user-plus"></i> Registration</h2>
            
            <label>Register As:</label>
            <select id="userRole" onchange="switchFields()" class="reg-input">
                <option value="">Select Role</option>
                <option value="Partner">Partner</option>
                <option value="Compliance">Compliance</option>
            </select>

            <input type="email" id="regEmail" placeholder="Login Email" class="reg-input">
            <input type="password" id="regPass" placeholder="Set Password" class="reg-input">

            <div id="partnerFields" class="hidden">
                <input type="text" id="pAgency" placeholder="Agency Name" class="reg-input">
                <input type="text" id="pPerson" placeholder="Authorized Person Name" class="reg-input">
                <input type="text" id="pContact" placeholder="Contact No" class="reg-input">
                <input type="text" id="pAddress" placeholder="Address" class="reg-input">
                <input type="text" id="pService" placeholder="Service Countries (e.g. UK, USA)" class="reg-input">
                
                <label>Trade License (PDF)</label>
                <input type="file" id="pTrade" class="reg-input" accept="application/pdf">
                
                <label>NID Copy (PDF)</label>
                <input type="file" id="pNid" class="reg-input" accept="application/pdf">
            </div>

            <div id="complianceFields" class="hidden">
                <input type="text" id="cName" placeholder="Employee Name" class="reg-input">
                <input type="text" id="cContact" placeholder="Contact No" class="reg-input">
                <input type="text" id="cOrg" placeholder="Organisation Name" class="reg-input">
                <input type="text" id="cExp" placeholder="Experience Duration" class="reg-input">
                <input type="text" id="cService" placeholder="Assigned Countries" class="reg-input">
            </div>

            <button class="btn-gold" id="regBtn">SUBMIT REQUEST</button>
            <p class="toggle-link" onclick="toggleView('login')">Already have an account? Login</p>
        </div>
    </div>

    <script type="module" src="auth-logic.js"></script>

    <script>
        // Toggle between Login and Register (Step 1.2)
        function toggleView(view) {
            if(view === 'register') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('registerSection').classList.remove('hidden');
            } else {
                document.getElementById('registerSection').classList.add('hidden');
                document.getElementById('loginSection').classList.remove('hidden');
            }
        }

        // Dynamic Fields Switcher (Step 1.3)
        function switchFields() {
            const role = document.getElementById('userRole').value;
            const pFields = document.getElementById('partnerFields');
            const cFields = document.getElementById('complianceFields');

            pFields.classList.add('hidden');
            cFields.classList.add('hidden');

            if (role === 'Partner') pFields.classList.remove('hidden');
            if (role === 'Compliance') cFields.classList.remove('hidden');
        }
    </script>
</body>
</html>
