<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | SCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold">SCC Partner Portal</h1>
        <ul class="flex space-x-6 nav-links">
            <li class="cursor-pointer hover:text-blue-400 active font-bold" onclick="tab('dash')">Dashboard</li>
            <li class="cursor-pointer hover:text-blue-400 font-bold" onclick="tab('apply')">New Application</li>
        </ul>
    </nav>

    <main class="p-8">
        <div id="dash" class="section active">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 border-b-2 border-blue-500 inline-block pb-1">Application Status</h2>
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
                <table class="min-w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4 text-sm font-semibold text-gray-600">Student Name</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Passport</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">University</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Status</th>
                            <th class="p-4 text-sm font-semibold text-gray-600">Date</th>
                        </tr>
                    </thead>
                    <tbody class="sharedBody divide-y text-gray-700">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="apply" class="section">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Available Universities</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow hover:border-blue-500 border-2 border-transparent transition cursor-pointer group" onclick="openApp('University of Delhi')">
                    <div class="bg-blue-100 w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:bg-blue-600 transition">
                        <span class="text-blue-600 group-hover:text-white font-bold text-xl">D</span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">University of Delhi</h3>
                    <p class="text-gray-500 text-sm mt-2">Submit your application for central university programs in India.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="appModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-4 backdrop-blur-sm" style="z-index: 999;">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 id="mTitle" class="text-2xl font-extrabold mb-4 text-blue-600"></h2>
            <p class="text-gray-500 mb-6">Enter student details below to submit application.</p>
            <div class="space-y-4">
                <input type="text" id="sName" placeholder="Student Full Name" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <input type="text" id="sPass" placeholder="Passport Number" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <div class="flex space-x-4 pt-4">
                    <button id="submitBtn" class="flex-1 bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition transform active:scale-95">Submit</button>
                    <button onclick="document.getElementById('appModal').style.display='none'" class="flex-1 bg-gray-100 text-gray-600 p-4 rounded-xl font-bold hover:bg-gray-200">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="partner-logic.js"></script>
</body>
</html>
