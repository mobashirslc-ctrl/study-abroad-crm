<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SCC Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b012d] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white/5 border border-white/10 p-8 rounded-2xl shadow-2xl w-full max-w-md backdrop-blur-lg">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white">SCC Portal</h2>
            <p class="text-gray-400 mt-2">Sign in to your dashboard</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Email Address</label>
                <input type="email" id="logEmail" placeholder="partner@scc.com" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Password</label>
                <input type="password" id="logPass" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <button id="loginBtn" class="w-full bg-[#ffcc00] text-black p-4 rounded-xl font-bold hover:bg-[#e6b800] transition transform active:scale-95">Login</button>
        </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function handleLogin() {
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPass').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !password) return alert("Please fill all fields!");

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                // এখানে ব্র্যাকেট ফিক্স করা হয়েছে
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // সেশন সেভ করা হচ্ছে যেন Partner Logic এটা ব্যবহার করতে পারে
                    localStorage.setItem('partnerEmail', email.toLowerCase().trim()); 
                    
                    alert("Login Successful!");
                    window.location.href = "/partner"; 
                } else {
                    alert(data.msg || "Login Failed");
                }
            } catch (err) {
                console.error(err);
                alert("Server error. Please try again.");
            } finally {
                btn.innerText = "Login";
                btn.disabled = false;
            }
        }

        document.getElementById('loginBtn').addEventListener('click', handleLogin);
    </script>
</body>
</html>
