<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SCC Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b012d] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white/5 border border-white/10 p-8 rounded-2xl shadow-2xl w-full max-w-md backdrop-blur-lg">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white">SCC Portal</h2>
            <p class="text-gray-400 mt-2">Sign in to your dashboard</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Email Address</label>
                <input type="email" id="logEmail" placeholder="partner@scc.com" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Password</label>
                <input type="password" id="logPass" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <button id="loginBtn" class="w-full bg-[#ffcc00] text-black p-4 rounded-xl font-bold hover:bg-[#e6b800] transition transform active:scale-95">Login</button>
        </div>

        <p class="text-center text-gray-400 mt-6 text-sm">
            Don't have an account? <a href="register.html" class="text-[#ffcc00] font-bold hover:underline">Register Now</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) return alert("Fill all fields!");

            try {
                btn.disabled = true;
                btn.innerText = "Checking...";
                
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    if (userData.status !== "active") {
                        alert("Account Pending! Please wait for admin approval.");
                        await signOut(auth);
                        btn.disabled = false;
                        btn.innerText = "Login";
                        return;
                    }

                    // গুরুত্বপূর্ণ: ইমেইল localStorage এ সেভ করা হচ্ছে ড্যাশবোর্ডের জন্য
                    localStorage.setItem('partnerEmail', email.trim().toLowerCase());

                    if (userData.role === "partner") {
                        window.location.replace("partner.html");
                    } else if (userData.role === "compliance") {
                        window.location.replace("compliance.html");
                    } else {
                        alert("Role not defined. Contact Admin.");
                    }
                }
            } catch (err) {
                alert("Login Failed: " + err.message);
                btn.disabled = false;
                btn.innerText = "Login";
            }
        };
    </script>
</body>
</html>
