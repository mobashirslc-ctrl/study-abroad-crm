<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC Portal | Login & Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b012d] flex items-center justify-center min-h-screen p-4">
    <div class="bg-white/5 border border-white/10 p-8 rounded-2xl shadow-2xl w-full max-w-md backdrop-blur-lg">
        
        <div class="text-center mb-8">
            <h2 id="formTitle" class="text-3xl font-extrabold text-white">SCC Portal</h2>
            <p id="formSubtitle" class="text-gray-400 mt-2">Sign in to your dashboard</p>
        </div>

        <div id="loginForm" class="space-y-4">
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Email Address</label>
                <input type="email" id="logEmail" placeholder="partner@scc.com" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Password</label>
                <input type="password" id="logPass" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <button id="loginBtn" class="w-full bg-[#ffcc00] text-black p-4 rounded-xl font-bold hover:bg-[#e6b800] transition transform active:scale-95">Login</button>
            
            <p class="text-center text-gray-400 text-sm mt-4">
                Don't have an account? 
                <a href="javascript:void(0)" onclick="toggleForm('register')" class="text-[#ffcc00] font-bold hover:underline">Register here</a>
            </p>
        </div>

        <div id="registerForm" class="space-y-4 hidden">
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Full Name</label>
                <input type="text" id="regName" placeholder="John Doe" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Email</label>
                <input type="email" id="regEmail" placeholder="email@example.com" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Password</label>
                <input type="password" id="regPass" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
            </div>
            <div>
                <label class="text-xs text-[#ffcc00] uppercase font-bold ml-1">Join As</label>
                <select id="regRole" class="w-full p-4 bg-[#1a0b45] border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-[#ffcc00]">
                    <option value="partner">Partner (Agent)</option>
                    <option value="staff">Staff / Compliance</option> 
                </select>
            </div>
            <button id="registerBtn" class="w-full bg-[#ffcc00] text-black p-4 rounded-xl font-bold hover:bg-[#e6b800] transition transform active:scale-95">Submit Application</button>
            
            <p class="text-center text-gray-400 text-sm mt-4">
                Already registered? 
                <a href="javascript:void(0)" onclick="toggleForm('login')" class="text-[#ffcc00] font-bold hover:underline">Login here</a>
            </p>
        </div>
    </div>

    <script>
        function toggleForm(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');

            if (type === 'register') {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                title.innerText = "Join SCC";
                subtitle.innerText = "Create your portal account";
            } else {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                title.innerText = "SCC Portal";
                subtitle.innerText = "Sign in to your dashboard";
            }
        }

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPass').value;
            if (!email || !password) return alert("Please fill all fields!");

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.user.role === 'staff' ? 'compliance.html' : 'partner.html';
                } else {
                    alert(data.msg);
                }
            } catch (err) {
                alert("Server Error!");
            }
        };

        document.getElementById('registerBtn').onclick = async () => {
            const fullName = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            if (!fullName || !email || !password) return alert("Fill all fields!");

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, userType: role })
                });
                const data = await res.json();
                if (res.ok) {
                    alert("Registration successful! Please login.");
                    toggleForm('login');
                } else {
                    alert(data.message || "Error during registration!");
                }
            } catch (err) {
                alert("Error during registration!");
            }
        };
    </script>
</body>
</html>
