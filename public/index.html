<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Georun Ltd. | Portal</title>
    <style>
        /* Apnar Glassmorphism CSS eikhane thakbe */
        body { background: #0b012d; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 400px; margin: 100px auto; }
        .reg-input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 id="formTitle">Registration</h2>
        
        <label>I am a:</label>
        <select id="userRole" onchange="switchFields()" class="reg-input">
            <option value="">Select Role</option>
            <option value="partner">Partner</option>
            <option value="compliance">Compliance</option>
        </select>

        <form id="mainForm">
            <input type="email" placeholder="Email" class="reg-input" required>
            <input type="password" placeholder="Password" class="reg-input" required>

            <div id="partnerFields" class="hidden">
                <input type="text" placeholder="Agency Name" class="reg-input">
                <input type="text" placeholder="Authorized Person" class="reg-input">
                <label>Trade License (PDF)</label>
                <input type="file" class="reg-input">
            </div>

            <div id="complianceFields" class="hidden">
                <input type="text" placeholder="Employee Name" class="reg-input">
                <input type="text" placeholder="Experience Duration" class="reg-input">
            </div>

            <button type="submit" style="width:100%; padding:10px; background:#ffcc00; border:none; border-radius:5px; font-weight:bold;">SUBMIT</button>
        </form>
    </div>

    <script>
        // Dynamic Fields Switcher Logic
        function switchFields() {
            const role = document.getElementById('userRole').value;
            const pFields = document.getElementById('partnerFields');
            const cFields = document.getElementById('complianceFields');

            if (role === 'partner') {
                pFields.classList.remove('hidden');
                cFields.classList.add('hidden');
            } else if (role === 'compliance') {
                cFields.classList.remove('hidden');
                pFields.classList.add('hidden');
            } else {
                pFields.classList.add('hidden');
                cFields.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
