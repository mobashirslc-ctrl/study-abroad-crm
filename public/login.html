<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --bg: #0b012d; --dark: #080120; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        
        .container { background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 204, 0, 0.1); width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo-box { text-align: center; margin-bottom: 20px; }
        .logo-box img { height: 45px; background: white; padding: 5px; border-radius: 8px; }
        
        .tab-btn { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .tab-btn span { padding: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; color: #777; }
        .tab-btn span.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        form { display: none; }
        form.active { display: block; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; background: var(--dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: white; box-sizing: border-box; outline: none; }
        .input-group input:focus { border-color: var(--gold); }

        .btn-main { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { background: #e6b800; transform: translateY(-2px); }
        
        .footer-note { font-size: 10px; color: #555; text-align: center; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box"><img src="logo.jpeg" alt="SCC"></div>
        
        <div class="tab-btn">
            <span id="loginTab" class="active" onclick="toggleForm('login')">LOGIN</span>
            <span id="regTab" onclick="toggleForm('register')">REGISTRATION</span>
        </div>

        <form id="loginForm" class="active">
            <div class="input-group">
                <label>Gmail / Username</label>
                <input type="email" id="lEmail" placeholder="partner@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="lPass" placeholder="******" required>
            </div>
            <button type="submit" class="btn-main">LOGIN AS PARTNER</button>
        </form>

        <form id="regForm">
            <div class="input-group">
                <label>Company Name</label>
                <input type="text" placeholder="e.g. Gorun Ltd." required>
            </div>
            <div class="input-group">
                <label>Authorized Person Name</label>
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" placeholder="+880..." required>
            </div>
            <div class="input-group">
                <label>Address</label>
                <input type="text" placeholder="Office Location" required>
            </div>
            <div class="input-group">
                <label>Gmail</label>
                <input type="email" placeholder="official@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn-main">SUBMIT APPLICATION</button>
        </form>

        <div class="footer-note">
            Authorized Partner Portal <br>
            Student Career Consultancy &copy; 2026
        </div>
    </div>

    <script>
        function toggleForm(type) {
            document.querySelectorAll('form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab-btn span').forEach(s => s.classList.remove('active'));
            
            if(type === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.getElementById('regForm').classList.add('active');
                document.getElementById('regTab').classList.add('active');
            }
        }

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            window.location.href = 'partner.html';
        };

        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Registration request sent to SCC Admin. You will receive a confirmation mail soon.");
            toggleForm('login');
        };
    </script>
</body>
</html>
