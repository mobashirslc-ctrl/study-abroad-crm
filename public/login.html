<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .glass-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        input { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .btn-primary { background: #3b82f6; transition: 0.3s; font-weight: bold; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .msg-box { display: none; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md glass-box p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">IHP CRM</h1>
            <p class="text-slate-400 text-sm mt-2" id="formSubtitle">Partner Access Portal</p>
        </div>

        <div id="msgDisplay" class="msg-box"></div>

        <div id="loginForm" class="space-y-4">
            <input type="email" id="lEmail" placeholder="Email Address">
            <input type="password" id="lPass" placeholder="Password">
            <button onclick="handleLogin()" class="w-full btn-primary py-3 rounded-lg">LOGIN</button>
            <p class="text-center text-sm text-slate-500">
                Don't have an account? 
                <a href="#" onclick="toggleForm('reg')" class="text-blue-400 hover:underline">Register</a>
            </p>
        </div>

        <div id="regForm" class="hidden space-y-4">
            <input type="text" id="rName" placeholder="Full Name / Agency Name">
            <input type="email" id="rEmail" placeholder="Business Email">
            <input type="password" id="rPass" placeholder="Create Password">
