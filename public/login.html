<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        <h2 class="text-3xl font-black text-center text-slate-800 mb-8 uppercase">Partner Login</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            <button onclick="loginUser()" id="loginBtn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition transform active:scale-95">Sign In</button>
        </div>
        <p class="text-center text-xs text-gray-400 mt-6 tracking-widest">SCC AUTHORIZED PERSONNEL ONLY</p>
    </div>
    <script type="module" src="auth-logic.js"></script>
</body>
</html>
