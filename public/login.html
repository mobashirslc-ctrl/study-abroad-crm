<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login & Register | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80'); background-size: cover; background-blend-mode: overlay;">

    <div class="glass w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div class="flex border-b">
            <button onclick="switchTab('login')" id="loginTab" class="tab-btn active w-1/2 py-4 font-bold uppercase text-xs tracking-widest">Login</button>
            <button onclick="switchTab('register')" id="registerTab" class="tab-btn w-1/2 py-4 font-bold uppercase text-xs tracking-widest text-slate-400">Register</button>
        </div>

        <div class="p-8">
            <div id="loginForm">
                <h2 class="text-2xl font-black text-slate-800 mb-2">Welcome Back</h2>
                <p class="text-slate-500 text-sm mb-6">Enter your email to access partner dashboard.</p>
                <div class="space-y-4">
                    <input type="email" id="lEmail" placeholder="Email Address" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg uppercase text-sm">Sign In</button>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <h2 class="text-2xl font-black text-slate-800 mb-2">Partner Inquiry</h2>
                <p class="text-slate-500 text-sm mb-6">Fill up the form to request partnership.</p>
                <div class="space-y-4">
                    <input type="text" id="rName" placeholder="Full Name" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
                    <input type="text" id="rOrg" placeholder="Organization Name" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
                    <input type="email" id="rEmail" placeholder="Email Address" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
                    <input type="text" id="rContact" placeholder="Contact Number" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
                    <button onclick="handleRegister()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-900 transition shadow-lg uppercase text-sm">Submit Request</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            if(type === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('lEmail').value;
            if(!email) return alert("Please enter email");

            const res = await fetch('/api/partner/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });

            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('partnerId', data._id);
                localStorage.setItem('partnerName', data.name);
                window.location.href = '/partner'; // সফল হলে ড্যাশবোর্ডে নিয়ে যাবে
            } else {
                alert(data.message || "Login Failed");
            }
        }

        async function handleRegister() {
            const data = {
                name: document.getElementById('rName').value,
                orgName: document.getElementById('rOrg').value,
                email: document.getElementById('rEmail').value,
                contact: document.getElementById('rContact').value
            };

            const res = await fetch('/api/partner/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                alert("✅ Registration Successful! Please wait for Admin approval.");
                switchTab('login');
            } else {
                const err = await res.json();
                alert(err.message || "Registration Failed");
            }
        }
    </script>
</body>
</html>
