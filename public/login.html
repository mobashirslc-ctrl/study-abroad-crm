<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0b0f1a; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-white/5 p-8 rounded-2xl border border-white/10">
        <h2 class="text-2xl font-bold text-center text-blue-500 mb-8" id="title">Partner Login</h2>
        <div id="msg" class="hidden p-3 rounded mb-4 text-xs text-center"></div>
        
        <div id="loginForm" class="space-y-4">
            <input type="email" id="lEmail" placeholder="Email" class="w-full p-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <input type="password" id="lPass" placeholder="Password" class="w-full p-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-3 rounded font-bold">LOGIN</button>
            <p class="text-center text-xs text-slate-500 mt-4">New? <a href="javascript:toggleForm()" class="text-blue-400">Register</a></p>
        </div>

        <div id="regForm" class="hidden space-y-4">
            <input type="text" id="rName" placeholder="Name" class="w-full p-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <input type="email" id="rEmail" placeholder="Email" class="w-full p-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <input type="password" id="rPass" placeholder="Password" class="w-full p-3 bg-slate-800 rounded border border-slate-700 outline-none">
            <button onclick="handleRegister()" class="w-full bg-emerald-600 py-3 rounded font-bold">REGISTER</button>
            <p class="text-center text-xs text-slate-500 mt-4">Back to <a href="javascript:toggleForm()" class="text-blue-400">Login</a></p>
        </div>
    </div>

    <script>
        function toggleForm() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('regForm').classList.toggle('hidden');
            document.getElementById('title').innerText = document.getElementById('loginForm').classList.contains('hidden') ? "Partner Registration" : "Partner Login";
        }

        async function handleLogin() {
            const res = await fetch('/api/partner/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email: lEmail.value, pass: lPass.value }) });
            const data = await res.json();
            if(res.ok) { localStorage.setItem('partnerId', data.id); localStorage.setItem('partnerName', data.name); window.location.href='/partner'; }
            else { alert(data.msg); }
        }

        async function handleRegister() {
            const res = await fetch('/api/partner/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: rName.value, email: rEmail.value, pass: rPass.value }) });
            const data = await res.json();
            alert(data.msg); toggleForm();
        }
    </script>
</body>
</html>
