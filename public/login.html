<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Login | IHP CRM</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96 border">
        <h2 class="text-xl font-bold text-center mb-6">PARTNER LOGIN</h2>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required class="w-full p-3 border rounded-lg outline-none">
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Login</button>
        </form>
    </div>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const res = await fetch('/api/partner/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('partnerInfo', JSON.stringify(data));
                window.location.href = "/partner";
            } else { alert(data.message || "Login failed!"); }
        }
    </script>
</body>
</html>
