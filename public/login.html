<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus {
            border-color: #3b82f6 !important;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md p-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter text-blue-500 italic">IHP GLOBAL</h1>
            <p class="text-slate-400 mt-2 text-sm">Partner Recruitment Portal</p>
        </div>

        <div class="glass-card p-8 shadow-2xl">
            <h2 class="text-xl font-semibold mb-6">Welcome Back</h2>
            
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="text-xs text-slate-400 block mb-1 uppercase tracking-widest">Email Address</label>
                    <input type="email" id="email" class="w-full p-3 rounded-xl" placeholder="name@org.com" required>
                </div>
                
                <div>
                    <label class="text-xs text-slate-400 block mb-1 uppercase tracking-widest">Password</label>
                    <input type="password" id="pass" class="w-full p-3 rounded-xl" placeholder="••••••••" required>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-500/20">
                    SIGN IN
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/5 text-center">
                <p class="text-sm text-slate-500">Don't have an account? 
                    <a href="/" class="text-blue-400 hover:underline">Apply Now</a>
                </p>
            </div>
        </div>
        
        <p class="text-center text-[10px] text-slate-600 mt-10 uppercase tracking-[3px]">© 2026 IHP Global CRM System</p>
    </div>

    <script>
        // যদি ইউজার আগে থেকেই লগইন করা থাকে, তবে সরাসরি ড্যাশবোর্ডে পাঠিয়ে দিবে
        if (localStorage.getItem('partnerId')) {
            window.location.replace('/partner');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/partner/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, pass })
                });

                const data = await res.json();

                if (res.ok) {
                    // সফল হলে ডাটা সেভ করা
                    localStorage.setItem('partnerId', data.id);
                    localStorage.setItem('partnerName', data.name);
                    // সরাসরি রিডাইরেক্ট
                    window.location.replace('/partner');
                } else {
                    alert(data.msg || "Invalid Credentials");
                    btn.innerText = "SIGN IN";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Server Connection Error");
                btn.innerText = "SIGN IN";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
