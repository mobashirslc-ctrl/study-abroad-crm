<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-96 border border-slate-200">
        <h2 class="text-2xl font-black text-center text-slate-800 mb-6 uppercase tracking-tighter">Partner Login</h2>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Email Address</label>
                <input type="email" id="email" required class="w-full p-3 border rounded-lg outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Password</label>
                <input type="password" id="password" required class="w-full p-3 border rounded-lg outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition uppercase text-xs tracking-widest">Login to Dashboard</button>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;

            const res = await fetch('/api/partner/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (res.ok) {
                // সাকসেস হলে ডাটা সেভ করে ড্যাশবোর্ডে পাঠানো
                localStorage.setItem('partnerInfo', JSON.stringify(data));
                window.location.href = "/partner";
            } else {
                alert(data.message || "Login failed!");
            }
        }
    </script>
</body>
</html>
