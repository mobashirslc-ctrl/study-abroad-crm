<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - IHP CRM</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin:0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title">Login</h2>
        <form id="authForm">
            <input type="text" id="name" placeholder="Full Name" style="display:none">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Password" required>
            <select id="role" style="display:none"><option value="partner">Partner</option></select>
            <button type="submit" id="btn">Login</button>
        </form>
        <p onclick="toggle()" style="text-align:center; color:blue; cursor:pointer;" id="toggleTxt">Register New Account</p>
    </div>

    <script>
        let isLogin = true;
        function toggle() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Login" : "Register";
            document.getElementById('name').style.display = isLogin ? "none" : "block";
            document.getElementById('role').style.display = isLogin ? "none" : "block";
            document.getElementById('btn').innerText = isLogin ? "Login" : "Register";
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = { email: document.getElementById('email').value, password: document.getElementById('pass').value };
            if(!isLogin) { body.name = document.getElementById('name').value; body.role = document.getElementById('role').value; }

            const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
            });
            const data = await res.json();
            if(data.success) {
                if(isLogin) {
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userRole', data.role);
                    window.location.href = `/${data.role}`;
                } else { alert(data.message); toggle(); }
            } else { alert(data.message || "Error occurred"); }
        });
    </script>
</body>
</html>
