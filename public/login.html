<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --bg: #0b012d; --darker: #080120; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 204, 0, 0.1);
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .logo-box {
            background: white;
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .logo-box img {
            height: 40px;
        }

        h2 {
            margin-bottom: 30px;
            color: var(--gold);
            font-size: 22px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--gold);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 32px;
            color: #666;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: var(--darker);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #e6b800;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #777;
        }

        /* Error message style */
        #errorMsg {
            color: #ff5e5e;
            font-size: 12px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="logo.jpeg" alt="SCC Logo">
        </div>
        
        <h2>PARTNER LOGIN</h2>

        <div id="errorMsg">Invalid Username or Password!</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">LOGIN NOW</button>
        </form>

        <div class="footer-text">
            Authorized Partner Access Only <br>
            Student Career Consultancy &copy; 2026
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            // Simple Logic: Username 'partner' and Password 'scc123'
            // You can change these values or link to your database later
            if (user === 'partner' && pass === 'scc123') {
                error.style.display = 'none';
                // Success: Redirecting to partner.html
                window.location.href = 'partner.html';
            } else {
                error.style.display = 'block';
                // Clear password field
                document.getElementById('password').value = '';
            }
        });
    </script>

</body>
</html>
