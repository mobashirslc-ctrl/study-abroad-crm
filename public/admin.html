<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Super Admin Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #f1c40f; --danger: #ff4757; --success: #2ecc71; --blue: #3498db; }
        body { background: linear-gradient(145deg, var(--bg-dark), var(--primary)); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: rgba(0, 0, 0, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; }
        .logo-area { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-area img { width: 100%; max-height: 50px; background: white; padding: 5px; border-radius: 5px; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: #888; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border-left: 4px solid var(--accent); }
        .wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .admin-form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.7rem; color: var(--accent); opacity: 0.8; }
        input, select { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; transition: 0.3s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; color: var(--accent); border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; color: white; transition: 0.2s; }
        .btn-approve { background: var(--success); width: 100%; margin-top: 20px; font-size: 1rem; }
        .btn-delete { background: var(--danger); }
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .badge { padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; }
        .badge-pending { background: #f39c12; color: black; }
        .badge-active { background: var(--success); color: black; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.jpeg" alt="SCC Logo"></div>
        <div onclick="showTab('uni-manage')" id="m-uni-manage" class="nav-item active"><i class="fas fa-university"></i> University Data</div>
        <div onclick="showTab('partners')" id="m-partners" class="nav-item"><i class="fas fa-handshake"></i> Partner Management</div>
        <div onclick="showTab('payouts')" id="m-payouts" class="nav-item"><i class="fas fa-wallet"></i> Payouts Control</div>
        <div style="margin-top:auto; padding:20px;">
            <div class="nav-item" style="color:var(--danger);" id="logoutAdmin"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <div class="wrapper">
        <div class="main">
            <div class="header">
                <h2 id="page-title">University Management</h2>
                <div style="color:var(--accent); font-weight:bold;">Rate: 1 USD = 120 BDT</div>
            </div>

            <div id="uni-manage" class="section active-section">
                <div class="card">
                    <h3><i class="fas fa-plus-circle"></i> Add New University</h3>
                    <div class="admin-form-grid">
                        <div class="form-group"><label>University Name</label><input type="text" id="uName"></div>
                        <div class="form-group"><label>Country</label><input type="text" id="uCountry"></div>
                        <div class="form-group"><label>Course Name</label><input type="text" id="uCourse"></div>
                        <div class="form-group">
                            <label>Applying For</label>
                            <select id="uDegree">
                                <option value="Bachelor">Bachelor</option>
                                <option value="Masters">Masters</option>
                                <option value="Foundation">Foundation</option>
                                <option value="Diploma">Diploma</option>
                                <option value="PHD">PHD</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Semester Fee (USD)</label><input type="number" id="uSemesterFee"></div>
                        <div class="form-group"><label>Partner Comm (%)</label><input type="number" id="uPartnerComm"></div>
                        <div class="form-group"><label>Min. Academic GPA</label><input type="number" step="0.01" id="uMinGPA"></div>
                        <div class="form-group"><label>IELTS Requirement</label><input type="text" id="uIeltsO" placeholder="e.g. 6.5 No band less 6"></div>
                        <div class="form-group"><label>Gap Acceptance</label><input type="text" id="uGap"></div>
                    </div>
                    <button class="btn btn-approve" id="saveUniBtn">Save University Data</button>
                </div>

                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Uni Name</th><th>Country</th><th>Course</th><th>GPA Req.</th><th>Action</th></tr>
                        </thead>
                        <tbody id="uniTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="partners" class="section">
                <div class="card">
                    <h3><i class="fas fa-user-clock"></i> User Approval & Management</h3>
                    <table>
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="payouts" class="section">
                <div class="card">
                    <h3><i class="fas fa-money-check-alt"></i> Payouts Control</h3>
                    <p class="text-gray-500">Real-time withdrawal requests will appear here.</p>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- University Save Logic ---
        // --- University Save Logic ---
document.getElementById('saveUniBtn').onclick = async () => {
    // ইনপুট ভ্যালুগুলো ধরা হচ্ছে
    const uName = document.getElementById('uName').value.trim();
    const uCountry = document.getElementById('uCountry').value.trim();
    const uDegree = document.getElementById('uDegree').value; // Select এর জন্য trim প্রয়োজন নেই

    // ভ্যালিডেশন: নাম বা দেশ ফাঁকা থাকলে সেভ হবে না
    if(!uName || !uCountry) {
        alert("Please fill University Name and Country!");
        return;
    }

    const data = {
        universityName: uName,
        country: uCountry,
        courseName: document.getElementById('uCourse').value.trim(),
        degree: uDegree, 
        semesterFee: Number(document.getElementById('uSemesterFee').value) || 0,
        partnerComm: Number(document.getElementById('uPartnerComm').value) || 0,
        minGPA: document.getElementById('uMinGPA').value.trim(),
        ieltsReq: document.getElementById('uIeltsO').value.trim(),
        gap: document.getElementById('uGap').value.trim(),
        timestamp: new Date().getTime()
    };

    try {
        await addDoc(collection(db, "universities"), data);
        alert("University Added Successfully!");
        // ইনপুট ফিল্ডগুলো খালি করে দেওয়া (reload এর বদলে এটি ভালো)
        document.getElementById('uName').value = "";
        document.getElementById('uCountry').value = "";
        // চাইলে location.reload(); ও রাখতে পারেন
    } catch (e) { 
        alert("Error: " + e.message); 
    }
};
        // --- Real-time University List ---
        onSnapshot(query(collection(db, "universities"), orderBy("timestamp", "desc")), (snap) => {
            let html = "";
            snap.forEach(docSnap => {
                const u = docSnap.data();
                html += `<tr>
                    <td>${u.universityName}</td>
                    <td>${u.country}</td>
                    <td>${u.courseName}</td>
                    <td>${u.minGPA}</td>
                    <td><button onclick="deleteUni('${docSnap.id}')" class="btn btn-delete">Delete</button></td>
                </tr>`;
            });
            document.getElementById('uniTableBody').innerHTML = html;
        });

        window.deleteUni = async (id) => {
            if(confirm("Are you sure?")) await deleteDoc(doc(db, "universities", id));
        };

        // --- User Approval ---
        onSnapshot(collection(db, "users"), (snap) => {
            let html = "";
            snap.forEach(docSnap => {
                const user = docSnap.data();
                const id = docSnap.id;
                const statusBadge = user.status === 'active' ? 'badge-active' : 'badge-pending';
                html += `<tr>
                    <td>${user.fullName}</td>
                    <td>${user.email}</td>
                    <td><span class="badge" style="background:var(--blue)">${user.role}</span></td>
                    <td><span class="badge ${statusBadge}">${user.status}</span></td>
                    <td>
                        ${user.status === 'pending' ? 
                            `<button onclick="updateStatus('${id}', 'active')" class="btn" style="background:var(--success)">Approve</button>` : 
                            `<button onclick="updateStatus('${id}', 'pending')" class="btn" style="background:var(--danger)">Suspend</button>`
                        }
                    </td>
                </tr>`;
            });
            document.getElementById('userTableBody').innerHTML = html;
        });

        window.updateStatus = async (id, newStatus) => {
            await updateDoc(doc(db, "users", id), { status: newStatus });
        };

        document.getElementById('logoutAdmin').onclick = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>

    <script>
        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('m-' + id).classList.add('active');
            const titles = { 'uni-manage': 'University Management', 'partners': 'Partner Management', 'payouts': 'Payouts & Wallet Control' };
            document.getElementById('page-title').innerText = titles[id];
        }
    </script>
</body>
</html>
