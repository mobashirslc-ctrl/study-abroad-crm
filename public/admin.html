<!DOCTYPE html>
<html>
<head>
    <title>IHP Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #1a237e; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🏠 Add University for Assessment</h2>
        <input type="text" id="country" placeholder="Country">
        <input type="text" id="uniName" placeholder="University Name">
        <select id="degree">
            <option>Degree Drop-down</option><option>UG</option><option>PG</option><option>DIPLOMA</option>
        </select>
        <select id="lang">
            <option>Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
        </select>
        <select id="currency">
            <option>Currency</option><option>DOLLAR</option><option>EURO</option><option>TAKA</option>
        </select>
        <button onclick="saveUni()">SAVE DATA</button>
    </div>

    <script>
        async function saveUni() {
            const data = {
                country: document.getElementById('country').value,
                uniName: document.getElementById('uniName').value,
                degree: document.getElementById('degree').value,
                language: document.getElementById('lang').value,
                currency: document.getElementById('currency').value
            };
            const res = await fetch('/api/admin/add-uni', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("University Saved!");
        }
    </script>
</body>
</html>
