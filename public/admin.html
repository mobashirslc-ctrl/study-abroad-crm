<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-input { border: 1px solid #e2e8f0; border-radius: 4px; padding: 8px; width: 100%; background: #fff; }
        .form-label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-[#1a202c] text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase tracking-widest"><i class="fas fa-user-circle mr-2"></i> Admin Master</h1>
            <div class="space-x-6 text-sm">
                <a href="#">Partner List</a> <a href="#">Add University</a> <a href="#">Compliance Control</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        <div class="bg-white rounded shadow-sm border p-8 mb-10">
            <h2 class="text-xl font-bold mb-6 text-gray-800 flex items-center">
                <i class="fas fa-university mr-3"></i> Add University Requirement
            </h2>
            <hr class="mb-8">
            
            <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-6">
                <div><label class="form-label">Country</label><input type="text" id="country" placeholder="e.g. Australia" class="form-input"></div>
                <div><label class="form-label">Degree Type</label><select id="degree" class="form-input"><option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option></select></div>
                <div><label class="form-label">Semester Fee per Year</label><input type="text" id="semesterFee" class="form-input"></div>
                <div><label class="form-label">Marital Status</label><select id="maritalStatus" class="form-input"><option>Single</option><option>With spouse</option></select></div>
                
                <div><label class="form-label">University Name</label><input type="text" id="uniName" class="form-input"></div>
                <div><label class="form-label">Language Requirement</label><select id="languageType" class="form-input"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                <div><label class="form-label">Currency</label><select id="currency" class="form-input"><option>DOLLAR</option><option>EURO</option><option>TAKA</option><option>UK POUND</option></select></div>
                <div><label class="form-label">Bank Name BD (Suggestion)</label><input type="text" id="bankNameBD" class="form-input"></div>
                
                <div><label class="form-label">Course Name</label><input type="text" id="courseName" class="form-input"></div>
                <div><label class="form-label">Study Gap Allowed (New)</label><input type="text" id="studyGap" placeholder="e.g. Max 2 Years" class="form-input"></div>
                <div><label class="form-label">Bank Type</label><select id="bankType" class="form-input"><option>FDR</option><option>SAVINGS</option></select></div>
                <div><label class="form-label">Loan Amount</label><input type="text" id="loanAmount" class="form-input"></div>

                <div class="md:col-start-4 md:row-start-4">
                    <label class="form-label">Partner Commission</label>
                    <input type="text" id="partnerCommission" class="form-input">
                </div>

                <input type="hidden" id="intake" value="Standard">
                <input type="hidden" id="academicScore" value="N/A">
                <input type="hidden" id="languageScore" value="N/A">

                <button type="submit" class="md:col-span-4 bg-[#2563eb] text-white font-bold py-3 mt-4 rounded hover:bg-blue-700 transition flex justify-center items-center">
                    <i class="fas fa-save mr-2"></i> PERMANENTLY SAVE UNIVERSITY
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = "SAVING..."; btn.disabled = true;

            const ids = ['country','uniName','courseName','intake','degree','languageType','academicScore','languageScore','studyGap','semesterFee','currency','bankType','maritalStatus','bankNameBD','loanAmount','partnerCommission'];
            const data = {};
            ids.forEach(id => { data[id] = document.getElementById(id).value; });

            try {
                const res = await fetch('/api/add-university', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) { alert("Success! Data Locked."); e.target.reset(); }
                else { alert("Error saving data!"); }
            } catch (err) { alert("Server Connection Failed!"); }
            finally { btn.innerHTML = '<i class="fas fa-save mr-2"></i> PERMANENTLY SAVE UNIVERSITY'; btn.disabled = false; }
        });
    </script>
</body>
</html>
