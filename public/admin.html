<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Master | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-input { border: 1px solid #d1d5db; border-radius: 4px; padding: 10px; width: 100%; font-size: 14px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #4a5568; }
        .nav-link { cursor: pointer; padding: 10px 15px; border-radius: 5px; transition: 0.3s; }
        .nav-link:hover, .active-tab { background: #334155; color: white; }
        .section { display: none; }
        .active-section { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; padding: 12px; border: 1px solid #e2e8f0; text-align: left; font-size: 12px; }
        td { padding: 10px; border: 1px solid #e2e8f0; font-size: 13px; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-[#1a202c] text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase">Admin Master</h1>
            <div class="flex space-x-2 text-sm">
                <span class="nav-link active-tab" onclick="showTab('add-uni', this)">Add University</span>
                <span class="nav-link" onclick="showTab('partner-ctrl', this)">Partner Control</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        <div id="add-uni" class="section active-section">
            <div class="bg-white p-8 rounded shadow border">
                <h2 class="font-bold mb-6 text-lg border-b pb-2"><i class="fas fa-university mr-2"></i> Add University Requirement</h2>
                <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div><label class="form-label">Country</label><input type="text" id="country" class="form-input" placeholder="e.g. Australia"></div>
                    <div><label class="form-label">Degree Type</label><select id="degree" class="form-input"><option>UG</option><option>PG</option><option>FOUNDATION</option><option>DIPLOMA</option></select></div>
                    <div><label class="form-label">Semester Fee/Year</label><input type="text" id="semesterFee" class="form-input"></div>
                    <div><label class="form-label">Currency</label><select id="currency" class="form-input"><option>AUD DOLLAR</option><option>DOLLAR</option><option>EURO</option><option>POUND</option><option>TAKA</option></select></div>
                    
                    <div><label class="form-label">University Name</label><input type="text" id="uniName" class="form-input"></div>
                    <div><label class="form-label">Language Req</label><select id="languageType" class="form-input"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                    <div><label class="form-label">Course Name</label><input type="text" id="courseName" class="form-input"></div>
                    <div><label class="form-label">Bank Name BD</label><input type="text" id="bankNameBD" class="form-input"></div>
                    
                    <div><label class="form-label">Intake</label><input type="text" id="intake" class="form-input"></div>
                    <div><label class="form-label">Academic Score</label><input type="text" id="academicScore" class="form-input"></div>
                    <div><label class="form-label">Language Score</label><input type="text" id="languageScore" class="form-input"></div>
                    <div><label class="form-label">Study Gap Allowed</label><input type="text" id="studyGap" class="form-input"></div>

                    <div><label class="form-label">Bank Type</label><select id="bankType" class="form-input"><option>FDR</option><option>SAVINGS</option></select></div>
                    <div><label class="form-label">Loan Amount</label><input type="text" id="loanAmount" class="form-input"></div>
                    <div><label class="form-label">Partner Commission</label><input type="text" id="partnerCommission" class="form-input"></div>
                    <div><label class="form-label">Marital Status</label><select id="maritalStatus" class="form-input"><option>Single</option><option>With spouse</option></select></div>
                    
                    <button type="submit" id="saveBtn" class="md:col-span-4 bg-blue-600 text-white font-bold py-3 rounded uppercase hover:bg-blue-700 transition shadow-md">
                        <i class="fas fa-save mr-2"></i> Save University Requirement
                    </button>
                </form>
            </div>
        </div>

        <div id="partner-ctrl" class="section">
            <div class="bg-white p-6 rounded shadow border">
                <h2 class="font-bold mb-4 text-blue-900">Partner Control Panel</h2>
                <table>
                    <thead><tr><th>Partner Name</th><th>Contact No</th><th>Status</th><th>Expiry Date</th><th>Action</th></tr></thead>
                    <tbody id="partnerTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-section');
            el.classList.add('active-tab');
            if(id === 'partner-ctrl') loadPartners();
        }

        async function loadPartners() {
            const res = await fetch('/api/admin-data');
            const data = await res.json();
            document.getElementById('partnerTable').innerHTML = data.partners.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.contactNo}</td>
                    <td>
                        <select id="status-${p._id}" class="border p-1 rounded text-sm">
                            <option value="Active" ${p.status==='Active'?'selected':''}>Active</option>
                            <option value="Inactive" ${p.status==='Inactive'?'selected':''}>Inactive</option>
                        </select>
                    </td>
                    <td><input type="date" id="date-${p._id}" value="${p.expiryDate}" class="border p-1 rounded text-sm"></td>
                    <td><button id="btn-${p._id}" onclick="updatePartner('${p._id}')" class="bg-blue-600 text-white px-4 py-1 rounded text-xs">Update</button></td>
                </tr>
            `).join('');
        }

        async function updatePartner(id) {
            const status = document.getElementById(`status-${id}`).value;
            const expiryDate = document.getElementById(`date-${id}`).value;
            const btn = document.getElementById(`btn-${id}`);
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            const res = await fetch(`/api/update-partner/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status, expiryDate })
            });
            if(res.ok) alert("Partner Updated!");
            btn.innerHTML = 'Update';
        }

        document.getElementById('uniForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = 'SAVING...';
            const fields = ['country','uniName','courseName','intake','degree','languageType','academicScore','languageScore','studyGap','semesterFee','currency','bankType','maritalStatus','bankNameBD','loanAmount','partnerCommission'];
            const data = {}; fields.forEach(id => data[id] = document.getElementById(id).value);
            
            const res = await fetch('/api/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert("University Saved!"); e.target.reset(); }
            btn.innerHTML = 'Save University Requirement';
        };
    </script>
</body>
</html>
