<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Panel | Core Locked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.section { display: none; } .active { display: block; }</style>
</head>
<body class="bg-gray-100 flex">
    <div class="w-64 bg-slate-900 h-screen text-white p-6 sticky top-0 shadow-xl">
        <h1 class="text-xl font-bold mb-10 text-blue-400">IHP ADMIN</h1>
        <nav class="space-y-4">
            <button onclick="showSection('uniSection')" class="w-full text-left py-2 px-3 hover:bg-slate-700 rounded transition">University Management</button>
            <button onclick="showSection('partnerSection')" class="w-full text-left py-2 px-3 hover:bg-slate-700 rounded transition">Partner Management</button>
            <button onclick="showSection('complianceSection')" class="w-full text-left py-2 px-3 hover:bg-slate-700 rounded transition">File Compliance</button>
            <button onclick="showSection('withdrawSection')" class="w-full text-left py-2 px-3 hover:bg-slate-700 rounded transition">Withdraw & Subs</button>
        </nav>
    </div>

    <div class="flex-1 p-10">
        <div id="uniSection" class="section active bg-white p-8 rounded shadow-lg border-t-4 border-blue-600">
            <h2 class="font-bold mb-6">ADD UNIVERSITY (20+ REQUIRED FIELDS)</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="uniForm">
                <input type="text" id="country" placeholder="Country" class="p-2 border rounded">
                <input type="text" id="uniName" placeholder="University Name" class="p-2 border rounded">
                <input type="text" id="courseName" placeholder="Course Name" class="p-2 border rounded">
                <select id="degree" class="p-2 border rounded"><option>Ug</option><option>Pg</option><option>Diploma</option></select>
                <input type="number" id="partnerCommission" placeholder="Commission ($)" class="p-2 border rounded border-blue-400 font-bold">
                </div>
            <button onclick="saveUni()" class="mt-8 bg-blue-600 text-white px-8 py-3 rounded font-bold">SAVE DATA</button>
        </div>
        
        <div id="partnerSection" class="section">
            <h2 class="font-bold mb-6">PARTNER MANAGEMENT</h2>
            <p>Name, Contact, Status (Active/Inactive), Expiry, Update</p>
        </div>
    </div>

    <script>
        function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        async function saveUni() {
            const data = {};
            document.querySelectorAll('#uniForm input, #uniForm select').forEach(el => data[el.id] = el.value);
            const res = await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) alert("✅ University Saved!");
        }
    </script>
</body>
</html>
