<!DOCTYPE html>
<html>
<head>
    <title>IHP Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        .sidebar { width: 250px; background: #1a237e; color: white; height: 100vh; padding: 20px; position: fixed; }
        .content { margin-left: 270px; padding: 30px; width: 100%; }
        .nav-btn { display: block; width: 100%; padding: 15px; text-align: left; background: none; border: none; color: white; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .nav-btn.active { background: #3949ab; font-weight: bold; }
        .tab-content { display: none; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .save-btn { grid-column: span 3; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Master Admin</h2>
    <button class="nav-btn active" onclick="openTab(event, 'uni-add')">1. University Add</button>
    <button class="nav-btn" onclick="openTab(event, 'tracking')">2. Student Tracking</button>
    <button class="nav-btn" onclick="openTab(event, 'partners')">3. Partner List</button>
    <button class="nav-btn" onclick="openTab(event, 'compliance')">4. Compliance Control</button>
    <button class="nav-btn" onclick="openTab(event, 'team')">5. Team Admin</button>
</div>

<div class="content">
    <div id="uni-add" class="tab-content" style="display:block;">
        <h3>🎓 Add University (Assessment Fields)</h3>
        <form id="uniForm">
            <div class="grid">
                <input type="text" name="country" placeholder="Country" required>
                <input type="text" name="uniName" placeholder="University Name" required>
                <input type="text" name="course" placeholder="Course Name">
                <input type="text" name="intake" placeholder="Intake (Jan/Sept)">
                <select name="degree">
                    <option>UG</option><option>PG</option><option>DIPLOMA</option>
                    <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                </select>
                <select name="language">
                    <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                </select>
                <input type="text" name="academicScore" placeholder="Academic Score Box">
                <input type="text" name="langScore" placeholder="Language Score Box">
                <input type="text" name="fee" placeholder="Semester fee per year">
                <select name="currency">
                    <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option>
                    <option>EURO</option><option>TAKA</option><option>UK POUND</option>
                </select>
                <input type="text" name="bankBalance" placeholder="Required bank balance">
                <select name="bankType"><option>FDR</option><option>SAVINGS</option></select>
                <select name="maritalStatus"><option>Single</option><option>With spouse</option></select>
                <input type="text" name="bankNameSuggestion" placeholder="Bank name suggestion">
                <input type="text" name="loanAmount" placeholder="Loan amount">
                <input type="text" name="partnerCommission" placeholder="Partner Commission">
                <button type="submit" class="save-btn">SAVE UNIVERSITY</button>
            </div>
        </form>
    </div>

    <div id="tracking" class="tab-content"><h3>Student File Tracking Content...</h3></div>
    <div id="partners" class="tab-content"><h3>Partner List & Control Content...</h3></div>
</div>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, navbtn;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        navbtn = document.getElementsByClassName("nav-btn");
        for (i = 0; i < navbtn.length; i++) navbtn[i].className = navbtn[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    document.getElementById('uniForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const res = await fetch('/api/add-uni', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) { alert("✅ Data Saved Successfully!"); e.target.reset(); }
    };
</script>
</body>
</html>
