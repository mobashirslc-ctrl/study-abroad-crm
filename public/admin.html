<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - IHP CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --secondary: #34a853; --danger: #ea4335; --dark: #202124; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f8f9fa; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; height: 100vh; background: var(--dark); color: white; padding: 20px; position: fixed; }
        .sidebar h2 { font-size: 20px; margin-bottom: 30px; color: var(--primary); }
        .nav-link { display: block; padding: 12px; color: #bdc1c6; text-decoration: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: #3c4043; color: white; }

        /* Main Content */
        .main-content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h3 { margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* Form Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        .btn-add { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-add:hover { background: #1557b0; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f1f3f4; color: #5f6368; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Master Admin</h2>
    <div class="nav-link active" onclick="showSection('uni-section')"><i class="fas fa-university"></i> Add University</div>
    <div class="nav-link" onclick="showSection('partner-list-section')"><i class="fas fa-handshake"></i> Partner List</div>
    <div class="nav-link" onclick="showSection('student-tracking-section')"><i class="fas fa-user-graduate"></i> Student Tracking</div>
</div>

<div class="main-content">
    
    <div id="uni-section" class="section">
        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> Add University for Assessment</h3>
            <form id="uniForm">
                <div class="grid">
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" name="country" placeholder="e.g. UK, USA" required>
                    </div>
                    <div class="form-group">
                        <label>University Name</label>
                        <input type="text" name="uniName" required>
                    </div>
                    <div class="form-group">
                        <label>Course Name</label>
                        <input type="text" name="course" required>
                    </div>
                    <div class="form-group">
                        <label>Degree</label>
                        <select name="degree">
                            <option>UG</option><option>PG</option><option>Diploma</option>
                            <option>Foundation</option><option>Research</option><option>PhD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Language Test</label>
                        <select name="language">
                            <option>IELTS</option><option>PTE</option><option>Duolingo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Currency</label>
                        <select name="currency">
                            <option>USD</option><option>GBP</option><option>EURO</option>
                            <option>AUD</option><option>CAD</option><option>BDT</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester Fee (Year)</label>
                        <input type="number" name="fee" required>
                    </div>
                    <div class="form-group">
                        <label>Partner Commission</label>
                        <input type="text" name="partnerCommission">
                    </div>
                </div>
                <button type="submit" class="btn-add">SAVE TO SYSTEM</button>
            </form>
        </div>
    </div>

    <div id="partner-list-section" class="section" style="display:none;">
        <div class="card"><h3>Partner Management Coming Soon...</h3></div>
    </div>
    <div id="student-tracking-section" class="section" style="display:none;">
        <div class="card"><h3>Student Tracking Coming Soon...</h3></div>
    </div>

</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    document.getElementById('uniForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = {};
        new FormData(e.target).forEach((value, key) => formData[key] = value);

        const res = await fetch('/api/add-uni', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        if(res.ok) {
            alert("✅ Data Saved Successfully!");
            e.target.reset();
        } else {
            alert("❌ Error Saving Data!");
        }
    };
</script>

</body>
</html>
