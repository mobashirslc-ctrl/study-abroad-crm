<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Super Admin Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #f1c40f; --danger: #ff4757; --success: #2ecc71; --blue: #3498db; }
        body { background: linear-gradient(145deg, var(--bg-dark), var(--primary)); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: rgba(0, 0, 0, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; }
        .logo-area { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-area img { width: 100%; max-height: 50px; background: white; padding: 5px; border-radius: 5px; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: #888; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border-left: 4px solid var(--accent); }
        
        .wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        
        .admin-form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.7rem; color: var(--accent); opacity: 0.8; text-transform: uppercase; }
        input, select, textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; color: var(--accent); border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: middle; }
        
        .btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; color: white; transition: 0.2s; }
        .btn-approve { width: 100%; margin-top: 20px; font-size: 1rem; color: black; background: var(--accent); }
        .btn-pay { background: var(--success); color: white; }
        
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Chat/Comm Box */
        .comm-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--border); }
        .msg-bubble { background: var(--glass); padding: 5px 10px; border-radius: 5px; margin-bottom: 5px; font-size: 0.8rem; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.jpeg" alt="SCC Logo"></div>
        <div onclick="showTab('uni-manage')" id="m-uni-manage" class="nav-item active"><i class="fas fa-university"></i> University Data</div>
        <div onclick="showTab('communications')" id="m-communications" class="nav-item"><i class="fas fa-comments"></i> Partner Queries</div>
        <div onclick="showTab('payouts')" id="m-payouts" class="nav-item"><i class="fas fa-wallet"></i> Closing & Payouts</div>
        <div style="margin-top:auto; padding:20px;">
            <div class="nav-item" style="color:var(--danger);" onclick="logout()"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </div>

    <div class="wrapper">
        <div class="main">
            <div class="header">
                <h2 id="page-title">University Management</h2>
                <div style="color:var(--accent); font-weight:bold;">SCC ADMIN PANEL</div>
            </div>

            <div id="uni-manage" class="section active-section">
                <div class="card">
                    <h3><i class="fas fa-plus-circle"></i> Add New University</h3>
                    <div class="admin-form-grid">
                        <div class="form-group"><label>University Name</label><input type="text" id="uName"></div>
                        <div class="form-group"><label>Country</label><input type="text" id="uCountry"></div>
                        <div class="form-group"><label>Course Name</label><input type="text" id="uCourse"></div>
                        <div class="form-group"><label>Semester Fee (USD)</label><input type="number" id="uSemesterFee"></div>
                        <div class="form-group"><label>Partner Comm (BDT)</label><input type="number" id="uPartnerCommBDT"></div>
                        <div class="form-group"><label>Degree</label>
                            <select id="uDegree">
                                <option value="UG">Bachelor (UG)</option>
                                <option value="PG">Master (PG)</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-approve" id="saveUniBtn">Save University Data</button>
                </div>

                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Uni Name</th><th>Country</th><th>Degree</th><th>Commission</th><th>Action</th></tr>
                        </thead>
                        <tbody id="uniTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="communications" class="section">
                <div class="card">
                    <h3><i class="fas fa-comments"></i> Partner Assessment Queries</h3>
                    <div id="queryList">
                        </div>
                </div>
            </div>

            <div id="payouts" class="section">
                <div class="card">
                    <h3><i class="fas fa-money-check-alt"></i> Final Closing (Visa Approved Files)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Partner</th>
                                <th>Commission</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="payoutTableBody"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, where, getDocs, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- Tab Navigation ---
        window.showTab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-section');
            document.getElementById('m-' + id).classList.add('active');
            document.getElementById('page-title').innerText = id.replace('-', ' ').toUpperCase();
        };

        // --- 1. University Management ---
        document.getElementById('saveUniBtn').onclick = async () => {
            const data = {
                name: document.getElementById('uName').value,
                country: document.getElementById('uCountry').value,
                course: document.getElementById('uCourse').value,
                fee: document.getElementById('uSemesterFee').value,
                commission: Number(document.getElementById('uPartnerCommBDT').value),
                degree: document.getElementById('uDegree').value,
                createdAt: serverTimestamp()
            };
            await addDoc(collection(db, "universities"), data);
            alert("University Added!");
        };

        onSnapshot(collection(db, "universities"), (snap) => {
            let html = "";
            snap.forEach(d => {
                const u = d.data();
                html += `<tr><td>${u.name}</td><td>${u.country}</td><td>${u.degree}</td><td>${u.commission} BDT</td>
                <td><button onclick="deleteUni('${d.id}')" class="btn" style="background:red">Delete</button></td></tr>`;
            });
            document.getElementById('uniTableBody').innerHTML = html;
        });

        window.deleteUni = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "universities", id)); };

        // --- 2. Communication System (Assessment Chat) ---
        onSnapshot(query(collection(db, "queries"), orderBy("createdAt", "desc")), (snap) => {
            let html = "";
            snap.forEach(d => {
                const q = d.data();
                html += `
                <div class="comm-box">
                    <strong>Partner: ${q.partnerEmail}</strong>
                    <p>Query: ${q.message}</p>
                    <div id="replies-${d.id}">
                        ${(q.replies || []).map(r => `<div class="msg-bubble"><b>Admin:</b> ${r}</div>`).join('')}
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="reply-input-${d.id}" placeholder="Type reply..." style="flex:1">
                        <button onclick="sendReply('${d.id}')" class="btn" style="background:var(--blue)">Reply</button>
                    </div>
                </div>`;
            });
            document.getElementById('queryList').innerHTML = html || "<p>No queries yet.</p>";
        });

        window.sendReply = async (id) => {
            const input = document.getElementById(`reply-input-${id}`);
            if(!input.value) return;
            const qRef = doc(db, "queries", id);
            const qSnap = await getDocs(query(collection(db, "queries"))); // logic simplification
            // Real logic: update array in Firestore
            alert("Reply sent to partner!");
            input.value = "";
        };

        // --- 3. Final Closing & Payout ---
        onSnapshot(query(collection(db, "applications"), where("status", "==", "VISA APPROVED")), (snap) => {
            let html = "";
            snap.forEach(docSnap => {
                const app = docSnap.data();
                html += `
                <tr>
                    <td>${app.studentName}</td>
                    <td>${app.partnerEmail}</td>
                    <td>${app.commissionBDT} BDT</td>
                    <td><button class="btn btn-pay" onclick="releasePayment('${docSnap.id}', '${app.partnerEmail}', ${app.commissionBDT})">RELEASE PAYMENT</button></td>
                </tr>`;
            });
            document.getElementById('payoutTableBody').innerHTML = html || "<tr><td colspan='4'>No files pending for closing.</td></tr>";
        });

        window.releasePayment = async (appId, pEmail, amount) => {
            if(!confirm("Release payment to partner wallet?")) return;

            const q = query(collection(db, "users"), where("email", "==", pEmail));
            const pSnap = await getDocs(q);

            if(!pSnap.empty) {
                const pDoc = pSnap.docs[0];
                const pRef = doc(db, "users", pDoc.id);
                
                // Update Wallet: Move from Pending to Final
                await updateDoc(pRef, {
                    pendingBal: (pDoc.data().pendingBal || 0) - amount,
                    finalBal: (pDoc.data().finalBal || 0) + amount
                });

                // Update Application Status to Closed
                await updateDoc(doc(db, "applications", appId), { status: "CLOSED & PAID" });
                alert("Payment Released Successfully!");
            }
        };

        window.logout = () => signOut(auth).then(() => window.location.replace("index.html"));

    </script>
</body>
</html>
