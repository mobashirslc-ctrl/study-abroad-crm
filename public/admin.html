<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <h1 class="text-3xl font-bold text-blue-400">Master Control Panel</h1>

        <div class="card">
            <h2 class="text-xl font-bold mb-4">Partner Management</h2>
            <div id="pList" class="space-y-2"></div>
        </div>

        <div class="card">
            <h2 class="text-xl font-bold mb-4">Add University</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="uName" placeholder="Uni Name" class="bg-slate-800 p-2 rounded">
                <select id="uDeg" class="bg-slate-800 p-2 rounded">
                    <option>PG</option><option>UG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>PHD</option>
                </select>
                <input id="uComm" placeholder="Commission (Number)" class="bg-slate-800 p-2 rounded">
                <button onclick="addUni()" class="bg-blue-600 rounded font-bold">SAVE UNI</button>
            </div>
        </div>
    </div>

    <script>
        async function loadAdmin() {
            const res = await fetch('/api/admin/partners');
            const data = await res.json();
            document.getElementById('pList').innerHTML = data.map(p => `
                <div class="flex justify-between p-3 bg-white/5 rounded">
                    <span>${p.name} (${p.status})</span>
                    ${p.status==='Pending' ? `<button onclick="updateP('${p._id}', 'Active')" class="text-emerald-400">Approve</button>` : ''}
                </div>
            `).join('');
        }
        async function updateP(id, status) {
            await fetch('/api/admin/partner-status/'+id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status}) });
            loadAdmin();
        }
        async function addUni() {
            const body = { uniName: document.getElementById('uName').value, degreeType: document.getElementById('uDeg').value, partnerCommission: Number(document.getElementById('uComm').value) };
            await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Uni Saved");
        }
        loadAdmin();
    </script>
</body>
</html>
