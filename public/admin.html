<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; } 
        .active { display: block; }
        .input-box { border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; }
        .input-box:focus { border-color: #2563eb; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 flex">

    <div class="w-64 bg-slate-900 h-screen text-white p-6 sticky top-0 shadow-2xl">
        <h1 class="text-xl font-bold mb-10 text-blue-400 text-center tracking-tighter">IHP CRM ADMIN</h1>
        <nav class="space-y-2">
            <button onclick="showSection('uniSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2"><span>📁</span> University Management</button>
            <button onclick="showSection('partnerSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2"><span>👥</span> Partner Management</button>
            <button onclick="showSection('complianceSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2"><span>✅</span> File Compliance</button>
            <button onclick="showSection('withdrawSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2"><span>💰</span> Withdraw & Subs</button>
        </nav>
    </div>

    <div class="flex-1 p-8">

        <div id="uniSection" class="section active bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 uppercase">University Entry (21 Fields)</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="uniForm">
                <div><label>Country</label><input type="text" id="country" class="input-box"></div>
                <div><label>University Name</label><input type="text" id="uniName" class="input-box"></div>
                <div><label>Course Name</label><input type="text" id="courseName" class="input-box"></div>
                <div><label>Intake</label><input type="text" id="intake" class="input-box"></div>
                <div><label>Degree Type</label><select id="degree" class="input-box"><option>Ug</option><option>Pg</option><option>Diploma</option><option>Foundation</option><option>PhD</option></select></div>
                <div><label>Language Type</label><select id="languageType" class="input-box"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option><option>MOI</option></select></div>
                <div><label>Academic Score</label><input type="text" id="academicScore" class="input-box"></div>
                <div><label>Language Score</label><input type="text" id="languageScore" class="input-box"></div>
                <div><label>Semester Fee</label><input type="text" id="semesterFee" class="input-box"></div>
                <div><label>Currency</label><input type="text" id="currency" class="input-box"></div>
                <div><label>Commission ($)</label><input type="number" id="partnerCommission" class="input-box font-bold border-blue-400"></div>
                <div><label>Bank Name (BD)</label><input type="text" id="bankNameBD" class="input-box"></div>
                <div><label>Bank Requirements</label><input type="text" id="bankType" class="input-box"></div>
                <div><label>Loan Amount</label><input type="text" id="loanAmount" class="input-box"></div>
                <div><label>Marital Status</label><input type="text" id="maritalStatus" class="input-box"></div>
                <div><label>Study Gap Allowed</label><input type="text" id="studyGap" class="input-box"></div>
                <div><label>App Fee</label><input type="text" id="appFee" class="input-box"></div>
                <div><label>Deadline</label><input type="text" id="deadline" class="input-box"></div>
                <div><label>Scholarship</label><input type="text" id="scholarship" class="input-box"></div>
                <div><label>Work Rights</label><input type="text" id="workRights" class="input-box"></div>
                <div><label>Location</label><input type="text" id="location" class="input-box"></div>
            </div>
            <button onclick="saveUniversity()" class="mt-8 bg-blue-600 text-white px-8 py-3 rounded font-bold uppercase text-xs">Save University</button>
        </div>

        <div id="withdrawSection" class="section bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 uppercase tracking-wide">Part 4: Withdraw & Subscription Control</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b">
                            <th class="p-4">Partner Name</th>
                            <th class="p-4">Org Name</th>
                            <th class="p-4">Payment Status</th>
                            <th class="p-4">Subscription</th>
                            <th class="p-4 text-center">Update</th>
                        </tr>
                    </thead>
                    <tbody id="subsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="partnerSection" class="section bg-white p-8 rounded shadow">
            <h2 class="font-bold mb-4 uppercase">Part 2: Partner List</h2>
            <div id="partnerListContent"> (Load via JS) </div>
        </div>

    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'withdrawSection') loadSubs();
            if(id === 'partnerSection') loadPartners();
        }

        async function saveUniversity() {
            const data = {};
            document.querySelectorAll('#uniForm input, #uniForm select').forEach(el => data[el.id] = el.value);
            const res = await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) alert("✅ University Saved!");
        }

        async function loadSubs() {
            const res = await fetch('/api/admin/partners');
            const partners = await res.json();
            const tbody = document.getElementById('subsTableBody');
            tbody.innerHTML = '';
            partners.forEach(p => {
                tbody.innerHTML += `
                    <tr class="text-sm border-b hover:bg-slate-50">
                        <td class="p-4 font-semibold text-slate-700">${p.name}</td>
                        <td class="p-4 text-slate-600">${p.orgName}</td>
                        <td class="p-4">
                            <select id="payStatus-${p._id}" class="border rounded p-1 text-xs font-bold">
                                <option value="Paid" ${p.paymentStatus === 'Paid' ? 'selected' : ''}>Paid</option>
                                <option value="Due" ${p.paymentStatus === 'Due' ? 'selected' : ''}>Due</option>
                                <option value="Cancel" ${p.paymentStatus === 'Cancel' ? 'selected' : ''}>Cancel</option>
                            </select>
                        </td>
                        <td class="p-4">
                            <select id="subStatus-${p._id}" class="border rounded p-1 text-xs font-bold ${p.subscriptionStatus === 'Active' ? 'text-green-600' : 'text-red-600'}">
                                <option value="Active" ${p.subscriptionStatus === 'Active' ? 'selected' : ''}>Active</option>
                                <option value="Inactive" ${p.subscriptionStatus === 'Inactive' ? 'selected' : ''}>Inactive</option>
                            </select>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="updateSubs('${p._id}')" class="bg-blue-600 text-white px-4 py-1 rounded text-[10px] font-bold uppercase">Update Status</button>
                        </td>
                    </tr>`;
            });
        }

        async function updateSubs(id) {
            const data = {
                paymentStatus: document.getElementById(`payStatus-${id}`).value,
                subscriptionStatus: document.getElementById(`subStatus-${id}`).value
            };
            const res = await fetch(`/api/admin/update-partner/${id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) alert("✅ Status Updated Successfully!");
        }
    </script>
</body>
</html>
