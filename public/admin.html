<!DOCTYPE html>
<html>
<head>
    <title>IHP Master Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; }
        .sidebar { width: 250px; background: #1a237e; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main-content { margin-left: 270px; padding: 30px; width: 100%; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: #3949ab; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button.save { grid-column: span 3; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .section { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP Admin</h2>
    <div class="nav-item active" onclick="showTab('tab1')">1. University Add</div>
    <div class="nav-item" onclick="showTab('tab2')">2. Student Tracking</div>
    <div class="nav-item" onclick="showTab('tab3')">3. Partner List</div>
    <div class="nav-item" onclick="showTab('tab4')">4. Compliance</div>
    <div class="nav-item" onclick="showTab('tab5')">5. Team Admin</div>
</div>

<div class="main-content">
    <div id="tab1" class="section" style="display:block;">
        <div class="card">
            <h3>🎓 Add University for Assessment</h3>
            <form id="uniForm">
                <div class="grid">
                    <input type="text" name="country" placeholder="Country" required>
                    <input type="text" name="uniName" placeholder="University Name" required>
                    <input type="text" name="course" placeholder="Course Name">
                    <input type="text" name="intake" placeholder="Intake (Jan/Sept)">
                    <select name="degree">
                        <option>UG</option><option>PG</option><option>DIPLOMA</option>
                        <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                    </select>
                    <select name="language">
                        <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                    </select>
                    <input type="text" name="academicScore" placeholder="Academic Score Box">
                    <input type="text" name="langScore" placeholder="Language Score Box">
                    <input type="text" name="fee" placeholder="Semester fee per year">
                    <select name="currency">
                        <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option>
                        <option>EURO</option><option>TAKA</option><option>UK POUND</option>
                    </select>
                    <input type="text" name="bankBalance" placeholder="Required bank balance">
                    <select name="bankType"><option>FDR</option><option>SAVINGS</option></select>
                    <select name="maritalStatus"><option>Single</option><option>With spouse</option></select>
                    <input type="text" name="bankNameSuggestion" placeholder="Bank name suggestion">
                    <input type="text" name="loanAmount" placeholder="Loan amount">
                    <input type="text" name="partnerCommission" placeholder="Partner Commission">
                    <button type="submit" class="save">SAVE TO SYSTEM</button>
                </div>
            </form>
        </div>
    </div>

    <div id="tab3" class="section">
        <div class="card">
            <h3>🤝 Partner Control Panel</h3>
            <table border="1" width="100%" cellpadding="10" style="border-collapse:collapse;">
                <tr style="background:#eee;"><th>Partner Name</th><th>Status</th><th>Wallet</th><th>Action</th></tr>
                <tbody id="partnerTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    document.getElementById('uniForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        const res = await fetch('/api/add-uni', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if(res.ok) { alert("✅ University Added!"); e.target.reset(); }
    };
</script>
</body>
</html>
