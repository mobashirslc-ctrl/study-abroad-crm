<!DOCTYPE html>
<html>
<head><title>Admin Dashboard</title>
<style>
    body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
    .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    input, select { padding: 8px; margin: 5px; width: 180px; }
    button { padding: 10px; background: #1a73e8; color: white; border: none; cursor: pointer; }
    .partner-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
</style>
</head>
<body>

    <div class="card">
        <h2>🤝 Partner Management</h2>
        <div id="pList">Loading partners...</div>
    </div>

    <div class="card">
        <h2>🏫 Add University</h2>
        <input type="text" id="uCountry" placeholder="Country">
        <input type="text" id="uName" placeholder="University">
        <select id="uDeg"><option>UG</option><option>PG</option><option>PHD</option></select>
        <button onclick="saveUni()">SAVE</button>
    </div>

    <div class="card">
        <h2>📁 Assign Compliance & Tracking</h2>
        <div id="adminFileList">Loading files...</div>
    </div>

<script>
    async function loadAdminData() {
        // Load Partners
        const pRes = await fetch('/api/admin/partners');
        const partners = await pRes.json();
        document.getElementById('pList').innerHTML = partners.map(p => `
            <div class="partner-row">
                <span>${p.name} (${p.status})</span>
                <div>
                    <button onclick="updateStatus('${p._id}', 'Active')">Approve</button>
                    <button style="background:red" onclick="updateStatus('${p._id}', 'Deactivate')">Block</button>
                </div>
            </div>
        `).join('');

        // Load Files
        const fRes = await fetch('/api/partner/files');
        const files = await fRes.json();
        document.getElementById('adminFileList').innerHTML = files.map(f => `
            <div class="partner-row">
                <span>${f.studentName} -> ${f.status}</span>
                <button onclick="assignComp('${f._id}')">Assign Compliance</button>
            </div>
        `).join('');
    }

    async function updateStatus(id, status) {
        await fetch('/api/admin/partner-status', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, status}) });
        alert("Partner " + status);
        loadAdminData();
    }

    async function assignComp(fileId) {
        const compName = prompt("Member Name:");
        const compContact = prompt("Member Contact:");
        const status = prompt("Status (Processing/Visa Approved):");
        await fetch('/api/admin/assign-compliance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fileId, compName, compContact, status}) });
        alert("Assigned!");
        loadAdminData();
    }

    loadAdminData();
</script>
</body>
</html>
