<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | Locked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-input { border: 1px solid #e2e8f0; border-radius: 4px; padding: 8px; width: 100%; background: #f8fafc; }
        .form-label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; color: #334155; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-[#1a202c] text-white p-3 shadow-md">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-lg font-bold uppercase tracking-widest"><i class="fas fa-user-shield mr-2"></i> ADMIN MASTER</h1>
            <div class="space-x-6 text-sm"><span>Partner List</span><span>Add University</span><span>Compliance Control</span></div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        <div class="bg-white rounded shadow-sm border p-8 mb-10">
            <h2 class="text-lg font-bold mb-6 text-gray-800 flex items-center"><i class="fas fa-university mr-3"></i> Add University Requirement</h2>
            
            <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-x-6 gap-y-4">
                <div><label class="form-label">Country</label><input type="text" id="country" class="form-input"></div>
                <div><label class="form-label">Degree Type</label><select id="degree" class="form-input"><option>UG</option><option>PG</option><option>DIPLOMA</option></select></div>
                <div><label class="form-label">Semester Fee per Year</label><input type="text" id="semesterFee" class="form-input"></div>
                <div><label class="form-label">Marital Status</label><select id="maritalStatus" class="form-input"><option>Single</option><option>With spouse</option></select></div>
                
                <div><label class="form-label">University Name</label><input type="text" id="uniName" class="form-input"></div>
                <div><label class="form-label">Language Requirement</label><select id="languageType" class="form-input"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                <div><label class="form-label">Currency</label><select id="currency" class="form-input"><option>DOLLAR</option><option>EURO</option><option>TAKA</option></select></div>
                <div><label class="form-label">Bank Name BD (Suggestion)</label><input type="text" id="bankNameBD" class="form-input"></div>
                
                <div><label class="form-label">Course Name</label><input type="text" id="courseName" class="form-input"></div>
                <div><label class="form-label">Study Gap Allowed (New)</label><input type="text" id="studyGap" class="form-input"></div>
                <div><label class="form-label">Bank Type</label><select id="bankType" class="form-input"><option>FDR</option><option>SAVINGS</option></select></div>
                <div><label class="form-label">Loan Amount</label><input type="text" id="loanAmount" class="form-input"></div>

                <div class="md:col-start-4"><label class="form-label">Partner Commission</label><input type="text" id="partnerCommission" class="form-input"></div>

                <input type="hidden" id="intake" value="Standard">
                <input type="hidden" id="academicScore" value="N/A">
                <input type="hidden" id="languageScore" value="N/A">

                <button type="submit" class="md:col-span-4 bg-[#2563eb] text-white font-bold py-3 mt-6 rounded hover:bg-blue-700 transition flex justify-center items-center uppercase text-sm">
                    <i class="fas fa-save mr-2 text-xs"></i> PERMANENTLY SAVE UNIVERSITY
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "PROCESSING..."; btn.disabled = true;

            const fields = ['country','uniName','courseName','intake','degree','languageType','academicScore','languageScore','studyGap','semesterFee','currency','bankType','maritalStatus','bankNameBD','loanAmount','partnerCommission'];
            const data = {};
            fields.forEach(id => { data[id] = document.getElementById(id).value; });

            try {
                const res = await fetch('/api/add-university', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if(res.ok) { alert("Data Saved Successfully!"); e.target.reset(); }
                else { alert("Error: API Failed"); }
            } catch (err) { alert("Error: Server Offline"); }
            finally { btn.innerHTML = '<i class="fas fa-save mr-2 text-xs"></i> PERMANENTLY SAVE UNIVERSITY'; btn.disabled = false; }
        });
    </script>
</body>
</html>
