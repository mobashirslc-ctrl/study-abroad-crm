<!DOCTYPE html>
<html>
<head>
    <title>IHP Master Admin</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; border: none; background: #ddd; border-radius: 5px; }
        .tab-btn.active { background: #1a73e8; color: white; }
        .section { display: none; background: white; padding: 20px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        button.save { grid-column: span 3; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🎓 Master Admin Dashboard</h2>
    <div class="tab-nav">
        <button class="tab-btn active" onclick="show('add-uni')">1. Add University</button>
        <button class="tab-btn" onclick="show('tracking')">2. File Tracking</button>
        <button class="tab-btn" onclick="show('partners')">3. Partner List</button>
        <button class="tab-btn" onclick="show('compliance')">4. Compliance</button>
        <button class="tab-btn" onclick="show('team')">5. Team Admin</button>
    </div>

    <div id="add-uni" class="section" style="display:block;">
        <form id="uniForm">
            <div class="grid">
                <input type="text" name="country" placeholder="Country" required>
                <input type="text" name="uniName" placeholder="University Name" required>
                <input type="text" name="course" placeholder="Course Name">
                <input type="text" name="intake" placeholder="Intake">
                <select name="degree"><option>UG</option><option>PG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option></select>
                <select name="language"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                <input type="text" name="academicScore" placeholder="Academic Score Box">
                <input type="text" name="minScore" placeholder="Language Score Box">
                <input type="text" name="fee" placeholder="Semester Fee per year">
                <select name="currency"><option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option><option>EURO</option><option>TAKA</option><option>UK POUND</option></select>
                <input type="text" name="bankBalance" placeholder="Required Bank Balance">
                <select name="bankType"><option>FDR</option><option>SAVINGS</option></select>
                <select name="maritalStatus"><option>Single</option><option>With spouse</option></select>
                <input type="text" name="bankName" placeholder="Bank Name Suggestion">
                <input type="text" name="loanAmount" placeholder="Loan Amount">
                <input type="text" name="partnerCommission" placeholder="Partner Commission">
                <button type="submit" class="save">SAVE UNIVERSITY</button>
            </div>
        </form>
    </div>

    <div id="tracking" class="section"><h3>Student File Tracking List...</h3></div>
    <div id="partners" class="section"><h3>Partner Management...</h3></div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            event.target.classList.add('active');
        }
        document.getElementById('uniForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/add-uni', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(Object.fromEntries(new FormData(e.target)))
            });
            if(res.ok) alert("✅ Data Saved!");
        };
    </script>
</body>
</html>
