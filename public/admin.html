<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHP CRM | Admin Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .locked-border { border: 2px solid #1a365d; }
        .grid-responsive { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider"><i class="fas fa-user-shield mr-2"></i> ADMIN MASTER</h1>
            <div class="space-x-4 hidden md:block">
                <a href="#partner-list" class="hover:text-blue-400">Partner List</a>
                <a href="#add-uni" class="hover:text-blue-400">Add University</a>
                <a href="#compliance" class="hover:text-blue-400">Compliance Control</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8">

        <section id="partner-list" class="mb-12 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-2"><i class="fas fa-users-cog mr-2"></i> Partner Access Control</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700">
                            <th class="p-3 border">Name</th>
                            <th class="p-3 border">Status</th>
                            <th class="p-3 border">Subscription Expiry</th>
                            <th class="p-3 border">Action</th>
                        </tr>
                    </thead>
                    <tbody id="partnerTableBody">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="add-uni" class="bg-white rounded-lg shadow-md p-6 mb-12">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-2"><i class="fas fa-university mr-2"></i> Add University Requirement</h2>
            
            <form id="uniForm" class="grid-responsive">
                <div class="space-y-4">
                    <label class="block font-semibold">Country</label>
                    <input type="text" id="country" class="w-full p-2 border rounded" placeholder="e.g. Australia" required>
                    
                    <label class="block font-semibold">University Name</label>
                    <input type="text" id="uniName" class="w-full p-2 border rounded" required>

                    <label class="block font-semibold">Course Name</label>
                    <input type="text" id="courseName" class="w-full p-2 border rounded" required>
                </div>

                <div class="space-y-4">
                    <label class="block font-semibold">Degree Type</label>
                    <select id="degree" class="w-full p-2 border rounded">
                        <option>UG</option><option>PG</option><option>DIPLOMA</option>
                        <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                    </select>

                    <label class="block font-semibold">Language Requirement</label>
                    <select id="languageType" class="w-full p-2 border rounded">
                        <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                    </select>

                    <label class="block font-semibold">Study Gap Allowed (New)</label>
                    <input type="text" id="studyGap" class="w-full p-2 border rounded" placeholder="e.g. Max 2 Years">
                </div>

                <div class="space-y-4">
                    <label class="block font-semibold">Semester Fee per Year</label>
                    <input type="number" id="semesterFee" class="w-full p-2 border rounded" required>

                    <label class="block font-semibold">Currency</label>
                    <select id="currency" class="w-full p-2 border rounded">
                        <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option>
                        <option>EURO</option><option>TAKA</option><option>UK POUND</option>
                    </select>

                    <label class="block font-semibold">Bank Type</label>
                    <select id="bankType" class="w-full p-2 border rounded">
                        <option>FDR</option><option>SAVINGS</option>
                    </select>
                </div>

                <div class="space-y-4">
                    <label class="block font-semibold">Marital Status</label>
                    <select id="maritalStatus" class="w-full p-2 border rounded">
                        <option>Single</option><option>With spouse</option>
                    </select>

                    <label class="block font-semibold">Bank Name BD (Suggestion)</label>
                    <input type="text" id="bankNameBD" class="w-full p-2 border rounded">

                    <label class="block font-semibold">Loan Amount</label>
                    <input type="text" id="loanAmount" class="w-full p-2 border rounded">

                    <label class="block font-semibold">Partner Commission</label>
                    <input type="text" id="partnerCommission" class="w-full p-2 border rounded">
                </div>

                <div class="col-span-full pt-6">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition">
                        <i class="fas fa-save mr-2"></i> PERMANENTLY SAVE UNIVERSITY
                    </button>
                </div>
            </form>
        </section>

    </div>

    <script>
        // Form Logic & API Calls (Locked for Consistency)
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                country: document.getElementById('country').value,
                uniName: document.getElementById('uniName').value,
                courseName: document.getElementById('courseName').value,
                degree: document.getElementById('degree').value,
                languageType: document.getElementById('languageType').value,
                studyGap: document.getElementById('studyGap').value,
                semesterFee: document.getElementById('semesterFee').value,
                currency: document.getElementById('currency').value,
                bankType: document.getElementById('bankType').value,
                maritalStatus: document.getElementById('maritalStatus').value,
                bankNameBD: document.getElementById('bankNameBD').value,
                loanAmount: document.getElementById('loanAmount').value,
                partnerCommission: document.getElementById('partnerCommission').value
            };

            const res = await fetch('/api/add-university', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) alert("University Requirements Locked Successfully!");
        });
    </script>
</body>
</html>
