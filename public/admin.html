<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; } 
        .active { display: block; }
        .input-box { border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 flex">

    <div class="w-64 bg-slate-900 h-screen text-white p-6 sticky top-0 shadow-2xl">
        <h1 class="text-xl font-bold mb-10 text-blue-400 text-center tracking-tighter">IHP CRM ADMIN</h1>
        <nav class="space-y-2">
            <button onclick="showSection('uniSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2">
                <span>📁</span> University Management
            </button>
            <button onclick="showSection('partnerSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2">
                <span>👥</span> Partner Management
            </button>
            <button onclick="showSection('complianceSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2">
                <span>✅</span> File Compliance
            </button>
            <button onclick="showSection('withdrawSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-2">
                <span>💰</span> Withdraw & Subs
            </button>
        </nav>
    </div>

    <div class="flex-1 p-8">

        <div id="uniSection" class="section active bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 border-b pb-4 uppercase tracking-wide">University Data Entry (21 Fields)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-5" id="uniForm">
                
                <div><label>Country</label><input type="text" id="country" placeholder="Country" class="input-box"></div>
                <div><label>University Name</label><input type="text" id="uniName" placeholder="University Name" class="input-box"></div>
                <div><label>Course Name</label><input type="text" id="courseName" placeholder="Course Name" class="input-box"></div>
                <div><label>Intake</label><input type="text" id="intake" placeholder="e.g. Jan/Sep 2026" class="input-box"></div>
                
                <div><label>Degree Type</label>
                    <select id="degree" class="input-box">
                        <option>Ug</option><option>Pg</option><option>Diploma</option><option>Foundation</option><option>PhD</option><option>Research</option>
                    </select>
                </div>

                <div><label>Language Type</label>
                    <select id="languageType" class="input-box">
                        <option>IELTS</option><option>PTE</option><option>DUOLINGO</option><option>MOI</option><option>Language Internal Test</option>
                    </select>
                </div>

                <div><label>Min Academic GPA</label><input type="text" id="academicScore" placeholder="GPA 3.00/5.00" class="input-box"></div>
                <div><label>Min Language Score</label><input type="text" id="languageScore" placeholder="6.0 (5.5)" class="input-box"></div>
                <div><label>Semester Fee</label><input type="text" id="semesterFee" placeholder="Semester Fee" class="input-box"></div>
                <div><label>Currency</label><input type="text" id="currency" placeholder="GBP / USD / EUR" class="input-box"></div>
                
                <div><label>Partner Commission ($)</label><input type="number" id="partnerCommission" placeholder="Amount in $" class="input-box border-blue-400 bg-blue-50 font-bold"></div>
                
                <div><label>Bank Name (BD)</label><input type="text" id="bankNameBD" placeholder="Approved Banks" class="input-box"></div>
                <div><label>Bank Requirements</label><input type="text" id="bankType" placeholder="Fund Type" class="input-box"></div>
                <div><label>Loan Amount</label><input type="text" id="loanAmount" placeholder="Loan Amount" class="input-box"></div>
                <div><label>Marital Status</label><input type="text" id="maritalStatus" placeholder="Single / Married" class="input-box"></div>
                <div><label>Study Gap Allowed</label><input type="text" id="studyGap" placeholder="Years" class="input-box"></div>
                
                <div><label>Application Fee</label><input type="text" id="appFee" placeholder="App Fee" class="input-box"></div>
                <div><label>Deadline</label><input type="text" id="deadline" placeholder="Deadline" class="input-box"></div>
                <div><label>Scholarship</label><input type="text" id="scholarship" placeholder="Scholarship Details" class="input-box"></div>
                <div><label>Work Rights</label><input type="text" id="workRights" placeholder="20hrs/week" class="input-box"></div>
                <div><label>Campus Location</label><input type="text" id="location" placeholder="City/Campus" class="input-box"></div>

            </div>
            <button onclick="saveUniversity()" class="mt-8 bg-blue-600 text-white px-10 py-3 rounded-lg font-bold hover:bg-blue-700 shadow-lg uppercase text-xs tracking-widest">Save University Data</button>
        </div>

        <div id="partnerSection" class="section bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 border-b pb-4 uppercase tracking-wide">Partner Management</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b">
                            <th class="p-4">Partner Name</th>
                            <th class="p-4">Contact No</th>
                            <th class="p-4">Org Name</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Expiry Date</th>
                            <th class="p-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="partnerTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'partnerSection') loadPartners();
        }

        async function saveUniversity() {
            const data = {};
            document.querySelectorAll('#uniForm input, #uniForm select').forEach(el => data[el.id] = el.value);
            const res = await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) alert("✅ University Added Successfully!");
        }

        async function loadPartners() {
            const res = await fetch('/api/admin/partners');
            const partners = await res.json();
            const tbody = document.getElementById('partnerTableBody');
            tbody.innerHTML = '';
            partners.forEach(p => {
                const date = p.expiryDate ? new Date(p.expiryDate).toISOString().split('T')[0] : '';
                tbody.innerHTML += `
                    <tr class="text-sm border-b hover:bg-slate-50 transition">
                        <td class="p-3"><input type="text" id="name-${p._id}" value="${p.name || ''}" class="border-none bg-transparent w-full focus:ring-1 focus:ring-blue-300 rounded"></td>
                        <td class="p-3"><input type="text" id="contact-${p._id}" value="${p.contact || ''}" class="border-none bg-transparent w-full focus:ring-1 focus:ring-blue-300 rounded"></td>
                        <td class="p-3"><input type="text" id="org-${p._id}" value="${p.orgName || ''}" class="border-none bg-transparent w-full focus:ring-1 focus:ring-blue-300 rounded"></td>
                        <td class="p-3">
                            <select id="status-${p._id}" class="bg-white border rounded text-xs p-1 font-bold">
                                <option value="Active" ${p.status === 'Active' ? 'selected' : ''}>Active</option>
                                <option value="Inactive" ${p.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                            </select>
                        </td>
                        <td class="p-3"><input type="date" id="expiry-${p._id}" value="${date}" class="bg-white border rounded text-xs p-1"></td>
                        <td class="p-3 text-center"><button onclick="updatePartner('${p._id}')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] font-bold uppercase">Update</button></td>
                    </tr>`;
            });
        }

        async function updatePartner(id) {
            const data = {
                name: document.getElementById(`name-${id}`).value,
                contact: document.getElementById(`contact-${id}`).value,
                orgName: document.getElementById(`org-${id}`).value,
                status: document.getElementById(`status-${id}`).value,
                expiryDate: document.getElementById(`expiry-${id}`).value
            };
            await fetch(`/api/admin/update-partner/${id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("✅ Partner Updated!");
        }
    </script>
</body>
</html>
