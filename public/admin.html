<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-input { border: 1px solid #e2e8f0; border-radius: 4px; padding: 10px; width: 100%; background: #fff; font-size: 14px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #4a5568; }
        .nav-link { cursor: pointer; transition: 0.3s; padding: 8px 15px; border-radius: 4px; font-size: 13px; }
        .nav-link:hover { background: #334155; }
        .section-content { display: none; }
        .section-active { display: block; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-[#1a202c] text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase"><i class="fas fa-user-shield mr-2"></i> Admin Master</h1>
            <div class="hidden md:flex space-x-2">
                <span class="nav-link" onclick="showSection('partner-list')">Partner Management</span>
                <span class="nav-link" onclick="showSection('add-uni')">Add University</span>
                <span class="nav-link" onclick="showSection('student-tracking')">Student Tracking</span>
                <span class="nav-link" onclick="showSection('withdrawals')">Withdrawal Requests</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        
        <div id="partner-list" class="section-content">
            <div class="bg-white p-6 rounded shadow border">
                <h2 class="text-xl font-bold mb-6 text-blue-900 border-b pb-2">Partner Control</h2>
                <table class="w-full text-left border-collapse text-sm">
                    <thead><tr class="bg-gray-100">
                        <th class="p-3 border">Name</th><th class="p-3 border">Contact</th><th class="p-3 border">Status</th><th class="p-3 border">Action</th>
                    </tr></thead>
                    <tbody id="partnerTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="add-uni" class="section-content section-active">
            <div class="bg-white rounded shadow-sm border p-8 mb-10">
                <h2 class="text-lg font-bold mb-6 text-gray-800 flex items-center"><i class="fas fa-university mr-3 text-blue-600"></i> Add University Requirement</h2>
                <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-6">
                    <div><label class="form-label">Country</label><input type="text" id="country" class="form-input"></div>
                    <div><label class="form-label">Degree</label><select id="degree" class="form-input"><option>UG</option><option>PG</option><option>FOUNDATION</option><option>DIPLOMA</option></select></div>
                    <div><label class="form-label">Semester Fee/Year</label><input type="text" id="semesterFee" class="form-input"></div>
                    <div><label class="form-label">Currency</label><select id="currency" class="form-input"><option>AUD DOLLAR</option><option>DOLLAR</option><option>EURO</option><option>POUND</option><option>TAKA</option></select></div>
                    <div><label class="form-label">University Name</label><input type="text" id="uniName" class="form-input"></div>
                    <div><label class="form-label">Language Req</label><select id="languageType" class="form-input"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                    <div><label class="form-label">Course Name</label><input type="text" id="courseName" class="form-input"></div>
                    <div><label class="form-label">Partner Commission</label><input type="text" id="partnerCommission" class="form-input"></div>
                    <button type="submit" class="md:col-span-4 bg-[#2563eb] text-white font-bold py-3 mt-4 rounded uppercase shadow-md">SAVE UNIVERSITY</button>
                </form>
            </div>
        </div>

        <div id="student-tracking" class="section-content">
            <div class="bg-white p-6 rounded shadow border">
                <h2 class="text-xl font-bold mb-6 text-blue-900 border-b pb-2">Student File Status</h2>
                <table class="w-full text-left border-collapse text-sm">
                    <thead><tr class="bg-gray-100">
                        <th class="p-3 border">Student Name</th><th class="p-3 border">Partner</th><th class="p-3 border">File Status</th><th class="p-3 border">Commission</th>
                    </tr></thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="withdrawals" class="section-content">
            <div class="bg-white p-6 rounded shadow border">
                <h2 class="text-xl font-bold mb-6 text-green-800 border-b pb-2">Withdrawal Requests</h2>
                <table class="w-full text-left border-collapse text-sm">
                    <thead><tr class="bg-gray-100">
                        <th class="p-3 border">Partner</th><th class="p-3 border">Amount</th><th class="p-3 border">Status</th><th class="p-3 border">Action</th>
                    </tr></thead>
                    <tbody id="withdrawalTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('section-active'));
            document.getElementById(id).classList.add('section-active');
            if(id === 'partner-list') loadPartners();
            if(id === 'student-tracking') loadStudents();
            if(id === 'withdrawals') loadWithdrawals();
        }

        // Logic for Pay Button
        async function markAsPaid(requestId) {
            const res = await fetch('/api/pay-commission', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ requestId })
            });
            if(res.ok) { alert("Payment Successful. Status updated to PAID"); loadWithdrawals(); }
        }

        async function loadWithdrawals() {
            const res = await fetch('/api/withdraw-requests');
            const data = await res.json();
            document.getElementById('withdrawalTableBody').innerHTML = data.map(w => `
                <tr>
                    <td class="p-3 border">${w.partnerName}</td>
                    <td class="p-3 border">${w.amount}</td>
                    <td class="p-3 border font-bold ${w.status === 'Paid' ? 'text-green-600' : 'text-red-600'}">${w.status}</td>
                    <td class="p-3 border">
                        ${w.status === 'Pending' ? `<button onclick="markAsPaid('${w._id}')" class="bg-green-600 text-white px-3 py-1 rounded">Pay Now</button>` : 'COMPLETED'}
                    </td>
                </tr>
            `).join('');
        }

        // Load Students (For Monitor)
        async function loadStudents() {
            const res = await fetch('/api/student-tracking');
            const data = await res.json();
            document.getElementById('studentTableBody').innerHTML = data.map(s => `
                <tr>
                    <td class="p-3 border font-bold">${s.studentName}</td>
                    <td class="p-3 border">${s.partnerName}</td>
                    <td class="p-3 border text-blue-600 font-bold uppercase">${s.status}</td>
                    <td class="p-3 border font-bold text-orange-600">${s.commissionStatus}</td>
                </tr>
            `).join('');
        }

        // --- All Other Previous Scripts Locked ---
        // (Partner loading, University saving logic remains identical to previous version)
    </script>
</body>
</html>
