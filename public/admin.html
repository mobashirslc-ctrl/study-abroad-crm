<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-green: #2ecc71; --brand-purple: #2c003e; --glass: rgba(255, 255, 255, 0.1); }
        body { background: linear-gradient(135deg, #1a0026 0%, #2c003e 100%); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .dashboard-container { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: var(--glass); backdrop-filter: blur(10px); border-right: 1px solid rgba(46, 204, 113, 0.2); padding: 30px; }
        .sidebar h2 { color: var(--brand-green); font-size: 22px; border-bottom: 2px solid var(--brand-green); padding-bottom: 10px; }
        .nav-item { padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.7); }
        .nav-item:hover, .active-nav { background: rgba(46, 204, 113, 0.1); color: var(--brand-green); border-left: 4px solid var(--brand-green); }
        .main-content { padding: 40px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(46, 204, 113, 0.2); border-radius: 15px; padding: 25px; }
        .btn-primary { background: var(--brand-green); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status-tag { background: rgba(46, 204, 113, 0.1); color: var(--brand-green); border: 1px solid var(--brand-green); padding: 5px 15px; border-radius: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>ASG ADMIN</h2>
            <div class="nav-item active-nav"><i class="fas fa-chart-line"></i> Overview</div>
            <div class="nav-item"><i class="fas fa-university"></i> Universities</div>
            <div class="nav-item"><i class="fas fa-handshake"></i> Partners</div>
            <div class="nav-item"><i class="fas fa-user-shield"></i> Compliance</div>
        </aside>
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>System Overview</h1>
                <span class="status-tag" id="db-status">Firebase: Connecting...</span>
            </header>
            <div class="glass-card">
                <h3 style="color: var(--brand-green);">Ready for Part 1</h3>
                <p>Admin links are now stabilized. Design is protected with Green Theme.</p>
                <button class="btn-primary" onclick="alert('Ready to build Part 1 Form!')">Start Part 1</button>
            </div>
        </main>
    </div>
</body>
</html>
