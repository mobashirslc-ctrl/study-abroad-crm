<!DOCTYPE html>
<html>
<head>
    <title>IHP Admin</title>
    <style>
        body { font-family: sans-serif; display: flex; margin:0; }
        .sidebar { width: 200px; background: #1a237e; color: white; min-height: 100vh; padding: 20px; }
        .main { flex: 1; padding: 20px; background: #f8f9fa; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: blue; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>IHP ADMIN</h3>
        <p>University Setup</p>
        <p>Partner Management</p>
        <p>Compliance Control</p>
    </div>
    <div class="main">
        <div class="card">
            <h2>🏫 Add University (Detailed)</h2>
            <input type="text" id="uCountry" placeholder="Country">
            <input type="text" id="uName" placeholder="University Name">
            <select id="uDeg">
                <option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option>
            </select>
            <select id="uCur">
                <option>DOLLAR</option><option>EURO</option><option>TAKA</option><option>UK POUND</option>
            </select>
            <select id="uBank"><option>FDR</option><option>SAVINGS</option></select>
            <select id="uMarital"><option>Single</option><option>With spouse</option></select>
            <input type="text" id="uBankBD" placeholder="BD Bank Name">
            <input type="text" id="uComm" placeholder="Partner Commission">
            <button onclick="saveUni()">SAVE DATA</button>
        </div>
    </div>
    <script>
        async function saveUni() {
            const body = {
                country: document.getElementById('uCountry').value,
                uniName: document.getElementById('uName').value,
                degree: document.getElementById('uDeg').value,
                currency: document.getElementById('uCur').value,
                bankType: document.getElementById('uBank').value,
                maritalStatus: document.getElementById('uMarital').value,
                bankNameBD: document.getElementById('uBankBD').value,
                partnerCommission: document.getElementById('uComm').value
            };
            const res = await fetch('/api/admin/add-uni', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if(res.ok) alert("University Added Successfully!");
        }
    </script>
</body>
</html>
