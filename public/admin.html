<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
        input, select { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; width: 100%; }
        label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 border-b border-white/10 pb-4 text-blue-400">Master Admin Control</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-emerald-400">Partner Requests</h2>
                <div id="partnerList" class="space-y-4 text-sm">
                    </div>
            </div>

            <div class="card">
                <h2 class="text-xl font-semibold mb-4 text-blue-400">Add New University</h2>
                <form id="uniForm" class="grid grid-cols-2 gap-4">
                    <div><label>Uni Name</label><input type="text" id="uniName" required></div>
                    <div><label>Country</label><input type="text" id="country" required></div>
                    <div><label>Location</label><input type="text" id="location"></div>
                    <div><label>Course Name</label><input type="text" id="courseName"></div>
                    <div><label>Degree Type</label><select id="degreeType"><option>Bachelors</option><option>Masters</option></select></div>
                    <div><label>Intake</label><input type="text" id="intake" placeholder="e.g. Sep 2026"></div>
                    <div><label>Semester Fee</label><input type="text" id="semesterFee"></div>
                    <div><label>Partner Commission</label><input type="text" id="partnerCommission" placeholder="e.g. 500"></div>
                    <div><label>Bank Req (BD)</label><input type="text" id="bankNameBD"></div>
                    <div><label>Loan Amount</label><input type="text" id="loanAmount"></div>
                    <div><label>Marital Status</label><select id="maritalStatus"><option>Single</option><option>Married</option><option>Both</option></select></div>
                    
                    <button type="submit" class="col-span-2 bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold mt-2">SAVE UNIVERSITY DATA</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Load Partners
        async function loadPartners() {
            const res = await fetch('/api/admin/partners');
            const data = await res.json();
            document.getElementById('partnerList').innerHTML = data.map(p => `
                <div class="flex justify-between items-center bg-white/5 p-3 rounded">
                    <span>${p.name} (${p.status})</span>
                    ${p.status === 'Pending' ? `<button onclick="approve('${p._id}')" class="bg-emerald-600 px-3 py-1 rounded">Approve</button>` : ''}
                </div>
            `).join('');
        }

        async function approve(id) {
            await fetch(`/api/admin/partner-status/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: 'Active'})
            });
            loadPartners();
        }

        // Add University
        document.getElementById('uniForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = {
                uniName: document.getElementById('uniName').value,
                country: document.getElementById('country').value,
                location: document.getElementById('location').value,
                courseName: document.getElementById('courseName').value,
                degreeType: document.getElementById('degreeType').value,
                intake: document.getElementById('intake').value,
                semesterFee: document.getElementById('semesterFee').value,
                partnerCommission: document.getElementById('partnerCommission').value,
                bankNameBD: document.getElementById('bankNameBD').value,
                loanAmount: document.getElementById('loanAmount').value,
                maritalStatus: document.getElementById('maritalStatus').value
            };

            await fetch('/api/admin/add-university', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            alert('University Added & Locked!');
            e.target.reset();
        }

        loadPartners();
    </script>
</body>
</html>
