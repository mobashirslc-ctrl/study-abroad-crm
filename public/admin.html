<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --bg: #0b012d; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --success: #2ecc71; --danger: #ff4757; }
        body { margin: 0; display: flex; background: radial-gradient(circle at top right, #1a0b4d, #0b012d); font-family: 'Poppins', sans-serif; color: white; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 80px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--border); transition: 0.3s; z-index: 1000; }
        .sidebar:hover { width: 220px; align-items: flex-start; padding-left: 15px; }
        .sidebar img.logo { width: 50px; border-radius: 5px; margin-bottom: 40px; background: white; padding: 2px; }
        .nav-links { list-style: none; padding: 0; width: 100%; flex-grow: 1; }
        .nav-links li { padding: 15px 20px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .nav-links li.active { color: var(--gold); background: var(--glass); border-left: 4px solid var(--gold); }
        .nav-links li span { display: none; }
        .sidebar:hover .nav-links li span { display: inline; }

        /* Main Content */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
        .content-body { padding: 30px; }
        
        .card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 25px; }
        .grid-filter { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        
        input, select { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 10px; color: white; border-radius: 8px; width: 100%; outline: none; font-size: 13px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); }
        label { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; display: block; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--gold); font-size: 11px; text-transform: uppercase; padding: 12px; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
