<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-input { border: 1px solid #e2e8f0; border-radius: 4px; padding: 10px; width: 100%; background: #fff; font-size: 14px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #4a5568; }
        .nav-link { cursor: pointer; transition: 0.3s; padding: 8px 15px; border-radius: 4px; font-size: 13px; }
        .nav-link:hover { background: #334155; }
        .section-content { display: none; }
        .section-active { display: block; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-[#1a202c] text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase"><i class="fas fa-user-shield mr-2"></i> Admin Master</h1>
            <div class="flex space-x-2">
                <span class="nav-link" onclick="showSection('partner-list')">Partner Management</span>
                <span class="nav-link" onclick="showSection('add-uni')">Add University</span>
                <span class="nav-link" onclick="showSection('student-tracking')">Student Tracking</span>
                <span class="nav-link" onclick="showSection('withdrawals')">Withdrawal Requests</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        <div id="add-uni" class="section-content section-active">
            <div class="bg-white rounded shadow-sm border p-8 mb-10">
                <h2 class="text-lg font-bold mb-6 text-gray-800 flex items-center"><i class="fas fa-university mr-3 text-blue-600"></i> Add University Requirement</h2>
                <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-6">
                    <div><label class="form-label">Country</label><input type="text" id="country" class="form-input"></div>
                    
                    <div><label class="form-label">Degree Type</label>
                        <select id="degree" class="form-input">
                            <option value="UG">UG</option>
                            <option value="PG">PG</option>
                            <option value="FOUNDATION">FOUNDATION</option>
                            <option value="DIPLOMA">DIPLOMA</option>
                        </select>
                    </div>

                    <div><label class="form-label">Semester Fee/Year</label><input type="text" id="semesterFee" class="form-input"></div>

                    <div><label class="form-label">Currency</label>
                        <select id="currency" class="form-input">
                            <option value="AUD DOLLAR">AUD DOLLAR</option>
                            <option value="DOLLAR">DOLLAR</option>
                            <option value="EURO">EURO</option>
                            <option value="POUND">POUND</option>
                            <option value="TAKA">TAKA</option>
                        </select>
                    </div>

                    <div><label class="form-label">University Name</label><input type="text" id="uniName" class="form-input"></div>
                    <div><label class="form-label">Language Req</label><select id="languageType" class="form-input"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                    <div><label class="form-label">Course Name</label><input type="text" id="courseName" class="form-input"></div>
                    <div><label class="form-label">Partner Commission</label><input type="text" id="partnerCommission" class="form-input"></div>

                    <div><label class="form-label">Intake</label><input type="text" id="intake" class="form-input"></div>
                    <div><label class="form-label">Academic Score</label><input type="text" id="academicScore" class="form-input"></div>
                    <div><label class="form-label">Language Score</label><input type="text" id="languageScore" class="form-input"></div>
                    <div><label class="form-label">Study Gap Allowed</label><input type="text" id="studyGap" class="form-input"></div>

                    <div><label class="form-label">Bank Name BD</label><input type="text" id="bankNameBD" class="form-input"></div>
                    
                    <div><label class="form-label">Bank Type</label>
                        <select id="bankType" class="form-input">
                            <option value="FDR">FDR</option>
                            <option value="SAVINGS">SAVINGS</option>
                        </select>
                    </div>

                    <div><label class="form-label">Loan Amount</label><input type="text" id="loanAmount" class="form-input"></div>

                    <div><label class="form-label">Marital Status</label>
                        <select id="maritalStatus" class="form-input">
                            <option value="Single">Single</option>
                            <option value="With spouse">With spouse</option>
                        </select>
                    </div>

                    <button type="submit" id="saveBtn" class="md:col-span-4 bg-[#2563eb] text-white font-bold py-3 mt-4 rounded uppercase shadow-md flex justify-center items-center">
                        <i class="fas fa-save mr-2"></i> SAVE UNIVERSITY
                    </button>
                </form>
            </div>
        </div>

        <div id="partner-list" class="section-content"><div class="bg-white p-6 rounded shadow border">Partner Management System Ready.</div></div>
        <div id="student-tracking" class="section-content"><div class="bg-white p-6 rounded shadow border">Student Tracking Ready.</div></div>
        <div id="withdrawals" class="section-content"><div class="bg-white p-6 rounded shadow border">Withdrawal Monitoring Ready.</div></div>
    </div>

    <script>
        // Menu Navigation Logic Fixed
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('section-active'));
            document.getElementById(id).classList.add('section-active');
        }

        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = 'SAVING...';
            btn.disabled = true;

            const fields = ['country','uniName','courseName','intake','degree','languageType','academicScore','languageScore','studyGap','semesterFee','currency','bankType','maritalStatus','bankNameBD','loanAmount','partnerCommission'];
            const data = {}; fields.forEach(id => { data[id] = document.getElementById(id).value; });

            try {
                const res = await fetch('/api/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                if(res.ok) { alert("University Requirement Locked & Saved!"); e.target.reset(); }
                else { alert("Error: API Failed to Save"); }
            } catch (err) { alert("Network/Server Error"); }
            finally { btn.innerHTML = 'SAVE UNIVERSITY'; btn.disabled = false; }
        });
    </script>
</body>
</html>
