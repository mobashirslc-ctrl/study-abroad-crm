<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ASG Global CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent-yellow: #facc15;
            --bg-deep: #0d001a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a002e, #0a0a0b);
            color: #fff;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - Standard 80px Locked Design */
        .sidebar {
            width: 80px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-icon {
            color: rgba(255, 255, 255, 0.4);
            font-size: 22px;
            margin-bottom: 40px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-icon.active, .nav-icon:hover { color: var(--accent-yellow); text-shadow: 0 0 10px var(--accent-yellow); }

        /* Main Content */
        .main-content {
            margin-left: 80px;
            flex: 1;
            padding: 40px;
        }

        .glass-header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 15px;
        }

        .glass-header h1 {
            font-size: 24px;
            color: var(--accent-yellow);
            margin: 0;
        }

        /* Form Grid - 21 Fields */
        .entry-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a1a1aa;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            background: var(--input-bg);
            border: 1px solid var(--border-glass);
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-yellow);
            background: rgba(250, 204, 21, 0.05);
        }

        .submit-container {
            grid-column: span 3;
            margin-top: 30px;
        }

        .btn-save {
            width: 100%;
            background: var(--accent-yellow);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3);
        }

        @media (max-width: 1100px) { .form-grid { grid-template-columns: repeat(2, 1fr); } .submit-container { grid-column: span 2; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icon active"><i class="fas fa-university"></i></div>
        <div class="nav-icon"><i class="fas fa-users"></i></div>
        <div class="nav-icon"><i class="fas fa-file-contract"></i></div>
        <div class="nav-icon" style="margin-top: auto;"><i class="fas fa-cog"></i></div>
    </aside>

    <main class="main-content">
        <div class="glass-header">
            <h1>Master University Entry</h1>
            <p style="color: #71717a; font-size: 14px;">Upload new data directly to the global database.</p>
        </div>

        <div class="entry-card">
            <div class="form-grid">
                <div class="form-group"><label>University Name</label><input type="text" id="u_name" placeholder="e.g. University of Hull"></div>
                <div class="form-group"><label>Country</label><input type="text" id="u_country" placeholder="UK / USA / Canada"></div>
                <div class="form-group"><label>Location/City</label><input type="text" id="u_location" placeholder="London / Ontario"></div>

                <div class="form-group"><label>Intake Month</label><input type="text" id="u_month" placeholder="September / January"></div>
                <div class="form-group"><label>Intake Year</label><input type="text" id="u_year" placeholder="2026"></div>
                <div class="form-group"><label>Course Level</label><select id="u_level"><option>Post-Graduate (Masters)</option><option>Under-Graduate (Bachelors)</option><option>Foundation</option></select></div>

                <div class="form-group"><label>Course Name</label><input type="text" id="u_course"></div>
                <div class="form-group"><label>Tuition Fee (Total)</label><input type="text" id="u_fee"></div>
                <div class="form-group"><label>Scholarship</label><input type="text" id="u_scholar"></div>

                <div class="form-group"><label>After Scholarship Fee</label><input type="text" id="u_final"></div>
                <div class="form-group"><label>Initial Deposit</label><input type="text" id="u_deposit"></div>
                <div class="form-group"><label>App. Fee</label><input type="text" id="u_app"></div>

                <div class="form-group"><label>IELTS Requirement</label><input type="text" id="u_ielts"></div>
                <div class="form-group"><label>Alt. English Test</label><input type="text" id="u_alt"></div>
                <div class="form-group"><label>MOI Acceptability</label><select id="u_moi"><option>Yes</option><option>No</option><option>Case by Case</option></select></div>

                <div class="form-group"><label>Academic Score (Min)</label><input type="text" id="u_academic"></div>
                <div class="form-group"><label>Gap Acceptability</label><input type="text" id="u_gap"></div>
                <div class="form-group"><label>Process Time</label><input type="text" id="u_time" placeholder="2-4 Weeks"></div>

                <div class="form-group"><label>Partner Commission</label><input type="text" id="u_comm" placeholder="£ 1,500"></div>
                <div class="form-group"><label>University Contact</label><input type="text" id="u_contact"></div>
                <div class="form-group"><label>Extra Notes</label><input type="text" id="u_notes"></div>

                <div class="submit-container">
                    <button class="btn-save" id="btn-save">UPLOAD TO DATABASE</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
