<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="font-family:sans-serif; padding:20px;">
    <h2>🏫 Add University (Detailed)</h2>
    <input type="text" id="uCountry" placeholder="Country">
    <input type="text" id="uName" placeholder="University Name">
    <select id="uDeg">
        <option>UG</option><option>PG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
    </select>
    <select id="uCur">
        <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option><option>EURO</option><option>TAKA</option><option>UK POUND</option>
    </select>
    <select id="uBankType"><option>FDR</option><option>SAVINGS</option></select>
    <select id="uMarital"><option>Single</option><option>With spouse</option></select>
    <input type="text" id="uBankBD" placeholder="BD Bank Name">
    <input type="text" id="uComm" placeholder="Partner Commission">
    <button onclick="save()" style="padding:10px 20px; background:blue; color:white;">SAVE DATA</button>

    <script>
        async function save() {
            const body = { country: document.getElementById('uCountry').value, uniName: document.getElementById('uName').value, degree: document.getElementById('uDeg').value, currency: document.getElementById('uCur').value, bankType: document.getElementById('uBankType').value, maritalStatus: document.getElementById('uMarital').value, bankNameBD: document.getElementById('uBankBD').value, partnerCommission: document.getElementById('uComm').value };
            await fetch('/api/admin/add-uni', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            alert("University Saved!");
        }
    </script>
</body>
</html>
