<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-input { border: 1px solid #e2e8f0; border-radius: 4px; padding: 10px; width: 100%; background: #fff; }
        .section-content { display: none; }
        .section-active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-[#1a202c] text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase"><i class="fas fa-user-shield mr-2"></i> Admin Master</h1>
            <div class="flex space-x-6 text-sm">
                <span class="cursor-pointer hover:text-blue-400" onclick="showSection('partner-list')">Partner Management</span>
                <span class="cursor-pointer hover:text-blue-400" onclick="showSection('add-uni')">Add University</span>
                <span class="cursor-pointer hover:text-blue-400" onclick="showSection('compliance')">Compliance</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        
        <div id="partner-list" class="section-content">
            <div class="bg-white p-6 rounded shadow border">
                <h2 class="text-xl font-bold mb-6 text-blue-900 border-b pb-2">Partner Management & Expiry Control</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="p-3 border">Partner Name</th>
                                <th class="p-3 border">Status</th>
                                <th class="p-3 border">Expiry Date</th>
                                <th class="p-3 border">Action</th>
                            </tr>
                        </thead>
                        <tbody id="partnerTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="add-uni" class="section-content section-active">
            <div class="bg-white rounded shadow-sm border p-8">
                <h2 class="text-lg font-bold mb-6 text-gray-800 flex items-center"><i class="fas fa-university mr-3"></i> Add University Requirement</h2>
                <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div><label class="block font-bold text-xs mb-1">Country</label><input type="text" id="country" class="form-input"></div>
                    <div><label class="block font-bold text-xs mb-1">Degree</label><select id="degree" class="form-input"><option>UG</option><option>PG</option><option>FOUNDATION</option></select></div>
                    <div><label class="block font-bold text-xs mb-1">Currency</label><select id="currency" class="form-input"><option>AUD DOLLAR</option><option>DOLLAR</option><option>EURO</option><option>POUND</option><option>TAKA</option></select></div>
                    <div><label class="block font-bold text-xs mb-1">University Name</label><input type="text" id="uniName" class="form-input"></div>
                    <button type="submit" class="md:col-span-4 bg-blue-600 text-white font-bold py-3 rounded">SAVE & LOCK</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('section-active'));
            document.getElementById(id).classList.add('section-active');
            if(id === 'partner-list') loadPartners();
        }

        async function loadPartners() {
            const res = await fetch('/api/partners');
            const partners = await res.json();
            const body = document.getElementById('partnerTableBody');
            body.innerHTML = partners.map(p => `
                <tr>
                    <td class="p-3 border">${p.name}</td>
                    <td class="p-3 border">
                        <select onchange="updatePartner('${p._id}', this.value, '${p.expiryDate}')" class="border p-1">
                            <option ${p.status === 'Active' ? 'selected' : ''}>Active</option>
                            <option ${p.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                        </select>
                    </td>
                    <td class="p-3 border"><input type="date" value="${p.expiryDate ? p.expiryDate.split('T')[0] : ''}" onchange="updatePartner('${p._id}', '${p.status}', this.value)" class="border p-1"></td>
                    <td class="p-3 border"><button class="bg-blue-500 text-white px-2 py-1 rounded">Update</button></td>
                </tr>
            `).join('');
        }

        async function updatePartner(id, status, expiryDate) {
            await fetch('/api/update-partner', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, status, expiryDate })
            });
            alert("Partner Status Updated!");
        }

        // Form Submit for University (Same as before)
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // ... (previous logic for saving university)
        });
    </script>
</body>
</html>
