<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0a0b; color: #fff; font-family: 'Inter', sans-serif; display: flex; margin: 0; }
        .sidebar { width: 260px; background: #111113; height: 100vh; border-right: 1px solid #27272a; padding: 20px; position: fixed; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .form-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: #111113;
            border: 1px solid #27272a;
            padding: 30px;
            border-radius: 12px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #71717a; margin-bottom: 8px; }
        .form-group input, .form-group select {
            background: #18181b;
            border: 1px solid #27272a;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
        }
        .submit-btn {
            grid-column: span 3;
            background: #facc15;
            color: #000;
            font-weight: bold;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: #facc15;">Admin Panel</h2>
        </div>
    <div class="main">
        <h3>Add New University Data</h3>
        <div class="form-container">
            <div class="form-group"><label>University Name</label><input type="text"></div>
            <div class="form-group"><label>Country</label><input type="text"></div>
            <div class="form-group"><label>Location/City</label><input type="text"></div>
            <div class="form-group"><label>Intake (Month)</label><input type="text"></div>
            <div class="form-group"><label>Intake (Year)</label><input type="text"></div>
            <div class="form-group"><label>Course Level</label><input type="text"></div>
            <div class="form-group"><label>Course Name</label><input type="text"></div>
            <div class="form-group"><label>Tuition Fee (Total)</label><input type="text"></div>
            <div class="form-group"><label>Scholarship</label><input type="text"></div>
            <div class="form-group"><label>After Scholarship Fee</label><input type="text"></div>
            <div class="form-group"><label>Initial Deposit</label><input type="text"></div>
            <div class="form-group"><label>IELTS Requirement</label><input type="text"></div>
            <div class="form-group"><label>Alternative English Test</label><input type="text"></div>
            <div class="form-group"><label>MOI Status</label><input type="text"></div>
            <div class="form-group"><label>Academic Requirement</label><input type="text"></div>
            <div class="form-group"><label>Gap Acceptability</label><input type="text"></div>
            <div class="form-group"><label>Application Fee</label><input type="text"></div>
            <div class="form-group"><label>Commission</label><input type="text"></div>
            <div class="form-group"><label>Processing Time</label><input type="text"></div>
            <div class="form-group"><label>Contact Person</label><input type="text"></div>
            <div class="form-group"><label>Special Notes</label><input type="text"></div>
            <button class="submit-btn">UPLOAD DATA TO DATABASE</button>
        </div>
    </div>
</body>
</html>
