<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.section { display: none; } .active { display: block; } .input-box { border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; }</style>
</head>
<body class="bg-slate-50 flex">
    <div class="w-64 bg-slate-900 h-screen text-white p-6 sticky top-0">
        <h1 class="text-xl font-bold mb-10 text-blue-400">ADMIN PANEL</h1>
        <nav class="space-y-2">
            <button onclick="showSection('uniSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded">📁 University Mgmt</button>
            <button onclick="showSection('partnerSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded">👥 Partner Mgmt</button>
        </nav>
    </div>

    <div class="flex-1 p-10">
        <div id="uniSection" class="section active bg-white p-8 rounded-xl shadow-sm border">
            <h2 class="font-bold mb-6 text-slate-800 uppercase">Add University (21 Fields)</h2>
            <div class="grid grid-cols-4 gap-4" id="uniForm">
                <input type="text" id="country" placeholder="Country" class="input-box">
                <input type="text" id="uniName" placeholder="University Name" class="input-box">
                <input type="text" id="courseName" placeholder="Course Name" class="input-box">
                <input type="text" id="intake" placeholder="Intake" class="input-box">
                <select id="degree" class="input-box"><option>Ug</option><option>Pg</option><option>Diploma</option><option>Foundation</option><option>PhD</option></select>
                <select id="languageType" class="input-box"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                <input type="text" id="academicScore" placeholder="Min GPA" class="input-box">
                <input type="text" id="languageScore" placeholder="Min Lang Score" class="input-box">
                <input type="text" id="semesterFee" placeholder="Semester Fee" class="input-box">
                <input type="text" id="currency" placeholder="Currency" class="input-box">
                <input type="number" id="partnerCommission" placeholder="Commission $" class="input-box">
                <input type="text" id="bankNameBD" placeholder="Bank Name BD" class="input-box">
                <input type="text" id="bankType" placeholder="Bank Requirements" class="input-box">
                <input type="text" id="loanAmount" placeholder="Loan Amount" class="input-box">
                <input type="text" id="maritalStatus" placeholder="Marital Status" class="input-box">
                <input type="text" id="studyGap" placeholder="Study Gap" class="input-box">
                <input type="text" id="appFee" placeholder="App Fee" class="input-box">
                <input type="text" id="deadline" placeholder="Deadline" class="input-box">
                <input type="text" id="scholarship" placeholder="Scholarship" class="input-box">
                <input type="text" id="workRights" placeholder="Work Rights" class="input-box">
                <input type="text" id="location" placeholder="Location" class="input-box">
            </div>
            <button onclick="saveUni()" class="mt-6 bg-blue-600 text-white px-8 py-3 rounded-lg font-bold uppercase text-xs">Save University</button>
        </div>

        <div id="partnerSection" class="section bg-white p-8 rounded-xl shadow-sm border">
            <h2 class="font-bold mb-6 text-slate-800 uppercase">Partner Management</h2>
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-500 border-b">
                    <tr><th class="p-4">Name</th><th class="p-4">Org</th><th class="p-4">Status</th><th class="p-4">Action</th></tr>
                </thead>
                <tbody id="pTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'partnerSection') loadPartners();
        }

        async function saveUni() {
            const data = {};
            document.querySelectorAll('#uniForm input, #uniForm select').forEach(i => data[i.id] = i.value);
            const res = await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if(res.ok) alert("✅ University Saved Successfully!");
        }

        async function loadPartners() {
            const res = await fetch('/api/admin/partners');
            const partners = await res.json();
            const tbody = document.getElementById('pTable');
            tbody.innerHTML = partners.map(p => `
                <tr class="border-b text-sm">
                    <td class="p-4 font-medium">${p.name}</td>
                    <td class="p-4">${p.orgName}</td>
                    <td class="p-4 font-bold ${p.status === 'Active' ? 'text-green-600' : 'text-red-600'}">${p.status}</td>
                    <td class="p-4">
                        <button onclick="toggleStatus('${p._id}', '${p.status === 'Active' ? 'Inactive' : 'Active'}')" 
                                class="${p.status === 'Active' ? 'bg-red-500' : 'bg-green-600'} text-white px-3 py-1 rounded text-[10px] font-bold uppercase">
                            Mark as ${p.status === 'Active' ? 'Inactive' : 'Active'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleStatus(id, newStatus) {
            const res = await fetch(`/api/admin/update-partner/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: newStatus })
            });
            if(res.ok) {
                alert(`✅ Partner is now ${newStatus}`);
                loadPartners();
            }
        }
    </script>
</body>
</html>
