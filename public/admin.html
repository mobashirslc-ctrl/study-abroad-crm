<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHP Admin Master</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; }
        .sidebar { width: 250px; background: #1a237e; color: white; min-height: 100vh; padding: 20px; }
        .main { flex: 1; padding: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>IHP ADMIN</h2>
        <p>University Setup</p>
        <p>Partner Management</p>
        <p>File Tracking</p>
    </div>
    <div class="main">
        <div class="card">
            <h3>🏫 Add University for Smart Assessment</h3>
            <div class="grid">
                <input type="text" id="uCountry" placeholder="Country">
                <input type="text" id="uName" placeholder="University Name">
                <input type="text" id="uCourse" placeholder="Course Name">
                <input type="text" id="uIntake" placeholder="Intake (e.g. Sep 2026)">
                <select id="uDeg">
                    <option>UG</option><option>PG</option><option>DIPLOMA</option>
                    <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                </select>
                <select id="uLang"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                <input type="text" id="uAcadScore" placeholder="Min. Academic Score">
                <input type="text" id="uFee" placeholder="Semester Fee per Year">
                <select id="uCur">
                    <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option>
                    <option>EURO</option><option>TAKA</option><option>UK POUND</option>
                </select>
                <input type="text" id="uBankBal" placeholder="Required Bank Balance">
                <select id="uBankType"><option>FDR</option><option>SAVINGS</option></select>
                <select id="uMarital"><option>Single</option><option>With spouse</option></select>
                <input type="text" id="uBankBD" placeholder="Bank Name Suggestion">
                <input type="text" id="uLoan" placeholder="Loan Amount">
                <input type="text" id="uComm" placeholder="Partner Commission">
            </div>
            <button onclick="saveUniversity()">SAVE TO DATABASE</button>
        </div>
    </div>

    <script>
        async function saveUniversity() {
            const data = {
                country: document.getElementById('uCountry').value,
                uniName: document.getElementById('uName').value,
                course: document.getElementById('uCourse').value,
                intake: document.getElementById('uIntake').value,
                degree: document.getElementById('uDeg').value,
                language: document.getElementById('uLang').value,
                acadScore: document.getElementById('uAcadScore').value,
                fee: document.getElementById('uFee').value,
                currency: document.getElementById('uCur').value,
                bankBalance: document.getElementById('uBankBal').value,
                bankType: document.getElementById('uBankType').value,
                maritalStatus: document.getElementById('uMarital').value,
                bankNameBD: document.getElementById('uBankBD').value,
                loanAmount: document.getElementById('uLoan').value,
                partnerCommission: document.getElementById('uComm').value
            };

            const res = await fetch('/api/admin/add-uni', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("University Data Saved Successfully!"); location.reload(); }
            else { alert("Error saving data!"); }
        }
    </script>
</body>
</html>
