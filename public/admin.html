<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | SCC Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --dark: #1a1a2e; --deep: #0f0f1b; --green: #2ecc71; --red: #ff4757; --blue: #3498db; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--deep); color: white; display: flex; }
        .sidebar { width: 250px; background: var(--dark); height: 100vh; position: fixed; border-right: 1px solid #333; }
        .sidebar ul { list-style: none; padding: 0; margin-top: 20px; }
        .sidebar ul li { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid #222; color: #ccc; font-size: 14px; }
        .sidebar ul li.active { background: #252545; color: var(--gold); border-left: 4px solid var(--gold); }
        .main-content { margin-left: 250px; flex: 1; padding: 30px; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-in; }
        .card { background: var(--dark); padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--dark); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #252545; color: var(--gold); }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .action-btn { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; margin: 2px; color: white; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; padding:20px;"><img src="logo.jpeg" alt="SCC" style="width:120px;"></div>
    <ul>
        <li class="active" onclick="showTab(event, 'uni-manage')"><i class="fas fa-university"></i> Universities</li>
        <li onclick="showTab(event, 'admission-requests')"><i class="fas fa-file-import"></i> New Admissions</li>
        <li onclick="showTab(event, 'user-manage')"><i class="fas fa-users-cog"></i> Users & Staff</li>
        <li onclick="showTab(event, 'wallet-tracking')"><i class="fas fa-wallet"></i> Wallet</li>
    </ul>
</div>

<div class="main-content">
    <div id="uni-manage" class="tab-content" style="display: block;">
        <h3>University Management</h3>
        <table><thead><tr><th>University</th><th>Requirements</th><th>Fee</th><th>Action</th></tr></thead><tbody id="uniTableBody"></tbody></table>
    </div>

    <div id="admission-requests" class="tab-content">
        <h3>Verification Requests (Student & Merchant Details)</h3>
        <div id="admissionGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;"></div>
    </div>

    <div id="user-manage" class="tab-content">
        <h3>User Management (Partners/Staff)</h3>
        <table><thead><tr><th>Name/Role</th><th>Contact</th><th>Status</th><th>Actions</th></tr></thead><tbody id="userListTable"></tbody></table>
    </div>

    <div id="wallet-tracking" class="tab-content">
        <h3>Wallet Tracking</h3>
        <table><thead><tr><th>Student</th><th>Merchant</th><th>Pending</th><th>Available</th><th>Action</th></tr></thead><tbody id="walletTableBody"></tbody></table>
    </div>
</div>

<script>
    const showTab = (e, id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.sidebar li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        e.currentTarget.classList.add('active');
    };

    window.loadAdminData = async () => {
        try {
            const [uR, aR, usR] = await Promise.all([fetch('/api/universities'), fetch('/api/admin/admissions'), fetch('/api/admin/users')]);
            const [unis, adms, users] = await Promise.all([uR.json(), aR.json(), usR.json()]);

            // Universities
            document.getElementById('uniTableBody').innerHTML = unis.map(u => `<tr><td><b>${u.universityName}</b></td><td>GPA: ${u.minGPA}</td><td>${u.totalTuitionFee}</td><td><button class="action-btn" style="background:var(--red)" onclick="deleteUni('${u._id}')">Delete</button></td></tr>`).join('');

            // Admissions Grid (Detailed)
            document.getElementById('admissionGrid').innerHTML = adms.map(ad => `
                <div class="card" style="border-top: 3px solid var(--gold);">
                    <p><b>Student:</b> ${ad.name} (${ad.phone || 'N/A'})</p>
                    <p><b>Course:</b> <span class="badge" style="background:var(--blue)">${ad.course || 'N/A'}</span></p>
                    <p><b>TrxID:</b> <span style="color:var(--gold)">${ad.transactionId}</span> | <b>Amt:</b> ৳${ad.fee}</p>
                    <hr style="border:0.5px solid #333;">
                    <p style="font-size:11px; color:#aaa;"><b>Merchant:</b> ${ad.merchantName || 'Direct'} <br> <b>Merchant Contact:</b> ${ad.merchantPhone || 'N/A'}</p>
                    <button class="btn-gold" onclick="approveAdmission('${ad._id}')">Verify & Approve</button>
                </div>`).join('') || "No pending data.";

            // Users Table
            document.getElementById('userListTable').innerHTML = users.map(u => `
                <tr>
                    <td><b>${u.fullName || u.orgName}</b><br><small>${u.role}</small></td>
                    <td>${u.email}<br>${u.phone || ''}</td>
                    <td><span class="badge ${u.isSuspended ? 'bg-red' : 'bg-green'}">${u.isSuspended ? 'Suspended' : 'Active'}</span></td>
                    <td>
                        ${u.status === 'pending' ? `<button class="action-btn bg-green" onclick="updateStatus('${u._id}','active')">Approve</button>` : ''}
                        <button class="action-btn" style="background:#555" onclick="toggleSuspend('${u._id}',${u.isSuspended})">${u.isSuspended ? 'Unsuspend' : 'Suspend'}</button>
                    </td></tr>`).join('');
        } catch (e) { console.error(e); }
    };

    const toggleSuspend = async (id, curr) => {
        if(confirm("Confirm action?")) {
            await fetch(`/api/admin/users/toggle-status/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({isSuspended: !curr}) });
            loadAdminData();
        }
    };

    const approveAdmission = async (id) => {
        if(confirm("Approve this admission?")) {
            await fetch(`/api/admin/admissions/approve/${id}`, { method:'POST' });
            loadAdminData();
        }
    };

    window.onload = loadAdminData;
</script>
</body>
</html>
