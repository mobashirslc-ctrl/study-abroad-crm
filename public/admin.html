<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Super Admin Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #f1c40f; --danger: #ff4757; --success: #2ecc71; --blue: #3498db; }
        body { background: linear-gradient(145deg, var(--bg-dark), var(--primary)); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: rgba(0, 0, 0, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; }
        .logo-area { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-area img { width: 100%; max-height: 50px; background: white; padding: 5px; border-radius: 5px; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; color: #888; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border-left: 4px solid var(--accent); }
        .wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .admin-form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.65rem; color: var(--accent); text-transform: uppercase; }
        input, select, textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; outline: none; font-size: 0.85rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; color: var(--accent); border-bottom: 2px solid var(--border); font-size: 0.75rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .btn { border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-pay { background: var(--accent); color: black; width: 100%; margin-top: 15px; }
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><img src="logo.jpeg" alt="SCC"></div>
        <div onclick="showTab('uni-manage')" id="m-uni-manage" class="nav-item active"><i class="fas fa-university"></i> University Data</div>
        <div onclick="showTab('partners')" id="m-partners" class="nav-item"><i class="fas fa-users-cog"></i> User Management</div>
        <div onclick="showTab('payouts')" id="m-payouts" class="nav-item"><i class="fas fa-wallet"></i> Closing & Payouts</div>
        <div style="margin-top:auto; padding:20px;"><div class="nav-item" style="color:var(--danger);" onclick="logout()"><i class="fas fa-power-off"></i> Logout</div></div>
    </div>

    <div class="wrapper">
        <div class="main">
            <div class="header">
                <h2 id="page-title">University Management</h2>
                <div style="color:var(--accent); font-weight:bold;">SUPER ADMIN PANEL</div>
            </div>

            <div id="uni-manage" class="section active-section">
                <div class="card">
                    <h3><i class="fas fa-plus-circle"></i> Add University (21 Fields)</h3>
                    <div class="admin-form-grid">
                        <div class="form-group"><label>University Name</label><input type="text" id="uName"></div>
                        <div class="form-group"><label>Country</label><input type="text" id="uCountry"></div>
                        <div class="form-group"><label>City/Campus</label><input type="text" id="uCity"></div>
                        <div class="form-group"><label>Intake (e.g. Sept, Jan)</label><input type="text" id="uIntake"></div>
                        <div class="form-group"><label>Degree</label><select id="uDegree"><option>Bachelor</option><option>Master</option><option>Foundation</option></select></div>
                        <div class="form-group"><label>Semester Fee</label><input type="number" id="uSemFee"></div>
                        <div class="form-group"><label>Currency</label><select id="uCurrency"><option value="USD">USD</option><option value="GBP">GBP</option><option value="EUR">EUR</option><option value="CAD">CAD</option><option value="MYR">MYR</option><option value="BDT">BDT</option></select></div>
                        <div class="form-group"><label>Partner Comm (%)</label><input type="number" id="uPartPercent"></div>
                        <div class="form-group"><label>Min CGPA</label><input type="number" step="0.01" id="uMinCGPA"></div>
                        <div class="form-group"><label>Min IELTS Overall</label><input type="number" step="0.1" id="uMinIELTS"></div>
                        <div class="form-group"><label>Min Band Score</label><input type="number" step="0.1" id="uMinBand"></div>
                        <div class="form-group"><label>Study Gap Allowed</label><input type="number" id="uGap"></div>
                        <div class="form-group"><label>Age Limit</label><input type="number" id="uAge"></div>
                        <div class="form-group"><label>Duration (Yrs)</label><input type="text" id="uDuration"></div>
                        <div class="form-group"><label>Scholarship</label><input type="text" id="uScholar"></div>
                        <div class="form-group"><label>MOI Acceptable?</label><select id="uMOI"><option>Yes</option><option>No</option></select></div>
                        <div class="form-group"><label>PSW Available?</label><select id="uPSW"><option>Yes</option><option>No</option></select></div>
                        <div class="form-group"><label>Initial Deposit</label><input type="text" id="uDeposit"></div>
                        <div class="form-group" style="grid-column: span 2;"><label>Special Note</label><textarea id="uNote" rows="1"></textarea></div>
                    </div>
                    <button class="btn btn-pay" id="saveUniBtn">SAVE FULL PROFILE</button>
                </div>
                <div class="card">
                    <table id="uniTable">
                        <thead><tr><th>Name</th><th>Country</th><th>Degree</th><th>Comm (%)</th><th>Action</th></tr></thead>
                        <tbody id="uniTableBody"></tbody>
                    </table>
                </div>
            </div>
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk", authDomain: "ihp-portal-v3.firebaseapp.com", projectId: "ihp-portal-v3", storageBucket: "ihp-portal-v3.firebasestorage.app", messagingSenderId: "481157902534", appId: "1:481157902534:web:2d9784032fbf8f2f7fe7c7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showTab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-section');
            document.getElementById('m-' + id).classList.add('active');
        };

        document.getElementById('saveUniBtn').onclick = async () => {
            const u = {
                name: document.getElementById('uName').value,
                country: document.getElementById('uCountry').value,
                city: document.getElementById('uCity').value,
                intake: document.getElementById('uIntake').value,
                degree: document.getElementById('uDegree').value,
                semesterFee: Number(document.getElementById('uSemFee').value),
                currency: document.getElementById('uCurrency').value,
                partnerPercent: Number(document.getElementById('uPartPercent').value),
                minCGPA: parseFloat(document.getElementById('uMinCGPA').value || 0),
                minIELTS: parseFloat(document.getElementById('uMinIELTS').value || 0),
                minBand: parseFloat(document.getElementById('uMinBand').value || 0),
                gapAllowed: Number(document.getElementById('uGap').value || 0),
                ageLimit: Number(document.getElementById('uAge').value || 0),
                duration: document.getElementById('uDuration').value,
                scholarship: document.getElementById('uScholar').value,
                moi: document.getElementById('uMOI').value,
                psw: document.getElementById('uPSW').value,
                deposit: document.getElementById('uDeposit').value,
                note: document.getElementById('uNote').value,
                createdAt: serverTimestamp()
            };
            await addDoc(collection(db, "universities"), u);
            alert("University Profile Saved!");
            location.reload();
        };

        onSnapshot(query(collection(db, "universities"), orderBy("createdAt", "desc")), (snap) => {
            let html = "";
            snap.forEach(d => {
                const u = d.data();
                html += `<tr><td>${u.name}</td><td>${u.country}</td><td>${u.degree}</td><td>${u.partnerPercent}%</td><td><button onclick="deleteUni('${d.id}')" style="background:#ff4757; border:none; color:white; padding:5px; cursor:pointer;">Delete</button></td></tr>`;
            });
            document.getElementById('uniTableBody').innerHTML = html;
        });
        window.deleteUni = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "universities", id)); };
    </script>
</body>
</html>
