<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-[#1a202c] text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase">Admin Master</h1>
            <div class="hidden md:flex space-x-2 text-sm">
                <span class="cursor-pointer px-3 py-1 hover:bg-gray-700 rounded" onclick="showSection('add-uni')">Add University</span>
                <span class="cursor-pointer px-3 py-1 hover:bg-gray-700 rounded" onclick="showSection('partner-list')">Partners</span>
                <span class="cursor-pointer px-3 py-1 hover:bg-gray-700 rounded" onclick="showSection('student-tracking')">Tracking</span>
                <span class="cursor-pointer px-3 py-1 hover:bg-gray-700 rounded" onclick="showSection('withdrawals')">Payments</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div id="add-uni" class="bg-white p-8 rounded shadow border max-w-5xl mx-auto">
            <h2 class="text-lg font-bold mb-6 flex items-center"><i class="fas fa-university mr-3"></i> Add University Requirement</h2>
            <form id="uniForm" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div><label class="block text-xs font-bold mb-1">Country</label><input type="text" id="country" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Degree</label><select id="degree" class="w-full border p-2 rounded"><option>UG</option><option>PG</option><option>DIPLOMA</option></select></div>
                <div><label class="block text-xs font-bold mb-1">Semester Fee</label><input type="text" id="semesterFee" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Currency</label><select id="currency" class="w-full border p-2 rounded"><option>AUD DOLLAR</option><option>DOLLAR</option><option>POUND</option></select></div>
                <div><label class="block text-xs font-bold mb-1">University Name</label><input type="text" id="uniName" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Language Req</label><select id="languageType" class="w-full border p-2 rounded"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                <div><label class="block text-xs font-bold mb-1">Course Name</label><input type="text" id="courseName" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Partner Commission</label><input type="text" id="partnerCommission" class="w-full border p-2 rounded"></div>
                
                <div><label class="block text-xs font-bold mb-1">Intake</label><input type="text" id="intake" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Academic Score</label><input type="text" id="academicScore" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Language Score</label><input type="text" id="languageScore" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Study Gap</label><input type="text" id="studyGap" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Bank Name BD</label><input type="text" id="bankNameBD" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Bank Type</label><input type="text" id="bankType" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Loan Amount</label><input type="text" id="loanAmount" class="w-full border p-2 rounded"></div>
                <div><label class="block text-xs font-bold mb-1">Marital Status</label><input type="text" id="maritalStatus" class="w-full border p-2 rounded"></div>

                <button type="submit" id="saveBtn" class="md:col-span-4 bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition uppercase">
                    SAVE UNIVERSITY
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = 'SAVING...';
            btn.disabled = true;

            const fields = ['country','uniName','courseName','intake','degree','languageType','academicScore','languageScore','studyGap','semesterFee','currency','bankType','maritalStatus','bankNameBD','loanAmount','partnerCommission'];
            const data = {}; fields.forEach(id => { data[id] = document.getElementById(id).value; });

            try {
                const res = await fetch('/api/add-university', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(data) 
                });
                if(res.ok) { alert("Successfully Saved & Locked!"); e.target.reset(); }
                else { alert("Error: API Failed"); }
            } catch (err) { alert("Network Error"); }
            finally { btn.innerHTML = 'SAVE UNIVERSITY'; btn.disabled = false; }
        });
    </script>
</body>
</html>
