<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin | SCC Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --dark: #1a1a2e; --deep: #0f0f1b; --green: #2ecc71; --red: #ff4757; --blue: #3498db; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--deep); color: white; display: flex; overflow-x: hidden; }
        .sidebar { width: 260px; background: var(--dark); height: 100vh; position: fixed; padding-top: 10px; border-right: 1px solid #333; z-index: 1000; }
        .logo-container { text-align: center; padding: 20px; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .logo-container img { max-width: 180px; border-radius: 8px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar ul li { padding: 15px 25px; cursor: pointer; transition: 0.3s; border-bottom: 1px solid #222; font-size: 14px; color: #ccc; }
        .sidebar ul li:hover, .sidebar ul li.active { background: #252545; color: var(--gold); border-left: 4px solid var(--gold); }
        .sidebar ul li i { margin-right: 12px; width: 20px; }
        .main-content { margin-left: 260px; flex: 1; padding: 30px; box-sizing: border-box; min-height: 100vh; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-in; }
        .card { background: var(--dark); padding: 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--dark); margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #252545; color: var(--gold); }
        input, select, textarea { background: #252545; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-active { background: var(--green); color: white; }
        .status-pending { background: var(--gold); color: black; }
        .action-btn { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; margin: 2px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>

    <script>
        // ১. সাইডবার লজিক (সবার আগে ডিফাইন করা হলো যাতে লক না হয়)
        function showTab(event, tabId) {
            // সব ট্যাব হাইড করা
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(t => t.style.display = 'none');

            // সব মেনু আইটেম থেকে একটিভ ক্লাস রিমুভ করা
            const listItems = document.querySelectorAll('.sidebar ul li');
            listItems.forEach(li => li.classList.remove('active'));

            // নির্দিষ্ট ট্যাব দেখানো
            const target = document.getElementById(tabId);
            if (target) {
                target.style.display = 'block';
                if (event && event.currentTarget) {
                    event.currentTarget.classList.add('active');
                }
            }
        }

        function logout() {
            if(confirm("Logout from Admin Panel?")) {
                localStorage.clear();
                location.href = 'auth.html';
            }
        }
    </script>
</head>
<body>

<div class="sidebar">
    <div class="logo-container"><img src="logo.jpeg" alt="SCC Admin"></div>
    <ul>
        <li class="active" onclick="showTab(event, 'uni-manage')">
            <i class="fas fa-university"></i> Manage Universities
        </li>
        <li onclick="showTab(event, 'user-manage')">
            <i class="fas fa-users-cog"></i> Partner & Compliance
        </li>
        <li onclick="showTab(event, 'merchant-manage')">
            <i class="fas fa-store"></i> Merchant Partners
        </li>
        <li onclick="showTab(event, 'tracking-manage')">
            <i class="fas fa-tasks"></i> Tracking & Wallet
        </li>
        <li onclick="showTab(event, 'admission-manage')">
            <i class="fas fa-user-graduate"></i> Admission Requests
        </li>
        <hr style="border: 0.5px solid #222; margin: 10px 20px;">
        <li onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </li>
    </ul>
</div>

<div class="main-content">
    <h2>Admin <span style="color:var(--gold);">Control Center</span></h2>

    <div id="uni-manage" class="tab-content" style="display: block;">
        <div class="card">
            <h3>Add New University</h3>
            <div class="input-group">
                <input type="text" id="uName" placeholder="University Name">
                <input type="text" id="uCountry" placeholder="Country">
                <input type="text" id="uCity" placeholder="City">
            </div>
            <button class="btn-gold" onclick="saveUniversity()">Add University</button>
        </div>
        <table>
            <thead><tr><th>University</th><th>Requirements</th><th>Fee</th><th>Action</th></tr></thead>
            <tbody id="adminUniTable"></tbody>
        </table>
    </div>

    <div id="user-manage" class="tab-content">
        <div class="card"><h3>Partner Management</h3>
            <tbody id="adminUserTable"></tbody>
        </div>
    </div>

    <div id="merchant-manage" class="tab-content">
        <div class="card"><h3>Merchant Management</h3>
            <tbody id="adminMerchantTable"></tbody>
        </div>
    </div>

    <div id="tracking-manage" class="tab-content">
        <div class="card"><h3>Tracking & Wallet</h3>
            <tbody id="adminTrackingTable"></tbody>
        </div>
    </div>

    <div id="admission-manage" class="tab-content">
        <div class="card"><h3>Admission Requests</h3>
            <tbody id="adminAdmissionTable"></tbody>
        </div>
    </div>
</div>

<script type="module">
    // ২. ডাটা ফেচিং লজিক (API কলগুলো এখানে থাকবে)
    async function fetchAll() {
        try {
            const res = await fetch('/api/universities');
            const unis = await res.json();
            document.getElementById('adminUniTable').innerHTML = unis.map(u => `
                <tr>
                    <td><b>${u.universityName}</b></td>
                    <td>GPA: ${u.minGPA}</td>
                    <td>${u.uCurrency} ${u.totalTuitionFee}</td>
                    <td><button class="action-btn" style="background:var(--gold)">EDIT</button></td>
                </tr>`).join('');
            
            // অন্যান্য ফেচ কল এখানে এড করুন (User, Merchant, etc.)
        } catch(e) { console.error("Loading Error:", e); }
    }

    window.saveUniversity = async () => {
        const data = { universityName: document.getElementById('uName').value, country: document.getElementById('uCountry').value };
        await fetch('/api/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        fetchAll();
    };

    window.onload = fetchAll;
</script>

</body>
</html>
