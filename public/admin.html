<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { display: flex; font-family: sans-serif; margin: 0; background: #f0f2f5; }
        .sidebar { width: 250px; background: #001529; color: white; height: 100vh; padding: 20px; position: fixed; }
        .main { margin-left: 270px; padding: 20px; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 30%; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP CRM</h2>
    <p onclick="location.reload()" style="cursor:pointer;">Add University</p>
</div>

<div class="main">
    <div class="card">
        <h3>🏫 Add University (Detailed)</h3>
        <input type="text" id="uCountry" placeholder="Country">
        <input type="text" id="uName" placeholder="University Name">
        <input type="text" id="uCourse" placeholder="Course">
        <input type="text" id="uIntake" placeholder="Intake">
        <select id="uDeg">
            <option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option>
        </select>
        <select id="uLang">
            <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
        </select>
        <input type="text" id="uFee" placeholder="Fee">
        <select id="uCur">
            <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>EURO</option><option>TAKA</option>
        </select>
        <input type="text" id="uBankBD" placeholder="Bank Name Suggestion">
        <input type="text" id="uComm" placeholder="Commission">
        <br>
        <button onclick="saveUni()" style="background:blue; color:white; padding:12px 30px; border:none; margin-top:20px; cursor:pointer;">SAVE UNIVERSITY</button>
    </div>
</div>

<script>
    async function saveUni() {
        const body = {
            country: document.getElementById('uCountry').value,
            uniName: document.getElementById('uName').value,
            course: document.getElementById('uCourse').value,
            intake: document.getElementById('uIntake').value,
            degree: document.getElementById('uDeg').value,
            language: document.getElementById('uLang').value,
            fee: document.getElementById('uFee').value,
            currency: document.getElementById('uCur').value,
            bankNameBD: document.getElementById('uBankBD').value,
            partnerCommission: document.getElementById('uComm').value
        };
        const res = await fetch('/api/admin/add-uni', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) alert("University Added Successfully!");
    }
</script>
</body>
</html>
