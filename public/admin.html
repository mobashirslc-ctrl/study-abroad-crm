<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>IHP CRM | Admin Panel Locked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; } .active { display: block; }
        .input-box { border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; outline: none; }
        label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 flex">

    <div class="w-64 bg-[#0f172a] h-screen text-white p-6 sticky top-0 shadow-2xl">
        <h1 class="text-xl font-bold mb-10 text-blue-400 text-center tracking-tighter uppercase">Admin Panel</h1>
        <nav class="space-y-2">
            <button onclick="showSection('uniSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-3">📁 University Management</button>
            <button onclick="showSection('partnerSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-3">👥 Partner Management</button>
            <button onclick="showSection('complianceSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-3">✅ File Compliance</button>
            <button onclick="showSection('withdrawSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition flex items-center gap-3">💰 Withdraw & Subs</button>
        </nav>
    </div>

    <div class="flex-1 p-10">

        <div id="uniSection" class="section active bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 uppercase tracking-widest border-b pb-2">Add New University</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="uniForm">
                <div><label>Country</label><input type="text" id="country" class="input-box"></div>
                <div><label>University Name</label><input type="text" id="uniName" class="input-box"></div>
                <div><label>Course Name</label><input type="text" id="courseName" class="input-box"></div>
                <div><label>Intake</label><input type="text" id="intake" class="input-box"></div>
                <div><label>Degree</label><select id="degree" class="input-box"><option>Ug</option><option>Pg</option><option>Diploma</option></select></div>
                <div><label>Language</label><select id="languageType" class="input-box"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
                <div><label>Academic Score</label><input type="text" id="academicScore" class="input-box"></div>
                <div><label>Language Score</label><input type="text" id="languageScore" class="input-box"></div>
                <div><label>Semester Fee</label><input type="text" id="semesterFee" class="input-box"></div>
                <div><label>Currency</label><input type="text" id="currency" class="input-box"></div>
                <div><label>Commission ($)</label><input type="number" id="partnerCommission" class="input-box font-bold border-blue-400 bg-blue-50"></div>
                <div><label>Bank Name (BD)</label><input type="text" id="bankNameBD" class="input-box"></div>
                <div><label>Bank Type</label><input type="text" id="bankType" class="input-box"></div>
                <div><label>Loan Amount</label><input type="text" id="loanAmount" class="input-box"></div>
                <div><label>Marital Status</label><input type="text" id="maritalStatus" class="input-box"></div>
                <div><label>Study Gap</label><input type="text" id="studyGap" class="input-box"></div>
                <div><label>App Fee</label><input type="text" id="appFee" class="input-box"></div>
                <div><label>Deadline</label><input type="text" id="deadline" class="input-box"></div>
                <div><label>Scholarship</label><input type="text" id="scholarship" class="input-box"></div>
                <div><label>Work Rights</label><input type="text" id="workRights" class="input-box"></div>
                <div><label>Location</label><input type="text" id="location" class="input-box"></div>
            </div>
            <button onclick="saveUniversity()" class="mt-8 bg-blue-600 text-white px-10 py-3 rounded-lg font-bold shadow-lg uppercase text-xs">Save University</button>
        </div>

        <div id="partnerSection" class="section bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 uppercase border-b pb-2">Partner List & Info</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b">
                        <tr><th class="p-4">Partner Name</th><th class="p-4">Contact</th><th class="p-4">Org Name</th><th class="p-4">Status</th><th class="p-4">Expiry</th><th class="p-4 text-center">Action</th></tr>
                    </thead>
                    <tbody id="partnerTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="withdrawSection" class="section bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800 uppercase border-b pb-2">Payment & Subscription Control</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b">
                        <tr><th class="p-4">Partner</th><th class="p-4">Org Name</th><th class="p-4">Payment</th><th class="p-4">Subscription</th><th class="p-4 text-center">Action</th></tr>
                    </thead>
                    <tbody id="subsTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'partnerSection') loadPartners();
            if(id === 'withdrawSection') loadSubs();
        }

        async function saveUniversity() {
            const data = {};
            document.querySelectorAll('#uniForm input, #uniForm select').forEach(el => data[el.id] = el.value);
            const res = await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) alert("✅ University Saved!");
        }

        async function loadPartners() {
            const res = await fetch('/api/admin/partners');
            const partners = await res.json();
            const tbody = document.getElementById('partnerTableBody');
            tbody.innerHTML = partners.map(p => `
                <tr class="text-sm border-b hover:bg-slate-50 transition">
                    <td class="p-3"><input type="text" id="name-${p._id}" value="${p.name || ''}" class="bg-transparent w-full"></td>
                    <td class="p-3"><input type="text" id="contact-${p._id}" value="${p.contact || ''}" class="bg-transparent w-full"></td>
                    <td class="p-3"><input type="text" id="org-${p._id}" value="${p.orgName || ''}" class="bg-transparent w-full"></td>
                    <td class="p-3"><select id="status-${p._id}" class="border rounded p-1 font-bold"><option value="Active" ${p.status === 'Active' ? 'selected' : ''}>Active</option><option value="Inactive" ${p.status === 'Inactive' ? 'selected' : ''}>Inactive</option></select></td>
                    <td class="p-3"><input type="date" id="expiry-${p._id}" value="${p.expiryDate ? p.expiryDate.split('T')[0] : ''}"></td>
                    <td class="p-3 text-center"><button onclick="updateP('${p._id}', 'p')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] uppercase font-bold">Update</button></td>
                </tr>`).join('');
        }

        async function loadSubs() {
            const res = await fetch('/api/admin/partners');
            const partners = await res.json();
            const tbody = document.getElementById('subsTableBody');
            tbody.innerHTML = partners.map(p => `
                <tr class="text-sm border-b hover:bg-slate-50">
                    <td class="p-4 font-semibold">${p.name}</td>
                    <td class="p-4">${p.orgName}</td>
                    <td class="p-4"><select id="pay-${p._id}" class="border rounded p-1 text-xs"><option value="Paid" ${p.paymentStatus === 'Paid' ? 'selected' : ''}>Paid</option><option value="Due" ${p.paymentStatus === 'Due' ? 'selected' : ''}>Due</option><option value="Cancel" ${p.paymentStatus === 'Cancel' ? 'selected' : ''}>Cancel</option></select></td>
                    <td class="p-4"><select id="sub-${p._id}" class="border rounded p-1 text-xs font-bold ${p.subscriptionStatus === 'Active' ? 'text-green-600' : 'text-red-600'}"><option value="Active" ${p.subscriptionStatus === 'Active' ? 'selected' : ''}>Active</option><option value="Inactive" ${p.subscriptionStatus === 'Inactive' ? 'selected' : ''}>Inactive</option></select></td>
                    <td class="p-4 text-center"><button onclick="updateP('${p._id}', 's')" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] uppercase font-bold">Update Status</button></td>
                </tr>`).join('');
        }

        async function updateP(id, mode) {
            const data = mode === 'p' ? {
                name: document.getElementById(`name-${id}`).value,
                contact: document.getElementById(`contact-${id}`).value,
                orgName: document.getElementById(`org-${id}`).value,
                status: document.getElementById(`status-${id}`).value,
                expiryDate: document.getElementById(`expiry-${id}`).value
            } : {
                paymentStatus: document.getElementById(`pay-${id}`).value,
                subscriptionStatus: document.getElementById(`sub-${id}`).value
            };
            await fetch(`/api/admin/update-partner/${id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("✅ Information Updated!");
        }
    </script>
</body>
</html>
