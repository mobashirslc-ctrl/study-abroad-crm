<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded shadow">
        <h1 class="text-2xl font-bold mb-6">Add University Assessment Data</h1>
        <form id="uniForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="country" placeholder="Country" class="border p-2 rounded" required>
            <input type="text" id="uniName" placeholder="University Name" class="border p-2 rounded" required>
            <input type="text" id="courseName" placeholder="Course Name" class="border p-2 rounded" required>
            <input type="text" id="intake" placeholder="Intake" class="border p-2 rounded" required>
            <select id="degree" class="border p-2 rounded">
                <option>UG</option><option>PG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
            </select>
            <select id="languageType" class="border p-2 rounded">
                <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
            </select>
            <input type="text" id="academicScore" placeholder="Min Academic Score" class="border p-2 rounded">
            <input type="text" id="languageScore" placeholder="Min Language Score" class="border p-2 rounded">
            <input type="text" id="studyGap" placeholder="Study Gap Allowed" class="border p-2 rounded">
            <input type="text" id="semesterFee" placeholder="Semester Fee" class="border p-2 rounded">
            <select id="currency" class="border p-2 rounded">
                <option>DOLLAR</option><option>AUSTRALIA DOLLAR</option><option>CANADIAN DOLLAR</option><option>EURO</option><option>TAKA</option><option>UK POUND</option>
            </select>
            <select id="bankType" class="border p-2 rounded">
                <option>FDR</option><option>SAVINGS</option>
            </select>
            <select id="maritalStatus" class="border p-2 rounded">
                <option>Single</option><option>With spouse</option>
            </select>
            <input type="text" id="bankNameBD" placeholder="Bank Name Suggestion BD" class="border p-2 rounded">
            <input type="text" id="loanAmount" placeholder="Loan Amount" class="border p-2 rounded">
            <input type="text" id="partnerCommission" placeholder="Partner Commission" class="border p-2 rounded col-span-full">
            
            <button type="submit" class="bg-blue-600 text-white p-3 rounded font-bold col-span-full mt-4">SAVE UNIVERSITY DATA</button>
        </form>
    </div>

    <script>
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {};
            const inputs = e.target.querySelectorAll('input, select');
            inputs.forEach(input => { data[input.id] = input.value; });

            const res = await fetch('/api/add-uni', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("Data Saved and Locked!"); e.target.reset(); }
            else { alert("Error saving data!"); }
        });
    </script>
</body>
</html>
