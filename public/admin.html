<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHP CRM | Admin Locked</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold text-blue-900 border-b pb-3 mb-6">ADMIN: ADD UNIVERSITY (LOCKED)</h2>
        <form id="uniForm" class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div><label class="block font-bold">Country</label><input type="text" id="country" class="w-full border p-2 rounded" required></div>
            <div><label class="block font-bold">University Name</label><input type="text" id="uniName" class="w-full border p-2 rounded" required></div>
            <div><label class="block font-bold">Course Name</label><input type="text" id="courseName" class="w-full border p-2 rounded" required></div>
            <div><label class="block font-bold">Intake</label><input type="text" id="intake" class="w-full border p-2 rounded"></div>
            <div><label class="block font-bold">Degree</label><select id="degree" class="w-full border p-2 rounded"><option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option></select></div>
            <div><label class="block font-bold">Language Type</label><select id="languageType" class="w-full border p-2 rounded"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select></div>
            <div><label class="block font-bold">Academic Score</label><input type="text" id="academicScore" class="w-full border p-2 rounded"></div>
            <div><label class="block font-bold">Language Score</label><input type="text" id="languageScore" class="w-full border p-2 rounded"></div>
            <div><label class="block font-bold">Study Gap</label><input type="text" id="studyGap" class="w-full border p-2 rounded"></div>
            <div><label class="block font-bold">Semester Fee</label><input type="text" id="semesterFee" class="w-full border p-2 rounded"></div>
            <div><label class="block font-bold">Currency</label><select id="currency" class="w-full border p-2 rounded"><option>DOLLAR</option><option>EURO</option><option>TAKA</option><option>UK POUND</option></select></div>
            <div><label class="block font-bold">Bank Type</label><select id="bankType" class="w-full border p-2 rounded"><option>FDR</option><option>SAVINGS</option></select></div>
            <div><label class="block font-bold">Marital Status</label><select id="maritalStatus" class="w-full border p-2 rounded"><option>Single</option><option>With spouse</option></select></div>
            <div><label class="block font-bold">Bank Suggestion BD</label><input type="text" id="bankNameBD" class="w-full border p-2 rounded"></div>
            <div><label class="block font-bold">Loan Amount</label><input type="text" id="loanAmount" class="w-full border p-2 rounded"></div>
            <div class="md:col-span-3"><label class="block font-bold">Partner Commission</label><input type="text" id="partnerCommission" class="w-full border p-2 rounded"></div>
            <button type="submit" class="md:col-span-3 bg-blue-700 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition">SAVE & LOCK DATA</button>
        </form>
    </div>
    <script>
        document.getElementById('uniForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {};
            new FormData(e.target).forEach((value, key) => { }); // Alternative logic for safety
            const ids = ['country','uniName','courseName','intake','degree','languageType','academicScore','languageScore','studyGap','semesterFee','currency','bankType','maritalStatus','bankNameBD','loanAmount','partnerCommission'];
            ids.forEach(id => { data[id] = document.getElementById(id).value; });
            const res = await fetch('/api/add-uni', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            if(res.ok) { alert("Data Saved Successfully!"); e.target.reset(); } else { alert("Error!"); }
        });
    </script>
</body>
</html>
