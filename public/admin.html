<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f7; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
    </style>
</head>
<body>
    <h2>🎓 Master Admin Dashboard</h2>
    <table>
        <thead><tr><th>Name</th><th>Phone</th><th>File</th></tr></thead>
        <tbody id="list"></tbody>
    </table>
    <script>
        fetch('/api/get-data').then(r => r.json()).then(data => {
            document.getElementById('list').innerHTML = data.map(i => `
                <tr><td>${i.name}</td><td>${i.phone}</td><td><a href="${i.documentUrl}" target="_blank">View</a></td></tr>
            `).join('');
        });
    </script>
</body>
</html>
