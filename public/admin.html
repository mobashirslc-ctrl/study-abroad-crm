<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        .sidebar { width: 260px; background: #1a237e; color: white; height: 100vh; position: fixed; padding: 20px; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 300px); }
        .nav-btn { display: block; width: 100%; padding: 15px; text-align: left; background: none; border: none; color: white; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .nav-btn.active { background: #3949ab; font-weight: bold; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .tab-content { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>IHP CRM ADMIN</h2>
    <button class="nav-btn active" onclick="showTab(event, 'tab1')"><i class="fas fa-plus"></i> University Add</button>
    <button class="nav-btn" onclick="showTab(event, 'tab2'); loadFiles()"><i class="fas fa-file-invoice"></i> Student Tracking</button>
    <button class="nav-btn" onclick="showTab(event, 'tab3'); loadPartners()"><i class="fas fa-handshake"></i> Partner List</button>
    <button class="nav-btn" onclick="showTab(event, 'tab4')"><i class="fas fa-shield-alt"></i> Compliance Control</button>
    <button class="nav-btn" onclick="showTab(event, 'tab5')"><i class="fas fa-users-cog"></i> Team Admin</button>
</div>

<div class="main">
    <div id="tab1" class="tab-content" style="display:block;">
        <div class="card">
            <h3>🎓 Add University for Assessment</h3>
            <form id="uniForm" class="grid">
                <input type="text" name="country" placeholder="Country" required>
                <input type="text" name="uniName" placeholder="University Name" required>
                <input type="text" name="course" placeholder="Course Name">
                <input type="text" name="intake" placeholder="Intake">
                <select name="degree">
                    <option>UG</option><option>PG</option><option>DIPLOMA</option>
                    <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                </select>
                <select name="language"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                <input type="text" name="academicScore" placeholder="Academic Score Box">
                <input type="text" name="langScore" placeholder="Language Score Box">
                <input type="text" name="fee" placeholder="Semester fee per year">
                <select name="currency">
                    <option>DOLLAR</option><option>TAKA</option><option>EURO</option><option>UK POUND</option>
                </select>
                <input type="text" name="bankBalance" placeholder="Required bank balance">
                <select name="bankType"><option>FDR</option><option>SAVINGS</option></select>
                <select name="maritalStatus"><option>Single</option><option>With spouse</option></select>
                <input type="text" name="bankNameSuggestion" placeholder="Bank name suggestion">
                <input type="text" name="loanAmount" placeholder="Loan amount">
                <input type="text" name="partnerCommission" placeholder="Partner Commission">
                <button type="submit" style="grid-column: span 3; background: #1a237e; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer;">SAVE UNIVERSITY DATA</button>
            </form>
        </div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="card">
            <h3>📁 Student File Tracking</h3>
            <table>
                <thead><tr><th>Student</th><th>Contact</th><th>University</th><th>Status</th><th>Date</th></tr></thead>
                <tbody id="fileTable"></tbody>
            </table>
        </div>
    </div>

    <div id="tab3" class="tab-content">
        <div class="card">
            <h3>🤝 Partner Management</h3>
            <table>
                <thead><tr><th>Name</th><th>Organization</th><th>Status</th><th>Wallet</th><th>Subscription</th></tr></thead>
                <tbody id="partnerTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function showTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        evt.currentTarget.classList.add('active');
    }

    async function loadFiles() {
        const res = await fetch('/api/admin/files');
        const data = await res.json();
        document.getElementById('fileTable').innerHTML = data.map(f => `
            <tr><td>${f.studentName}</td><td>${f.contact}</td><td>${f.university}</td><td>${f.status}</td><td>${new Date(f.openTime).toLocaleDateString()}</td></tr>
        `).join('');
    }

    async function loadPartners() {
        const res = await fetch('/api/admin/partners');
        const data = await res.json();
        document.getElementById('partnerTable').innerHTML = data.map(p => `
            <tr><td>${p.name}</td><td>${p.orgName}</td><td>${p.status}</td><td>৳${p.wallet.total}</td><td>${p.subscription.package}</td></tr>
        `).join('');
    }

    document.getElementById('uniForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/add-uni', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(Object.fromEntries(new FormData(e.target)))
        });
        if(res.ok) alert("✅ University Added!");
    };
</script>
</body>
</html>
