<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex">
    <div class="w-64 min-h-screen bg-slate-900 border-r border-white/10 p-6">
        <h1 class="text-2xl font-bold text-blue-500 mb-10">IHP MASTER</h1>
        <nav class="space-y-4">
            <button onclick="showSec('partners')" class="w-full text-left p-3 rounded-lg hover:bg-blue-600 transition">Partner Management</button>
            <button onclick="showSec('uni')" class="w-full text-left p-3 rounded-lg hover:bg-blue-600 transition">Add University</button>
        </nav>
    </div>

    <div class="flex-1 p-8">
        <div id="sec-partners">
            <h2 class="text-2xl font-bold mb-6">Partner Requests</h2>
            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5">
                        <tr><th class="p-4">Name</th><th class="p-4">Email</th><th class="p-4">Status</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="pTable"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-uni" class="hidden">
            <h2 class="text-2xl font-bold mb-6">Add New University</h2>
            <form id="uForm" class="grid grid-cols-3 gap-4 glass p-6 rounded-xl">
                <input type="text" id="un" placeholder="Uni Name" class="bg-slate-800 p-2 rounded">
                <input type="text" id="uc" placeholder="Country" class="bg-slate-800 p-2 rounded">
                <input type="number" id="uas" placeholder="Min Academic Score %" class="bg-slate-800 p-2 rounded">
                <button type="submit" class="col-span-3 bg-blue-600 py-3 rounded font-bold">SAVE DATA</button>
            </form>
        </div>
    </div>

    <script>
        function showSec(id) {
            document.getElementById('sec-partners').classList.add('hidden');
            document.getElementById('sec-uni').classList.add('hidden');
            document.getElementById('sec-'+id).classList.remove('hidden');
        }

        async function loadP() {
            const res = await fetch('/api/admin/partners');
            const data = await res.json();
            document.getElementById('pTable').innerHTML = data.map(p => `
                <tr class="border-b border-white/5">
                    <td class="p-4">${p.name}</td>
                    <td class="p-4">${p.email}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${p.status === 'Active' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">${p.status}</span></td>
                    <td class="p-4">${p.status === 'Pending' ? `<button onclick="approve('${p._id}')" class="bg-blue-600 px-3 py-1 rounded text-sm">Approve</button>` : 'Locked'}</td>
                </tr>
            `).join('');
        }

        async function approve(id) {
            await fetch('/api/admin/partner-status/'+id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: 'Active'}) });
            loadP();
        }

        loadP();
    </script>
</body>
</html>
