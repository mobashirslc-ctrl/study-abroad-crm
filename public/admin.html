<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আপনার অরিজিনাল গ্লাস ডিজাইন */
        :root {
            --primary-green: #2ecc71;
            --deep-purple: #1a0026;
        }
        body {
            background: radial-gradient(circle at top right, #2c003e, #12001a);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(46, 204, 113, 0.2);
            height: 100vh;
            padding: 30px;
            position: fixed;
        }
        .logo-text {
            color: var(--primary-green);
            font-size: 22px;
            font-weight: 800;
            border-bottom: 2px solid var(--primary-green);
            padding-bottom: 10px;
            margin-bottom: 40px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }
        .nav-item.active, .nav-item:hover {
            background: rgba(46, 204, 113, 0.1);
            color: var(--primary-green);
            box-shadow: inset 4px 0 0 var(--primary-green);
        }
        .main-content { margin-left: 280px; flex: 1; padding: 40px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 20px;
            padding: 30px;
        }
        .btn-update {
            background: var(--primary-green);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-text">ASG GLOBAL</div>
        <a href="admin.html" class="nav-item active"><i class="fas fa-home"></i>&nbsp;&nbsp;Dashboard</a>
        <a href="partner.html" class="nav-item"><i class="fas fa-handshake"></i>&nbsp;&nbsp;Partners</a>
        <a href="compliance.html" class="nav-item"><i class="fas fa-shield-alt"></i>&nbsp;&nbsp;Compliance</a>
    </div>
    <div class="main-content">
        <div class="glass-card">
            <h2 style="color: var(--primary-green);">Admin Overview</h2>
            <p>Design 100% Restored. Yellow replaced with Brand Green.</p>
        </div>
    </div>
</body>
</html>
