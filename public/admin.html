<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; } 
        .active { display: block; }
        input, select { border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; }
    </style>
</head>
<body class="bg-slate-50 flex">

    <div class="w-64 bg-slate-900 h-screen text-white p-6 sticky top-0 shadow-2xl">
        <h1 class="text-xl font-bold mb-12 text-blue-400 border-b border-slate-700 pb-4">ADMIN PANEL</h1>
        <nav class="space-y-4">
            <button onclick="showSection('uniSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition">University Management</button>
            <button onclick="showSection('partnerSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition">Partner Management</button>
            <button onclick="showSection('complianceSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition">File Compliance</button>
        </nav>
    </div>

    <div class="flex-1 p-10">
        
        <div id="uniSection" class="section active bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-6 text-slate-800">ADD UNIVERSITY</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="uniForm">
                <input type="text" id="country" placeholder="Country">
                <input type="text" id="uniName" placeholder="University Name">
                <input type="text" id="courseName" placeholder="Course Name">
                <input type="text" id="intake" placeholder="Intake">
                <select id="degree"><option>Ug</option><option>Pg</option><option>Diploma</option></select>
                <input type="number" id="partnerCommission" placeholder="Commission ($)" class="border-blue-300 font-bold text-blue-600">
                <input type="text" id="semesterFee" placeholder="Semester Fee">
                <input type="text" id="bankNameBD" placeholder="Bank Name BD">
            </div>
            <button onclick="saveUni()" class="mt-8 bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700">SAVE UNIVERSITY</button>
        </div>

        <div id="partnerSection" class="section bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-slate-800">PARTNER LIST & UPDATE</h2>
                <button onclick="loadPartners()" class="text-blue-600 text-sm font-bold underline">Refresh List</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-[11px] uppercase text-slate-500 font-bold border-b">
                            <th class="p-3">Partner Name</th>
                            <th class="p-3">Contact</th>
                            <th class="p-3">Org Name</th>
                            <th class="p-3">Status</th>
                            <th class="p-3">Expiry</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="partnerTableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'partnerSection') loadPartners();
        }

        async function loadPartners() {
            const res = await fetch('/api/admin/partners');
            const partners = await res.json();
            const tbody = document.getElementById('partnerTableBody');
            tbody.innerHTML = partners.map(p => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-2"><input type="text" id="name-${p._id}" value="${p.name || ''}" class="!p-1"></td>
                    <td class="p-2"><input type="text" id="contact-${p._id}" value="${p.contact || ''}" class="!p-1"></td>
                    <td class="p-2"><input type="text" id="org-${p._id}" value="${p.orgName || ''}" class="!p-1"></td>
                    <td class="p-2">
                        <select id="status-${p._id}" class="!p-1">
                            <option value="Active" ${p.status === 'Active' ? 'selected' : ''}>Active</option>
                            <option value="Inactive" ${p.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                        </select>
                    </td>
                    <td class="p-2"><input type="date" id="expiry-${p._id}" value="${p.expiryDate ? p.expiryDate.split('T')[0] : ''}" class="!p-1"></td>
                    <td class="p-2 text-center"><button onclick="updatePartner('${p._id}')" class="bg-green-600 text-white px-3 py-1 rounded text-xs">UPDATE</button></td>
                </tr>
            `).join('');
        }

        async function updatePartner(id) {
            const data = {
                name: document.getElementById(`name-${id}`).value,
                contact: document.getElementById(`contact-${id}`).value,
                orgName: document.getElementById(`org-${id}`).value,
                status: document.getElementById(`status-${id}`).value,
                expiryDate: document.getElementById(`expiry-${id}`).value
            };
            const res = await fetch(`/api/admin/update-partner/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("✅ Partner Status Updated!");
        }

        async function saveUni() {
            const data = {};
            document.querySelectorAll('#uniForm input, #uniForm select').forEach(el => data[el.id] = el.value);
            const res = await fetch('/api/admin/add-university', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) alert("✅ University Added!");
        }
    </script>
</body>
</html>
