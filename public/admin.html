<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #facc15; --bg-dark: #0a0a0b; --card-bg: #111113; --border: #27272a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: #fff; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: var(--card-bg); border-right: 1px solid var(--border); position: fixed; padding: 20px; }
        .nav-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 8px; color: #a1a1aa; text-decoration: none; transition: 0.2s; }
        .nav-item.active { background: var(--border); color: var(--accent); }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .glass-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #71717a; margin-bottom: 8px; }
        .form-group input, .form-group select { background: #18181b; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; outline: none; }
        .form-group input:focus { border-color: var(--accent); }
        .btn-submit { grid-column: span 3; background: var(--accent); color: #000; font-weight: bold; padding: 15px; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent);">ASG Global</h2>
        <a href="admin.html" class="nav-item active"><i class="fas fa-university"></i> University Entry</a>
        <a href="partner.html" class="nav-item"><i class="fas fa-handshake"></i> Partners</a>
        <a href="compliance.html" class="nav-item"><i class="fas fa-shield-alt"></i> Compliance</a>
    </div>
    <div class="main">
        <div class="glass-card">
            <h3>Add New University (Master Entry)</h3>
            <div class="form-grid">
                <div class="form-group"><label>University Name</label><input type="text" id="uni-name"></div>
                <div class="form-group"><label>Country</label><input type="text" id="uni-country"></div>
                <div class="form-group"><label>Location</label><input type="text" id="uni-location"></div>
                <div class="form-group"><label>Intake Month</label><input type="text" id="uni-month"></div>
                <div class="form-group"><label>Intake Year</label><input type="text" id="uni-year"></div>
                <div class="form-group"><label>Course Level</label><input type="text" id="uni-level"></div>
                <div class="form-group"><label>Course Name</label><input type="text" id="uni-course"></div>
                <div class="form-group"><label>Tuition Fee</label><input type="text" id="uni-fee"></div>
                <div class="form-group"><label>Scholarship</label><input type="text" id="uni-scholarship"></div>
                <div class="form-group"><label>Final Fee</label><input type="text" id="uni-final-fee"></div>
                <div class="form-group"><label>Initial Deposit</label><input type="text" id="uni-deposit"></div>
                <div class="form-group"><label>IELTS Requirement</label><input type="text" id="uni-ielts"></div>
                <div class="form-group"><label>Alternative English</label><input type="text" id="uni-alt"></div>
                <div class="form-group"><label>MOI Status</label><input type="text" id="uni-moi"></div>
                <div class="form-group"><label>Academic Requirement</label><input type="text" id="uni-academic"></div>
                <div class="form-group"><label>Gap Acceptability</label><input type="text" id="uni-gap"></div>
                <div class="form-group"><label>Application Fee</label><input type="text" id="uni-app-fee"></div>
                <div class="form-group"><label>Commission</label><input type="text" id="uni-commission"></div>
                <div class="form-group"><label>Processing Time</label><input type="text" id="uni-time"></div>
                <div class="form-group"><label>Contact Person</label><input type="text" id="uni-contact"></div>
                <div class="form-group"><label>Notes</label><input type="text" id="uni-notes"></div>
                <button class="btn-submit">SAVE TO SYSTEM</button>
            </div>
        </div>
    </div>
</body>
</html>
