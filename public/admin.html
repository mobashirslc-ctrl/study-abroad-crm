<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Restoring your Original Glassmorphism & Purple Theme */
        :root {
            --brand-green: #2ecc71;
            --brand-purple: #2c003e;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(46, 204, 113, 0.2);
        }

        body {
            background: radial-gradient(circle at top right, #3d005e, #1a0026);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .dashboard-container { display: flex; min-height: 100vh; }

        /* Sidebar Design Restored */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 25px;
        }

        .logo-area {
            font-size: 24px;
            font-weight: bold;
            color: var(--brand-green);
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--brand-green);
            padding-bottom: 15px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 15px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(46, 204, 113, 0.15);
            color: var(--brand-green);
            box-shadow: inset 4px 0 0 var(--brand-green);
        }

        .nav-link i { margin-right: 15px; width: 20px; }

        /* Main Glass Card Area */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-green {
            background: var(--brand-green);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-green:hover {
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-area">ASG ADMIN</div>
            <nav>
                <a href="#" class="nav-link active"><i class="fas fa-th-large"></i> Overview</a>
                <a href="#" class="nav-link"><i class="fas fa-university"></i> Universities</a>
                <a href="#" class="nav-link"><i class="fas fa-handshake"></i> Partners</a>
                <a href="#" class="nav-link"><i class="fas fa-shield-alt"></i> Compliance</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="glass-card">
                <h1>Welcome, Admin</h1>
                <p>All links are fixed. System ready for Part 1 Data Implementation.</p>
                <div id="fb-status" style="color: var(--brand-green);">● Firebase System: Online</div>
            </div>
        </main>
    </div>
</body>
</html>
