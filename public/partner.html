<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
        .status-fixed { color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 2px 8px; border-radius: 4px; }
        .status-pending { color: #f59e0b; background: rgba(245, 158, 11, 0.1); padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8 glass p-6">
            <div><h1 class="text-2xl font-bold">IHP Partner Portal</h1><p class="text-slate-400" id="pName">Welcome</p></div>
            <div class="text-right"><p class="text-xs text-slate-400">Total Fixed Balance</p><p class="text-2xl font-bold text-emerald-400">$<span id="pWallet">0.00</span></p></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-6 h-fit">
                <h2 class="text-lg font-bold mb-4 border-b border-white/10 pb-2">Smart Assessment</h2>
                <div class="space-y-4">
                    <select id="sDegree"><option>PG</option><option>UG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>PHD</option></select>
                    <select id="sLang"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                    <input type="text" id="sScore" placeholder="Language Score">
                    <input type="text" id="sGpa" placeholder="Academic Score (GPA)">
                    <button onclick="runAssessment()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">FIND UNIVERSITIES</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-6">
                    <h2 class="text-lg font-bold mb-4">Matching Results</h2>
                    <div id="resultsArea" class="space-y-4"><p class="text-slate-500 text-center py-10">Search to see eligible courses.</p></div>
                </div>

                <div class="glass p-6">
                    <h2 class="text-lg font-bold mb-4">Commission History (Escrow)</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead><tr class="text-slate-500 border-b border-white/10"><th class="pb-2">Student</th><th class="pb-2">University</th><th class="pb-2">Amount</th><th class="pb-2">Status</th></tr></thead>
                            <tbody id="historyArea"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass p-8 w-full max-w-md bg-slate-900">
            <h2 class="text-xl font-bold mb-4">Open Student File</h2>
            <div class="space-y-4">
                <input type="text" id="stName" placeholder="Student Name">
                <input type="text" id="stContact" placeholder="Contact Number">
                <input type="text" id="stPassport" placeholder="Passport Number">
                <input type="email" id="stEmail" placeholder="Student Email">
                <p class="text-xs text-amber-400">Note: Commission will stay "Pending" until Compliance verification.</p>
                <button onclick="submitFile()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold">SUBMIT APPLICATION</button>
                <button onclick="document.getElementById('fileModal').classList.add('hidden')" class="w-full text-slate-500">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const pId = localStorage.getItem('partnerId');
        document.getElementById('pName').innerText = "Welcome, " + localStorage.getItem('partnerName');
        
        async function loadDashboard() {
            const res = await fetch('/api/partner/history/' + pId);
            const data = await res.json();
            document.getElementById('historyArea').innerHTML = data.map(h => `
                <tr class="border-b border-white/5"><td class="py-3">${h.studentName}</td><td>${h.uniName}</td><td>$${h.commission}</td>
                <td><span class="status-${h.status.toLowerCase()}">${h.status}</span><br><small class="text-slate-500">${h.complianceStatus}</small></td></tr>
            `).join('');
        }

        async function runAssessment() {
            const res = await fetch('/api/universities');
            const unis = await res.json();
            const filtered = unis.filter(u => u.degreeType === document.getElementById('sDegree').value);
            document.getElementById('resultsArea').innerHTML = filtered.map(u => `
                <div class="glass p-4 border-l-4 border-blue-500">
                    <div class="flex justify-between">
                        <div><h3 class="font-bold text-blue-300">${u.uniName}</h3><p class="text-xs text-slate-400">${u.courseName}</p></div>
                        <button onclick="openForm('${u.uniName}', ${u.partnerCommission})" class="bg-white/10 px-4 py-2 rounded text-xs hover:bg-white/20">Open File & Commission</button>
                    </div>
                </div>
            `).join('');
        }

        let currentUni = null;
        function openForm(name, comm) { currentUni = {name, comm}; document.getElementById('fileModal').classList.remove('hidden'); }

        async function submitFile() {
            const body = {
                partnerId: pId, studentName: document.getElementById('stName').value,
                contactNo: document.getElementById('stContact').value, passportNo: document.getElementById('stPassport').value,
                studentEmail: document.getElementById('stEmail').value, uniName: currentUni.name, commission: currentUni.comm
            };
            await fetch('/api/partner/submit-file', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("File Submitted!"); location.reload();
        }
        loadDashboard();
    </script>
</body>
</html>
