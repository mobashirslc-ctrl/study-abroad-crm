<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC Partner Portal | Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #060212; --border: rgba(46, 204, 113, 0.2); --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar isolation fix */
        .sidebar { width: 70px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; flex-shrink: 0; z-index: 10; }
        .nav-item { color: #444; font-size: 20px; margin-bottom: 30px; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 10px; }
        .nav-item.active { color: var(--accent); background: rgba(46, 204, 113, 0.1); }

        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 30px; box-sizing: border-box; position: relative; }
        .glass-box { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }

        /* Form Design */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        
        /* PDF Upload UI */
        .file-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .file-card { border: 1px dashed var(--border); padding: 15px; text-align: center; border-radius: 10px; font-size: 11px; cursor: pointer; background: rgba(46, 204, 113, 0.02); }
        .file-card input { display: none; }
        .file-card i { font-size: 20px; margin-bottom: 5px; color: var(--accent); }

        .btn-submit { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.01); background: #27ae60; }

        /* Table */
        .table-wrapper { overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: var(--accent); font-size: 11px; padding: 15px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .status-pill { padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; background: rgba(46, 204, 113, 0.2); color: var(--accent); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showTab('track', this)"><i class="fas fa-list-ul"></i></div>
        <div class="nav-item" onclick="logout()" style="margin-top:auto; color:#ff4d4d;"><i class="fas fa-sign-out-alt"></i></div>
    </aside>

    <main class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <img src="logo.jpeg" height="45" alt="Logo">
            <div style="text-align: right;">
                <b id="pBrand" style="color:var(--accent)">GORUN LTD.</b><br>
                <small id="pMail" style="color:#666; font-size: 11px;"></small>
            </div>
        </div>

        <section id="home" class="section active">
            <div class="glass-box">
                <h3 style="margin-top:0"><i class="fas fa-user-plus"></i> New Application Submission</h3>
                <div class="form-grid">
                    <input type="text" id="sName" placeholder="Student Name">
                    <input type="text" id="sPass" placeholder="Passport Number">
                </div>
                
                <div class="file-section">
                    <label class="file-card">
                        <i class="fas fa-id-card"></i><br>Passport PDF
                        <input type="file" id="pdf1" accept=".pdf">
                    </label>
                    <label class="file-card">
                        <i class="fas fa-graduation-cap"></i><br>Academic PDF
                        <input type="file" id="pdf2" accept=".pdf">
                    </label>
                    <label class="file-card">
                        <i class="fas fa-language"></i><br>Language PDF
                        <input type="file" id="pdf3" accept=".pdf">
                    </label>
                </div>
                <button class="btn-submit" onclick="submitApp()">SEND TO COMPLIANCE</button>
            </div>

            <div class="glass-box">
                <h3><i class="fas fa-bolt"></i> Real-time Queue</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Student</th><th>Passport</th><th>Status</th><th>Handled By</th></tr>
                        </thead>
                        <tbody id="queueTable">
                            <tr><td colspan="4" style="text-align:center; padding:30px; color:#555;">Connecting to live database...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="track" class="section">
            <div class="glass-box">
                <h3><i class="fas fa-history"></i> Submission History</h3>
                <div class="table-wrapper" id="historyContent">
                    </div>
            </div>
        </section>
    </main>

    <div id="successModal" class="modal">
        <div style="background:#fff; color:#000; padding:40px; border-radius:20px; text-align:center; width:320px;">
            <i class="fas fa-check-circle" style="font-size:60px; color:var(--accent)"></i>
            <h2 style="margin:15px 0 5px;">Submitted!</h2>
            <p id="confirmStudent" style="font-weight:bold;"></p>
            <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0;"></div>
            <button class="btn-submit" onclick="location.reload()">CLOSE</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. Auth Status & Live Sync
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('pMail').innerText = user.email;
                syncQueue();
            } else {
                window.location.href = 'index.html';
            }
        });

        // 2. Tab Switching Logic
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // 3. Real-time Queue & History Sync
        function syncQueue() {
            db.ref('applications').on('value', snapshot => {
                const table = document.getElementById('queueTable');
                table.innerHTML = "";
                if(!snapshot.exists()) {
                    table.innerHTML = "<tr><td colspan='4' style='text-align:center'>No applications found.</td></tr>";
                    return;
                }
                snapshot.forEach(child => {
                    const d = child.val();
                    table.innerHTML += `
                        <tr>
                            <td>${d.studentName}</td>
                            <td>${d.passport}</td>
                            <td><span class="status-pill">${d.compliance || 'PENDING'}</span></td>
                            <td><i class="fas fa-user-shield"></i> ${d.handledBy || 'Wait...'}</td>
                        </tr>
                    `;
                });
            });
        }

        // 4. Data Submission
        function submitApp() {
            const name = document.getElementById('sName').value;
            const pass = document.getElementById('sPass').value;
            if(!name || !pass) return alert("Please enter Student Name & Passport!");

            const appId = Date.now();
            db.ref('applications/' + appId).set({
                studentName: name,
                passport: pass,
                partnerOrg: "GORUN LTD.",
                compliance: "UNCLAIMED",
                handledBy: "",
                timestamp: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('successModal').style.display = 'flex';
                document.getElementById('confirmStudent').innerText = name;
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: pass, width: 120, height: 120 });
            });
        }

        function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
    </script>
</body>
</html>
