<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Accurate Dashboard Styling */
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; overflow-x: hidden; min-height: 100vh; }
        
        .sidebar { width: 260px; height: 100vh; background: #0d001a; border-right: 1px solid var(--border); position: fixed; padding: 20px; z-index: 1000; }
        .logo img { width: 150px; margin-bottom: 30px; background: white; padding: 10px; border-radius: 8px; }
        .nav-item { padding: 15px; margin-bottom: 8px; cursor: pointer; border-radius: 10px; transition: 0.3s; color: #ccc; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--gold); border: 1px solid var(--border); }

        .wrapper { margin-left: 260px; width: calc(100% - 260px); }
        .top-bar { padding: 15px 30px; background: var(--glass); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main { padding: 30px; }
        .section { display: none; }
        .active-section { display: block !important; }

        .card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .reg-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(241,196,15,0.4); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 15px; color: var(--gold); background: rgba(255,255,255,0.05); font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .submitted { background: #3498db; } .verified { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-search-location"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Earning</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <div>Welcome, <span id="welcomeName" style="color:var(--gold); font-weight:bold;">Partner</span></div>
            <button onclick="logout()" style="background:#ff4757; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="main">
            <div id="home" class="section active-section">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div class="card" style="border-left: 5px solid var(--gold);">
                        <p style="font-size: 12px; color:#aaa; margin:0;">PENDING COMMISSION</p>
                        <h2 id="topPending" style="color:var(--gold); margin:10px 0;">৳0</h2>
                    </div>
                    <div class="card" style="border-left: 5px solid #2ecc71;">
                        <p style="font-size: 12px; color:#aaa; margin:0;">FINAL BALANCE</p>
                        <h2 id="topFinal" style="color:#2ecc71; margin:10px 0;">৳0</h2>
                    </div>
                </div>
                <div class="card">
                    <h3 style="color:var(--gold); margin-top:0;">Recent Applications</h3>
                    <table id="homeTable">
                        <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="homeTrackingBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="assessment" class="section">
                <div class="card">
                    <h3 style="color:var(--gold); margin-top:0;">Search University</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 120px; gap: 10px;">
                        <input type="text" id="fCountry" placeholder="Country (e.g. UK)" class="reg-input">
                        <select id="fDegree" class="reg-input">
                            <option value="">Any Degree</option>
                            <option value="Bachelor">Bachelor</option>
                            <option value="Master">Master</option>
                        </select>
                        <button onclick="searchUniversity()" class="btn-gold" style="height:45px;">SEARCH</button>
                    </div>
                </div>
                <div id="searchResultArea" class="card" style="display:none;">
                    <table id="uniTable">
                        <thead><tr><th>University</th><th>Degree</th><th>Country</th><th>Commission</th><th>Action</th></tr></thead>
                        <tbody id="uniListContainer"></tbody>
                    </table>
                </div>
            </div>

            <div id="tracking" class="section">
                <div class="card">
                    <h3 style="color:var(--gold); margin-top:0;">Application History</h3>
                    <table>
                        <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="sidebarTrackingBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="card" style="width: 550px; border: 1px solid var(--gold);">
            <h2 style="color:var(--gold); margin-top:0;">Apply for <span id="targetUni">...</span></h2>
            <form id="applyForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="sName" placeholder="Student Full Name" class="reg-input" required>
                    <input type="text" id="sPassport" placeholder="Passport Number" class="reg-input" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:10px;">
                    <div><label style="font-size:10px; color:#aaa;">Passport Copy (PDF)</label><input type="file" id="pdf1" accept=".pdf" class="reg-input" required></div>
                    <div><label style="font-size:10px; color:#aaa;">Academic Docs (PDF)</label><input type="file" id="pdf2" accept=".pdf" class="reg-input" required></div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" id="submitBtn" class="btn-gold" style="flex:2;">CONFIRM SUBMISSION</button>
                    <button type="button" onclick="closeModal()" style="flex:1; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk",
            authDomain: "ihp-portal-v3.firebaseapp.com",
            projectId: "ihp-portal-v3",
            storageBucket: "ihp-portal-v3.firebasestorage.app",
            messagingSenderId: "481157902534",
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const partnerEmail = localStorage.getItem('userEmail') || "gorunbangladesh@gmail.com";

        // ১. সরাসরি PDF আপলোড লজিক (Cloudinary)
        async function uploadPDF(file) {
            if(!file) return "";
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'scc_docs'); 
            const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            return data.secure_url;
        }

        // ২. লাইভ ডাটা লোড
        onSnapshot(query(collection(db, "applications"), where("partnerEmail", "==", partnerEmail)), (snap) => {
            let pending = 0, final = 0, rows = "";
            snap.forEach(doc => {
                const d = doc.data();
                if (d.status === "verified") pending += Number(d.partnerComm || 0);
                if (d.walletStatus === "paid") final += Number(d.partnerComm || 0);
                rows += `<tr><td><b>${d.studentName}</b><br><small>${d.university}</small></td><td>${d.passportNo}</td><td><span class="status-pill ${d.status}">${d.status}</span></td><td>${d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString() : 'Now'}</td></tr>`;
            });
            document.getElementById('topPending').innerText = `৳${pending}`;
            document.getElementById('topFinal').innerText = `৳${final}`;
            document.getElementById('homeTrackingBody').innerHTML = rows || "<tr><td colspan='4'>No applications found.</td></tr>";
            document.getElementById('sidebarTrackingBody').innerHTML = rows;
        });

        // ৩. সার্চ ফিল্টার (Fix: Assessment grid)
        window.searchUniversity = async () => {
            const country = document.getElementById('fCountry').value.toLowerCase();
            const degree = document.getElementById('fDegree').value;
            const container = document.getElementById('uniListContainer');
            document.getElementById('searchResultArea').style.display = "block";
            container.innerHTML = "Searching...";
            
            const snap = await getDocs(collection(db, "universities"));
            let html = "";
            snap.forEach(doc => {
                const u = doc.data();
                if ((!country || u.country.toLowerCase().includes(country)) && (!degree || u.degree === degree)) {
                    html += `<tr><td>${u.name}</td><td>${u.degree}</td><td>${u.country}</td><td>৳${u.partnerComm}</td><td><button onclick="openApplyModal('${u.name}', '${u.partnerComm}')" class="btn-gold" style="padding:5px 10px; font-size:10px;">APPLY</button></td></tr>`;
                }
            });
            container.innerHTML = html || "<tr><td colspan='5'>No results found</td></tr>";
        };

        // ৪. সাবমিশন লজিক (PDF Mapping Fixed)
        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "UPLOADING PDF..."; btn.disabled = true;

            try {
                const url1 = await uploadPDF(document.getElementById('pdf1').files[0]);
                const url2 = await uploadPDF(document.getElementById('pdf2').files[0]);

                await addDoc(collection(db, "applications"), {
                    studentName: document.getElementById('sName').value,
                    passportNo: document.getElementById('sPassport').value,
                    university: window.selectedUni,
                    partnerComm: Number(window.selectedComm),
                    partnerEmail: partnerEmail,
                    status: "submitted",
                    pdf1: url1, pdf2: url2, // Compliance Dashboard Fix
                    walletStatus: "pending",
                    createdAt: serverTimestamp()
                });
                alert("Success! Documents Uploaded.");
                closeModal();
            } catch (err) { alert(err.message); }
            btn.innerText = "CONFIRM SUBMISSION"; btn.disabled = false;
        };

        window.openApplyModal = (uni, comm) => {
            document.getElementById('targetUni').innerText = uni;
            document.getElementById('applyModal').style.display = "flex";
            window.selectedUni = uni; window.selectedComm = comm;
        };
        window.closeModal = () => document.getElementById('applyModal').style.display = "none";
        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };
        window.logout = () => { localStorage.clear(); location.href = 'index.html'; };
    </script>
</body>
</html>
