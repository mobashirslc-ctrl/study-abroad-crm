<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item { transition: 0.3s; border-radius: 12px; cursor: pointer; padding: 15px; margin-bottom: 5px; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .content-section { display: none; height: calc(100vh - 40px); overflow-y: auto; padding: 20px; }
        .content-section.active { display: block; }
        input, select { background: #161b2a; border: 1px solid #2d364d; color: white; padding: 10px; border-radius: 8px; width: 100%; outline: none; }
    </style>
</head>
<body class="flex">

    <div class="w-64 h-screen glass border-r border-white/5 flex flex-col p-4">
        <div class="mb-10 px-2">
            <h1 class="text-xl font-bold text-blue-400">IHP GLOBAL</h1>
            <p class="text-[10px] text-slate-500 uppercase">Partner Dashboard</p>
        </div>

        <nav class="flex-1">
            <div onclick="showSection('assessment')" class="sidebar-item active"><i class="fa-solid fa-search mr-2"></i> Assessment</div>
            <div onclick="showSection('history')" class="sidebar-item"><i class="fa-solid fa-list mr-2"></i> Commission History</div>
            <div onclick="showSection('wallet')" class="sidebar-item"><i class="fa-solid fa-wallet mr-2"></i> My Wallet</div>
        </nav>

        <div class="mt-auto space-y-2">
            <div class="glass p-3 rounded-xl border-l-4 border-amber-500">
                <p class="text-[9px] text-slate-500 uppercase">Pending Commission</p>
                <p class="text-md font-bold text-amber-500">$<span id="pPending">0.00</span></p>
            </div>
            <div class="glass p-3 rounded-xl border-l-4 border-emerald-500">
                <p class="text-[9px] text-slate-500 uppercase">Final Wallet</p>
                <p class="text-md font-bold text-emerald-500">$<span id="pFinal">0.00</span></p>
            </div>
        </div>
    </div>

    <div class="flex-1">
        
        <div id="assessment" class="content-section active">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="glass p-6 rounded-2xl space-y-4 h-fit">
                    <h2 class="font-bold text-blue-400 mb-2 underline">Search Criteria</h2>
                    <div><label class="text-[10px] text-slate-500">Target Country</label><input type="text" id="sCountry" placeholder="e.g. UK"></div>
                    <div><label class="text-[10px] text-slate-500">Degree</label>
                        <select id="sDegree"><option>PG</option><option>UG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>PHD</option></select>
                    </div>
                    <div><label class="text-[10px] text-slate-500">Academic GPA</label><input type="text" id="sGpa" placeholder="e.g. 3.50"></div>
                    <div><label class="text-[10px] text-slate-500">Language Test</label>
                        <select id="sLang"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option><option>MOI</option></select>
                    </div>
                    <div><label class="text-[10px] text-slate-500">Language Score</label><input type="text" id="sScore" placeholder="e.g. 6.5"></div>
                    <button onclick="runAssessment()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mt-2">FIND COURSES</button>
                </div>

                <div class="lg:col-span-3">
                    <div id="resultsArea" class="space-y-4">
                        <div class="glass p-20 text-center text-slate-500 rounded-2xl">Enter details to generate results</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="history" class="content-section">
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-bold mb-6">Commission & File History</h2>
                <div id="historyList" class="space-y-3"></div>
            </div>
        </div>

        <div id="wallet" class="content-section">
            <div class="grid grid-cols-2 gap-6 max-w-2xl mx-auto mt-20">
                <div class="glass p-10 rounded-3xl text-center border-t-4 border-amber-500">
                    <p class="text-slate-500 mb-2">Pending Box</p>
                    <p class="text-4xl font-bold text-amber-500">$<span id="pPendingBig">0.00</span></p>
                </div>
                <div class="glass p-10 rounded-3xl text-center border-t-4 border-emerald-500">
                    <p class="text-slate-500 mb-2">Final Commission</p>
                    <p class="text-4xl font-bold text-emerald-500">$<span id="pFinalBig">0.00</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="glass p-8 w-full max-w-md rounded-3xl">
            <h2 class="text-xl font-bold mb-4">Student Details</h2>
            <div class="space-y-3">
                <input type="text" id="stName" placeholder="Student Name">
                <input type="text" id="stContact" placeholder="Contact Number">
                <input type="text" id="stPassport" placeholder="Passport No">
                <input type="email" id="stEmail" placeholder="Email Address">
                <button onclick="submitFile()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold">SUBMIT TO PENDING BOX</button>
                <button onclick="document.getElementById('fileModal').classList.add('hidden')" class="w-full text-slate-500 mt-2">Close</button>
            </div>
        </div>
    </div>

    <script>
        const pId = localStorage.getItem('partnerId');
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function loadData() {
            const res = await fetch('/api/partner/details/' + pId);
            const p = await res.json();
            document.getElementById('pPending').innerText = p.pendingBalance.toFixed(2);
            document.getElementById('pFinal').innerText = p.walletBalance.toFixed(2);
            document.getElementById('pPendingBig').innerText = p.pendingBalance.toFixed(2);
            document.getElementById('pFinalBig').innerText = p.walletBalance.toFixed(2);

            const hRes = await fetch('/api/partner/history/' + pId);
            const history = await hRes.json();
            document.getElementById('historyList').innerHTML = history.map(h => `
                <div class="glass p-4 rounded-xl flex justify-between items-center">
                    <div><p class="font-bold">${h.studentName}</p><p class="text-[10px] text-slate-500">${h.uniName}</p></div>
                    <div class="text-right"><p class="font-bold text-blue-400">$${h.commission}</p><p class="text-[10px] text-amber-500">${h.status}</p></div>
                </div>
            `).join('');
        }

        async function runAssessment() {
            const res = await fetch('/api/universities');
            const unis = await res.json();
            const filtered = unis.filter(u => u.degreeType === document.getElementById('sDegree').value);
            
            document.getElementById('resultsArea').innerHTML = filtered.map(u => `
                <div class="glass p-6 rounded-2xl border-l-4 border-blue-500 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full flex justify-between">
                        <h3 class="text-xl font-bold text-blue-400">${u.uniName}</h3>
                        <button onclick="openForm('${u.uniName}', ${u.partnerCommission})" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">Open File</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[11px]">
                        <p><span class="text-slate-500">Country:</span> ${u.country}</p>
                        <p><span class="text-slate-500">Location:</span> ${u.location}</p>
                        <p><span class="text-slate-500">Course:</span> ${u.courseName}</p>
                        <p><span class="text-slate-500">Intake:</span> ${u.intake}</p>
                        <p><span class="text-slate-500">Duration:</span> ${u.duration}</p>
                        <p><span class="text-slate-500">Semester Fee:</span> ${u.semesterFee}</p>
                        <p><span class="text-slate-500">Total Fee:</span> ${u.totalFee}</p>
                        <p><span class="text-slate-500">Bank Req:</span> ${u.bankNameBD}</p>
                        <p><span class="text-slate-500">Loan:</span> ${u.loanAmount}</p>
                        <p><span class="text-slate-500">Marital:</span> ${u.maritalStatus}</p>
                        <p><span class="text-emerald-400">Commission:</span> $${u.partnerCommission}</p>
                    </div>
                </div>
            `).join('');
        }

        let curUni = null;
        function openForm(n, c) { curUni={n,c}; document.getElementById('fileModal').classList.remove('hidden'); }

        async function submitFile() {
            const body = {
                partnerId: pId, studentName: document.getElementById('stName').value,
                contactNo: document.getElementById('stContact').value, passportNo: document.getElementById('stPassport').value,
                studentEmail: document.getElementById('stEmail').value, uniName: curUni.n, commission: curUni.c
            };
            await fetch('/api/partner/submit-file', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert("Sent to Pending Box!"); location.reload();
        }
        loadData();
    </script>
</body>
</html>
