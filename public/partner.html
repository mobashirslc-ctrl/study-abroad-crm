<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.section { display: none; } .active { display: block; }</style>
</head>
<body class="bg-gray-100 flex">
    <div class="w-64 bg-[#0f172a] h-screen text-white p-6 sticky top-0">
        <h1 class="text-xl font-bold mb-8">PARTNER MASTER</h1>
        <div class="mb-6 p-4 bg-slate-800 rounded">
            <p class="text-[10px] text-gray-400">WALLET BALANCE</p>
            <h2 id="wallet" class="text-xl font-bold text-green-400">$0.00</h2>
        </div>
        <nav class="space-y-4">
            <button onclick="show('assess')" class="w-full text-left">🔍 Assessment Tool</button>
            <button onclick="show('track')" class="w-full text-left">📂 File Tracking</button>
        </nav>
    </div>

    <div class="flex-1 p-10">
        <div id="assess" class="section active bg-white p-8 rounded shadow">
            <h2 class="font-bold mb-6 border-b pb-2">PART 2: SMART ASSESSMENT</h2>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <input id="c" placeholder="Country" class="border p-2 rounded">
                <select id="d" class="border p-2 rounded"><option>UG</option><option>PG</option><option>DIPLOMA</option></select>
                <button onclick="search()" class="bg-blue-600 text-white rounded font-bold">SEARCH</button>
            </div>
            <div id="results" class="space-y-4"></div>
        </div>

        <div id="track" class="section bg-white p-8 rounded shadow">
            <h2 class="font-bold mb-6 border-b pb-2">PART 3: FILE TRACKING</h2>
            <table class="w-full text-left text-sm">
                <thead><tr class="bg-gray-50 uppercase text-[10px]">
                    <th class="p-4">Student</th><th class="p-4">Contact</th><th class="p-4">Status</th><th class="p-4">Date</th>
                </tr></thead>
                <tbody id="trackTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const pId = "YOUR_ID"; // লগইন করার পর এটি সেট হবে

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function search() {
            const res = await fetch('/api/partner/assessment', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ country: document.getElementById('c').value, degree: document.getElementById('d').value })
            });
            const unis = await res.json();
            document.getElementById('results').innerHTML = unis.map(u => `
                <div class="p-6 border rounded-xl flex justify-between bg-slate-50">
                    <div>
                        <h4 class="font-bold text-blue-800">${u.uniName}</h4>
                        <p class="text-xs text-gray-500">${u.location} | ${u.country}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-green-600 font-bold mb-2">Commission: $${u.partnerCommission}</p>
                        <button onclick="openFile('${u.uniName}', ${u.partnerCommission})" class="bg-blue-600 text-white px-4 py-2 rounded text-xs">OPEN FILE</button>
                    </div>
                </div>`).join('');
        }

        async function openFile(name, comm) {
            const sName = prompt("Enter Student Name:");
            if(!sName) return;
            const res = await fetch('/api/partner/open-file', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ partnerId: pId, studentName: sName, uniName: name, commission: comm })
            });
            if(res.ok) alert("File Opened & Commission Added to Wallet!");
        }
    </script>
</body>
</html>
