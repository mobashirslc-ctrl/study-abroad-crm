<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        .section { display: none; }
        .active-section { display: block !important; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .submitted { background: #3498db; color: white; }
        .active { background: #2ecc71; color: white; }
        .pending { background: #f1c40f; color: black; }
        .rejected { background: #ff4757; color: white; }
        
        .assessment-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: flex-end; }
        .reg-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 5px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }

        /* BACKUP SAFE PRINT LOGIC */
        @media print {
            body * { visibility: hidden; }
            #receiptModal, #receiptModal * { visibility: visible; }
            #receiptModal { 
                position: absolute !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 100% !important; 
                display: flex !important; 
                background: white !important;
                justify-content: center !important;
            }
            .no-print { display: none !important; }
            .receipt-container { box-shadow: none !important; border: 1px solid #eee !important; margin: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-search-location"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Earning</div>
        <div class="nav-item" onclick="showTab('profile', this)"><i class="fas fa-user-circle"></i> Profile</div>
    </div>

    <div class="wrapper">
        <div class="top-bar" style="display: flex; justify-content: space-between; padding: 15px 30px; background: var(--glass); border-bottom: 1px solid var(--border);">
            <div>Welcome, <span id="welcomeName" style="color:var(--gold); font-weight:bold;">Partner</span></div>
            <button onclick="logout()" style="background:#ff4757; color:white; padding:5px 15px; border:none; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="main">
            <div id="home" class="section active-section">
                <div class="wallet-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div class="wallet-box" style="background:var(--glass); padding:20px; border-radius:15px; border:1px solid var(--border);"><p>PENDING COMMISSION</p><h2 id="topPending">৳0</h2></div>
                    <div class="wallet-box" style="background:var(--glass); padding:20px; border-radius:15px; border:1px solid var(--border);"><p>FINAL BALANCE</p><h2 id="topFinal">৳0</h2></div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom:15px; color:var(--gold);">Recent Applications</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Docs</th><th>Date</th></tr></thead>
                            <tbody id="homeTrackingBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="modal-content" style="background: #111; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; border: 1px solid var(--border);">
            <h2 id="modalUniName" style="color:var(--gold); margin-bottom:15px;"></h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="appSName" placeholder="Student Name" class="reg-input">
                <input type="text" id="appSPhone" placeholder="Phone Number" class="reg-input">
                <input type="text" id="appSPass" placeholder="Passport Number" class="reg-input">
            </div>
            <div style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label style="font-size:11px; color:#aaa;">Academic Docs</label><input type="file" id="fileAcad" class="reg-input"></div>
                <div><label style="font-size:11px; color:#aaa;">Passport Copy</label><input type="file" id="filePass" class="reg-input"></div>
            </div>
            <button id="submitAppBtn" class="btn-gold" style="width:100%; margin-top:25px;">CONFIRM ENROLLMENT</button>
            <button onclick="closeModal()" style="margin-top:10px; background:none; color:white; border:none; cursor:pointer; width:100%;">Close</button>
        </div>
    </div>

    <div id="receiptModal" class="modal" style="display: none; z-index: 3000;">
        <div class="receipt-container" style="background: white; color: #2d3436; padding: 40px; border-radius: 15px; width: 95%; max-width: 700px; position: relative; border-top: 10px solid #6c5ce7; box-shadow: 0 25px 50px rgba(0,0,0,0.5);">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
                <img src="logo.jpeg" style="height: 40px;">
                <div style="text-align: right;">
                    <h2 style="margin: 0; color: #6c5ce7; font-size: 18px;">ADMISSION SLIP</h2>
                    <p id="rDate" style="margin: 5px 0 0; font-size: 10px; color: #636e72;"></p>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div style="font-size: 13px;">
                    <p style="margin: 4px 0;"><b>Student:</b> <span id="rName"></span></p>
                    <p style="margin: 4px 0;"><b>Passport:</b> <span id="rPass"></span></p>
                    <p style="margin: 4px 0;"><b>University:</b> <span id="rUni"></span></p>
                </div>
                <div style="text-align: right;">
                    <div style="background: #2ecc71; color: white; padding: 4px 12px; border-radius: 50px; display: inline-block; font-size: 10px; font-weight: bold;">HUB VERIFIED (2026)</div>
                    <div id="rQR" style="margin-top: 10px; display: flex; justify-content: flex-end;"></div>
                </div>
            </div>
            <div class="no-print" style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="window.print()" style="flex: 1; background: #6c5ce7; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;">PRINT / PDF</button>
                <button onclick="location.reload()" style="flex: 1; background: #eee; color: #333; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;">CLOSE</button>
            </div>
        </div>
    </div>

    <script type="module" src="partner-logic.js"></script>
</body>
</html>
