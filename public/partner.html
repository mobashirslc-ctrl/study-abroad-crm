<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(45deg, #0f172a, #1e293b, #334155); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; display: flex; }
        .sidebar { width: 260px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.1); height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 2rem; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
        input, select { background: rgba(15, 23, 42, 0.6) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none; }
        .nav-item { padding: 14px 24px; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; cursor: pointer; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-right: 3px solid #3b82f6; }
        @media (max-width: 1024px) { .sidebar { width: 80px; } .sidebar span, .sidebar h2 { display: none; } .main-content { margin-left: 80px; width: calc(100% - 80px); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6"><h2 class="text-xl font-bold text-blue-400">IHP CRM</h2></div>
        <nav class="mt-4">
            <div class="nav-item active"><i class="fas fa-search"></i> <span>Assessment</span></div>
            <div class="nav-item"><i class="fas fa-users"></i> <span>My Students</span></div>
            <div class="nav-item"><i class="fas fa-wallet"></i> <span>Earnings</span></div>
            <div class="mt-20 px-6">
                <button onclick="localStorage.clear(); location.href='/login'" class="text-sm text-red-400 flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </button>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-8 glass-panel p-6">
            <div><h1 class="text-2xl font-bold">Welcome, <span id="partnerNameDisplay" class="text-blue-400">Partner</span></h1></div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase">Wallet Balance</p>
                <p class="text-3xl font-mono font-bold text-emerald-400">$<span id="walletBal">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-panel p-6 h-fit">
                <h2 class="text-lg font-semibold mb-6 border-b border-white/10 pb-2">Smart Filters</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400">Preferred Country (Written)</label>
                        <input type="text" id="sCountry" placeholder="e.g. UK, Canada" class="w-full p-3 rounded-lg mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Select Degree</label>
                        <select id="sDegree" class="w-full p-3 rounded-lg mt-1">
                            <option value="PG">PG</option><option value="UG">UG</option>
                            <option value="DIPLOMA">DIPLOMA</option><option value="PHD">PHD</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-slate-400">Lang Score</label>
                            <input type="text" id="sScore" placeholder="6.5" class="w-full p-3 rounded-lg mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400">GPA</label>
                            <input type="text" id="sGpa" placeholder="3.50" class="w-full p-3 rounded-lg mt-1">
                        </div>
                    </div>
                    <button onclick="runAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold mt-4 transition-all uppercase">Find Universities</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-panel p-6 min-h-[500px]">
                <h2 class="text-lg font-semibold mb-6 border-b border-white/10 pb-2">Matching Results</h2>
                <div id="resultsArea" class="space-y-4">
                    <div class="text-center py-24 text-slate-500"><p>Enter details to fetch results.</p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = async () => {
            document.getElementById('partnerNameDisplay').innerText = localStorage.getItem('partnerName') || 'Partner';
            refreshWallet();
        };

        async function refreshWallet() {
            try {
                const res = await fetch(`/api/partner/details/${localStorage.getItem('partnerId')}`);
                const data = await res.json();
                document.getElementById('walletBal').innerText = (data.walletBalance || 0).toFixed(2);
            } catch(e) { console.error("Wallet load failed"); }
        }

        async function runAssessment() {
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = '<div class="text-center py-20 animate-pulse text-blue-400">MATCHING...</div>';

            try {
                const res = await fetch('/api/universities');
                if (!res.ok) throw new Error();
                const unis = await res.json();

                const countryInput = document.getElementById('sCountry').value.trim().toUpperCase();
                const degree = document.getElementById('sDegree').value;
                
                const filtered = unis.filter(u => 
                    u.country.toUpperCase().includes(countryInput) && 
                    u.degreeType.toUpperCase().includes(degree)
                );

                if(filtered.length === 0) {
                    resultsArea.innerHTML = '<div class="text-center py-20 text-slate-400">No matching results.</div>';
                    return;
                }

                resultsArea.innerHTML = filtered.map(u => `
                    <div class="glass-panel p-6 border-l-4 border-blue-500 hover:bg-white/5 transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div><h3 class="text-xl font-bold text-blue-300 uppercase">${u.uniName}</h3><p class="text-xs text-slate-400">${u.country}</p></div>
                            <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/20">$${u.partnerCommission} COMM.</span>
                        </div>
                        <button class="w-full bg-blue-600/20 hover:bg-blue-600 py-3 rounded-lg text-sm font-bold border border-blue-500/30 transition-all uppercase">Open File</button>
                    </div>
                `).join('');
            } catch(e) {
                resultsArea.innerHTML = '<div class="text-center py-20 text-red-400">Server communication error. Check Database URI!</div>';
            }
        }
    </script>
</body>
</html>
