<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 70px; }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .res-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 10px; font-size: 11px; color: #888; cursor: pointer; }
        .active { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="dashboard">
    <div id="assessment" class="page">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="sCountry" placeholder="Country">
            <select id="sDegree">
                <option value="">Degree</option><option>UG</option><option>PG</option><option>DIPLOMA</option>
                <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
            </select>
            <select id="sLang">
                <option value="">Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
            </select>
            <div style="display:flex; gap:10px;">
                <input type="text" id="sAcad" placeholder="Academic Score">
                <input type="text" id="sScore" placeholder="Lang Score">
            </div>
            <button class="btn-blue" onclick="runSearch()">SEARCH</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="wallet" class="page" style="display:none;">
        <div class="card" style="background:#1a73e8; color:white;">
            <p>Total Balance</p><h2>৳ 50,000.00</h2>
        </div>
        <div class="card">
            <h3>Withdraw Found</h3>
            <select id="wMethod"><option>Bkash</option><option>Nagad</option><option>Bank</option></select>
            <input type="text" id="wAcc" placeholder="Account Number">
            <input type="number" id="wAmt" placeholder="Amount">
            <button class="btn-main btn-blue" style="background:#28a745;" onclick="sendWithdraw()">SEND REQUEST</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showP('assessment', this)"><i class="fas fa-search"></i><br>Search</div>
    <div class="nav-item" onclick="showP('wallet', this)"><i class="fas fa-wallet"></i><br>Withdraw</div>
</div>

<script>
    function showP(id, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function runSearch() {
        const res = await fetch(`/api/search-uni?country=${document.getElementById('sCountry').value}&degree=${document.getElementById('sDegree').value}&language=${document.getElementById('sLang').value}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.map(u => `
            <div class="card">
                <b>${u.uniName}</b><br><small>${u.location}, ${u.country}</small>
                <div class="res-box">
                    <div>Course: <b>${u.course}</b></div>
                    <div>Intake: <b>${u.intake}</b></div>
                    <div>Fee: <b>${u.fee} ${u.currency}</b></div>
                    <div>Bank BD: <b>${u.bankNameBD}</b></div>
                </div>
                <button class="btn-blue" style="margin-top:10px; background:#28a745;" onclick="openStudentFile('${u.uniName}')">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    async function openStudentFile(uni) {
        const name = prompt("Student Full Name:");
        const contact = prompt("Contact No:");
        const pdf = prompt("Paste PDF Link:");
        if(!name) return;

        const res = await fetch('/api/open-file', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ studentName: name, contact: contact, university: uni, pdfUrl: pdf })
        });
        const data = await res.json();
        if(data.success) alert(data.message);
    }

    async function sendWithdraw() {
        const body = { method: document.getElementById('wMethod').value, account: document.getElementById('wAcc').value, amount: document.getElementById('wAmt').value };
        const res = await fetch('/api/withdraw-request', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if(data.success) alert(data.message);
    }
</script>
</body>
</html>
