<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Portal 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a0b4d; --accent: #f1c40f; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); --success: #2ecc71; --danger: #ff4757; }
        body { background: radial-gradient(circle at top right, #2b0054, #070014); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif; }
        .sidebar { width: 260px; background: rgba(0,0,0,0.9); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
        .logo { text-align: center; padding-bottom: 30px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo img { width: 150px; background: white; padding: 5px; border-radius: 5px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #bbb; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border-left: 4px solid var(--accent); }
        .wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .main { padding: 30px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(15px); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .reg-input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none; }
        .btn-gold { background: var(--accent); color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); }
        .modal-content { background: #1a0b4d; border: 1px solid var(--accent); margin: 5% auto; padding: 30px; border-radius: 20px; width: 60%; }
        .content-section { display: none; }
        .active-section { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Smart Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-map-marker-alt"></i> Tracking</div>
        <div class="nav-item" style="margin-top:auto;" onclick="localStorage.clear(); location.href='index.html'"><i class="fas fa-power-off"></i> Logout</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <div>Welcome, <span id="pNameDisp" style="color:var(--accent); font-weight:bold;">Partner</span></div>
            <div id="walletBox" style="font-weight:bold;">Final Wallet: <span id="finalWallet" style="color:var(--success);">0 BDT</span></div>
        </div>

        <div class="main">
            <div id="home" class="content-section active-section">
                <div class="card">
                    <h2>Live Stats Overview</h2>
                    <p style="opacity:0.7;">Start by assessing a student's profile to see matching universities.</p>
                </div>
            </div>

            <div id="assessment" class="content-section">
                <div class="card">
                    <h3 style="color:var(--accent);">Step 1: Student Profile Assessment</h3>
                    <div class="form-grid">
                        <div><label style="font-size:10px;">Full Name</label><input type="text" id="sName" class="reg-input"></div>
                        <div><label style="font-size:10px;">CGPA</label><input type="number" step="0.01" id="sCGPA" class="reg-input"></div>
                        <div><label style="font-size:10px;">IELTS Overall</label><input type="number" step="0.1" id="sIELTS" class="reg-input"></div>
                        <div><label style="font-size:10px;">IELTS Band</label><input type="number" step="0.1" id="sBand" class="reg-input"></div>
                        <div><label style="font-size:10px;">Study Gap (Yrs)</label><input type="number" id="sGap" class="reg-input"></div>
                        <div><label style="font-size:10px;">Degree</label><select id="sDegree" class="reg-input"><option>Bachelor</option><option>Master</option></select></div>
                        <button onclick="runAdvancedAssessment()" class="btn-gold" style="margin-top:15px;">MATCH NOW</button>
                    </div>
                </div>

                <div id="resultGrid" class="result-grid"></div>
            </div>
            </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="modal-content">
            <h2 id="modalUniName" style="color:var(--accent);">University Name</h2>
            <div class="form-grid" style="margin-top:20px;">
                <input type="text" id="sPassNo" placeholder="Passport Number" class="reg-input">
                <input type="file" id="fPassport" class="reg-input">
                <input type="file" id="fAcademic" class="reg-input">
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button id="finalSubmitBtn" onclick="submitFinalApplication()" class="btn-gold">SUBMIT FULL FILE</button>
                <button onclick="document.getElementById('applyModal').style.display='none'" style="color:white; background:none; border:none; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk", authDomain: "ihp-portal-v3.firebaseapp.com", projectId: "ihp-portal-v3", storageBucket: "ihp-portal-v3.firebasestorage.app", messagingSenderId: "481157902534", appId: "1:481157902534:web:2d9784032fbf8f2f7fe7c7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userEmail = localStorage.getItem('userEmail');
        const currencyRates = { "USD": 121, "GBP": 153, "EUR": 131, "CAD": 89, "MYR": 26, "BDT": 1 };

        window.showTab = (id, el) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-section');
            if(el) el.classList.add('active');
        };

        let selectedUni = null;
        let finalCommBDT = 0;

        window.runAdvancedAssessment = async () => {
            const cgpa = parseFloat(document.getElementById('sCGPA').value || 0);
            const ielts = parseFloat(document.getElementById('sIELTS').value || 0);
            const gap = parseInt(document.getElementById('sGap').value || 0);
            const degree = document.getElementById('sDegree').value;
            const resGrid = document.getElementById('resultGrid');

            resGrid.innerHTML = "Searching...";
            const snap = await getDocs(collection(db, "universities"));
            let html = "";

            snap.forEach(d => {
                const u = d.data();
                if(cgpa >= u.minCGPA && ielts >= u.minIELTS && gap <= u.gapAllowed && u.degree === degree) {
                    const rate = currencyRates[u.currency] || 1;
                    const bdtComm = (u.semesterFee * rate) * (u.partnerPercent / 100);
                    
                    html += `
                    <div class="card" style="border:1px solid var(--accent);">
                        <h3 style="margin:0;">${u.name}</h3>
                        <p style="font-size:12px; opacity:0.7;">${u.country} | Intake: ${u.intake}</p>
                        <div style="background:var(--accent); color:black; padding:15px; border-radius:10px; text-align:center; margin:15px 0;">
                            <span style="font-size:10px; font-weight:bold; display:block;">ESTIMATED COMMISSION</span>
                            <strong style="font-size:1.5rem;">৳ ${bdtComm.toLocaleString()}</strong>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; font-size:11px; gap:8px;">
                            <span>🎓 Degree: ${u.degree}</span>
                            <span>💰 Fee: ${u.semesterFee} ${u.currency}</span>
                            <span>🛂 PSW: ${u.psw}</span>
                            <span>📄 Scholarship: ${u.scholarship}</span>
                        </div>
                        <button onclick="openApply('${u.name}', ${bdtComm})" class="btn-gold" style="margin-top:15px;">APPLY NOW</button>
                    </div>`;
                }
            });
            resGrid.innerHTML = html || "<p>No matching university found.</p>";
        };

        window.openApply = (name, comm) => {
            selectedUni = name;
            finalCommBDT = comm;
            document.getElementById('modalUniName').innerText = name;
            document.getElementById('applyModal').style.display = 'block';
        };

        window.submitFinalApplication = async () => {
            const btn = document.getElementById('finalSubmitBtn');
            btn.innerText = "UPLOADING..."; btn.disabled = true;
            try {
                // ... Cloudinary Upload logic here ...
                await addDoc(collection(db, "applications"), {
                    studentName: document.getElementById('sName').value,
                    passport: document.getElementById('sPassNo').value,
                    university: selectedUni,
                    commissionBDT: finalCommBDT,
                    partnerEmail: userEmail,
                    status: 'PENDING',
                    createdAt: serverTimestamp()
                });
                alert("Application Submitted!");
                location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        };

        // Wallet Sync
        onSnapshot(query(collection(db, "users"), where("email", "==", userEmail)), (snap) => {
            if(!snap.empty) {
                const u = snap.docs[0].data();
                document.getElementById('pNameDisp').innerText = u.agencyName || "Partner";
                document.getElementById('finalWallet').innerText = (u.finalBal || 0).toLocaleString() + " BDT";
            }
        });
    </script>
</body>
</html>
