<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-open { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-card { border-left: 5px solid #1a73e8; }
        .details { font-size: 13px; line-height: 1.6; color: #333; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #1a73e8; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="assess-page" class="page">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="country" placeholder="Country Name">
            <select id="degree">
                <option value="">Degree</option><option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option>
            </select>
            <select id="lang">
                <option value="">Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
            </select>
            <input type="text" id="score" placeholder="Academic & Language Score Box">
            <button class="btn-search" onclick="search()">RUN ASSESSMENT</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="wallet-page" class="page" style="display:none;">
        <div class="card" style="background: #1a73e8; color: white;">
            <p>Total Balance</p><h2>৳ 0.00</h2>
            <small>Subscription Expires: 31-12-2026</small>
        </div>
        <div class="card">
            <h3>Withdraw Request</h3>
            <select><option>Bkash</option><option>Nagad</option><option>Bank</option></select>
            <input type="number" placeholder="Amount">
            <button class="btn-search" style="background: #28a745;">SEND WITHDRAW REQUEST</button>
        </div>
    </div>
</div>

<div id="fileModal" class="modal">
    <div class="modal-content">
        <h3>📄 Open Student File</h3>
        <input type="hidden" id="selectedUni">
        <input type="text" id="stdName" placeholder="Student Name">
        <input type="text" id="stdContact" placeholder="Contact Number">
        <button class="btn-search" onclick="submitFile()">CONFIRM SUBMIT</button>
        <button onclick="closeModal()" style="background:none; border:none; color:red; width:100%; margin-top:10px;">Close</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showP('assess-page', this)"><i class="fas fa-search fa-lg"></i><br>Assessment</div>
    <div class="nav-item" onclick="showP('wallet-page', this)"><i class="fas fa-wallet fa-lg"></i><br>Wallet</div>
</div>

<script>
    async function search() {
        const res = await fetch(`/api/search-uni?country=${document.getElementById('country').value}&degree=${document.getElementById('degree').value}&language=${document.getElementById('lang').value}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.map(u => `
            <div class="card result-card">
                <div style="font-weight:bold; color:#1a73e8; font-size:18px;">${u.uniName}</div>
                <div class="details">
                    Fee: ${u.fee} ${u.currency} | Bank: ${u.bankNameSuggestion}<br>
                    Loan: ${u.loanAmount} | <b>Commission: ${u.partnerCommission}</b>
                </div>
                <button class="btn-open" onclick="openModal('${u.uniName}')">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    function showP(id, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function openModal(uni) { document.getElementById('selectedUni').value = uni; document.getElementById('fileModal').style.display = 'block'; }
    function closeModal() { document.getElementById('fileModal').style.display = 'none'; }

    async function submitFile() {
        await fetch('/api/open-file', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                studentName: document.getElementById('stdName').value,
                contact: document.getElementById('stdContact').value,
                university: document.getElementById('selectedUni').value
            })
        });
        alert("✅ File Opened Successfully!"); closeModal();
    }
</script>
</body>
</html>
