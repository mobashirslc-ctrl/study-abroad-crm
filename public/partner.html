<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #060212; --glass: rgba(255, 255, 255, 0.03); --border: rgba(46, 204, 113, 0.15); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 70px; background: rgba(0,0,0,0.5); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; z-index: 1000; flex-shrink: 0; }
        .nav-icon { color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; transition: 0.3s; padding: 12px; border-radius: 10px; }
        .nav-icon.active { color: var(--accent); background: rgba(46, 204, 113, 0.1); }

        .main-container { flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 80px; box-sizing: border-box; }
        .glass-box { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }

        /* Form Layout Fix */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        input, select { background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        
        .file-upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .file-input-wrapper { background: rgba(46, 204, 113, 0.05); border: 1px dashed var(--border); padding: 10px; border-radius: 8px; text-align: center; }
        .file-input-wrapper input { display: none; }
        .file-label { font-size: 10px; cursor: pointer; color: #bbb; }

        .main-btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .main-btn:hover { background: #27ae60; }

        /* Tracking Table */
        .table-wrapper { overflow-x: auto; border-radius: 10px; background: rgba(0,0,0,0.2); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; color: var(--accent); padding: 12px; font-size: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icon active" onclick="showSec('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-icon" onclick="showSec('tracking', this)"><i class="fas fa-history"></i></div>
        <div class="nav-icon logout-icon" onclick="logout()" style="margin-top:auto; color:#ff4757"><i class="fas fa-sign-out-alt"></i></div>
    </aside>

    <main class="main-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <img src="logo.jpeg" style="height: 45px;">
            <div style="text-align: right;">
                <b style="color:var(--accent)" id="partnerBrand">GORUN LTD.</b><br>
                <small id="userMailDisplay" style="color: #888; font-size: 10px;"></small>
            </div>
        </div>

        <section id="home" class="section active">
            <div class="glass-box">
                <h3>Submit New Application</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Student Name</label>
                        <input type="text" id="sName" placeholder="Full Name">
                    </div>
                    <div class="form-group">
                        <label>Passport Number</label>
                        <input type="text" id="sPass" placeholder="Number">
                    </div>
                </div>
                
                <div class="file-upload-grid">
                    <div class="file-input-wrapper">
                        <label class="file-label" for="pdf1"><i class="fas fa-file-pdf"></i><br>Passport PDF</label>
                        <input type="file" id="pdf1" accept=".pdf">
                    </div>
                    <div class="file-input-wrapper">
                        <label class="file-label" for="pdf2"><i class="fas fa-file-pdf"></i><br>Academic PDF</label>
                        <input type="file" id="pdf2" accept=".pdf">
                    </div>
                    <div class="file-input-wrapper">
                        <label class="file-label" for="pdf3"><i class="fas fa-file-pdf"></i><br>Language PDF</label>
                        <input type="file" id="pdf3" accept=".pdf">
                    </div>
                </div>

                <button class="main-btn" style="margin-top:20px;" onclick="submitFinal()">Submit To Compliance</button>
            </div>

            <div class="glass-box">
                <h3>Live Status Updates</h3>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Student</th><th>Passport</th><th>Staff</th><th>Compliance Status</th></tr></thead>
                        <tbody id="liveUpdateTable">
                            <tr><td colspan="4" style="text-align:center; padding:20px; color:#555;">No active applications.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tracking" class="section">
            <div class="glass-box">
                <h3>All Submissions History</h3>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Date</th><th>Student</th><th>Passport</th><th>Status</th></tr></thead>
                        <tbody id="historyTable"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="slipModal" class="modal-overlay">
        <div style="background:#fff; color:#000; padding:30px; border-radius:20px; text-align:center; width:350px;">
            <i class="fas fa-check-circle" style="color:var(--accent); font-size:50px;"></i>
            <h2>Submission Success</h2>
            <p id="resName" style="font-weight:bold;"></p>
            <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0;"></div>
            <button class="main-btn" onclick="location.reload()">Close & Refresh</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. Auth & Real-time Profile
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userMailDisplay').innerText = user.email;
                loadRealtimeData();
            } else {
                window.location.href = 'index.html';
            }
        });

        // 2. Real-time Status Sync
        function loadRealtimeData() {
            db.ref('applications').on('value', snapshot => {
                const liveBody = document.getElementById('liveUpdateTable');
                const historyBody = document.getElementById('historyTable');
                liveBody.innerHTML = "";
                historyBody.innerHTML = "";

                snapshot.forEach(child => {
                    const data = child.val();
                    const row = `<tr>
                        <td>${data.studentName}</td>
                        <td>${data.passport}</td>
                        <td>${data.handledBy || 'Pending'}</td>
                        <td style="color:var(--accent); font-weight:bold;">${data.compliance || 'IN QUEUE'}</td>
                    </tr>`;
                    liveBody.innerHTML += row;
                    historyBody.innerHTML += row;
                });
            });
        }

        // 3. Final Submission with PDF placeholder logic
        function submitFinal() {
            const n = document.getElementById('sName').value;
            const p = document.getElementById('sPass').value;
            
            if(!n || !p) return alert("Please fill Student Name and Passport!");

            const appId = Date.now();
            db.ref('applications/' + appId).set({
                studentName: n,
                passport: p,
                partnerOrg: "GORUN LTD.",
                compliance: "UNCLAIMED",
                handledBy: "",
                timestamp: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('slipModal').style.display = 'flex';
                document.getElementById('resName').innerText = n;
                new QRCode(document.getElementById("qrcode"), { text: p, width: 120, height: 120 });
            });
        }

        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
    </script>
</body>
</html>
