<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-800 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">Partner Panel: <span id="pNameDisplay"></span></h1>
            <button onclick="location.href='/login'" class="bg-red-500 px-4 py-1 rounded text-sm">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded shadow border">
            <h2 class="font-bold mb-4 text-blue-800 uppercase text-sm border-b pb-2">Student File Tracking</h2>
            <form id="studentForm" class="space-y-4">
                <div><label class="block text-xs font-bold uppercase text-gray-500">Student Name</label>
                <input type="text" id="sName" class="w-full p-2 border rounded text-sm" required></div>
                
                <div><label class="block text-xs font-bold uppercase text-gray-500">Contact No</label>
                <input type="text" id="sContact" class="w-full p-2 border rounded text-sm" required></div>
                
                <div><label class="block text-xs font-bold uppercase text-gray-500">Upload Student PDF (Link)</label>
                <input type="text" id="pdfUrl" class="w-full p-2 border rounded text-sm" placeholder="Paste Drive or PDF Link" required></div>
                
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">SUBMIT FILE</button>
            </form>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded shadow border">
            <h2 class="font-bold mb-4 text-blue-800 uppercase text-sm border-b pb-2">Application Status Tracking</h2>
            <div id="statusList" class="p-4 bg-gray-100 rounded text-gray-600 italic">
                Student Tracking Ready. Submissions will appear here.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('pNameDisplay').innerText = localStorage.getItem('partnerName') || 'Partner';

        document.getElementById('studentForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                partnerId: localStorage.getItem('partnerId'),
                studentName: document.getElementById('sName').value,
                contact: document.getElementById('sContact').value,
                pdfUrl: document.getElementById('pdfUrl').value
            };
            const res = await fetch('/api/student/apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("Student File Uploaded Successfully!"); e.target.reset(); }
        };
    </script>
</body>
</html>
