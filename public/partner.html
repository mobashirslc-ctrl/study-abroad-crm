<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p-green: #2ecc71; --bg-deep: #0a0118; --card-bg: #12002b; }
        body { background: var(--bg-deep); color: #fff; font-family: sans-serif; margin: 0; display: flex; min-height: 100vh; }

        /* Fixed Sidebar */
        .sidebar { width: 80px; background: rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; padding: 20px 0; position: sticky; top: 0; height: 100vh; }
        .sidebar img { width: 40px; margin-bottom: 30px; }
        .nav-icon { color: #888; font-size: 20px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .nav-icon:hover, .nav-icon.active { color: var(--p-green); }

        /* Main Content Wrapper */
        .main-container { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; }

        /* Wallet Cards */
        .wallet-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .wallet-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .wallet-card h4 { margin: 0; color: #aaa; font-size: 12px; text-transform: uppercase; }
        .wallet-card h2 { margin: 10px 0; font-size: 24px; color: var(--p-green); }

        /* Form / Search Section */
        .action-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; }
        select, input { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        select:focus, input:focus { border-color: var(--p-green); }

        .submit-btn { background: var(--p-green); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .status-badge { color: #00ff00; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="logo.png" alt="Logo">
        <div class="nav-icon active"><i class="fas fa-home"></i></div>
        <div class="nav-icon"><i class="fas fa-chart-line"></i></div>
        <div class="nav-icon"><i class="fas fa-wallet"></i></div>
        <div class="nav-icon" style="margin-top: auto; color: #ff4757;"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <div class="main-container">
        
        <div class="wallet-section">
            <div class="wallet-card">
                <h4>Estimated Pending</h4>
                <h2>৳ 0.00</h2>
                <small style="color: #ff4757;">* Condition: Payment after enrollment.</small>
            </div>
            <div class="wallet-card">
                <h4>Available Wallet</h4>
                <h2>৳ 0.00</h2>
            </div>
            <div class="wallet-card">
                <h4>Subscription Status</h4>
                <div class="status-badge">PREMIUM ACTIVE</div>
                <small>Expiry: 31 Dec 2026</small>
            </div>
        </div>

        <div class="action-bar">
            <input type="text" placeholder="e.g. UK">
            <select>
                <option>PG</option>
                <option>UG</option>
            </select>
            <input type="text" placeholder="GPA">
            <select>
                <option>IELTS</option>
                <option>OIETC</option>
            </select>
            <input type="text" placeholder="Overall Score">
            <button class="submit-btn">Search University</button>
        </div>

    </div>

</body>
</html>
