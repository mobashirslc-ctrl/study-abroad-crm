<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .sidebar { background: #161b2a; border-right: 1px solid #2d334a; }
        .nav-link { padding: 14px 20px; display: flex; align-items: center; color: #94a3b8; transition: 0.3s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        input, select { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; font-size: 13px; outline: none; width: 100%; }
        .status-fixed { color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 2px 8px; border-radius: 4px; }
        .status-pending { color: #f59e0b; background: rgba(245, 158, 11, 0.1); padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body class="flex">

    <div class="w-64 h-screen sidebar sticky top-0 hidden md:flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-white/10 text-blue-500">IHP CRM</div>
        <nav class="mt-8 flex-1">
            <div onclick="showSection('assessment')" class="nav-link active" id="link-assessment"><span>🔍 Search & Assessment</span></div>
            <div onclick="showSection('history')" class="nav-link" id="link-history"><span>📋 App History</span></div>
            <div onclick="showSection('wallet')" class="nav-link" id="link-wallet"><span>💰 Wallet & Earning</span></div>
        </nav>
        <div class="p-6 border-t border-white/10">
            <button onclick="handleLogout()" class="text-red-400 text-sm font-bold">Logout ➔</button>
        </div>
    </div>

    <main class="flex-1 p-6 md:p-10">
        <div class="flex justify-between items-center mb-10 bg-slate-900/50 p-4 rounded-xl border border-white/5">
            <div><h2 class="text-xl font-bold" id="pNameDisp">Welcome</h2></div>
            <div class="flex gap-6 text-center">
                <div class="glass-card px-4 py-1 border-amber-500/30"><p class="text-[9px] text-slate-500 uppercase">Pending</p><p class="text-amber-500 font-bold">$<span id="pendingBal">0.00</span></p></div>
                <div class="glass-card px-4 py-1 border-emerald-500/30"><p class="text-[9px] text-slate-500 uppercase">Fixed</p><p class="text-emerald-500 font-bold">$<span id="fixedBal">0.00</span></p></div>
            </div>
        </div>

        <div id="section-assessment" class="content-section">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="glass-card p-6 h-fit space-y-4 shadow-xl">
                    <h3 class="font-bold border-b border-white/10 pb-2 text-blue-400">Smart Assessment</h3>
                    <div><label class="text-[10px] text-slate-500 uppercase">Country Name</label><input type="text" id="sCountry" placeholder="e.g. UK, USA"></div>
                    <div><label class="text-[10px] text-slate-500 uppercase">Degree Type</label>
                        <select id="sDegree"><option>UG</option><option>PG</option><option>DIPLOMA</option><option>RESEARCH</option><option>FOUNDATION</option><option>PHD</option></select>
                    </div>
                    <div><label class="text-[10px] text-slate-500 uppercase">Academic Score (GPA)</label><input type="text" id="sGpa" placeholder="e.g. 3.50"></div>
                    <div><label class="text-[10px] text-slate-500 uppercase">Language Test</label>
                        <select id="sLang"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                    </div>
                    <div><label class="text-[10px] text-slate-500 uppercase">Language Score</label><input type="text" id="sScore" placeholder="e.g. 6.5"></div>
                    <button onclick="runAssessment()" class="w-full bg-blue-600 py-3 rounded-lg font-bold mt-2 hover:bg-blue-700 transition">FIND UNIVERSITIES</button>
                </div>

                <div class="lg:col-span-3 space-y-4" id="resultsArea">
                    <div class="text-center py-20 text-slate-500 glass-card">Matching universities will appear here</div>
                </div>
            </div>
        </div>

        <div id="section-history" class="content-section hidden">...</div>
        <div id="section-wallet" class="content-section hidden">...</div>

    </main>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-2xl w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-xl font-bold mb-6 text-blue-400 border-b border-white/10 pb-2">Student Application Form</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="text-[10px] text-slate-500">Student Full Name</label><input type="text" id="stName"></div>
                <div><label class="text-[10px] text-slate-500">Contact Number</label><input type="text" id="stContact"></div>
                <div><label class="text-[10px] text-slate-500">Passport Number</label><input type="text" id="stPassport"></div>
                <div><label class="text-[10px] text-slate-500">Degree Applied</label><input type="text" id="stDegree" readonly class="bg-slate-800"></div>
                <div><label class="text-[10px] text-slate-500">Academic Score (GPA)</label><input type="text" id="stGpa" readonly class="bg-slate-800"></div>
                <div><label class="text-[10px] text-slate-500">Language Score</label><input type="text" id="stLangScore" readonly class="bg-slate-800"></div>
                <div class="md:col-span-2"><label class="text-[10px] text-slate-500">Selected University</label><input type="text" id="stUni" readonly class="bg-slate-800 font-bold text-blue-400"></div>
            </div>
            <div class="mt-6 p-4 bg-emerald-500/10 rounded-xl border border-emerald-500/20">
                <p class="text-xs text-slate-400">Potential Commission (Locked in Escrow)</p>
                <p class="text-xl font-bold text-emerald-400">$<span id="targetComm"></span></p>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="submitFile()" class="flex-1 bg-emerald-600 py-3 rounded-lg font-bold hover:bg-emerald-700 transition">SUBMIT TO COMPLIANCE</button>
                <button onclick="document.getElementById('fileModal').classList.add('hidden')" class="px-6 py-3 rounded-lg border border-white/10 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const pId = localStorage.getItem('partnerId');
        document.getElementById('pNameDisp').innerText = "Hello, " + localStorage.getItem('partnerName');

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.getElementById('link-' + id).classList.add('active');
        }

        async function runAssessment() {
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = '<div class="text-center py-20 text-blue-400">Searching eligible matches...</div>';
            
            const res = await fetch('/api/universities');
            const unis = await res.json();
            
            // ফিল্টারিং লজিক (Degree অনুযায়ী)
            const filtered = unis.filter(u => u.degreeType === document.getElementById('sDegree').value);
            
            if(filtered.length === 0) {
                resultsArea.innerHTML = '<div class="text-center py-20 text-slate-500 glass-card">No universities found for this criteria.</div>';
                return;
            }

            resultsArea.innerHTML = filtered.map(u => `
                <div class="glass-card p-6 border-l-4 border-blue-600 hover:bg-white/5 transition duration-300">
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-y-4 gap-x-2 text-[11px]">
                        <div class="col-span-2 md:col-span-2"><p class="text-slate-500 uppercase tracking-tighter">University</p><p class="text-base font-bold text-blue-400 truncate">${u.uniName}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Country</p><p class="font-bold">${u.country || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Course</p><p class="font-bold">${u.courseName || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Intake</p><p class="font-bold">${u.intake || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Semester Fee</p><p class="font-bold text-amber-500">${u.semesterFee || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Degree</p><p class="font-bold">${u.degreeType}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Bank Req (BD)</p><p class="font-bold">${u.bankNameBD || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Loan Amount</p><p class="font-bold">${u.loanAmount || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Marital Status</p><p class="font-bold">${u.maritalStatus || 'N/A'}</p></div>
                        <div><p class="text-slate-500 uppercase tracking-tighter">Commission</p><p class="font-bold text-emerald-400 text-sm">$${u.partnerCommission}</p></div>
                        <div class="col-span-2 lg:col-span-1 flex items-end">
                            <button onclick="openForm('${u.uniName}', ${u.partnerCommission})" class="w-full bg-blue-600 py-2 rounded-lg font-bold text-[10px] hover:bg-blue-700 transition uppercase">Open File</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function openForm(uniName, comm) {
            document.getElementById('stUni').value = uniName;
            document.getElementById('targetComm').innerText = comm;
            // অটো ফিল ডাটা ফ্রম অ্যাসেসমেন্ট
            document.getElementById('stDegree').value = document.getElementById('sDegree').value;
            document.getElementById('stGpa').value = document.getElementById('sGpa').value;
            document.getElementById('stLangScore').value = document.getElementById('sScore').value;
            
            document.getElementById('fileModal').classList.remove('hidden');
        }

        async function submitFile() {
            const body = {
                partnerId: pId,
                studentName: document.getElementById('stName').value,
                contactNo: document.getElementById('stContact').value,
                passportNo: document.getElementById('stPassport').value,
                degree: document.getElementById('stDegree').value,
                gpa: document.getElementById('stGpa').value,
                langScore: document.getElementById('stLangScore').value,
                uniName: document.getElementById('stUni').value,
                commission: Number(document.getElementById('targetComm').innerText)
            };

            const res = await fetch('/api/partner/submit-file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });

            if(res.ok) {
                alert("Application Sent! Commission added to Pending Wallet.");
                location.reload();
            }
        }

        // Initialize Stats load
        async function loadStats() {
            const res = await fetch('/api/partner/stats/' + pId);
            const data = await res.json();
            document.getElementById('pendingBal').innerText = data.pending.toFixed(2);
            document.getElementById('fixedBal').innerText = data.fixed.toFixed(2);
        }
        loadStats();
    </script>
</body>
</html>
