<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; height: 100vh; background: #0d001a; border-right: 1px solid var(--border); position: fixed; padding: 20px; box-sizing: border-box; z-index: 100; }
        .logo img { width: 100%; max-width: 140px; background: white; padding: 8px; border-radius: 8px; margin-bottom: 30px; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; cursor: pointer; border-radius: 10px; color: #ccc; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--gold); border: 1px solid var(--border); }

        /* Wrapper */
        .wrapper { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; position: relative; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px 30px; background: var(--glass); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .section { display: none; padding: 30px; animation: fadeIn 0.4s ease; }
        .active-section { display: block !important; }

        /* UI Components */
        .card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); margin-bottom: 20px; }
        .reg-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; border-radius: 6px; margin-bottom: 12px; box-sizing: border-box; font-size: 13px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(241,196,15,0.3); }

        /* Assessment Table */
        .assessment-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 15px; align-items: flex-end; }
        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th { text-align: left; padding: 12px; color: var(--gold); background: rgba(0,0,0,0.2); border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-search-location"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Earning</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <div>Welcome, <span id="welcomeName" style="color:var(--gold);">Partner</span></div>
            <button onclick="logout()" style="background:#ff4757; color:white; border:none; padding:6px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div id="home" class="section">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                <div class="card"><p style="font-size:12px; color:#aaa;">PENDING COMMISSION</p><h2 id="topPending">৳0</h2></div>
                <div class="card"><p style="font-size:12px; color:#aaa;">FINAL BALANCE</p><h2 id="topFinal">৳0</h2></div>
            </div>
        </div>

        <div id="assessment" class="section active-section">
            <div class="card">
                <h3 style="color:var(--gold); margin-top:0;">Smart Search Filter (Real-time BDT)</h3>
                <div class="assessment-grid">
                    <div>
                        <label style="font-size:10px;color:#aaa">Target Country</label>
                        <select id="fCountry" class="reg-input">
                            <option value="">All Countries</option>
                            <option value="UK">United Kingdom</option>
                            <option value="USA">USA</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:10px;color:#aaa">Language Test</label>
                        <select id="fLanguage" class="reg-input">
                            <option value="">No Test / MOI</option>
                            <option value="IELTS">IELTS</option>
                            <option value="Duolingo">Duolingo</option>
                            <option value="PTE">PTE</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:10px;color:#aaa">Degree</label>
                        <select id="fDegree" class="reg-input">
                            <option value="">All Degrees</option>
                            <option value="Bachelor">Bachelor</option>
                            <option value="Master">Master</option>
                            <option value="Foundation">Foundation</option>
                        </select>
                    </div>
                    <div><label style="font-size:10px;color:#aaa">Lang. Score</label><input type="number" step="0.1" id="fLangScore" placeholder="6.5" class="reg-input"></div>
                    <div><label style="font-size:10px;color:#aaa">Academic GPA</label><input type="number" step="0.01" id="fGPA" placeholder="3.50" class="reg-input"></div>
                    <button onclick="searchUniversity()" class="btn-gold" style="height:44px; margin-bottom:12px;">SEARCH DATA</button>
                </div>
            </div>

            <div id="searchResultArea" class="card" style="display:none;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>University</th>
                                <th>Country</th>
                                <th>Location</th>
                                <th>Degree</th>
                                <th>Subject</th>
                                <th>Intake</th>
                                <th>Duration</th>
                                <th>Min GPA</th>
                                <th>Lang. Req</th>
                                <th>Tuition (৳)</th>
                                <th>Your Comm (৳)</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="uniListContainer"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="card" style="width: 550px; border: 1px solid var(--gold); max-height: 90vh; overflow-y: auto;">
            <h2 style="color:var(--gold); margin-top:0;">Apply for <span id="targetUni">...</span></h2>
            <form id="applyForm">
                <input type="text" id="sName" placeholder="Student Full Name" class="reg-input" required>
                <input type="text" id="sPassport" placeholder="Passport Number" class="reg-input" required>
                <p style="font-size: 11px; color: var(--gold); margin-bottom:5px;">Upload Documents (PDF)</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="file" id="pdf1" class="reg-input" required title="Passport">
                    <input type="file" id="pdf2" class="reg-input" required title="Academic">
                    <input type="file" id="pdf3" class="reg-input" title="Language">
                    <input type="file" id="pdf4" class="reg-input" title="CV">
                </div>
                <button type="submit" id="submitBtn" class="btn-gold" style="margin-top:15px;">CONFIRM SUBMISSION</button>
                <button type="button" onclick="closeModal()" style="background:none; color:red; border:none; width:100%; margin-top:10px; cursor:pointer;">CANCEL</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk",
            authDomain: "ihp-portal-v3.firebaseapp.com",
            projectId: "ihp-portal-v3",
            storageBucket: "ihp-portal-v3.firebasestorage.app",
            messagingSenderId: "481157902534",
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Conversion Rates
        const BDT_RATES = { "UK": 155, "USA": 120, "Canada": 88, "Australia": 78, "Default": 120 };

        window.searchUniversity = async () => {
            const country = document.getElementById('fCountry').value;
            const degree = document.getElementById('fDegree').value;
            const userGPA = parseFloat(document.getElementById('fGPA').value) || 0;
            const userLang = parseFloat(document.getElementById('fLangScore').value) || 0;

            const container = document.getElementById('uniListContainer');
            document.getElementById('searchResultArea').style.display = "block";
            container.innerHTML = "<tr><td colspan='12'>Processing Commissions...</td></tr>";

            try {
                const snap = await getDocs(collection(db, "universities"));
                let html = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    if ((!country || u.country === country) && (!degree || u.degree === degree) && 
                        (userGPA >= (u.minGPA || 0)) && (userLang >= (u.minLangScore || 0))) {
                        
                        const rate = BDT_RATES[u.country] || BDT_RATES["Default"];
                        const partnerBDT = Math.round(((u.totalComm || 0) * (u.partnerShare || 50) / 100) * rate);
                        const tuitionBDT = Math.round((u.tuitionFee || 0) * rate);

                        html += `<tr>
                            <td><b>${u.name}</b></td>
                            <td>${u.country}</td>
                            <td>${u.location || 'N/A'}</td>
                            <td>${u.degree}</td>
                            <td>${u.subject || 'All'}</td>
                            <td>${u.intake || 'N/A'}</td>
                            <td>${u.duration || 'N/A'}</td>
                            <td>GPA ${u.minGPA}</td>
                            <td>${u.minLangScore || 'N/A'}</td>
                            <td>৳${tuitionBDT.toLocaleString()}</td>
                            <td style="color:var(--gold); font-weight:bold;">৳${partnerBDT.toLocaleString()}</td>
                            <td><button onclick="openApplyModal('${u.name}', '${partnerBDT}')" class="btn-gold" style="padding:5px 10px; font-size:11px;">APPLY</button></td>
                        </tr>`;
                    }
                });
                container.innerHTML = html || "<tr><td colspan='12' style='color:red'>No profile match found.</td></tr>";
            } catch (err) { container.innerHTML = "<tr><td colspan='12'>Error loading database.</td></tr>"; }
        };

        window.openApplyModal = (uni, bdt) => {
            document.getElementById('targetUni').innerText = uni;
            window.selectedUni = uni; window.selectedComm = bdt;
            document.getElementById('applyModal').style.display = "flex";
        };
        window.closeModal = () => document.getElementById('applyModal').style.display = "none";
        
        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };
        window.logout = () => { localStorage.clear(); location.href = 'index.html'; };
    </script>
</body>
</html>
