<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; display: flex;
            min-height: 100vh; background-color: #0b012d; font-family: 'Poppins', sans-serif; color: white;
        }
        /* Sidebar Styling */
        .sidebar {
            width: 250px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1); padding: 20px;
            display: flex; flex-direction: column;
        }
        .logo-box { background: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 30px; }
        .logo-box img { height: 35px; }
        
        .nav-links { list-style: none; padding: 0; flex-grow: 1; }
        .nav-links li { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-links li:hover, .nav-links li.active { background: #ffcc00; color: #0b012d; font-weight: bold; }
        
        .logout-btn {
            background: #ff4444; color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .logout-btn:hover { background: #cc0000; }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: #ffcc00; margin: 0; }

        .card {
            background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Form Styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #ffcc00; font-size: 14px; }
        input, select {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; outline: none; box-sizing: border-box;
        }
        .submit-btn {
            grid-column: span 2; padding: 15px; background: #ffcc00; color: #0b012d;
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { background: #e6b800; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box"><img src="logo.jpeg" alt="SCC Logo"></div>
        <ul class="nav-links">
            <li class="active"><i class="fa-solid fa-user-plus"></i> Add Student</li>
            <li><i class="fa-solid fa-list-check"></i> Student List</li>
            <li><i class="fa-solid fa-file-contract"></i> Agreements</li>
            <li><i class="fa-solid fa-gear"></i> Settings</li>
        </ul>
        <button class="logout-btn" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Partner Dashboard</h1>
            <div id="welcomeUser" style="color: #bdc3c7;">Welcome, Partner</div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Register New Student File</h3>
            <form id="studentForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Student Full Name</label>
                        <input type="text" id="studentName" placeholder="Enter Full Name" required>
                    </div>
                    <div class="input-group">
                        <label>Passport Number</label>
                        <input type="text" id="passportNumber" placeholder="Ex: A01234567" required>
                    </div>
                    <div class="input-group">
                        <label>Course/Program</label>
                        <input type="text" id="course" placeholder="Ex: Bachelor of Science" required>
                    </div>
                    <div class="input-group">
                        <label>Target Country</label>
                        <select id="country">
                            <option value="UK">United Kingdom</option>
                            <option value="USA">USA</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Initial Status</label>
                        <input type="text" value="File Received" readonly style="color: #bdc3c7;">
                    </div>
                    <button type="submit" class="submit-btn">Save Student File</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Logout ফাংশন
        function handleLogout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = "/login";
            }
        }

        // Student Form সাবমিট লজিক (ভবিষ্যতের জন্য কানেক্টেড)
        document.getElementById('studentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const studentData = {
                name: document.getElementById('studentName').value,
                passport: document.getElementById('passportNumber').value,
                course: document.getElementById('course').value,
                country: document.getElementById('country').value
            };

            console.log("Saving Student Data:", studentData);
            alert("✅ Student File Saved Successfully! (Database connection coming soon)");
            e.target.reset();
        });

        // ব্রাউজার ব্যাক বাটন প্রিভেন্ট করা লগআউট অবস্থায়
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>

</body>
</html>
