<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding-bottom: 60px; }
        .card { background: white; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 10px; font-size: 12px; color: #666; cursor: pointer; }
        .active { color: #1a73e8; }
        .result-card { border-left: 5px solid #1a73e8; margin-top: 10px; padding: 10px; background: #f9f9f9; }
    </style>
</head>
<body>

<div id="assessment" class="page">
    <div class="card">
        <h3>🔍 Smart Assessment</h3>
        <input type="text" id="country" placeholder="Enter Country">
        <select id="degree">
            <option>Select Degree</option>
            <option>UG</option><option>PG</option><option>DIPLOMA</option>
            <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
        </select>
        <select id="lang">
            <option>Select Language</option>
            <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="text" id="langScore" placeholder="Lang Score">
            <input type="text" id="acadScore" placeholder="Academic CGPA">
        </div>
        <button class="btn-search" onclick="searchUni()">SEARCH UNIVERSITY</button>
    </div>
    <div id="uniResults"></div>
</div>

<div id="withdraw" class="page" style="display:none;">
    <div class="card">
        <h3>💰 Wallet & Subscription</h3>
        <p>Total Balance: <b>$500.00</b></p>
        <select id="method">
            <option>Bkash</option><option>Nagad</option><option>Bank Account</option>
        </select>
        <input type="number" id="amount" placeholder="Enter Amount">
        <button class="btn-search" style="background:#28a745;">SEND WITHDRAW REQUEST</button>
    </div>
</div>

<div id="tracking" class="page" style="display:none;">
    <div class="card">
        <h3>📁 File Tracking</h3>
        <div id="fileList"></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('assessment', this)"><i class="fas fa-search"></i><br>Search</div>
    <div class="nav-item" onclick="showPage('tracking', this); loadFiles()"><i class="fas fa-file-alt"></i><br>Tracking</div>
    <div class="nav-item" onclick="showPage('withdraw', this)"><i class="fas fa-wallet"></i><br>Wallet</div>
</div>

<script>
    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function searchUni() {
        const res = await fetch(`/api/search-uni?country=${document.getElementById('country').value}&degree=${document.getElementById('degree').value}`);
        const data = await res.json();
        document.getElementById('uniResults').innerHTML = data.map(u => `
            <div class="card result-card">
                <b>${u.uniName}</b> (${u.location})<br>
                <small>Intake: ${u.intake} | Fee: ${u.fee} ${u.currency}</small><br>
                <small>Bank Req: ${u.bankReq} | Comm: ${u.partnerCommission}</small>
                <button onclick="openFilePrompt('${u.uniName}')" style="margin-top:10px; background:#28a745; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    async function openFilePrompt(uni) {
        const name = prompt("Student Name:");
        const contact = prompt("Contact No:");
        const pdf = prompt("Paste PDF Link (Google Drive/Dropbox):");
        if(!name || !pdf) return;

        await fetch('/api/open-file', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                studentName: name, contact: contact, university: uni, pdfUrl: pdf,
                complianceMember: { name: "IHP Admin", id: "IHP-01" } 
            })
        });
        alert("File Submitted with PDF!");
    }

    async function loadFiles() {
        const res = await fetch('/api/files');
        const data = await res.json();
        document.getElementById('fileList').innerHTML = data.map(f => `
            <div style="border-bottom:1px solid #eee; padding:10px 0;">
                <b>${f.studentName}</b> - ${f.university}<br>
                <small>Status: ${f.status} | Date: ${new Date(f.openTime).toLocaleString()}</small><br>
                <small>Compliance: ${f.complianceMember.name}</small><br>
                <a href="${f.pdfUrl}" target="_blank" style="color:blue;">View/Download PDF</a>
            </div>
        `).join('');
    }
</script>
</body>
</html>
