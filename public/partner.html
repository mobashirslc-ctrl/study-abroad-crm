<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #2b0054; 
            --bg-dark: #070014; 
            --gold: #f1c40f; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
            --success: #2ecc71;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: white;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #0d001a;
            border-right: 1px solid var(--border);
            position: fixed;
            padding: 20px;
        }
        .logo img { width: 120px; margin-bottom: 30px; background: white; padding: 5px; border-radius: 8px; }
        .nav-item {
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            color: #ccc;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--glass);
            color: var(--gold);
            border: 1px solid var(--border);
        }

        /* --- WRAPPER --- */
        .wrapper { margin-left: 260px; width: calc(100% - 260px); }
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(13, 0, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .main { padding: 40px; }
        .section { display: none; }
        .active-section { display: block !important; }

        /* --- CARDS & TABLES --- */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .wallet-box {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
        }
        .wallet-box p { font-size: 12px; color: #aaa; letter-spacing: 1px; }
        .wallet-box h2 { font-size: 32px; margin: 10px 0; color: var(--gold); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 15px; border-bottom: 1px solid var(--border); color: var(--gold); font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }

        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .student_paid { background: var(--success); color: white; }
        .pending { background: var(--gold); color: black; }

        .reg-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 10px; margin-bottom: 15px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-search-location"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Earning</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <div>Welcome, <span id="welcomeName" style="color:var(--gold); font-weight:bold;">Partner</span></div>
            <button onclick="logout()" style="background:#ff4757; color:white; padding:8px 20px; border:none; border-radius:8px; cursor:pointer;">Logout</button>
        </div>

        <div class="main">
            <div id="home" class="section active-section">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div class="wallet-box" style="border-left: 5px solid var(--gold);">
                        <p>PENDING COMMISSION (Verified)</p>
                        <h2 id="topPending">৳0</h2>
                    </div>
                    <div class="wallet-box" style="border-left: 5px solid var(--success);">
                        <p>FINAL BALANCE (Paid)</p>
                        <h2 id="topFinal">৳0</h2>
                    </div>
                </div>
                <div class="card">
                    <h3 style="color:var(--gold);">Recent Applications</h3>
                    <table>
                        <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="homeTrackingBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="withdraw" class="section">
                <div class="card" style="text-align: center; padding: 60px;">
                    <i class="fas fa-wallet" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
                    <h2>Available for Withdrawal</h2>
                    <h1 style="color:var(--gold); font-size: 48px;">৳ <span id="withdrawFinalBalance">0</span></h1>
                    <button class="btn-gold" style="width: 280px;">REQUEST WITHDRAWAL</button>
                </div>
            </div>

            <div id="assessment" class="section"><div class="card"><h3>Coming Soon: Smart Search</h3></div></div>
            <div id="tracking" class="section">
                <div class="card">
                    <h3 style="color:var(--gold);">Full Application List</h3>
                    <table>
                        <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Docs</th></tr></thead>
                        <tbody id="sidebarTrackingBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk",
            authDomain: "ihp-portal-v3.firebaseapp.com",
            projectId: "ihp-portal-v3",
            storageBucket: "ihp-portal-v3.firebasestorage.app",
            messagingSenderId: "481157902534",
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // লগইন করা পার্টনারের ইমেইল (আপনার ডাটাবেস অনুযায়ী)
        const partnerEmail = "gorunbangladesh@gmail.com"; 

        function initDashboard() {
            const q = query(collection(db, "applications"), where("partnerEmail", "==", partnerEmail));
            
            onSnapshot(q, (snapshot) => {
                let pendingComm = 0;
                let finalBal = 0;
                let tableHTML = "";

                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const comm = Number(d.partnerComm || 0);

                    // --- WALLET LOGIC ---
                    // ১. পেন্ডিং বক্সে যাবে যদি Compliance ভেরিফাই করে (isVerified: true)
                    if (d.isVerified === true && d.walletStatus === "pending") {
                        pendingComm += comm;
                    }
                    // ২. ফাইনাল বক্সে যাবে যদি এডমিন পেমেন্ট কনফার্ম করে (walletStatus: paid)
                    if (d.walletStatus === "paid") {
                        finalBal += comm;
                    }

                    tableHTML += `
                        <tr>
                            <td><b>${d.studentName}</b><br><small>${d.university || 'N/A'}</small></td>
                            <td>${d.passportNo}</td>
                            <td><span class="status-pill ${d.status || 'pending'}">${d.status || 'pending'}</span></td>
                            <td>${d.updatedAt ? new Date(d.updatedAt.seconds * 1000).toLocaleDateString() : 'N/A'}</td>
                        </tr>
                    `;
                });

                document.getElementById('topPending').innerText = `৳${pendingComm.toLocaleString()}`;
                document.getElementById('topFinal').innerText = `৳${finalBal.toLocaleString()}`;
                document.getElementById('withdrawFinalBalance').innerText = finalBal.toLocaleString();
                document.getElementById('homeTrackingBody').innerHTML = tableHTML;
                document.getElementById('sidebarTrackingBody').innerHTML = tableHTML;
            });
        }

        window.showTab = (tabId, element) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(tabId).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');
        };

        window.logout = () => { location.href = "login.html"; };

        window.onload = initDashboard;
    </script>
</body>
</html>
