<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHP CRM | Partner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-handshake mr-2"></i> PARTNER PORTAL</h1>
            <div id="subscription-status" class="bg-green-600 px-3 py-1 rounded-full text-sm">Active</div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8">
        
        <section class="bg-white rounded-xl shadow-lg p-6 mb-8 border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fas fa-search-location mr-2"></i> Smart University Assessment</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-bold mb-1">Target Country</label>
                    <input type="text" id="searchCountry" placeholder="e.g. UK" class="w-full p-2 border rounded shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Degree</label>
                    <select id="searchDegree" class="w-full p-2 border rounded shadow-sm">
                        <option value="All">All Degrees</option>
                        <option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Language Test</label>
                    <select id="searchLanguage" class="w-full p-2 border rounded shadow-sm">
                        <option value="All">All Tests</option>
                        <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Study Gap (Years)</label>
                    <input type="number" id="searchGap" placeholder="e.g. 2" class="w-full p-2 border rounded shadow-sm">
                </div>
                <div class="md:col-span-4 mt-2">
                    <button onclick="performAssessment()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                        GET ASSESSMENT RESULTS
                    </button>
                </div>
            </div>
        </section>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

    </div>

    <script>
        async function performAssessment() {
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '<p class="text-center col-span-full">Processing Data...</p>';

            // API fetch logic
            const res = await fetch(`/api/search-uni?country=${document.getElementById('searchCountry').value}&degree=${document.getElementById('searchDegree').value}`);
            const data = await res.json();

            resultsGrid.innerHTML = '';
            data.forEach(uni => {
                resultsGrid.innerHTML += `
                    <div class="bg-white border rounded-xl shadow hover:shadow-xl transition p-5 border-l-8 border-blue-500">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg font-bold text-blue-900">${uni.uniName}</h3>
                            <span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded">${uni.degree}</span>
                        </div>
                        <p class="text-sm text-gray-600 mb-4"><i class="fas fa-book-open mr-2"></i> ${uni.courseName}</p>
                        
                        <div class="space-y-2 text-sm border-t pt-3">
                            <div class="flex justify-between"><span>Intake:</span> <strong>${uni.intake}</strong></div>
                            <div class="flex justify-between"><span>Semester Fee:</span> <strong>${uni.semesterFee} ${uni.currency}</strong></div>
                            <div class="flex justify-between"><span>Marital Status:</span> <strong class="text-green-600">${uni.maritalStatus}</strong></div>
                            <div class="flex justify-between"><span>Study Gap Allowed:</span> <strong>${uni.studyGap}</strong></div>
                            <div class="flex justify-between font-bold text-red-600"><span>Bank Req BD:</span> <span>${uni.bankNameBD}</span></div>
                            <div class="flex justify-between"><span>Loan Support:</span> <strong>${uni.loanAmount}</strong></div>
                        </div>

                        <button class="w-full mt-4 bg-slate-800 text-white py-2 rounded font-bold text-sm">
                            <i class="fas fa-folder-plus mr-2"></i> OPEN STUDENT FILE
                        </button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
