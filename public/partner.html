<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026 (Fixed)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --success: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #0d001a; border-right: 1px solid var(--border); position: fixed; padding: 20px; }
        .wrapper { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 10px; color: #ccc; margin-bottom: 5px; }
        .nav-item.active { background: var(--glass); color: var(--gold); border: 1px solid var(--border); }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .reg-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .section { display: none; } .active-section { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: var(--gold); border-bottom: 2px solid var(--border); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-search"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-tasks"></i> Tracking</div>
    </div>

    <div class="wrapper">
        <div id="home" class="section active-section">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card"><h4>PENDING</h4><h2 id="topPending">৳0</h2></div>
                <div class="card"><h4>FINAL</h4><h2 id="topFinal">৳0</h2></div>
            </div>
            <div class="card">
                <h3>Recent Applications</h3>
                <table>
                    <thead><tr><th>Student</th><th>Passport</th><th>Status</th></tr></thead>
                    <tbody id="homeTrackingBody"></tbody>
                </table>
            </div>
        </div>

        <div id="assessment" class="section">
            <div class="card">
                <h3>Search University</h3>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <input type="text" id="fCountry" placeholder="Country" class="reg-input">
                    <select id="fDegree" class="reg-input"><option value="">Degree</option><option value="Bachelor">Bachelor</option><option value="Master">Master</option></select>
                    <button onclick="searchUniversity()" class="btn-gold">FILTER</button>
                </div>
            </div>
            <div class="card" style="overflow-x:auto;">
                <table id="uniTable">
                    <thead><tr><th>Uni Name</th><th>Country</th><th>Degree</th><th>Commission</th><th>Action</th></tr></thead>
                    <tbody id="uniListContainer"></tbody>
                </table>
            </div>
        </div>

        <div id="tracking" class="section">
            <div class="card"><h3>All Applications</h3><table id="fullTrackingBody"></table></div>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="card" style="width: 500px;">
            <h3 id="targetUni">Apply</h3>
            <form id="applyForm">
                <input type="text" id="sName" placeholder="Student Name" class="reg-input" required>
                <input type="text" id="sPassport" placeholder="Passport Number" class="reg-input" required>
                <label>Passport PDF:</label><input type="file" id="file1" accept=".pdf" class="reg-input" required>
                <label>Academic PDF:</label><input type="file" id="file2" accept=".pdf" class="reg-input" required>
                <button type="submit" id="submitBtn" class="btn-gold">CONFIRM & UPLOAD PDF</button>
                <button type="button" onclick="closeModal()" style="background:none; color:red; border:none; margin-top:10px; cursor:pointer; width:100%;">Cancel</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk", 
            authDomain: "ihp-portal-v3.firebaseapp.com", 
            projectId: "ihp-portal-v3", 
            storageBucket: "ihp-portal-v3.firebasestorage.app", 
            messagingSenderId: "481157902534", 
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const partnerEmail = localStorage.getItem('userEmail') || "gorunbangladesh@gmail.com";

        // ১. PDF আপলোড লজিক (Cloudinary API)
        async function uploadFile(file) {
            if(!file) return "";
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'scc_docs'); // আপনার Cloudinary preset নাম দিন
            const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            return data.secure_url;
        }

        // ২. লাইভ ডাটা রিট্রিভাল (Fix: Data vanished issue)
        onSnapshot(query(collection(db, "applications"), where("partnerEmail", "==", partnerEmail)), (snap) => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                html += `<tr><td>${d.studentName}</td><td>${d.passportNo}</td><td><span class="status-pill">${d.status}</span></td></tr>`;
            });
            document.getElementById('homeTrackingBody').innerHTML = html;
        });

        // ৩. সার্চ ফিল্টার (Fix: Search filter working again)
        window.searchUniversity = async () => {
            const country = document.getElementById('fCountry').value.toLowerCase();
            const degree = document.getElementById('fDegree').value;
            const container = document.getElementById('uniListContainer');
            container.innerHTML = "Searching...";

            const snap = await getDocs(collection(db, "universities"));
            let html = "";
            snap.forEach(doc => {
                const u = doc.data();
                if ((!country || u.country.toLowerCase().includes(country)) && (!degree || u.degree === degree)) {
                    html += `<tr><td>${u.name}</td><td>${u.country}</td><td>${u.degree}</td><td>৳${u.partnerComm}</td>
                    <td><button onclick="openApplyModal('${u.name}', '${u.partnerComm}')" class="btn-gold" style="padding:5px;">APPLY</button></td></tr>`;
                }
            });
            container.innerHTML = html || "No Universities Found";
        };

        // ৪. অ্যাপ্লিকেশন সাবমিশন (PDF Upload Fix)
        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "UPLOADING PDF..."; btn.disabled = true;

            try {
                const url1 = await uploadFile(document.getElementById('file1').files[0]);
                const url2 = await uploadFile(document.getElementById('file2').files[0]);

                await addDoc(collection(db, "applications"), {
                    studentName: document.getElementById('sName').value,
                    passportNo: document.getElementById('sPassport').value,
                    university: window.selectedUni,
                    partnerComm: Number(window.selectedComm),
                    partnerEmail: partnerEmail,
                    status: "submitted",
                    pdf1: url1, pdf2: url2,
                    createdAt: serverTimestamp()
                });
                alert("Application Success with PDF!");
                closeModal();
            } catch (err) { alert("Error: " + err.message); }
            btn.innerText = "CONFIRM & UPLOAD PDF"; btn.disabled = false;
        };

        window.openApplyModal = (uni, comm) => {
            document.getElementById('targetUni').innerText = "Apply for " + uni;
            document.getElementById('applyModal').style.display = "flex";
            window.selectedUni = uni; window.selectedComm = comm;
        };
        window.closeModal = () => document.getElementById('applyModal').style.display = "none";
        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        };
        window.onload = searchUniversity;
    </script>
</body>
</html>
