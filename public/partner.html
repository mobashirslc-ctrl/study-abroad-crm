<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }
        .main-content {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 2rem;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        input, select {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            outline: none;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border-right: 3px solid #3b82f6;
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6">
            <h2 class="text-xl font-bold tracking-tighter text-blue-400">IHP PARTNER</h2>
        </div>
        <nav class="mt-4">
            <a href="#" class="nav-item active"><i class="fas fa-search"></i> Assessment</a>
            <a href="#" class="nav-item"><i class="fas fa-file-invoice-dollar"></i> My Files</a>
            <a href="#" class="nav-item"><i class="fas fa-wallet"></i> Wallet History</a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i> Settings</a>
            <div class="mt-20 px-6">
                <button onclick="localStorage.clear(); location.href='/login'" class="text-sm text-red-400 hover:text-red-300">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-8 glass-panel p-6">
            <div>
                <h1 class="text-2xl font-bold">Welcome, <span id="partnerNameDisplay" class="text-blue-400">Partner</span></h1>
                <p class="text-slate-400 text-sm">Real-time University Assessment</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase">Wallet Balance</p>
                <p class="text-3xl font-mono font-bold text-emerald-400">$<span id="walletBal">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-panel p-6 h-fit">
                <h2 class="text-lg font-semibold mb-6 border-b border-white/10 pb-2"><i class="fas fa-filter text-blue-400 mr-2"></i> Smart Filters</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400">Select Degree</label>
                        <select id="sDegree" class="w-full p-3 rounded-lg mt-1">
                            <option value="PG">PG (Post Graduate)</option>
                            <option value="UG">UG (Under Graduate)</option>
                            <option value="DIPLOMA">DIPLOMA</option>
                            <option value="FOUNDATION">FOUNDATION</option>
                            <option value="RESEARCH">RESEARCH</option>
                            <option value="PHD">PHD</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Language Test</label>
                        <select id="sLang" class="w-full p-3 rounded-lg mt-1">
                            <option value="IELTS">IELTS</option>
                            <option value="PTE">PTE</option>
                            <option value="DUOLINGO">DUOLINGO</option>
                        </select>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-xs text-slate-400">Lang Score</label>
                            <input type="text" id="sScore" placeholder="7.0" class="w-full p-3 rounded-lg mt-1">
                        </div>
                        <div class="flex-1">
                            <label class="text-xs text-slate-400">GPA</label>
                            <input type="text" id="sGpa" placeholder="3.5" class="w-full p-3 rounded-lg mt-1">
                        </div>
                    </div>
                    <button onclick="runAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold mt-4 transition-all shadow-lg shadow-blue-500/20 uppercase">
                        Find Universities
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-panel p-6 min-h-[400px]">
                <h2 class="text-lg font-semibold mb-6 border-b border-white/10 pb-2">Eligible Options</h2>
                <div id="resultsArea" class="space-y-4">
                    <div class="text-center py-20 text-slate-500">
                        <i class="fas fa-university text-4xl mb-4 opacity-20"></i>
                        <p>Adjust filters and press find to see matching results.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[200]">
        <div class="glass-panel p-8 w-full max-w-md border-t-4 border-emerald-500">
            <h2 class="text-2xl font-bold mb-4">Confirm Student File</h2>
            <div class="space-y-4">
                <input type="text" id="stName" placeholder="Student Full Name" class="w-full p-3 rounded-lg">
                <input type="text" id="stContact" placeholder="Contact Number" class="w-full p-3 rounded-lg">
                <div class="p-4 bg-emerald-500/10 rounded-lg">
                    <p class="text-xs text-emerald-200">Commission Earned:</p>
                    <p class="text-2xl font-bold text-emerald-400" id="commLabel">$0</p>
                </div>
                <button onclick="submitStudentFile()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold">SUBMIT & ADD COMMISSION</button>
                <button onclick="document.getElementById('fileModal').classList.add('hidden')" class="w-full text-sm text-slate-400">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentUni = null;

        // Load Initial Data
        window.onload = async () => {
            document.getElementById('partnerNameDisplay').innerText = localStorage.getItem('partnerName') || 'Partner';
            refreshWallet();
        };

        async function refreshWallet() {
            const res = await fetch(`/api/partner/details/${localStorage.getItem('partnerId')}`);
            if(res.ok) {
                const data = await res.json();
                document.getElementById('walletBal').innerText = (data.walletBalance || 0).toFixed(2);
            }
        }

        async function runAssessment() {
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = '<div class="text-center py-20 animate-pulse text-blue-400">Searching...</div>';

            try {
                const res = await fetch('/api/universities');
                const unis = await res.json();

                const degree = document.getElementById('sDegree').value;
                
                // FIXED FILTER LOGIC
                const filtered = unis.filter(u => u.degreeType.toUpperCase().includes(degree));

                if(filtered.length === 0) {
                    resultsArea.innerHTML = '<p class="text-center py-20 text-slate-400">No universities match your criteria yet.</p>';
                    return;
                }

                resultsArea.innerHTML = filtered.map(u => `
                    <div class="glass-panel p-6 hover:bg-white/5 transition-all border-l-4 border-blue-500">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-blue-300">${u.uniName}</h3>
                                <p class="text-xs text-slate-400"><i class="fas fa-map-marker-alt mr-1"></i> ${u.country} | ${u.location}</p>
                            </div>
                            <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/30">
                                $${u.partnerCommission} Comp.
                            </span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-[11px] text-slate-300 mb-4">
                            <div><p class="text-slate-500">Intake</p>${u.intake}</div>
                            <div><p class="text-slate-500">Course</p>${u.courseName}</div>
                            <div><p class="text-slate-500">Sem. Fee</p>${u.semesterFee}</div>
                            <div><p class="text-slate-500">Marital Req.</p>${u.maritalStatus}</div>
                            <div><p class="text-slate-500">Bank Req.</p>${u.bankNameBD}</div>
                        </div>
                        <button onclick="openForm('${u.uniName}', ${u.partnerCommission})" class="w-full bg-blue-600/20 hover:bg-blue-600 py-3 rounded-lg text-sm font-bold transition-all border border-blue-500/30">
                            OPEN FILE & EARN
                        </button>
                    </div>
                `).join('');
            } catch(e) {
                resultsArea.innerHTML = '<p class="text-center py-20 text-red-400">Error connecting to server.</p>';
            }
        }

        function openForm(name, comm) {
            currentUni = { name, comm };
            document.getElementById('commLabel').innerText = "$" + comm;
            document.getElementById('fileModal').classList.remove('hidden');
        }

        async function submitStudentFile() {
            const payload = {
                partnerId: localStorage.getItem('partnerId'),
                studentName: document.getElementById('stName').value,
                contactNo: document.getElementById('stContact').value,
                uniName: currentUni.name,
                commission: currentUni.comm
            };

            const res = await fetch('/api/partner/submit-file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                alert("File Submitted Successfully!");
                location.reload();
            }
        }
    </script>
</body>
</html>
