<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard | Georun Ltd.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --purple-dark: #0b012d; --purple-light: #1a0b4d; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: radial-gradient(circle at top right, var(--purple-light), var(--purple-dark)); font-family: 'Poppins', sans-serif; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; text-align: center; }
        .nav-links { list-style: none; padding: 0; flex-grow: 1; }
        .nav-links li { padding: 18px 25px; cursor: pointer; color: #b1a7d1; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-links li.active { background: var(--glass); color: var(--gold); border-right: 4px solid var(--gold); }

        /* Content Area */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass-border); }
        .content { padding: 30px; }

        /* Wallet Boxes */
        .wallet-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .wallet-box { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; }
        .wallet-box h3 { font-size: 32px; margin: 10px 0; color: var(--gold); }

        /* Smart Assessment Search */
        .search-card { background: var(--glass); padding: 30px; border-radius: 25px; border: 1px solid var(--glass-border); }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; }
        
        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--gold); border-bottom: 2px solid var(--glass-border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        footer { text-align: center; padding: 20px; font-size: 12px; opacity: 0.5; margin-top: auto; }
        
        .section { display: none; }
        .section.active { display: block; }

        /* Modal */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><img src="logo.jpeg" width="80" style="border-radius:12px; border:2px solid var(--gold);"></div>
        <ul class="nav-links">
            <li class="active" onclick="showSection('assessment', this)"><i class="fas fa-search"></i> Smart Assessment</li>
            <li onclick="showSection('tracking', this)"><i class="fas fa-tasks"></i> Live File Tracking</li>
            <li onclick="showSection('earning', this)"><i class="fas fa-wallet"></i> Withdraw & Earning</li>
            <li onclick="showSection('profile', this)"><i class="fas fa-user-circle"></i> Profile Setup</li>
        </ul>
    </aside>

    <main class="main-container">
        <header class="header">
            <div>Welcome, <span id="partnerName" style="color:var(--gold)">...</span></div>
            <button onclick="logout()" style="background:none; color:white; border:1px solid red; padding:8px 15px; border-radius:8px; cursor:pointer;">Logout</button>
        </header>

        <div class="content">
            <div id="assessment" class="section active">
                <div class="search-card">
                    <h3><i class="fas fa-graduation-cap"></i> Find Universities</h3>
                    <div class="filter-row">
                        <select id="fCountry"><option>UK</option><option>USA</option></select>
                        <select id="fDegree"><option>Bachelor</option><option>Master</option></select>
                        <select id="fLang"><option>IELTS</option><option>Duolingo</option></select>
                        <input type="number" id="fGPA" placeholder="Academic GPA">
                        <input type="number" id="fScore" placeholder="Lang Score">
                    </div>
                    <button class="btn-gold" id="searchBtn" style="background:var(--gold); padding:12px 30px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Search Now</button>
                </div>
                <div id="resultArea" style="margin-top:30px;">
                    </div>
            </div>

            <div id="tracking" class="section">
                <div class="search-card">
                    <h3><i class="fas fa-sync-alt"></i> File Status</h3>
                    <table>
                        <thead><tr><th>Student</th><th>Passport</th><th>Status</th><th>Compliance</th><th>Doc</th><th>Update</th></tr></thead>
                        <tbody id="trackingBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="earning" class="section">
                <div class="wallet-container">
                    <div class="wallet-box"><p>Pending Box</p><h3 id="pBox">৳ 0</h3></div>
                    <div class="wallet-box"><p>Final Box</p><h3 id="fBox">৳ 0</h3></div>
                </div>
                <button class="btn-gold" id="withdrawBtn" disabled style="opacity:0.5; width:200px; padding:15px; background:var(--gold); border:none; border-radius:10px; cursor:not-allowed;">Withdraw Now</button>
            </div>

            <div id="profile" class="section">
                <div class="search-card" style="max-width:500px;">
                    <h3>Update Payment Details</h3>
                    <input type="text" id="bankName" placeholder="Bank Name" style="width:100%; margin-bottom:15px;">
                    <input type="text" id="accNo" placeholder="Account Number" style="width:100%; margin-bottom:15px;">
                    <button class="btn-gold" style="background:var(--gold); border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer;">Save Profile</button>
                </div>
            </div>
        </div>

        <footer>Alright and reserved Georun Ltd.</footer>
    </main>

    <script>
        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
