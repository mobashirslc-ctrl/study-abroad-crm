<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #0a0a0b; color: #fff; font-family: 'Inter', sans-serif; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #111113; border-right: 1px solid #27272a; position: fixed; padding: 20px; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .search-container { background: #111113; border: 1.5px solid #facc15; border-radius: 10px; display: flex; margin-bottom: 30px; }
        .search-container input { flex: 1; background: transparent; border: none; color: #fff; padding: 15px; outline: none; }
        .btn-search { background: #facc15; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; }
        .data-table { width: 100%; border-collapse: collapse; background: #111113; border-radius: 12px; overflow: hidden; border: 1px solid #27272a; }
        .data-table th { text-align: left; padding: 15px; border-bottom: 2px solid #facc15; color: #facc15; }
        .data-table td { padding: 15px; border-bottom: 1px solid #27272a; }
    </style>
</head>
<body>
    <div class="sidebar"><h2 style="color:#facc15;">Partner Dashboard</h2></div>
    <div class="main">
        <div class="search-container">
            <input type="text" placeholder="Search University by Name or Country...">
            <button class="btn-search">SEARCH</button>
        </div>
        <table class="data-table">
            <thead>
                <tr><th>UNIVERSITY</th><th>LEVEL</th><th>DEPOSIT</th><th>COMMISSION</th><th>ACTION</th></tr>
            </thead>
            <tbody>
                <tr><td>University of Hull</td><td>Masters</td><td>£3,000</td><td style="color:#facc15;">£1,500</td><td><button class="btn-search" style="padding:8px 15px; border-radius:5px;">Apply</button></td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
