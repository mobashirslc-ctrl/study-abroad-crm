<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner Master | Core Locked</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.section { display: none; } .active { display: block; }</style>
</head>
<body class="bg-gray-50 flex" onload="loadDashboard()">
    <div class="w-64 bg-[#0f172a] h-screen text-white p-6 sticky top-0">
        <h1 class="text-xl font-bold mb-10 text-blue-500">PARTNER MASTER</h1>
        <nav class="space-y-4">
            <button onclick="showTab('assessment')" class="w-full text-left py-2 px-3 hover:bg-slate-800 rounded">Smart Assesment</button>
            <button onclick="showTab('tracking')" class="w-full text-left py-2 px-3 hover:bg-slate-800 rounded">File Tracking</button>
            <button onclick="showTab('finance')" class="w-full text-left py-2 px-3 hover:bg-slate-800 rounded">Finance & Subs</button>
        </nav>
    </div>

    <div class="flex-1 p-10">
        <div id="assessment" class="section active bg-white p-6 rounded shadow border border-gray-100">
            <h2 class="font-bold mb-4 uppercase">Assesment Tool</h2>
            <div class="grid grid-cols-4 gap-4 mb-8">
                <input type="text" id="sCountry" placeholder="Country" class="border p-2 rounded">
                <select id="sDegree" class="border p-2 rounded"><option>Ug</option><option>Pg</option><option>Diploma</option></select>
                <select id="sLang" class="border p-2 rounded"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                <button onclick="searchUni()" class="bg-blue-600 text-white rounded font-bold">SEARCH</button>
            </div>
            <div id="results"></div>
        </div>

        <div id="finance" class="section">
            <div class="grid grid-cols-2 gap-8">
                <div class="bg-blue-900 text-white p-10 rounded-xl">
                    <p class="text-xs opacity-70">WALLET BALANCE</p>
                    <h2 class="text-4xl font-bold">$ <span id="wallet">0.00</span></h2>
                </div>
                <div class="bg-white p-8 rounded shadow border">
                    <h3 class="font-bold mb-4">WITHDRAW</h3>
                    <input type="text" id="accNo" placeholder="Account Number" class="w-full border p-2 mb-2 rounded">
                    <input type="number" id="amount" placeholder="Amount" class="w-full border p-2 mb-4 rounded">
                    <button id="withdrawBtn" disabled class="w-full bg-gray-400 text-white py-3 rounded font-bold uppercase">Locked</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        // Core functions remain here...
    </script>
</body>
</html>
