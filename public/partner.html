<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner Portal | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center h-screen">

    <div id="authBox" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 tracking-tighter">IHP CRM</h1>
            <p class="text-gray-500 text-sm font-semibold uppercase mt-1">Partner Portal Access</p>
        </div>
        
        <div id="loginForm">
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Registered Email</label>
            <input type="email" id="loginEmail" placeholder="partner@example.com" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-6 outline-none focus:border-blue-500 transition">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition duration-300">LOGIN TO DASHBOARD</button>
            <div class="mt-6 text-center">
                <p class="text-gray-500 text-sm">Don't have an account? <a href="#" onclick="toggleAuth()" class="text-blue-600 font-bold hover:underline">Apply for Partnership</a></p>
            </div>
        </div>

        <div id="regForm" class="hidden">
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-green-500">
                <input type="email" id="regEmail" placeholder="Email Address" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-green-500">
                <input type="text" id="regOrg" placeholder="Organization/Agency Name" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-green-500">
                <input type="text" id="regContact" placeholder="Contact Number" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-green-500">
            </div>
            <button onclick="handleRegister()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold mt-6 hover:bg-green-700 shadow-lg shadow-green-100 transition duration-300">SUBMIT REGISTRATION</button>
            <div class="mt-6 text-center">
                <a href="#" onclick="toggleAuth()" class="text-gray-400 text-sm font-bold hover:text-gray-600">Already registered? Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('regForm').classList.toggle('hidden');
        }

        async function handleRegister() {
            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                orgName: document.getElementById('regOrg').value,
                contact: document.getElementById('regContact').value
            };
            
            if(!data.email || !data.name) return alert("Please fill required fields.");

            const res = await fetch('/api/partner/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if(result.success) toggleAuth();
        }

        async function checkLogin() {
            const email = document.getElementById('loginEmail').value;
            if(!email) return alert("Please enter email");

            const res = await fetch('/api/partner/login-check', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email })
            });
            const result = await res.json();
            
            if(result.approved) {
                alert(`Welcome back, ${result.name}! Redirecting...`);
                // এখানে পরবর্তী ধাপে ড্যাশবোর্ড লোড হবে
                localStorage.setItem('partnerId', result.partnerId);
                // window.location.href = "/partner-dashboard"; // আমরা এখনো ড্যাশবোর্ড পেজ বানাইনি
            } else {
                alert(result.msg);
            }
        }
    </script>
</body>
</html>
