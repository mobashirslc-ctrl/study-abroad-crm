<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 11px; color: #888; cursor: pointer; }
        .active { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <div class="card">
            <h2 id="authTitle">Partner Registration</h2>
            <div id="regFields">
                <input type="text" id="pName" placeholder="Full Name">
            </div>
            <input type="email" id="pEmail" placeholder="Email Address">
            <input type="password" id="pPass" placeholder="Password">
            <button class="btn-main" id="authBtn" onclick="handleAuth()">REGISTER NOW</button>
            <p style="text-align:center; cursor:pointer; font-size:12px;" onclick="toggleAuth()">Already have an account? Login</p>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="sCountry" placeholder="Enter Country">
            <select id="sDegree">
                <option value="">Select Degree</option>
                <option>UG</option><option>PG</option><option>PHD</option>
            </select>
            <button class="btn-main" onclick="runSearch()">SEARCH UNIVERSITY</button>
        </div>
        <div id="results"></div>
    </div>
</div>

<div class="nav-bar" id="navbar" style="display:none;">
    <div class="nav-item active"><i class="fas fa-search"></i><br>Search</div>
    <div class="nav-item"><i class="fas fa-wallet"></i><br>Wallet</div>
</div>

<script>
    let isLogin = false;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Partner Login" : "Partner Registration";
        document.getElementById('regFields').style.display = isLogin ? "none" : "block";
        document.getElementById('authBtn').innerText = isLogin ? "LOGIN" : "REGISTER NOW";
    }

    async function handleAuth() {
        const email = document.getElementById('pEmail').value;
        const pass = document.getElementById('pPass').value;
        const name = document.getElementById('pName').value;

        if(isLogin) {
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, pass })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('pUser', JSON.stringify(data.user));
                showDashboard();
            } else alert(data.message);
        } else {
            const res = await fetch('/api/auth/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, pass })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) toggleAuth(); // রেজিস্ট্রেশন শেষে লগইন পেজে নিয়ে যাবে
        }
    }

    function showDashboard() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('navbar').style.display = 'flex';
    }

    // বাটন ফিক্স: runSearch ফাংশনটি এখন সঠিকভাবে কাজ করবে
    async function runSearch() {
        const country = document.getElementById('sCountry').value;
        const degree = document.getElementById('sDegree').value;
        const res = await fetch(`/api/search-uni?country=${country}&degree=${degree}`);
        const data = await res.json();
        
        document.getElementById('results').innerHTML = data.map(u => `
            <div class="card">
                <b>${u.uniName}</b><br><small>${u.country}</small>
                <div style="font-size:12px; margin-top:10px;">
                    Fee: ${u.fee} ${u.currency} | Comm: ${u.partnerCommission}
                </div>
                <button class="btn-main" style="margin-top:10px; background:#28a745;">OPEN FILE</button>
            </div>
        `).join('');
    }

    // অটো লগইন চেক
    const savedUser = JSON.parse(localStorage.getItem('pUser'));
    if(savedUser) showDashboard();
</script>
</body>
</html>
