<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .section { display: none; } .active { display: block; } </style>
</head>
<body class="bg-slate-50 flex">
    <div class="w-64 bg-[#0f172a] h-screen text-white p-6 sticky top-0 flex flex-col">
        <h1 class="text-xl font-black mb-8 text-blue-400 text-center italic uppercase">IHP Partner</h1>
        <div class="mb-8 p-4 bg-slate-800 rounded-xl border border-slate-700 text-center">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Wallet Balance</p>
            <h3 id="walletBalance" class="text-2xl font-black text-green-400">$0.00</h3>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showSection('assessmentSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition font-semibold text-sm">🔍 Smart Assessment</button>
        </nav>
        <button onclick="logout()" class="w-full bg-red-500/10 text-red-400 py-2 rounded text-xs font-bold hover:bg-red-500 hover:text-white transition">LOGOUT</button>
    </div>

    <div class="flex-1 p-10 overflow-y-auto h-screen">
        <div id="assessmentSection" class="section active bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-black mb-6 uppercase border-b pb-4">Smart Assessment Tool</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                <input type="text" id="aCountry" placeholder="Country" class="p-3 border rounded-lg text-sm outline-none">
                <select id="aDegree" class="p-3 border rounded-lg text-sm outline-none">
                    <option value="">Degree</option><option>Ug</option><option>Pg</option><option>PhD</option>
                </select>
                <button onclick="runAssessment()" class="bg-blue-600 text-white py-2 rounded-lg font-bold uppercase text-xs">Search</button>
            </div>
            <div id="assessmentResult" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <script>
        // লগইন চেক
        window.onload = () => {
            const info = JSON.parse(localStorage.getItem('partnerInfo'));
            if(!info) { window.location.href = "/"; return; }
            document.getElementById('walletBalance').innerText = `$${info.walletBalance || 0}`;
        };

        async function runAssessment() {
            const res = await fetch('/api/partner/assessment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ country: document.getElementById('aCountry').value, degree: document.getElementById('aDegree').value })
            });
            const unis = await res.json();
            const div = document.getElementById('assessmentResult');
            div.innerHTML = unis.map(u => `
                <div class="bg-slate-50 border rounded-2xl p-6 shadow-sm">
                    <h3 class="font-black text-blue-900 uppercase">${u.uniName}</h3>
                    <p class="text-[10px] text-blue-500 font-bold mb-3 uppercase">${u.location}, ${u.country}</p>
                    <div class="grid grid-cols-2 gap-2 text-[11px] text-slate-600 border-y py-3 mb-4">
                        <p><b>Course:</b> ${u.courseName}</p><p><b>Intake:</b> ${u.intake}</p>
                        <p><b>Fee:</b> ${u.semesterFee}</p><p><b>Bank BD:</b> ${u.bankNameBD}</p>
                        <p><b>Loan:</b> ${u.loanAmount}</p><p><b>Marital:</b> ${u.maritalStatus}</p>
                        <p class="col-span-2"><b>Bank Req:</b> ${u.bankType}</p>
                    </div>
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border">
                        <span class="text-lg font-black text-green-600">$${u.partnerCommission}</span>
                        <button class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-xs uppercase">Open File</button>
                    </div>
                </div>`).join('');
        }

        function logout() { localStorage.clear(); window.location.href = "/"; }
    </script>
</body>
</html>
