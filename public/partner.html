<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: #0d001a; border-right: 1px solid var(--border); position: fixed; padding: 20px; box-sizing: border-box; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; cursor: pointer; border-radius: 10px; color: #ccc; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: var(--glass); color: var(--gold); border: 1px solid var(--border); }
        .wrapper { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; }
        .section { display: none; padding: 30px; }
        .active-section { display: block !important; }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .reg-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 5px; margin-bottom: 10px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { color: var(--gold); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-tasks"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Withdraw</div>
        <div class="nav-item" onclick="showTab('profile', this)"><i class="fas fa-user-circle"></i> Profile</div>
    </div>

    <div class="wrapper">
        <div id="assessment" class="section active-section">
            <div class="card">
                <h3>Search University</h3>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                    <input type="text" id="fCountry" placeholder="Country (e.g. UK)" class="reg-input">
                    <input type="number" step="0.1" id="fGPA" placeholder="Your GPA" class="reg-input">
                    <button onclick="searchUniversity()" class="btn-gold">SEARCH</button>
                </div>
            </div>
            <div class="card" id="searchResultArea" style="display:none; overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>University</th><th>Country</th><th>Min GPA</th><th>Tuition (৳)</th><th>Commission (৳)</th><th>Action</th></tr>
                    </thead>
                    <tbody id="uniListContainer"></tbody>
                </table>
            </div>
        </div>

        <div id="tracking" class="section">
            <div class="card">
                <h3>Application Tracking</h3>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr><th>Student Name</th><th>University</th><th>Status</th><th>Last Update</th></tr>
                        </thead>
                        <tbody id="trackingContainer"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="withdraw" class="section">
            <div class="card">
                <h3>Withdraw Earnings</h3>
                <p>Available Balance: <span style="color:var(--gold); font-size: 24px;">৳<span id="balanceText">0</span></span></p>
                <input type="number" id="wAmount" placeholder="Amount to Withdraw" class="reg-input">
                <select id="wMethod" class="reg-input">
                    <option value="bKash">bKash</option>
                    <option value="Nagad">Nagad</option>
                    <option value="Bank">Bank Transfer</option>
                </select>
                <button onclick="requestWithdraw()" class="btn-gold">SEND REQUEST</button>
            </div>
        </div>

        <div id="profile" class="section">
            <div class="card">
                <h3>Partner Profile</h3>
                <label>Agency Name</label>
                <input type="text" id="pAgency" class="reg-input" readonly>
                <label>Email</label>
                <input type="text" id="pEmail" class="reg-input" readonly>
                <label>Phone</label>
                <input type="text" id="pPhone" class="reg-input">
                <button onclick="updateProfile()" class="btn-gold">UPDATE PROFILE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk",
            authDomain: "ihp-portal-v3.firebaseapp.com",
            projectId: "ihp-portal-v3",
            storageBucket: "ihp-portal-v3.firebasestorage.app",
            messagingSenderId: "481157902534",
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const partnerID = localStorage.getItem('partnerEmail') || 'guest';

        // 1. Fixed Assessment Search
        window.searchUniversity = async () => {
            const country = document.getElementById('fCountry').value.trim();
            const userGPA = parseFloat(document.getElementById('fGPA').value) || 0;
            const container = document.getElementById('uniListContainer');
            document.getElementById('searchResultArea').style.display = "block";
            container.innerHTML = "Searching...";

            const snap = await getDocs(collection(db, "universities"));
            let html = "";
            snap.forEach(doc => {
                const u = doc.data();
                // Matching logic with fallback for empty fields
                const matchCountry = !country || (u.country && u.country.toLowerCase().includes(country.toLowerCase()));
                const matchGPA = userGPA >= (parseFloat(u.minGPA) || 0);

                if (matchCountry && matchGPA) {
                    const rate = 150; // Manual BDT Rate
                    const comm = Math.round(((u.totalComm || 0) * (u.partnerShare || 50) / 100) * rate);
                    html += `<tr>
                        <td>${u.name}</td><td>${u.country}</td><td>${u.minGPA}</td>
                        <td>৳${((u.tuitionFee || 0) * rate).toLocaleString()}</td>
                        <td style="color:var(--gold)">৳${comm.toLocaleString()}</td>
                        <td><button class="btn-gold" style="padding:5px">Apply</button></td>
                    </tr>`;
                }
            });
            container.innerHTML = html || "<tr><td colspan='6'>No matching university found.</td></tr>";
        };

        // 2. Tracking Table Fix
        async function loadTracking() {
            const q = query(collection(db, "applications"), where("partnerEmail", "==", partnerID));
            const snap = await getDocs(q);
            let html = "";
            snap.forEach(doc => {
                const a = doc.data();
                html += `<tr><td>${a.studentName}</td><td>${a.university}</td><td>${a.status || 'Pending'}</td><td>${a.date || 'N/A'}</td></tr>`;
            });
            document.getElementById('trackingContainer').innerHTML = html || "<tr><td colspan='4'>No applications found.</td></tr>";
        }

        // 3. Profile Setup
        async function loadProfile() {
            document.getElementById('pEmail').value = partnerID;
            document.getElementById('pAgency').value = localStorage.getItem('partnerName') || 'SCC Partner';
        }

        // 4. Withdraw Logic
        window.requestWithdraw = async () => {
            const amount = document.getElementById('wAmount').value;
            if(!amount) return alert("Enter amount");
            await addDoc(collection(db, "withdrawals"), {
                partnerEmail: partnerID,
                amount: amount,
                method: document.getElementById('wMethod').value,
                status: "Pending",
                timestamp: new Date()
            });
            alert("Withdrawal request sent!");
        };

        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'tracking') loadTracking();
        };

        loadProfile();
    </script>
</body>
</html>
