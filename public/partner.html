<!DOCTYPE html>
<html>
<head>
    <title>Partner Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 60px; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-search { width: 100%; background: #1a73e8; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 12px; color: #666; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="sCountry" placeholder="Enter Country">
            <select id="sDeg">
                <option>Select Degree</option><option>UG</option><option>PG</option><option>PHD</option>
            </select>
            <button class="btn-search" onclick="searchUni()">SEARCH UNIVERSITY</button>
        </div>
        <div id="results"></div>
    </div>
    <div class="nav">
        <div class="nav-item">Search</div>
        <div class="nav-item">Files</div>
        <div class="nav-item">Wallet</div>
    </div>
    <script>
        async function searchUni() {
            const res = await fetch(`/api/search-uni?country=${document.getElementById('sCountry').value}&degree=${document.getElementById('sDeg').value}`);
            const data = await res.json();
            document.getElementById('results').innerHTML = data.map(u => `
                <div class="card">
                    <b>${u.uniName}</b> (${u.country})<br>
                    <small>Commission: ${u.partnerCommission} | Bank: ${u.bankType}</small><br>
                    <button class="btn-search" style="background:green; margin-top:10px;">OPEN STUDENT FILE</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
