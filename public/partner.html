<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; } .active { display: block; }
        .input-box { border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; width: 100%; font-size: 13px; outline: none; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 flex">

    <div class="w-64 bg-[#0f172a] h-screen text-white p-6 sticky top-0 shadow-2xl flex flex-col">
        <h1 class="text-xl font-black mb-8 text-blue-400 text-center uppercase tracking-tighter italic">IHP Partner</h1>
        
        <div class="mb-8 p-4 bg-slate-800 rounded-xl border border-slate-700 text-center">
            <p class="text-[9px] text-slate-400 uppercase font-bold mb-1 tracking-widest">Commission Wallet</p>
            <h3 id="walletBalance" class="text-2xl font-black text-green-400">$0.00</h3>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="showSection('assessmentSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition text-sm font-semibold">🔍 Smart Assessment</button>
            <button onclick="showSection('trackingSection')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition text-sm font-semibold">📂 File Tracking</button>
        </nav>

        <button onclick="logout()" class="w-full bg-red-500/20 text-red-400 py-2 rounded text-xs font-bold hover:bg-red-600 hover:text-white transition">LOGOUT</button>
    </div>

    <div class="flex-1 p-10 overflow-y-auto h-screen">

        <div id="assessmentSection" class="section active bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-black mb-6 uppercase tracking-tight border-b pb-4">Smart Assessment Tool</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                <div><label>Country</label><input type="text" id="aCountry" placeholder="Country" class="input-box"></div>
                <div><label>Degree</label>
                    <select id="aDegree" class="input-box">
                        <option value="">All Degrees</option>
                        <option>Ug</option><option>Pg</option><option>Diploma</option>
                        <option>Foundation</option><option>PhD</option><option>Research</option>
                    </select>
                </div>
                <div><label>Language</label>
                    <select id="aLanguage" class="input-box">
                        <option value="">Any</option>
                        <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                    </select>
                </div>
                <div><label>Score</label><input type="text" id="aLangScore" placeholder="Score" class="input-box"></div>
                <div><label>Academic</label><input type="text" id="aAcademic" placeholder="GPA" class="input-box"></div>
                <div class="flex items-end"><button onclick="runAssessment()" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-bold">SEARCH</button></div>
            </div>

            <div id="assessmentResult" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>

        <div id="trackingSection" class="section bg-white p-8 rounded-2xl shadow-sm border">
            <h2 class="text-xl font-bold mb-6 uppercase border-b pb-4">My Student Files</h2>
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-[10px] uppercase text-slate-500 font-bold border-b">
                    <tr><th class="p-4">Student Name</th><th class="p-4">Contact</th><th class="p-4">University</th><th class="p-4">Status</th><th class="p-4">Commission</th></tr>
                </thead>
                <tbody id="trackingTableBody" class="divide-y"></tbody>
            </table>
        </div>
    </div>

    <div id="fileModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl w-[400px] shadow-2xl">
            <h3 class="text-lg font-bold mb-4 uppercase">Confirm File Opening</h3>
            <div class="space-y-4">
                <div><label>Student Name</label><input type="text" id="sName" class="input-box"></div>
                <div><label>Phone Number</label><input type="text" id="sContact" class="input-box"></div>
                <div class="bg-green-50 p-3 rounded-lg flex justify-between">
                    <span class="text-[10px] font-bold text-green-700">Earnings:</span>
                    <span id="modalComm" class="font-black text-green-600"></span>
                </div>
            </div>
            <div class="flex gap-4 mt-6">
                <button onclick="submitFile()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold uppercase text-xs">Confirm</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-100 py-2 rounded font-bold uppercase text-xs">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let selectedUni = {};
        let partnerId = "";

        // Login Check & Wallet Update
        window.onload = () => {
            const partnerInfo = JSON.parse(localStorage.getItem('partnerInfo'));
            if(!partnerInfo || !partnerInfo._id) {
                alert("Session Expired. Please Login.");
                window.location.href = "/"; // Redirect to login
                return;
            }
            partnerId = partnerInfo._id;
            document.getElementById('walletBalance').innerText = `$${partnerInfo.walletBalance || 0}`;
        };

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'trackingSection') loadTracking();
        }

        async function runAssessment() {
            const res = await fetch('/api/partner/assessment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ country: document.getElementById('aCountry').value, degree: document.getElementById('aDegree').value })
            });
            const unis = await res.json();
            const div = document.getElementById('assessmentResult');
            div.innerHTML = unis.map(u => `
                <div class="bg-slate-50 border rounded-2xl p-6 shadow-sm">
                    <h3 class="font-black text-blue-900 uppercase">${u.uniName}</h3>
                    <p class="text-[10px] text-blue-500 font-bold mb-3 uppercase">${u.location}, ${u.country}</p>
                    <div class="grid grid-cols-2 gap-2 text-[11px] text-slate-600 border-y py-3 mb-4">
                        <p><b>Course:</b> ${u.courseName}</p><p><b>Intake:</b> ${u.intake}</p>
                        <p><b>Fee:</b> ${u.semesterFee} ${u.currency}</p><p><b>Bank BD:</b> ${u.bankNameBD}</p>
                        <p><b>Loan:</b> ${u.loanAmount}</p><p><b>Marital:</b> ${u.maritalStatus}</p>
                        <p class="col-span-2"><b>Bank Req:</b> ${u.bankType}</p>
                    </div>
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-blue-50">
                        <div><p class="text-[9px] text-slate-400 font-bold">COMMISSION</p><p class="text-xl font-black text-green-600">$${u.partnerCommission}</p></div>
                        <button onclick="openFileModal('${u.uniName}', ${u.partnerCommission})" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-xs uppercase">Open File</button>
                    </div>
                </div>
            `).join('');
        }

        function openFileModal(name, comm) {
            selectedUni = { name, comm };
            document.getElementById('modalComm').innerText = `$${comm}`;
            document.getElementById('fileModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('fileModal').classList.add('hidden'); }

        async function submitFile() {
            const data = { partnerId, studentName: document.getElementById('sName').value, studentContact: document.getElementById('sContact').value, universityName: selectedUni.name, commissionAmount: selectedUni.comm };
            const res = await fetch('/api/partner/open-file', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert("File Opened & Wallet Updated!"); location.reload(); }
        }

        async function loadTracking() {
            const res = await fetch(`/api/partner/my-files/${partnerId}`);
            const files = await res.json();
            const tbody = document.getElementById('trackingTableBody');
            tbody.innerHTML = files.map(f => `
                <tr class="hover:bg-slate-50 transition border-b">
                    <td class="p-4 font-bold">${f.studentName}</td><td class="p-4">${f.studentContact}</td>
                    <td class="p-4">${f.universityName}</td><td class="p-4 text-xs font-bold text-blue-600 uppercase">${f.status}</td>
                    <td class="p-4 text-green-600 font-black">$${f.commissionAmount}</td>
                </tr>`).join('');
        }

        function logout() { localStorage.clear(); window.location.href = "/"; }
    </script>
</body>
</html>
