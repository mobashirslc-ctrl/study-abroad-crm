<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #0b012d; --darker: #080120; --card-bg: rgba(255, 255, 255, 0.02); }
        body { margin: 0; display: flex; flex-direction: column; min-height: 100vh; background-color: var(--bg); font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 80px; background: var(--darker); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; padding: 20px 0; transition: 0.3s; z-index: 100; }
        .sidebar:hover { width: 220px; align-items: flex-start; padding-left: 20px; }
        .logo-box { background: white; padding: 5px; border-radius: 8px; margin-bottom: 40px; }
        .logo-box img { height: 30px; }
        .nav-links { list-style: none; padding: 0; width: 100%; flex-grow: 1; }
        .nav-links li { padding: 15px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #bdc3c7; transition: 0.2s; }
        .nav-links li span { display: none; white-space: nowrap; font-size: 14px; }
        .sidebar:hover .nav-links li span { display: inline; }
        .nav-links li:hover, .nav-links li.active { color: var(--gold); background: rgba(255, 204, 0, 0.05); }
        .logout-btn { color: #ff5e5e !important; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto; padding-top: 20px !important; }

        .main-content { flex-grow: 1; padding: 25px; overflow-y: auto; padding-bottom: 80px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1000px; }
        th { text-align: left; padding: 12px; background: rgba(255, 204, 0, 0.1); color: var(--gold); border-bottom: 2px solid var(--gold); }
        td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #160a3d; padding: 30px; border-radius: 15px; width: 450px; border: 1px solid var(--gold); }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; background: var(--darker); border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box;}
        
        #qrcode { display: none; }
    </style>
</head>
<body>

    <div id="qrcode"></div>

    <div class="wrapper">
        <div class="sidebar">
            <div class="logo-box"><img id="portalLogo" src="logo.jpeg" alt="SCC"></div>
            <ul class="nav-links">
                <li class="active" onclick="showSection('dashboard')"><i class="fa-solid fa-gauge-high"></i> <span>Dashboard</span></li>
                <li onclick="showSection('tracking')"><i class="fa-solid fa-folder-tree"></i> <span>Track Files</span></li>
                <li onclick="showSection('wallet')"><i class="fa-solid fa-wallet"></i> <span>Wallet</span></li>
                <li onclick="showSection('profile')"><i class="fa-solid fa-id-card"></i> <span>Profile Edit</span></li>
                <li class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></li>
            </ul>
        </div>

        <div class="main-content">
            <div id="dashboard" class="section active">
                <div class="card">
                    <h3>Smart Assessment</h3>
                    <button class="btn-gold" onclick="searchUni()">Search Universities</button>
                </div>

                <div id="uniSection" class="card" style="display:none;">
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>University</th><th>Course</th><th>Commission</th><th>Action</th></tr></thead>
                            <tbody><tr><td>Hertfordshire University</td><td>MSc CS</td><td>৳ 75,000</td><td><button class="btn-gold" onclick="openFileForm('Hertfordshire', 'Jan 2026', 'MSc CS', 75000)">Open File</button></td></tr></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3>Live File Tracking</h3>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>Name</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                            <tbody class="sharedTrackBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tracking" class="section"></div>
            <div id="wallet" class="section"></div>
            <div id="profile" class="section"></div>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content">
            <h3 id="mTitle">Apply</h3>
            <input type="text" id="sName" placeholder="Student Name">
            <input type="text" id="sPass" placeholder="Passport Number">
            <input type="text" id="sPhone" placeholder="Contact Number">
            <button class="btn-gold" onclick="submitFile()">Submit & Get Slip</button>
            <button class="btn-gold" onclick="closeModal()" style="background:#444; color:#fff;">Cancel</button>
        </div>
    </div>

    <script>
        let currentUni = "", currentIntake = "", currentCourse = "", currentComm = 0;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function searchUni() { document.getElementById('uniSection').style.display = 'block'; }
        function openFileForm(u, i, c, co) { currentUni = u; currentIntake = i; currentCourse = c; currentComm = co; document.getElementById('mTitle').innerText = u; document.getElementById('fileModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('fileModal').style.display = 'none'; }

        function handleLogout() { if(confirm("Logout?")) window.location.href = 'login.html'; }

        function submitFile() {
            const name = document.getElementById('sName').value;
            const pass = document.getElementById('sPass').value;
            if(!name || !pass) return alert("Fill Name and Passport!");

            // Updated Track Link
            const trackLink = "https://study-abroad-crm.onrender.com/track.html?id=" + pass;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: trackLink, width: 128, height: 128 });

            setTimeout(() => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Get Portal Logo
                const logoImg = document.getElementById('portalLogo');
                
                // HEADER Design
                doc.setFillColor(11, 1, 45); doc.rect(0, 0, 210, 50, 'F');
                
                // Draw Logo in Header
                try { doc.addImage(logoImg, 'JPEG', 15, 10, 25, 25); } catch(e) { console.log("Logo error"); }

                doc.setTextColor(255, 204, 0); doc.setFontSize(20); doc.setFont(undefined, 'bold');
                doc.text("STUDENT CAREER CONSULTANCY", 110, 25, null, null, "center");
                doc.setFontSize(10); doc.setTextColor(255, 255, 255);
                doc.text("OFFICIAL ACKNOWLEDGMENT SLIP", 110, 35, null, null, "center");

                // BODY
                doc.setTextColor(0, 0, 0); doc.setFontSize(14);
                doc.text("Application Receipt: " + name, 20, 65);
                doc.setFontSize(10); doc.setFont(undefined, 'normal');
                doc.text("Passport No: " + pass, 20, 75);
                doc.text("University: " + currentUni, 20, 85);
                doc.text("Course: " + currentCourse, 20, 95);
                doc.text("Date: " + new Date().toLocaleDateString(), 20, 105);

                // QR Section
                doc.text("Scan to Track Live Status:", 105, 130, null, null, "center");
                const qrImg = document.querySelector("#qrcode img").src;
                doc.addImage(qrImg, 'PNG', 85, 135, 40, 40);

                doc.setFontSize(8); doc.setTextColor(150);
                doc.text("Authorized by Gorun Ltd. & Student Career Consultancy", 105, 190, null, null, "center");

                doc.save(`SCC_Slip_${pass}.pdf`);
                
                const row = `<tr><td>${name}</td><td>${pass}</td><td><span style="color:orange">Pending</span></td><td>${new Date().toLocaleDateString()}</td></tr>`;
                document.querySelectorAll('.sharedTrackBody').forEach(el => el.innerHTML += row);
                closeModal();
            }, 800);
        }
    </script>
</body>
</html>
