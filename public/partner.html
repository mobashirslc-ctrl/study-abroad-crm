<div class="space-y-4">
    <div>
        <label class="text-xs text-slate-400">Select Degree</label>
        <select id="sDegree" class="w-full p-2 rounded mt-1 bg-slate-800 border-slate-700">
            <option>PG</option><option>UG</option><option>DIPLOMA</option>
            <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
        </select>
    </div>
    <div>
        <label class="text-xs text-slate-400">Language Test</label>
        <select id="sLang" class="w-full p-2 rounded mt-1 bg-slate-800 border-slate-700">
            <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
        </select>
    </div>
    <input type="text" id="sScore" placeholder="Language Score" class="w-full p-2 rounded bg-slate-800 border-slate-700">
    <input type="text" id="sGpa" placeholder="Academic Score (GPA)" class="w-full p-2 rounded bg-slate-800 border-slate-700">
    <button onclick="runAssessment()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">FIND UNIVERSITIES</button>
</div>

<div id="fileModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-white/10 p-6 rounded-xl w-full max-w-md">
        <h2 class="text-xl font-bold mb-4">Open Student File</h2>
        <div class="space-y-3">
            <input type="text" id="stName" placeholder="Student Full Name" class="w-full p-2 rounded bg-slate-800">
            <input type="text" id="stContact" placeholder="Contact Number" class="w-full p-2 rounded bg-slate-800">
            <p class="text-xs text-slate-400">Commission will be added: <span id="commLabel" class="text-emerald-400"></span></p>
            <button onclick="submitStudentFile()" class="w-full bg-emerald-600 py-3 rounded font-bold">SUBMIT & ADD COMMISSION</button>
            <button onclick="closeModal()" class="w-full text-slate-400 text-sm">Cancel</button>
        </div>
    </div>
</div>

<script>
let selectedUni = null;

function openFileForm(uniName, commission) {
    selectedUni = { uniName, commission };
    document.getElementById('commLabel').innerText = "$" + commission;
    document.getElementById('fileModal').classList.remove('hidden');
}

async function submitStudentFile() {
    const data = {
        partnerId: localStorage.getItem('partnerId'),
        studentName: document.getElementById('stName').value,
        contactNo: document.getElementById('stContact').value,
        uniName: selectedUni.uniName,
        commission: selectedUni.commission
    };

    const res = await fetch('/api/partner/submit-file', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    if(res.ok) {
        alert("Success! Commission added to wallet.");
        location.reload();
    }
}
// ... [Existing runAssessment function will now use openFileForm(u.uniName, u.partnerCommission)]
</script>
