<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; color: #333; font-size: 18px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-card { border-left: 5px solid #1a73e8; background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .uni-name { font-weight: bold; color: #1a73e8; font-size: 17px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; color: #444; margin-top: 8px; }
        .btn-open { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #777; cursor: pointer; }
        .nav-item.active { color: #1a73e8; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 15px; }
        .track-card { background: white; padding: 15px; border-radius: 10px; border-bottom: 3px solid #ddd; margin-bottom: 10px; font-size: 13px; }
        .welcome-bar { padding: 10px; background: #fff; margin-bottom: 10px; border-radius: 10px; font-weight: bold; color: #1a73e8; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-bar">
        <i class="fas fa-user-circle fa-lg"></i> <span id="partnerWelcome">Welcome, Partner</span>
    </div>

    <div id="assessment-section" class="page">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="sCountry" placeholder="Country">
            <select id="sDegree">
                <option value="">Degree</option><option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option>
            </select>
            <select id="sLang">
                <option value="">Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
            </select>
            <input type="text" id="sScore" placeholder="Language & CGPA Score">
            <button class="btn-search" onclick="runSearch()">SEARCH UNIVERSITY</button>
        </div>
        <div id="resultsArea"></div>
    </div>

    <div id="tracking-section" class="page" style="display:none;">
        <h3>📁 My Student Files</h3>
        <div id="trackingList"></div>
    </div>

    <div id="wallet-section" class="page" style="display:none;">
        <div class="card" style="background: #1a73e8; color: white;">
            <p>Available Balance</p><h2 id="wBalance">৳ 0.00</h2>
        </div>
        <div class="card">
            <h3>Withdraw Funds</h3>
            <select id="wMethod"><option>Bkash</option><option>Nagad</option><option>Bank Account</option></select>
            <input type="text" id="wAccNum" placeholder="Enter Account/Bank Number"> <input type="number" id="wAmount" placeholder="Amount">
            <button class="btn-search">SEND WITHDRAW REQUEST</button>
        </div>
    </div>
</div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h3>📄 Open Student File</h3>
        <form id="fileForm">
            <input type="hidden" id="mUni">
            <input type="text" id="mStdName" placeholder="Student Name" required>
            <input type="text" id="mStdPhone" placeholder="Contact Number" required>
            <label style="font-size:12px; font-weight:bold;">Upload PDF (Mandatory)</label>
            <input type="file" id="mFile" accept=".pdf" required>
            <button type="submit" class="btn-open">SUBMIT FILE</button>
            <button type="button" onclick="closeModal()" style="background:none; border:none; color:red; width:100%; margin-top:10px;">Cancel</button>
        </form>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showPage('assessment-section', this)"><i class="fas fa-search"></i>Assessment</div>
    <div class="nav-item" onclick="showPage('tracking-section', this); fetchTracking()"><i class="fas fa-tasks"></i>Tracking</div>
    <div class="nav-item" onclick="showPage('wallet-section', this)"><i class="fas fa-wallet"></i>Wallet</div>
</div>

<script>
    // Welcome Name Logic
    const user = JSON.parse(localStorage.getItem('partnerUser')) || { name: "Partner" };
    document.getElementById('partnerWelcome').innerText = "Welcome, " + user.name;

    function showPage(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        navEl.classList.add('active');
    }

    async function runSearch() {
        const area = document.getElementById('resultsArea');
        area.innerHTML = "Searching...";
        const res = await fetch(`/api/search-uni?country=${document.getElementById('sCountry').value}&degree=${document.getElementById('sDegree').value}`);
        const data = await res.json();
        area.innerHTML = data.map(u => `
            <div class="result-card">
                <div class="uni-name">${u.uniName}</div>
                <div class="info-grid">
                    <div><b>Location:</b> ${u.location || 'N/A'}</div>
                    <div><b>Course:</b> ${u.course}</div>
                    <div><b>Fee:</b> ${u.fee} ${u.currency}</div>
                    <div><b>Marital:</b> ${u.maritalStatus}</div>
                    <div><b>Bank BD:</b> ${u.bankNameSuggestion}</div>
                    <div><b>Loan:</b> ${u.loanAmount}</div>
                </div>
                <button class="btn-open" onclick="openModal('${u.uniName}')">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    function openModal(name) { document.getElementById('mUni').value = name; document.getElementById('uploadModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }

    async function fetchTracking() {
        const res = await fetch('/api/admin/files');
        const data = await res.json();
        document.getElementById('trackingList').innerHTML = data.map(f => `
            <div class="track-card">
                <b>${f.studentName}</b> | ${f.university}<br>
                <small>Compliance: ${f.complianceInfo?.name || 'IHP Member'}</small><br>
                <a href="${f.pdfUrl || '#'}" target="_blank" style="text-decoration:none;">
                    <button style="background:#1a73e8; color:white; border:none; padding:5px 10px; border-radius:5px; margin-top:5px; cursor:pointer;">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                </a>
            </div>
        `).join('');
    }

    document.getElementById('fileForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            studentName: document.getElementById('mStdName').value,
            contact: document.getElementById('mStdPhone').value,
            university: document.getElementById('mUni').value,
            complianceInfo: { name: "IHP Admin", org: "IHP Global", id: "IHP-001" },
            pdfUrl: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" // Dummy for now
        };
        const res = await fetch('/api/open-file', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if(res.ok) { alert("File Submitted!"); closeModal(); }
    };
</script>
</body>
</html>
