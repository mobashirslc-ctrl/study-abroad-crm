<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: white; font-family: sans-serif; }
        .sidebar { background: #161b2a; border-right: 1px solid #2d334a; }
        .nav-link { padding: 14px 20px; display: block; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        input, select { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; outline: none; font-size: 13px; }
        .status-pending { color: #f59e0b; background: rgba(245, 158, 11, 0.1); padding: 4px 10px; border-radius: 6px; font-size: 10px; }
    </style>
</head>
<body class="flex">
    <div class="w-64 h-screen sidebar sticky top-0 hidden md:flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-white/10 text-blue-500">IHP CRM</div>
        <nav class="mt-8 flex-1">
            <div onclick="showSection('assessment')" class="nav-link active" id="link-assessment">🔍 Search & Assessment</div>
            <div onclick="showSection('history')" class="nav-link" id="link-history">📋 Live Tracking</div>
            <div onclick="showSection('wallet')" class="nav-link" id="link-wallet">💰 Wallet (Taka)</div>
        </nav>
        <div class="p-6 border-t border-white/10">
            <button onclick="handleLogout()" class="text-red-400 font-bold">Logout ➔</button>
        </div>
    </div>

    <main class="flex-1 p-6 md:p-10">
        <div class="flex justify-between items-center mb-10 bg-slate-900/50 p-4 rounded-xl">
            <h2 class="text-xl font-bold" id="pNameDisp">Welcome</h2>
            <div class="flex gap-4">
                <div class="glass-card px-4 py-1 text-center border-amber-500/30">
                    <p class="text-[9px] text-slate-500">PENDING</p>
                    <p class="text-amber-500 font-bold" id="pendingBal">৳0</p>
                </div>
                <div class="glass-card px-4 py-1 text-center border-emerald-500/30">
                    <p class="text-[9px] text-slate-500">FIXED</p>
                    <p class="text-emerald-500 font-bold" id="fixedBal">৳0</p>
                </div>
            </div>
        </div>

        <div id="section-assessment" class="content-section">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="glass-card p-6 h-fit space-y-4">
                    <h3 class="font-bold text-blue-400">Smart Assessment</h3>
                    <input type="text" id="sCountry" placeholder="Country Name">
                    <select id="sDegree"><option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option></select>
                    <input type="text" id="sGpa" placeholder="Academic GPA">
                    <select id="sLang"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                    <input type="text" id="sScore" placeholder="Score">
                    <button onclick="runAssessment()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">FIND UNIVERSITY</button>
                </div>
                <div class="lg:col-span-3 space-y-4" id="resultsArea"></div>
            </div>
        </div>

        <div id="section-history" class="content-section hidden">
            <div class="glass-card p-6 overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead><tr class="text-slate-500 border-b border-white/5"><th class="pb-4">Student</th><th class="pb-4">University</th><th class="pb-4">Comm.</th><th class="pb-4">Status</th></tr></thead>
                    <tbody id="historyArea"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-lg border border-white/10">
            <h2 class="text-xl font-bold mb-6 text-blue-400">Student Application</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="stName" placeholder="Full Name">
                <input type="text" id="stContact" placeholder="Contact No">
                <input type="text" id="stPassport" placeholder="Passport No">
                <input type="text" id="stUni" readonly class="bg-slate-800">
            </div>
            <button onclick="submitFile()" class="w-full bg-emerald-600 py-3 rounded-lg font-bold mt-6">SUBMIT FILE</button>
            <button onclick="document.getElementById('fileModal').classList.add('hidden')" class="w-full text-slate-500 mt-2 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        const pId = localStorage.getItem('partnerId');
        if(!pId) window.location.href = '/login';
        document.getElementById('pNameDisp').innerText = "Hello, " + localStorage.getItem('partnerName');

        function handleLogout() { localStorage.clear(); window.location.href = '/login'; }

        async function loadDashboard() {
            const res = await fetch('/api/partner/stats/' + pId);
            const data = await res.json();
            document.getElementById('pendingBal').innerText = "৳" + data.pending.toLocaleString();
            document.getElementById('fixedBal').innerText = "৳" + data.fixed.toLocaleString();
            document.getElementById('historyArea').innerHTML = data.history.map(h => `
                <tr class="border-b border-white/5"><td class="py-4 font-bold">${h.studentName}</td><td>${h.uniName}</td>
                <td class="text-blue-400 font-bold">৳${h.commission}</td><td><span class="status-pending">${h.status}</span></td></tr>`).join('');
        }

        async function runAssessment() {
            const res = await fetch('/api/universities');
            const unis = await res.json();
            const filtered = unis.filter(u => u.degreeType === document.getElementById('sDegree').value);
            document.getElementById('resultsArea').innerHTML = filtered.map(u => `
                <div class="glass-card p-6 flex justify-between items-center border-l-4 border-blue-600">
                    <div><p class="font-bold text-lg text-blue-400">${u.uniName}</p><p class="text-xs text-slate-500">${u.country} | ৳${u.partnerCommission}</p></div>
                    <button onclick="openForm('${u.uniName}', ${u.partnerCommission})" class="bg-blue-600 px-6 py-2 rounded-lg font-bold text-xs">OPEN FILE</button>
                </div>`).join('');
        }

        let sel = null;
        function openForm(n, c) { sel={n,c}; document.getElementById('stUni').value=n; document.getElementById('fileModal').classList.remove('hidden'); }
        async function submitFile() {
            const body = { partnerId: pId, studentName: document.getElementById('stName').value, contactNo: document.getElementById('stContact').value, passportNo: document.getElementById('stPassport').value, uniName: sel.n, commission: sel.c };
            await fetch('/api/partner/submit-file', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            location.reload();
        }
        function showSection(id) { document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden')); document.getElementById('section-'+id).classList.remove('hidden'); }
        loadDashboard();
    </script>
</body>
</html>
