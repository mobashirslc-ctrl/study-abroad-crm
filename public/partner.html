<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Portal 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1a0b4d; --accent: #f1c40f; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); --success: #2ecc71; --danger: #ff4757; --gold: #f1c40f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle at top right, #2b0054, #070014); color: white; height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; background: rgba(0,0,0,0.9); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo img { width: 140px; background: white; padding: 5px; border-radius: 5px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #bbb; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border-left: 4px solid var(--accent); }

        .wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .main { padding: 30px; flex: 1; }
        
        .wallet-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .wallet-box { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(15px); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .reg-input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: var(--gold); border-bottom: 1px solid var(--border); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); justify-content:center; align-items:center; }
        .modal-content { background: #1a0b4d; border: 1px solid var(--gold); padding: 30px; border-radius: 20px; width: 60%; }
        
        #printArea { display:none; }
        @media print { body * { display:none; } #printArea { display:block !important; color:black; background:white; padding:50px; } }

        .section { display: none; }
        .active-section { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Smart Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-tasks"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('earning', this)"><i class="fas fa-wallet"></i> Earning</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <div>Welcome, <span id="partnerTitle" style="color:var(--gold); font-weight:bold;">Partner</span></div>
            <button onclick="localStorage.clear(); location.href='index.html'" class="btn-gold" style="background:var(--danger); color:white; padding:5px 15px;">Logout</button>
        </div>

        <div class="main">
            <div id="home" class="section active-section">
                <div class="wallet-container">
                    <div class="wallet-box"><div><p style="font-size:10px; opacity:0.6;">PENDING</p><h2 id="topPending">৳0</h2></div></div>
                    <div class="wallet-box" style="border-color: var(--success);"><div><p style="font-size:10px; opacity:0.6;">FINAL</p><h2 id="topFinal">৳0</h2></div></div>
                </div>
                <div class="card"><h3>Recent Status</h3><table><thead><tr><th>Student</th><th>University</th><th>Status</th></tr></thead><tbody id="homeTrackingBody"></tbody></table></div>
            </div>

            <div id="assessment" class="section">
                <div class="card">
                    <h3 style="color:var(--gold); margin-bottom:20px;">Search Filter</h3>
                    <div class="form-grid">
                        <input type="text" id="fCountry" placeholder="Country" class="reg-input">
                        <select id="fDegree" class="reg-input">
                            <option value="">Degree</option>
                            <option value="Bachelor">Bachelor (Ug)</option>
                            <option value="Master">Master (Pg)</option>
                            <option value="Foundation">Foundation</option>
                        </select>
                        <input type="number" step="0.01" id="fGPA" placeholder="Student GPA" class="reg-input">
                        <input type="number" step="0.1" id="fLangScore" placeholder="IELTS/Lang Score" class="reg-input">
                        <button id="searchBtn" class="btn-gold">SEARCH</button>
                    </div>
                </div>
                <div id="searchResultArea" style="display:none;" class="card">
                    <table>
                        <thead><tr><th>University</th><th>Fees</th><th>Commission</th><th>Action</th></tr></thead>
                        <tbody id="uniListContainer"></tbody>
                    </table>
                </div>
            </div>

            <div id="tracking" class="section">
                <div class="card">
                    <table><thead><tr><th>Student</th><th>Passport</th><th>University</th><th>Status</th></tr></thead><tbody id="trackingList"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="modal-content">
            <h2 id="modalUniName" style="color:var(--gold);"></h2>
            <div class="form-grid" style="margin-top:20px;">
                <input type="text" id="sName" placeholder="Student Name" class="reg-input">
                <input type="text" id="sPass" placeholder="Passport No" class="reg-input">
                <input type="file" id="pdfAcademic">
            </div>
            <button id="submitAppBtn" class="btn-gold" style="width:100%; margin-top:20px;">SUBMIT FILE</button>
        </div>
    </div>

    <div id="printArea">
        <div style="text-align:center; border:2px solid #000; padding:30px;">
            <img src="logo.jpeg" style="width:120px;">
            <h1>CONFIRMATION SLIP</h1>
            <h2 id="slipName"></h2>
            <p>University: <b id="slipUni"></b></p>
            <div id="qrcode" style="display:flex; justify-content:center; margin-top:20px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, doc, getDocs, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config (Using your scc-partner-portal)
        const firebaseConfig = { 
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            storageBucket: "scc-partner-portal.firebasestorage.app",
            messagingSenderId: "13013457431",
            appId: "1:13013457431:web:9c2a470f569721b1cf9a52"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userEmail = localStorage.getItem('userEmail');

        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-section');
            if(el) el.classList.add('active');
        };

        let allUnis = [];
        onSnapshot(collection(db, "universities"), (snap) => {
            allUnis = snap.docs.map(d => d.data());
        });

        // FIXED Search Logic to match your Admin fields
        document.getElementById('searchBtn').onclick = () => {
            const country = document.getElementById('fCountry').value.trim().toLowerCase();
            const gpa = parseFloat(document.getElementById('fGPA').value) || 0;
            const lang = parseFloat(document.getElementById('fLangScore').value) || 0;
            const degree = document.getElementById('fDegree').value;

            const filtered = allUnis.filter(u => {
                const uCountry = (u.country || u.uCountry || "").toLowerCase();
                const uDegree = (u.degree || u.uDegree || "");
                const minGPA = parseFloat(u.minCGPA || u.minGPA || 0);
                const minLang = parseFloat(u.minIELTS || u.minLangScore || 0);

                return (country === "" || uCountry.includes(country)) &&
                       (degree === "" || uDegree === degree) &&
                       (gpa >= minGPA) &&
                       (lang >= minLang);
            });

            const container = document.getElementById('uniListContainer');
            document.getElementById('searchResultArea').style.display = 'block';
            
            if (filtered.length > 0) {
                container.innerHTML = filtered.map(u => `
                    <tr>
                        <td><b>${u.name || u.uName || u.universityName}</b><br><small>${u.country || u.uCountry}</small></td>
                        <td>${u.semesterFee || u.uSemFee} ${u.currency || u.uCurrency}</td>
                        <td style="color:var(--gold); font-weight:bold;">৳${(u.partnerComm || 50000).toLocaleString()}</td>
                        <td><button class="btn-gold" onclick="openApply('${u.name || u.uName || u.universityName}', '${u.partnerComm || 50000}')">Apply</button></td>
                    </tr>`).join('');
            } else {
                container.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px;">No match found. Try lower GPA/IELTS.</td></tr>`;
            }
        };

        window.openApply = (n, c) => {
            document.getElementById('modalUniName').innerText = n;
            document.getElementById('applyModal').style.display = 'flex';
            window.selectedApp = { name: n, comm: c };
        };

        document.getElementById('submitAppBtn').onclick = async () => {
            const name = document.getElementById('sName').value;
            const pass = document.getElementById('sPass').value;
            if(!name || !pass) return alert("Fill all fields");

            await addDoc(collection(db, "applications"), {
                studentName: name, passportNo: pass, partnerEmail: userEmail,
                university: window.selectedApp.name, commission: window.selectedApp.comm,
                status: 'pending', createdAt: serverTimestamp()
            });

            document.getElementById('slipName').innerText = name;
            document.getElementById('slipUni').innerText = window.selectedApp.name;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: pass, width: 100, height: 100 });
            
            alert("Submitted!");
            window.print();
            location.reload();
        };

        onSnapshot(query(collection(db, "applications"), where("partnerEmail", "==", userEmail), orderBy("createdAt", "desc")), (snap) => {
            let p = 0, f = 0, html = "", hhtml = "";
            snap.forEach(doc => {
                const d = doc.data();
                const c = Number(d.commission) || 0;
                if(d.status === 'pending') p += c; else f += c;
                html += `<tr><td>${d.studentName}</td><td>${d.passportNo}</td><td>${d.university}</td><td>${d.status}</td></tr>`;
                hhtml += `<tr><td>${d.studentName}</td><td>${d.university}</td><td>${d.status}</td></tr>`;
            });
            document.getElementById('topPending').innerText = `৳${p.toLocaleString()}`;
            document.getElementById('topFinal').innerText = `৳${f.toLocaleString()}`;
            document.getElementById('trackingList').innerHTML = html;
            document.getElementById('homeTrackingBody').innerHTML = hhtml;
        });
    </script>
</body>
</html>
