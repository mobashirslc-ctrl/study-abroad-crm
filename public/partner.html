<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner | Smart Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if(!localStorage.getItem('partnerId')) window.location.replace('/login');</script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="flex">
    <div class="w-64 min-h-screen bg-slate-900 border-r border-white/10 p-6 fixed">
        <h1 class="text-xl font-bold text-blue-500 mb-8">IHP PARTNER</h1>
        <nav class="space-y-4">
            <a href="#" class="block p-3 bg-blue-600 rounded-lg">Smart Assessment</a>
            <button onclick="logout()" class="w-full text-left p-3 text-red-400 mt-20">Logout</button>
        </nav>
    </div>

    <div class="flex-1 ml-64 p-8">
        <div class="flex justify-between mb-8">
            <h2 class="text-2xl font-bold italic">University <span class="text-blue-400">Assessment Tool</span></h2>
            <div class="text-right"><p id="pName" class="text-sm font-bold"></p><p class="text-emerald-400">$0.00</p></div>
        </div>

        <div class="grid grid-cols-4 gap-6">
            <div class="glass p-6 h-fit space-y-4">
                <h3 class="text-xs font-bold text-slate-500 uppercase">Filters</h3>
                <div><label class="text-[10px]">Destination</label><select id="sCountry" class="w-full p-2 rounded"><option>UK</option><option>USA</option><option>Canada</option></select></div>
                <div><label class="text-[10px]">Academic Score %</label><input type="number" id="sAcademic" class="w-full p-2 rounded"></div>
                <div><label class="text-[10px]">Degree</label><select id="sDegree" class="w-full p-2 rounded"><option>UG</option><option>PG</option></select></div>
                <button onclick="search()" class="w-full bg-blue-600 py-3 rounded-xl font-bold mt-2 shadow-lg shadow-blue-500/20">SEARCH NOW</button>
            </div>

            <div class="col-span-3 space-y-4" id="results">
                <div class="glass p-20 text-center text-slate-500 italic">Enter student criteria to see matching results.</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('pName').innerText = localStorage.getItem('partnerName');
        async function search(){
            const resArea = document.getElementById('results');
            resArea.innerHTML = '<div class="text-blue-400 p-10 text-center animate-pulse">Filtering Universities...</div>';
            const res = await fetch('/api/universities');
            const unis = await res.json();
            const country = document.getElementById('sCountry').value;
            const score = parseFloat(document.getElementById('sAcademic').value) || 0;
            const degree = document.getElementById('sDegree').value;

            const filtered = unis.filter(u => u.country === country && score >= (u.minAcademicScore || 0) && u.degreeType === degree);

            if(filtered.length === 0) { resArea.innerHTML = '<div class="glass p-20 text-center text-slate-500">No match found for this criteria.</div>'; return; }
            
            resArea.innerHTML = filtered.map(u => `
                <div class="glass p-6 border-l-4 border-blue-500 hover:bg-white/5 transition">
                    <div class="flex justify-between items-start">
                        <div><h3 class="text-lg font-bold">${u.uniName}</h3><p class="text-blue-400 text-xs">${u.courseName} (${u.degreeType})</p></div>
                        <div class="text-right text-emerald-400 font-bold">$${u.partnerCommission}<br><span class="text-[9px] text-slate-500 uppercase">Comm.</span></div>
                    </div>
                    <div class="grid grid-cols-4 gap-4 mt-4 text-[10px] bg-black/20 p-3 rounded uppercase">
                        <div>Score Req: ${u.minAcademicScore}%</div><div>Bank: ${u.bankType}</div><div>Intake: ${u.intake}</div><div>Fee: ${u.semesterFee}</div>
                    </div>
                    <button class="w-full mt-4 bg-white/10 hover:bg-blue-600 py-2 rounded font-bold text-xs transition">OPEN FILE & APPLY</button>
                </div>
            `).join('');
        }
        function logout(){ localStorage.clear(); window.location.replace('/login'); }
    </script>
</body>
</html>
