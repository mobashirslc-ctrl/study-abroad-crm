<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-green: #2ecc71;
            --brand-purple: #2c003e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(46, 204, 113, 0.2);
            --text-white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #1a0026 0%, #2c003e 100%);
            font-family: 'Segoe UI', sans-serif;
            color: var(--text-white);
            margin: 0;
            min-height: 100vh;
        }

        .dashboard-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar with Green Theme */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--glass-border);
            padding: 30px;
        }

        .sidebar h2 { color: var(--brand-green); border-bottom: 2px solid var(--brand-green); padding-bottom: 15px; }

        .nav-link {
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: block;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(46, 204, 113, 0.1);
            color: var(--brand-green);
            border-left: 4px solid var(--brand-green);
        }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .btn-primary {
            background: var(--brand-green);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover { box-shadow: 0 0 15px var(--brand-green); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table thead tr { background: rgba(46, 204, 113, 0.1); color: var(--brand-green); }
        table th, table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--glass-border); }

        .status-active { color: var(--brand-green); font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h2>PARTNER</h2>
            <nav>
                <a href="#" class="nav-link active"><i class="fas fa-home"></i> Home</a>
                <a href="#" class="nav-link"><i class="fas fa-file-upload"></i> My Applications</a>
                <a href="#" class="nav-link"><i class="fas fa-university"></i> Find Universities</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="glass-card">
                <h1>Partner Dashboard</h1>
                <p>Welcome back! Your status: <span class="status-active">● Active</span></p>
                <button class="btn-primary">New Application</button>
            </div>
            
            <div class="glass-card">
                <h3>Recent Submissions</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Passport</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Example Student</td>
                            <td>A1234567</td>
                            <td><span class="status-active">Under Review</span></td>
                            <td><button class="btn-primary" style="padding: 5px 10px;">View</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
