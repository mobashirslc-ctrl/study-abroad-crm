<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partner Dashboard | IHP CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --white: #ffffff; --text: #202124; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding-bottom: 70px; }
        
        .header { background: var(--white); padding: 15px; text-align: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .header h2 { color: var(--primary); font-size: 18px; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        h3 { font-size: 16px; margin-bottom: 15px; color: var(--text); border-left: 4px solid var(--primary); padding-left: 10px; }

        /* Assessment Form */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #5f6368; }
        select, input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-search { background: var(--primary); color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Results Card */
        .result-item { background: #fff; border: 1px solid #e8f0fe; border-radius: 10px; padding: 15px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .uni-header { font-weight: bold; color: var(--primary); font-size: 17px; margin-bottom: 10px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
        .info-label { color: #70757a; }
        .info-value { font-weight: 600; color: #3c4043; }
        .btn-file { background: #34a853; color: white; width: 100%; padding: 10px; border: none; border-radius: 6px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        /* Wallet Styles */
        .wallet-card { background: linear-gradient(135deg, #1a73e8, #1557b0); color: white; }
        .amount-box { font-size: 24px; font-weight: bold; margin: 10px 0; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; color: #5f6368; font-size: 11px; text-decoration: none; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="header"><h2>IHP Partner Portal</h2></div>

<div class="container">
    
    <section id="assessment-sec" class="page">
        <div class="card">
            <h3><i class="fas fa-search-plus"></i> Smart Assessment</h3>
            <form id="assessmentForm">
                <div class="form-group">
                    <label>Country</label>
                    <select id="country" required>
                        <option value="">Select Country</option>
                        <option value="AUSTRALIA">AUSTRALIA</option>
                        <option value="UK">UK</option>
                        <option value="USA">USA</option>
                        <option value="CANADA">CANADA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Degree</label>
                    <select id="degree" required>
                        <option>UG</option><option>PG</option><option>DIPLOMA</option>
                        <option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Language Test</label>
                    <select id="language" required>
                        <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Language & Academic CGPA</label>
                    <input type="text" placeholder="e.g. IELTS 6.5, CGPA 3.5">
                </div>
                <button type="submit" class="btn-search">FIND UNIVERSITIES</button>
            </form>
        </div>
        <div id="resultsContainer"></div>
    </section>

    <section id="tracking-sec" class="page" style="display:none;">
        <div class="card">
            <h3><i class="fas fa-tasks"></i> Student File Tracking</h3>
            <p style="font-size: 13px; color: #666;">No active files found.</p>
        </div>
    </section>

    <section id="wallet-sec" class="page" style="display:none;">
        <div class="card wallet-card">
            <p>Total Balance</p>
            <div class="amount-box">৳ 0.00</div>
            <p style="font-size: 12px; opacity: 0.8;">Subscription Expires: 31 Dec 2026</p>
        </div>
        <div class="card">
            <h3>Withdraw Commission</h3>
            <select class="form-group"><option>Bkash</option><option>Nagad</option><option>Bank Account</option></select>
            <input type="number" placeholder="Enter Amount" class="form-group">
            <button class="btn-search" style="background:#34a853">SEND REQUEST</button>
        </div>
    </section>

</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage('assessment-sec')"><i class="fas fa-magic"></i>Assessment</div>
    <div class="nav-item" onclick="showPage('tracking-sec')"><i class="fas fa-file-medical"></i>Files</div>
    <div class="nav-item" onclick="showPage('wallet-sec')"><i class="fas fa-wallet"></i>Wallet</div>
    <div class="nav-item" onclick="location.href='/student'"><i class="fas fa-user-grad"></i>Student</div>
</nav>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    document.getElementById('assessmentForm').onsubmit = async (e) => {
        e.preventDefault();
        const resultsBox = document.getElementById('resultsContainer');
        resultsBox.innerHTML = "Searching...";

        const country = document.getElementById('country').value;
        const degree = document.getElementById('degree').value;
        const language = document.getElementById('language').value;

        // API Call to search (Case-insensitive)
        try {
            const res = await fetch(`/api/search-uni?country=${country}&degree=${degree}&language=${language}`);
            const data = await res.json();

            if(data.length === 0) {
                resultsBox.innerHTML = "<div class='card'>No universities match your criteria.</div>";
                return;
            }

            resultsBox.innerHTML = data.map(uni => `
                <div class="result-item">
                    <div class="uni-header">${uni.uniName}</div>
                    <div class="info-grid">
                        <div><span class="info-label">Course:</span> <span class="info-value">${uni.course}</span></div>
                        <div><span class="info-label">Intake:</span> <span class="info-value">${uni.intake || 'Next Available'}</span></div>
                        <div><span class="info-label">Fee:</span> <span class="info-value">${uni.fee} ${uni.currency}</span></div>
                        <div><span class="info-label">Bank Req:</span> <span class="info-value">${uni.bankBalance || 'N/A'}</span></div>
                        <div><span class="info-label">Marital:</span> <span class="info-value">${uni.maritalStatus || 'Single'}</span></div>
                        <div><span class="info-label">Commission:</span> <span class="info-value" style="color:#137333">${uni.partnerCommission || 'TBA'}</span></div>
                    </div>
                    <button class="btn-file" onclick="alert('File opening process started...')">OPEN STUDENT FILE</button>
                </div>
            `).join('');
        } catch(err) { resultsBox.innerHTML = "Error loading data."; }
    };
</script>

</body>
</html>
