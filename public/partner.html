<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Sign Up | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-blue-700 mb-6 text-center">Partner Registration</h2>
        <form id="regForm" class="space-y-4">
            <div><label class="block text-sm font-semibold">Full Name</label><input type="text" id="name" class="w-full p-2 border rounded" required></div>
            <div><label class="block text-sm font-semibold">Email Address</label><input type="email" id="email" class="w-full p-2 border rounded" required></div>
            <div><label class="block text-sm font-semibold">Contact Number</label><input type="text" id="contact" class="w-full p-2 border rounded" required></div>
            <div><label class="block text-sm font-semibold">Password</label><input type="password" id="password" class="w-full p-2 border rounded" required></div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">SUBMIT APPLICATION</button>
        </form>
        <p class="mt-4 text-center text-sm">Already have an account? <a href="/login" class="text-blue-600 font-bold">Login Here</a></p>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                contactNo: document.getElementById('contact').value,
                password: document.getElementById('password').value
            };
            const res = await fetch('/api/partner/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("Registration Success! Account is Inactive until Admin Approval."); window.location.href = '/login'; }
            else { alert("Failed. Email already registered."); }
        };
    </script>
</body>
</html>
