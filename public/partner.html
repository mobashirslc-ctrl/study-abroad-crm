<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partner Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #007bff; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🤝 Partner Dashboard</h2>
        <form id="pForm">
            <input type="text" name="name" placeholder="Student Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="file" name="document" required>
            <button type="submit">Submit Data</button>
        </form>
        <p id="msg" style="text-align:center; margin-top:10px;"></p>
    </div>
    <script>
        document.getElementById('pForm').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('msg').innerText = "Uploading...";
            const res = await fetch('/submit-partner', { method: 'POST', body: new FormData(e.target) });
            document.getElementById('msg').innerText = res.ok ? "✅ Submitted!" : "❌ Error!";
        };
    </script>
</body>
</html>
