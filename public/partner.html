<!DOCTYPE html>
<html>
<head>
    <title>Partner Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #666; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: #1a73e8; }
        .result-card { border-left: 5px solid #1a73e8; }
        .tag { font-size: 11px; background: #e3f2fd; color: #1565c0; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="p-assess" class="page">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="c" placeholder="Country Name">
            <select id="d"><option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option></select>
            <select id="l"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
            <input type="text" id="s" placeholder="Academic & Language Score Box">
            <button class="btn-search" onclick="search()">SEARCH UNIVERSITY</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="p-wallet" class="page" style="display:none;">
        <div class="card" style="background: #1a73e8; color:white;">
            <p>Total Balance</p><h2>৳ 0.00</h2>
            <small>Expiry: 31-12-2026</small>
        </div>
        <div class="card">
            <h3>Withdraw</h3>
            <select><option>Bkash</option><option>Nagad</option><option>Bank Account</option></select>
            <input type="number" placeholder="Amount">
            <button class="btn-search" style="background:#28a745;">WITHDRAW REQUEST</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showP('p-assess')"><i class="fas fa-search"></i><br>Assessment</div>
    <div class="nav-item" onclick="showP('p-wallet')"><i class="fas fa-wallet"></i><br>Withdraw</div>
</div>

<script>
    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    async function search() {
        const resBox = document.getElementById('results');
        resBox.innerHTML = "Searching...";
        const res = await fetch(`/api/search-uni?country=${document.getElementById('c').value}&degree=${document.getElementById('d').value}&language=${document.getElementById('l').value}`);
        const data = await res.json();
        
        resBox.innerHTML = data.map(u => `
            <div class="card result-card">
                <div style="font-weight:bold; color:#1a73e8; font-size:18px;">${u.uniName}</div>
                <div style="font-size:12px; color:#666; margin-bottom:10px;">${u.course} | ${u.intake}</div>
                <div style="font-size:13px; line-height:1.6;">
                    <b>Fee:</b> ${u.fee} ${u.currency} | <b>Bank Req:</b> ${u.bankBalance}<br>
                    <b>Bank BD:</b> ${u.bankNameSuggestion} | <b>Loan:</b> ${u.loanAmount}<br>
                    <b>Marital:</b> ${u.maritalStatus} | <b style="color:green;">Commission: ${u.partnerCommission}</b>
                </div>
                <button class="btn-search" style="margin-top:10px; background:#28a745; font-size:12px;">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
