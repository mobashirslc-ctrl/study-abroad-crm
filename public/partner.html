<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | Georun Ltd.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffcc00; --purple-dark: #0b012d; --purple-light: #1a0b4d; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: radial-gradient(circle at top right, var(--purple-light), var(--purple-dark)); font-family: 'Poppins', sans-serif; color: white; overflow-x: hidden; }
        
        .sidebar { width: 250px; height: 100vh; position: fixed; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-right: 1px solid var(--glass-border); }
        .main-content { margin-left: 250px; padding: 30px; }
        
        .card { background: var(--glass); border-radius: 15px; border: 1px solid var(--glass-border); padding: 20px; margin-bottom: 20px; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: white; }
        
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--gold); border-bottom: 2px solid var(--glass-border); padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #applyModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index: 999; align-items:center; justify-content:center; }
        #printArea { display:none; }
        
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; background: white; color: black; padding: 50px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding:30px; text-align:center;"><img src="logo.jpeg" style="width:80px; border-radius:10px;"></div>
    <div style="padding:20px;">
        <p onclick="location.reload()" style="cursor:pointer;"><i class="fas fa-home"></i> Dashboard</p>
    </div>
</div>

<div class="main-content">
    <div class="card">
        <h2>Assessment Search</h2>
        <div class="filter-grid">
            <input type="text" id="fCountry" placeholder="Country">
            <select id="fDegree">
                <option value="">Degree</option>
                <option value="Bachelor">Bachelor</option>
                <option value="Master">Master</option>
            </select>
            <input type="number" id="fGPA" placeholder="Your GPA (e.g. 3.5)">
            <input type="number" id="fLang" placeholder="IELTS/Duolingo Score">
        </div>
        <button class="btn-gold" id="searchBtn">Check Eligibility</button>
    </div>

    <div id="searchResultArea" style="display:none;">
        <div class="card">
            <h3 style="color:var(--gold);">Available Universities for You:</h3>
            <div id="uniListContainer"></div>
        </div>
    </div>

    <div class="card">
        <h3>Live Application Tracking</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Student</th><th>Passport</th><th>University</th><th>Status</th><th>Document</th></tr></thead>
                <tbody id="trackingList"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="applyModal">
    <div class="card" style="width:500px; background:#1a0b4d;">
        <h3 id="modalUniName" style="color:var(--gold)"></h3>
        <label>Student Name</label><input type="text" id="sName" placeholder="Full Name">
        <label>Passport Number</label><input type="text" id="sPass" placeholder="Passport No">
        <label>Academic PDF</label><input type="file" id="pdfAcademic" accept="application/pdf">
        <label>Others PDF (Optional)</label><input type="file" id="pdfOthers" accept="application/pdf">
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-gold" id="submitAppBtn" style="flex:1;">Submit & Get Slip</button>
            <button onclick="document.getElementById('applyModal').style.display='none'" style="background:red; color:white; border:none; border-radius:8px; padding:10px;">Close</button>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="text-align:center;">
        <img src="logo.jpeg" style="width:100px;">
        <h1>Georun Ltd.</h1>
        <h3>Acknowledgement Receipt</h3>
    </div>
    <hr>
    <div style="font-size:18px; margin-top:30px;">
        <p><b>Date:</b> <span id="slipDate"></span></p>
        <p><b>Student Name:</b> <span id="slipName"></span></p>
        <p><b>Passport No:</b> <span id="slipPass"></span></p>
        <p><b>University:</b> <span id="slipUni"></span></p>
        <p><b>Status:</b> <span style="color:green">Application Received</span></p>
    </div>
    <div style="margin-top:50px; text-align:center;">
        <div id="qrcode" style="display:inline-block;"></div>
        <p>Scan to verify</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module" src="partner-logic.js"></script>
</body>
</html>
