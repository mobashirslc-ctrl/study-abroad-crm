<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; }
        
        /* Sidebar Styling for Required Look */
        .sidebar { width: 260px; height: 100vh; background: #0d001a; border-right: 1px solid var(--border); position: fixed; padding: 20px; box-sizing: border-box; }
        .logo img { width: 100%; max-width: 150px; background: white; padding: 10px; border-radius: 8px; margin-bottom: 30px; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; cursor: pointer; border-radius: 10px; color: #ccc; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--gold); border: 1px solid var(--border); }

        .wrapper { margin-left: 260px; width: calc(100% - 260px); min-height: 100vh; }
        .section { display: none; padding: 30px; }
        .active-section { display: block !important; }
        
        .card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); margin-bottom: 20px; }
        .reg-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(241,196,15,0.3); }

        /* Assessment Grid as per your HTML */
        .assessment-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: flex-end; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--gold); border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        /* Modal Required Design */
        .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .submitted { background: #3498db; color: white; }
        .verified { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-search-location"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Earning</div>
        <div class="nav-item" onclick="showTab('profile', this)"><i class="fas fa-user-circle"></i> Profile</div>
    </div>

    <div class="wrapper">
        <div class="top-bar">
            <div>Welcome, <span id="welcomeName" style="color:var(--gold); font-weight:bold;">Partner</span></div>
            <button onclick="logout()" style="background:#ff4757; color:white; padding:5px 15px; border:none; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="main">
            <div id="home" class="section active-section">
                <div class="wallet-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div class="card"><p style="font-size:12px; color:#aaa;">PENDING COMMISSION</p><h2 id="topPending">৳0</h2></div>
                    <div class="card"><p style="font-size:12px; color:#aaa;">FINAL BALANCE</p><h2 id="topFinal">৳0</h2></div>
                </div>
                <div class="card">
                    <h3 style="color:var(--gold);">Recent Applications</h3>
                    <table>
                        <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="homeTrackingBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="assessment" class="section">
                <div class="card">
                    <h3 style="color:var(--gold);">Smart Search Filter</h3>
                    <div class="assessment-grid">
                        <div><label style="font-size:10px;color:#aaa">Country</label><input type="text" id="fCountry" placeholder="e.g. UK" class="reg-input"></div>
                        <div><label style="font-size:10px;color:#aaa">Degree</label>
                            <select id="fDegree" class="reg-input">
                                <option value="">Any Degree</option>
                                <option value="Bachelor">Bachelor</option>
                                <option value="Master">Master</option>
                            </select>
                        </div>
                        <button onclick="searchUniversity()" class="btn-gold" style="height:40px;">SEARCH</button>
                    </div>
                </div>
                <div id="searchResultArea" class="card" style="display:none;">
                    <table>
                        <thead><tr><th>University</th><th>Degree</th><th>Requirement</th><th>Commission</th><th>Action</th></tr></thead>
                        <tbody id="uniListContainer"></tbody>
                    </table>
                </div>
            </div>

            <div id="tracking" class="section">
                <div class="card">
                    <h3 style="color:var(--gold);">Detailed Application Status</h3>
                    <table>
                        <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="sidebarTrackingBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="card" style="width: 500px; border: 1px solid var(--gold);">
            <h2 style="color:var(--gold);">Apply for <span id="targetUni">...</span></h2>
            <form id="applyForm">
                <input type="text" id="sName" placeholder="Student Full Name" class="reg-input" required>
                <input type="text" id="sPassport" placeholder="Passport Number" class="reg-input" required>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div><label style="font-size:10px; color:#aaa;">Passport (PDF)</label><input type="file" id="pdf1" class="reg-input" required></div>
                    <div><label style="font-size:10px; color:#aaa;">Academic (PDF)</label><input type="file" id="pdf2" class="reg-input" required></div>
                </div>
                <button type="submit" id="submitBtn" class="btn-gold" style="margin-top:15px;">CONFIRM SUBMISSION</button>
                <button type="button" onclick="closeModal()" style="background:none; color:white; border:none; width:100%; margin-top:10px; cursor:pointer;">Cancel</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk",
            authDomain: "ihp-portal-v3.firebaseapp.com",
            projectId: "ihp-portal-v3",
            storageBucket: "ihp-portal-v3.firebasestorage.app",
            messagingSenderId: "481157902534",
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const partnerEmail = localStorage.getItem('userEmail') || "gorunbangladesh@gmail.com";

        // Logic: Search Filter
        window.searchUniversity = async () => {
            const country = document.getElementById('fCountry').value.toLowerCase();
            const degree = document.getElementById('fDegree').value;
            const container = document.getElementById('uniListContainer');
            document.getElementById('searchResultArea').style.display = "block";
            
            const snap = await getDocs(collection(db, "universities"));
            let html = "";
            snap.forEach(doc => {
                const u = doc.data();
                if ((!country || u.country.toLowerCase().includes(country)) && (!degree || u.degree === degree)) {
                    html += `<tr><td>${u.name}</td><td>${u.degree}</td><td>GPA ${u.minGPA}</td><td>৳${u.partnerComm}</td>
                             <td><button onclick="openApplyModal('${u.name}', '${u.partnerComm}')" class="btn-gold" style="padding:5px 10px; font-size:10px;">APPLY</button></td></tr>`;
                }
            });
            container.innerHTML = html || "<tr><td colspan='5'>No results found</td></tr>";
        };

        // Logic: Live Tracking & Wallet Sync
        onSnapshot(query(collection(db, "applications"), where("partnerEmail", "==", partnerEmail)), (snap) => {
            let pending = 0, final = 0, rows = "";
            snap.forEach(doc => {
                const d = doc.data();
                if (d.status === "verified") pending += Number(d.partnerComm || 0);
                if (d.walletStatus === "paid") final += Number(d.partnerComm || 0);
                rows += `<tr><td><b>${d.studentName}</b><br><small>${d.university}</small></td><td>${d.passportNo}</td>
                         <td><span class="status-pill ${d.status}">${d.status}</span></td><td>${d.createdAt?.toDate().toLocaleDateString() || 'Now'}</td></tr>`;
            });
            document.getElementById('topPending').innerText = `৳${pending}`;
            document.getElementById('topFinal').innerText = `৳${final}`;
            document.getElementById('homeTrackingBody').innerHTML = rows;
            document.getElementById('sidebarTrackingBody').innerHTML = rows;
        });

        // Logic: Modal & Submission
        window.openApplyModal = (uni, comm) => {
            document.getElementById('targetUni').innerText = uni;
            window.selectedUni = uni; window.selectedComm = comm;
            document.getElementById('applyModal').style.display = "flex";
        };
        window.closeModal = () => document.getElementById('applyModal').style.display = "none";

        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "SUBMITTING..."; btn.disabled = true;

            try {
                // Note: Actual PDF upload logic would go here (e.g. Cloudinary/Firebase Storage)
                await addDoc(collection(db, "applications"), {
                    studentName: document.getElementById('sName').value,
                    passportNo: document.getElementById('sPassport').value,
                    university: window.selectedUni,
                    partnerComm: Number(window.selectedComm),
                    partnerEmail: partnerEmail,
                    status: "submitted",
                    walletStatus: "pending",
                    createdAt: serverTimestamp(),
                    pdf1: "uploaded_url_here", // Add mapping here
                    pdf2: "uploaded_url_here"
                });
                alert("Application Submitted Successfully!");
                closeModal();
            } catch (err) { alert(err.message); }
            btn.innerText = "CONFIRM SUBMISSION"; btn.disabled = false;
        };

        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };
        window.logout = () => { localStorage.clear(); location.href = 'index.html'; };
    </script>
</body>
</html>
