<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.section { display: none; } .active { display: block; } .input-box { border:1px solid #ddd; padding:8px; width:100%; border-radius:4px; }</style>
</head>
<body class="bg-slate-50 flex">
    <div class="w-64 bg-slate-900 h-screen text-white p-6">
        <h2 class="text-xl font-bold mb-10 text-blue-400">PARTNER PORTAL</h2>
        <nav class="space-y-4">
            <button onclick="showSection('assessmentSection')" class="w-full text-left">🔍 Smart Assessment</button>
        </nav>
    </div>

    <div class="flex-1 p-8">
        <div id="assessmentSection" class="section active">
            <div class="grid grid-cols-5 gap-4 mb-8 bg-white p-4 rounded shadow">
                <input type="text" id="aCountry" placeholder="Country" class="input-box">
                <select id="aDegree" class="input-box"><option>Ug</option><option>Pg</option><option>Diploma</option></select>
                <select id="aLang" class="input-box"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                <input type="text" id="aScore" placeholder="Lang Score" class="input-box">
                <button onclick="runSearch()" class="bg-blue-600 text-white rounded">Search</button>
            </div>
            <div id="results" class="grid grid-cols-2 gap-6"></div>
        </div>
    </div>

    <script>
        async function runSearch() {
            const res = await fetch('/api/partner/assessment', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ country: document.getElementById('aCountry').value, degree: document.getElementById('aDegree').value })
            });
            const unis = await res.json();
            document.getElementById('results').innerHTML = unis.map(u => `
                <div class="bg-white p-6 rounded shadow-lg border-l-4 border-blue-600">
                    <h3 class="font-bold text-lg text-blue-800">${u.uniName}</h3>
                    <p class="text-xs text-slate-500 mb-4">${u.location}, ${u.country}</p>
                    <div class="grid grid-cols-2 text-[11px] gap-2">
                        <p><b>Course:</b> ${u.courseName}</p>
                        <p><b>Intake:</b> ${u.intake}</p>
                        <p><b>Fee:</b> ${u.semesterFee} ${u.currency}</p>
                        <p><b>Bank BD:</b> ${u.bankNameBD}</p>
                        <p><b>Loan:</b> ${u.loanAmount}</p>
                        <p><b>Status:</b> ${u.maritalStatus}</p>
                    </div>
                    <div class="mt-4 pt-4 border-t flex justify-between items-center">
                        <p class="font-bold text-green-600 text-lg">Comm: $${u.partnerCommission}</p>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-xs">OPEN FILE</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
