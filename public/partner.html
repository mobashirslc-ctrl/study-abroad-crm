<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .search-section { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .uni-card { background: white; padding: 15px; margin-top: 15px; border-radius: 8px; border-left: 5px solid #1a73e8; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0;">Partner Dashboard</h1>
        <p id="welcomeMsg" style="margin:5px 0 0 0; font-weight:bold;">Welcome!</p>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="search-section">
    <h3>🔍 Smart Assessment</h3>
    <input type="text" id="search" placeholder="Search Country..." onkeyup="filter()" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;">
</div>

<div id="results"></div>

<script>
    // ১. নাম দেখানো এবং স্ট্যাটাস চেক
    async function checkSecurity() {
        const name = localStorage.getItem('userName');
        const email = localStorage.getItem('userEmail');
        if(!name) return window.location.href = "/";
        
        document.getElementById('welcomeMsg').innerText = `Welcome, ${name} 👋`;

        // সার্ভার থেকে লেটেস্ট স্ট্যাটাস চেক (যদি ইনএকটিভ হয় তবে বের করে দেবে)
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const me = users.find(u => u.email === email);
        if(me && me.status !== 'active') {
            alert("Your account is deactivated by Admin.");
            logout();
        }
    }

    async function fetchUnis() {
        const res = await fetch('/api/search-university');
        const unis = await res.json();
        const container = document.getElementById('results');
        container.innerHTML = unis.map(u => `
            <div class="uni-card">
                <h3>${u.name}</h3>
                <p>📍 ${u.country} | Fee: ${u.semesterFee} ${u.currency}</p>
            </div>
        `).join('');
    }

    function logout() { localStorage.clear(); window.location.href = "/"; }

    window.onload = () => {
        checkSecurity();
        fetchUnis();
    };
</script>
</body>
</html>
