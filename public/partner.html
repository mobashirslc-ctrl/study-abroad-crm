<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Dashboard | IHP CRM</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-50 flex">
    <div class="w-64 bg-slate-900 h-screen text-white p-6 sticky top-0">
        <h1 class="text-lg font-bold mb-8 text-blue-400">IHP PARTNER</h1>
        <div class="mb-6 p-4 bg-slate-800 rounded-lg text-center">
            <p class="text-xs text-slate-400 uppercase">Wallet</p>
            <h3 id="walletBalance" class="text-xl font-bold text-green-400">$0.00</h3>
        </div>
        <button onclick="logout()" class="w-full bg-red-500/10 text-red-400 py-2 rounded text-xs font-bold mt-auto">LOGOUT</button>
    </div>

    <div class="flex-1 p-10">
        <div class="bg-white p-8 rounded-xl shadow-sm border">
            <h2 class="text-lg font-bold mb-6 border-b pb-4">Smart Assessment Tool</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <input type="text" id="aCountry" placeholder="Country" class="p-3 border rounded-lg outline-none">
                <button onclick="runAssessment()" class="bg-blue-600 text-white py-2 rounded-lg font-bold">Search</button>
            </div>
            <div id="assessmentResult" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const info = JSON.parse(localStorage.getItem('partnerInfo'));
            if(!info) { window.location.href = "/"; return; }
            document.getElementById('walletBalance').innerText = `$${info.walletBalance || 0}`;
        };

        async function runAssessment() {
            const res = await fetch('/api/partner/assessment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ country: document.getElementById('aCountry').value })
            });
            const unis = await res.json();
            document.getElementById('assessmentResult').innerHTML = unis.map(u => `
                <div class="bg-slate-50 border rounded-xl p-6">
                    <h3 class="font-bold text-blue-900">${u.uniName}</h3>
                    <p class="text-xs text-slate-500 mb-4">${u.location}, ${u.country}</p>
                    <div class="grid grid-cols-2 gap-2 text-xs text-slate-600 border-y py-3 mb-4">
                        <p><b>Course:</b> ${u.courseName}</p><p><b>Intake:</b> ${u.intake}</p>
                        <p><b>Fee:</b> ${u.semesterFee}</p><p><b>Bank:</b> ${u.bankNameBD}</p>
                    </div>
                    <div class="flex justify-between items-center bg-white p-3 rounded-lg border">
                        <span class="font-bold text-green-600">$${u.partnerCommission}</span>
                        <button class="bg-blue-600 text-white px-4 py-1.5 rounded text-xs font-bold">Open File</button>
                    </div>
                </div>`).join('');
        }
        function logout() { localStorage.clear(); window.location.href = "/"; }
    </script>
</body>
</html>
