<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | Mobashir Ahmed Nasrullah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #4b0082; /* Deep Purple Theme */
            --bg-dark: #1a0033;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark), var(--primary-purple));
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            border-right: 1px solid var(--border); position: fixed; height: 100vh; display: flex; flex-direction: column;
        }
        .logo-box { padding: 30px 20px; text-align: center; }
        .logo-box img { width: 100%; max-width: 150px; background: white; border-radius: 8px; padding: 5px; }

        .menu-list { flex-grow: 1; padding: 20px 0; }
        .menu-item {
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            color: #ccc; text-decoration: none; transition: 0.3s; cursor: pointer;
        }
        .menu-item:hover, .menu-item.active { background: var(--glass); color: white; border-left: 4px solid #fff; }

        /* --- MAIN CONTENT --- */
        .main { margin-left: 260px; flex-grow: 1; padding: 30px; }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border);
            border-radius: 15px; padding: 25px; margin-bottom: 25px;
        }

        /* --- SEARCH FILTER (5 FIELDS) --- */
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #ddd; }
        .input-group input, .input-group select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.3); color: white; outline: none; box-sizing: border-box;
        }

        /* --- WALLET BOXES --- */
        .wallet-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .wallet-box { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .amount { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        .pending { color: #f1c40f; } .final { color: #2ecc71; }

        /* --- BUTTONS --- */
        .btn { background: white; color: var(--primary-purple); border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #ddd; }

        /* --- HIDDEN SECTIONS --- */
        #search-result-section, #full-form-section { display: none; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .data-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .data-box label { font-size: 0.7rem; color: #aaa; display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box">
            <img src="logo.jpeg" alt="SCC Logo">
        </div>
        <nav class="menu-list">
            <a onclick="showSection('dashboard')" class="menu-item active"><i class="fas fa-home"></i> Dashboard</a>
            <a onclick="showSection('search')" class="menu-item"><i class="fas fa-search"></i> Search Result</a>
            <a onclick="showSection('tracking')" class="menu-item"><i class="fas fa-map-marker-alt"></i> File Tracking</a>
            <a onclick="showSection('wallet')" class="menu-item"><i class="fas fa-wallet"></i> My Wallet</a>
            <a onclick="showSection('subscription')" class="menu-item"><i class="fas fa-crown"></i> Subscriptions</a>
        </nav>
        <div style="padding: 20px;">
            <a class="menu-item" style="color: #ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2>Partner Overview</h2>
            <div style="font-weight: bold;">MOBASHIR AHMED NASRULLAH <i class="fas fa-check-circle" style="color:#2ecc71;"></i></div>
        </div>

        <div class="wallet-container">
            <div class="wallet-box">
                <h4>Pending Commission</h4>
                <div class="amount pending">৳ <span id="pending-val">0.00</span></div>
            </div>
            <div class="wallet-box">
                <h4>Final/Available Balance</h4>
                <div class="amount final">৳ <span id="final-val">0.00</span></div>
                <button class="btn" style="padding: 5px 15px; font-size: 0.7rem;">Withdraw Now</button>
            </div>
        </div>

        <div class="glass-card">
            <h3>Assessment Search</h3>
            <div class="filter-grid">
                <div class="input-group"><label>Country</label><input type="text" placeholder="e.g. Canada"></div>
                <div class="input-group">
                    <label>Degree</label>
                    <select><option>UG</option><option>PG</option><option>Diploma</option><option>Foundation</option><option>PhD</option></select>
                </div>
                <div class="input-group"><label>Academic Score</label><input type="text" placeholder="CGPA"></div>
                <div class="input-group">
                    <label>Language Test</label>
                    <select><option>IELTS</option><option>PTE</option><option>Duolingo</option></select>
                </div>
                <div class="input-group"><label>Language Score</label><input type="text" placeholder="Score"></div>
            </div>
            <button class="btn" style="margin-top: 20px;" onclick="runSearch()">Run Assessment</button>
        </div>

        <div class="glass-card" id="search-result-section">
            <h3>Assessment Result</h3>
            <div class="result-grid" id="result-grid-display">
                </div>
            <button class="btn" style="margin-top: 20px; background: #2ecc71; color: white;" onclick="openForm()">Open File & Apply</button>
        </div>

        <div class="glass-card" id="full-form-section">
            <h3>Student Application Form</h3>
            <div class="filter-grid">
                <div class="input-group"><label>Student Name</label><input type="text"></div>
                <div class="input-group"><label>Contact Number</label><input type="text"></div>
                <div class="input-group"><label>Passport Number</label><input type="text"></div>
            </div>
            <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="input-group"><label>Passport PDF</label><input type="file" accept=".pdf"></div>
                <div class="input-group"><label>Academic PDF</label><input type="file" accept=".pdf"></div>
                <div class="input-group"><label>Language PDF</label><input type="file" accept=".pdf"></div>
            </div>
            <button class="btn" style="margin-top: 20px;" onclick="alert('Application Submitted!')">Submit Application</button>
        </div>

        <footer>© 2026 <strong>MOBASHIR AHMED NASRULLAH</strong>. All Rights Reserved.</footer>
    </div>

    <script>
        // NAVIGATION LOGIC
        function showSection(section) {
            alert(section + " module is active now.");
        }

        // SEARCH LOGIC (Shows 11 Fields)
        function runSearch() {
            const section = document.getElementById('search-result-section');
            const grid = document.getElementById('result-grid-display');
            section.style.display = 'block';
            
            const fields = ["Uni Name", "Location", "Intake", "Tuition Fee", "Scholarship", "App Fee", "Entry Req", "IELTS Req", "Living Cost", "Process Time", "Commission"];
            grid.innerHTML = "";
            fields.forEach(f => {
                grid.innerHTML += `<div class="data-box"><label>${f}</label><span>Match Found</span></div>`;
            });
            window.scrollTo(0, document.body.scrollHeight);
        }

        // FORM LOGIC
        function openForm() {
            document.getElementById('full-form-section').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
