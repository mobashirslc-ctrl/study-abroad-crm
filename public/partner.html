<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #060212; --glass: rgba(255, 255, 255, 0.03); --border: rgba(46, 204, 113, 0.15); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 70px; background: rgba(0,0,0,0.5); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; z-index: 1000; }
        .nav-icon { color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; transition: 0.3s; padding: 12px; border-radius: 10px; }
        .nav-icon.active { color: var(--accent); background: rgba(46, 204, 113, 0.1); }

        .main-container { flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 80px; }
        .glass-box { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }

        .table-wrapper { overflow-x: auto; margin-top: 15px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: left; color: var(--accent); font-size: 9px; padding: 12px; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        
        input, select { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; font-size: 12px; margin-bottom: 10px; }
        .main-btn { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .popup-card { background: #111; border: 1px solid var(--accent); width: 420px; padding: 25px; border-radius: 15px; }
        .slip-box { background: #fff; width: 480px; padding: 40px; border-radius: 15px; color: #000; text-align: center; border: 2px dashed var(--accent); }

        .section { display: none; } .section.active { display: block; }
        .footer { background: #000; border-top: 1px solid var(--border); padding: 15px; text-align: center; font-size: 11px; color: #666; width: 100%; position: fixed; bottom: 0; left: 0; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="nav-icon active" onclick="showSec('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-icon" onclick="showSec('tracking', this)"><i class="fas fa-history"></i></div>
        <div class="nav-icon" onclick="showSec('wallet', this)"><i class="fas fa-wallet"></i></div>
    </aside>

    <main class="main-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <img src="logo.jpeg" alt="SCC Logo" style="height: 50px;">
            <div style="text-align: right;"><b style="color:var(--accent)">GORUN LTD.</b></div>
        </div>

        <section id="home" class="section active">
            <div class="glass-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin:0;">Assessment Filter</h3>
                    <button class="main-btn" onclick="location.reload()" style="background:transparent; border:1px solid var(--border); color:var(--accent);">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
                <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; margin-top:15px;">
                    <input type="text" placeholder="Country">
                    <select><option>Masters</option><option>Bachelor</option></select>
                    <input type="text" placeholder="GPA">
                    <select><option>IELTS</option><option>PTE</option></select>
                    <input type="text" placeholder="Score">
                </div>
                <button class="main-btn" style="margin-top:15px;" onclick="document.getElementById('resT').style.display='block'">Search Now</button>

                <div id="resT" class="table-wrapper" style="display:none;">
                    <table>
                        <thead>
                            <tr><th>University</th><th>Course</th><th>Total Fee</th><th>Partner Commission (৳)</th><th>Action</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Hull University</td><td>MSc Data Science</td><td>£16,000</td>
                                <td style="color:#f1c40f; font-weight:bold;">৳ 25,000</td>
                                <td><button class="main-btn" onclick="openPopup()">Open File</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        </main>

    <div id="formModal" class="modal-overlay">
        <div class="popup-card">
            <h3 style="color:var(--accent);">Registration Form</h3>
            <input type="text" id="sName" placeholder="Student Name">
            <input type="text" id="sPass" placeholder="Passport No">
            <div style="margin:10px 0; border:1px dashed var(--border); padding:10px;">
                <label style="font-size:10px; color:var(--accent)">Upload 3 PDF Files</label>
                <input type="file" accept=".pdf" style="margin-top:5px;"><input type="file" accept=".pdf"><input type="file" accept=".pdf">
            </div>
            <button class="main-btn" style="width:100%; margin-top:10px;" onclick="submitAndShowSlip()">Submit & Generate Slip</button>
            <button class="main-btn" style="width:100%; margin-top:10px; background:#333; color:#fff;" onclick="closePopup()">Cancel</button>
        </div>
    </div>

    <div id="slipModal" class="modal-overlay">
        <div class="slip-box">
            <img src="logo.jpeg" style="height:50px; margin-bottom:10px;">
            <h2>STUDENT CAREER CONSULTANCY</h2>
            <hr style="border:0.5px solid #eee; margin:20px 0;">
            <h3 id="resTitle" style="font-size:24px;"></h3>
            <div style="background:#f9f9f9; padding:20px; border-radius:12px; text-align:left; font-family:monospace; font-size:13px;">
                <b>STUDENT:</b> <span id="resName"></span><br>
                <b>PASSPORT:</b> <span id="resPass"></span><br>
                <b>PARTNER:</b> GORUN LTD.
            </div>
            <div id="qrcode" style="display:flex; justify-content:center; margin:25px 0;"></div>
            <button class="main-btn" onclick="window.print()">PRINT SLIP</button>
            <button class="main-btn" style="background:#eee; color:#333;" onclick="location.reload()">CLOSE</button>
        </div>
    </div>

    <footer class="footer">
        © 2026 Student Career Consultancy. All Rights Reserved. | Powered by <b>Gorun Ltd.</b>
    </footer>

    <script>
        function showSec(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function openPopup() { document.getElementById('formModal').style.display = 'flex'; }
        function closePopup() { document.getElementById('formModal').style.display = 'none'; }

        function submitAndShowSlip() {
            const n = document.getElementById('sName').value;
            const p = document.getElementById('sPass').value;
            if(!n || !p) return alert("Fill all fields!");

            document.getElementById('formModal').style.display = 'none';
            document.getElementById('slipModal').style.display = 'flex';
            document.getElementById('resTitle').innerText = "Congratulations, " + n + "!";
            document.getElementById('resName').innerText = n;
            document.getElementById('resPass').innerText = p;

            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: p, width: 120, height: 120 });
        }
    </script>
</body>
</html>
