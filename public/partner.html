<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .main-content { margin-left: 260px; padding: 32px; width: calc(100% - 260px); }
        .nav-item { padding: 12px 24px; display: flex; align-items: center; gap: 12px; color: #94a3b8; cursor: pointer; border-radius: 8px; margin: 4px 16px; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; font-size: 13px; }
        #leadModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="leadModal">
        <div class="glass p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-xl font-bold text-blue-400 mb-6">Student Enrollment</h2>
            <div class="space-y-4">
                <input type="text" id="stdName" placeholder="Student Full Name" class="w-full p-3 rounded-lg outline-none">
                <input type="text" id="stdPhone" placeholder="Contact Number" class="w-full p-3 rounded-lg outline-none">
                <div class="flex gap-3 mt-6">
                    <button onclick="closeModal()" class="flex-1 bg-white/5 py-3 rounded-xl font-bold text-xs uppercase">Cancel</button>
                    <button onclick="confirmLead()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase shadow-lg shadow-blue-900/40">Confirm & Unlock</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar glass flex flex-col">
        <div class="p-8 border-b border-white/5"><h2 class="text-xl font-bold text-blue-400 tracking-tighter">IHP PARTNER</h2></div>
        <nav class="mt-8 flex-1">
            <div class="nav-item active"><span>🔍</span> Smart Assessment</div>
            <div class="nav-item"><span>📂</span> File Tracking</div>
            <div class="nav-item"><span>💳</span> Withdraw & Sub</div>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold">Welcome, <span id="partnerDisplayName" class="text-blue-400">...</span></h1>
                <p class="text-slate-400 text-sm italic">Assessment Tool with Student Lead Lock</p>
            </div>
            <div class="glass px-8 py-4 rounded-2xl text-center border-emerald-500/20">
                <p class="text-[10px] uppercase text-slate-500 mb-1 font-bold">Wallet Balance</p>
                <p class="text-3xl font-mono font-bold text-emerald-400">$<span id="walletVal">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 glass p-6 rounded-2xl h-fit">
                <h3 class="text-xs font-bold text-blue-300 mb-6 uppercase">Search Filters</h3>
                <div class="space-y-4">
                    <div><label class="text-[10px] text-slate-500 uppercase">Country Name</label>
                    <input type="text" id="fCountry" placeholder="e.g. United Kingdom" class="w-full p-2.5 rounded mt-1"></div>
                    
                    <div><label class="text-[10px] text-slate-500 uppercase">Degree</label>
                    <select id="fDegree" class="w-full p-2.5 rounded mt-1">
                        <option value="UG">Undergraduate (UG)</option>
                        <option value="PG">Postgraduate (PG)</option>
                        <option value="DIPLOMA">Diploma</option>
                        <option value="PHD">PhD</option>
                        <option value="RESEARCH">Research</option>
                    </select></div>

                    <div><label class="text-[10px] text-slate-500 uppercase">Language Test</label>
                    <select id="fLangType" class="w-full p-2.5 rounded mt-1">
                        <option value="IELTS">IELTS</option>
                        <option value="PTE">PTE</option>
                        <option value="DUOLINGO">Duolingo</option>
                    </select></div>

                    <div><label class="text-[10px] text-slate-500 uppercase">Language Score</label>
                    <input type="text" id="fLangScore" placeholder="e.g. 6.5" class="w-full p-2.5 rounded mt-1"></div>

                    <div><label class="text-[10px] text-slate-500 uppercase">Academic Score (%)</label>
                    <input type="text" id="fAcademic" placeholder="e.g. 80" class="w-full p-2.5 rounded mt-1"></div>

                    <button onclick="runAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold mt-4 shadow-lg shadow-blue-900/40 transition-all">SEARCH NOW</button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="resGrid" class="space-y-4">
                    <div class="text-center py-24 glass rounded-2xl border-dashed border-white/10 text-slate-500 italic">Enter student details to find universities.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('partnerDisplayName').innerText = localStorage.getItem('partnerName') || 'Partner';
        let currentWallet = 0; let pendingComm = 0; let currentBtn = null;

        async function runAssessment() {
            const grid = document.getElementById('resGrid');
            grid.innerHTML = '<div class="text-center py-20 text-blue-400 animate-pulse font-bold">Scanning Global Data...</div>';
            
            try {
                const res = await fetch('/api/universities');
                const unis = await res.json();
                const country = document.getElementById('fCountry').value.toLowerCase();
                const filtered = country ? unis.filter(u => u.country.toLowerCase().includes(country)) : unis;

                grid.innerHTML = filtered.map(u => `
                    <div class="glass p-6 rounded-2xl border-l-4 border-blue-500 mb-4 hover:bg-white/[0.04] transition-all">
                        <div class="flex justify-between mb-6">
                            <div><h3 class="text-xl font-bold">${u.uniName}</h3><p class="text-blue-400 text-sm font-medium">${u.courseName}</p></div>
                            <span class="bg-emerald-500/10 text-emerald-400 text-[10px] px-3 py-1 rounded-full font-bold border border-emerald-500/20 uppercase">$${u.partnerCommission} Comm</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-[11px] border-t border-white/5 pt-6">
                            <div><p class="text-slate-500 uppercase">Intake</p><p class="font-bold">${u.intake}</p></div>
                            <div><p class="text-slate-500 uppercase">Semester Fee</p><p class="font-bold text-blue-300 font-mono">${u.semesterFee}</p></div>
                            <div><p class="text-slate-500 uppercase">Bank BD</p><p class="font-bold">${u.bankNameBD}</p></div>
                            <div><p class="text-slate-500 uppercase">Language Req</p><p class="font-bold text-orange-400">${u.ieltsScore || '6.0'}</p></div>
                        </div>
                        <button onclick="openLeadModal('${u.partnerCommission}', this)" class="w-full mt-8 bg-white/5 hover:bg-blue-600 py-3 rounded-xl text-[10px] font-bold tracking-widest border border-white/10 uppercase transition-all">Open File & Add Commission</button>
                    </div>
                `).join('');
            } catch(e) { grid.innerHTML = '<p class="text-red-400">Error loading data.</p>'; }
        }

        function openLeadModal(amt, btn) {
            pendingComm = parseFloat(amt); currentBtn = btn;
            document.getElementById('leadModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('leadModal').style.display = 'none'; }

        function confirmLead() {
            const name = document.getElementById('stdName').value;
            if(!name || !document.getElementById('stdPhone').value) return alert("Fill all info");
            
            currentWallet += pendingComm;
            document.getElementById('walletVal').innerText = currentWallet.toFixed(2);
            currentBtn.innerText = "✓ FILE OPENED FOR: " + name.toUpperCase();
            currentBtn.disabled = true;
            currentBtn.className = "w-full mt-8 bg-emerald-600/20 text-emerald-400 py-3 rounded-xl text-[10px] font-bold cursor-not-allowed border border-emerald-500/20";
            closeModal();
        }
    </script>
</body>
</html>
