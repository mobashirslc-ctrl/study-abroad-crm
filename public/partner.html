<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --bg: #0b012d; --darker: #080120; --card-bg: rgba(255, 255, 255, 0.05); --danger: #ff5e5e; --success: #2ecc71; }
        body { margin: 0; display: flex; background-color: var(--bg); font-family: 'Poppins', sans-serif; color: white; height: 100vh; overflow: hidden; }
        .sidebar { width: 90px; background: var(--darker); display: flex; flex-direction: column; align-items: center; padding: 25px 0; border-right: 1px solid rgba(255,255,255,0.05); transition: 0.3s; z-index: 1000; }
        .sidebar:hover { width: 220px; align-items: flex-start; padding-left: 15px; }
        .sidebar img.logo { width: 70px; background: white; border-radius: 12px; margin-bottom: 45px; }
        .nav-links { list-style: none; padding: 0; width: 100%; flex-grow: 1; }
        .nav-links li { padding: 18px; cursor: pointer; color: #bdc3c7; display: flex; align-items: center; gap: 15px; transition: 0.2s; border-left: 3px solid transparent; width: 100%; box-sizing: border-box; }
        .nav-links li span { display: none; white-space: nowrap; font-size: 14px; }
        .sidebar:hover .nav-links li span { display: inline; }
        .nav-links li.active { color: var(--gold); background: rgba(255, 204, 0, 0.08); border-left-color: var(--gold); }
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .content-body { padding: 25px; flex-grow: 1; }
        .section { display: none; }
        .section.active { display: block; }
        .top-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: linear-gradient(135deg, #1c1145, #080120); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,204,0,0.3); }
        .stat-box .amount { font-size: 20px; font-weight: bold; color: var(--gold); }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px;}
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="logo.jpeg" class="logo">
        <ul class="nav-links">
            <li class="active" onclick="showSection('dashboard', this)"><i class="fa-solid fa-house"></i> <span>Home</span></li>
            <li onclick="showSection('tracking-sec', this)"><i class="fa-solid fa-folder-tree"></i> <span>File Tracking</span></li>
            <li onclick="showSection('wallet-sec', this)"><i class="fa-solid fa-wallet"></i> <span>Wallet</span></li>
            <li onclick="showSection('profile', this)"><i class="fa-solid fa-user-gear"></i> <span>Profile Setup</span></li>
        </ul>
        <div onclick="logout()" style="margin-top:auto; padding-bottom:20px; color:var(--danger); cursor:pointer; width:100%; text-align:center;"><i class="fa-solid fa-right-from-bracket"></i></div>
    </div>

    <div class="main-container">
        <div class="top-header">
            <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 15px; border-radius:5px; cursor:pointer;">Refresh</button>
            <div style="color: var(--gold); font-weight: bold; font-size: 14px;">
                <i class="fa-solid fa-user-check"></i> <span id="pNameText">Partner Portal</span>
            </div>
        </div>

        <div class="content-body">
            <div class="top-stats">
                <div class="stat-box"><small>Estimated Pending</small><div class="amount">৳ 0</div></div>
                <div class="stat-box"><small>Available Wallet</small><div class="amount">৳ 0</div></div>
                <div class="stat-box"><small>System Status</small><div class="amount" style="color:var(--success); font-size:14px;">LIVE</div></div>
            </div>

            <div id="dashboard" class="section active">
                <div class="card">
                    <h3 style="margin-top:0; color: var(--gold);">Welcome Back</h3>
                    <p>আপনার ড্যাশবোর্ড এখন সচল। গিটহাব থেকে আপডেট লোড হতে ১-২ মিনিট সময় লাগতে পারে।</p>
                    <button class="btn-gold">Start New Assessment</button>
                </div>
            </div>
            <div id="tracking-sec" class="section"><div class="card"><h3>Tracking</h3></div></div>
            <div id="wallet-sec" class="section"><div class="card"><h3>Wallet</h3></div></div>
            <div id="profile" class="section"><div class="card"><h3>Profile</h3></div></div>
        </div>
    </div>

    <script>
        function showSection(id, element) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            element.classList.add('active');
        }

        function logout() {
            localStorage.removeItem('partnerData');
            window.location.href = 'index.html';
        }

        // নাম দেখানোর চেষ্টা (যদি লগইন করা থাকে)
        const partnerData = JSON.parse(localStorage.getItem('partnerData'));
        if (partnerData) {
            document.getElementById('pNameText').innerText = partnerData.name;
        }
    </script>
</body>
</html>
