<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | SCC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold">SCC Partner Portal</h1>
        <ul class="flex space-x-6 nav-links">
            <li class="cursor-pointer hover:text-blue-400 active" onclick="tab('dash')">Dashboard</li>
            <li class="cursor-pointer hover:text-blue-400" onclick="tab('apply')">New Application</li>
        </ul>
    </nav>

    <main class="p-8">
        <div id="dash" class="section active">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Application Status</h2>
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="min-w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4">Student Name</th>
                            <th class="p-4">Passport</th>
                            <th class="p-4">University</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Date</th>
                        </tr>
                    </thead>
                    <tbody class="sharedBody divide-y">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="apply" class="section">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Submit Application</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow cursor-pointer hover:border-blue-500 border-2 border-transparent transition" onclick="openApp('University of Delhi')">
                    <h3 class="text-xl font-bold">University of Delhi</h3>
                    <p class="text-gray-500">Apply for undergraduate or graduate programs.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="appModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h2 id="mTitle" class="text-2xl font-bold mb-4"></h2>
            <input type="text" id="sName" placeholder="Student Full Name" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="sPass" placeholder="Passport Number" class="w-full p-3 border rounded-lg mb-6 outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex space-x-4">
                <button id="submitBtn" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">Submit Now</button>
                <button onclick="document.getElementById('appModal').style.display='none'" class="flex-1 bg-gray-200 p-3 rounded-lg font-bold hover:bg-gray-300">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="partner-logic.js"></script>
</body>
</html>
