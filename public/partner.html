<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 11px; color: #888; cursor: pointer; }
        .active { color: #1a73e8; font-weight: bold; }
        .page { display: none; } .page.active-page { display: block; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="auth-box" class="card">
        <h2 id="authTitle">Partner Registration</h2>
        <div id="regOnly"><input type="text" id="pName" placeholder="Full Name"></div>
        <input type="email" id="pEmail" placeholder="Email Address">
        <input type="password" id="pPass" placeholder="Password">
        <button class="btn-blue" onclick="handleAuth()" id="authBtn">REGISTER</button>
        <p onclick="toggleAuth()" style="text-align:center; font-size:12px; cursor:pointer; margin-top:10px;">Already have account? Login</p>
    </div>

    <div id="main-content" style="display:none;">
        <div id="p-assessment" class="page active-page">
            <div class="card">
                <h3>🔍 Smart Assessment</h3>
                <input type="text" id="sCountry" placeholder="Country">
                <select id="sDegree">
                    <option value="">Degree</option><option>UG</option><option>PG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                </select>
                <select id="sLang">
                    <option value="">Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                </select>
                <input type="text" id="sAcad" placeholder="Academic CGPA/GPA">
                <button class="btn-blue" onclick="runSearch()">SEARCH</button>
            </div>
            <div id="results"></div>
        </div>

        <div id="p-tracking" class="page">
            <h3>📁 File Tracking</h3>
            <div id="trackList"></div>
        </div>

        <div id="p-wallet" class="page">
            <div class="card" style="background:#1a73e8; color:white;">
                <p>Total Balance</p><h2>৳ <span id="w-total">0.00</span></h2>
                <small>Pending: ৳ <span id="w-pending">0.00</span></small>
            </div>
            <div class="card">
                <h3>Withdraw Funds</h3>
                <select id="wMethod"><option>Bkash</option><option>Nagad</option><option>Bank Account</option></select>
                <input type="text" placeholder="Account Details">
                <input type="number" placeholder="Amount">
                <button class="btn-blue" style="background:#28a745;">SEND REQUEST</button>
            </div>
        </div>
    </div>
</div>

<div class="nav-bar" id="navbar" style="display:none;">
    <div class="nav-item active" onclick="showPage('p-assessment', this)"><i class="fas fa-search"></i><br>Search</div>
    <div class="nav-item" onclick="showPage('p-tracking', this); loadFiles()"><i class="fas fa-tasks"></i><br>Tracking</div>
    <div class="nav-item" onclick="showPage('p-wallet', this)"><i class="fas fa-wallet"></i><br>Wallet</div>
</div>

<script>
    let isLogin = false;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "Partner Login" : "Partner Registration";
        document.getElementById('regOnly').style.display = isLogin ? "none" : "block";
        document.getElementById('authBtn').innerText = isLogin ? "LOGIN" : "REGISTER";
    }

    async function handleAuth() {
        const email = document.getElementById('pEmail').value;
        const pass = document.getElementById('pPass').value;
        const url = isLogin ? '/api/auth/login' : '/api/auth/register';
        const body = isLogin ? {email, pass} : {name: document.getElementById('pName').value, email, pass};

        const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const data = await res.json();
        if(data.success && isLogin) {
            localStorage.setItem('pUser', JSON.stringify(data.user));
            location.reload();
        } else alert(data.message);
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function runSearch() {
        const res = await fetch(`/api/search-uni?country=${document.getElementById('sCountry').value}&degree=${document.getElementById('sDegree').value}&language=${document.getElementById('sLang').value}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.map(u => `
            <div class="card">
                <b>${u.uniName}</b> | ${u.country}
                <div class="res-grid">
                    <div>Course: <b>${u.course}</b></div><div>Intake: <b>${u.intake}</b></div>
                    <div>Fee: <b>${u.fee} ${u.currency}</b></div><div>Bank: <b>${u.bankBalance}</b></div>
                    <div>BD Bank: <b>${u.bankNameBD}</b></div><div>Loan: <b>${u.loanAmount}</b></div>
                    <div>Marital: <b>${u.maritalStatus}</b></div><div>Comm: <b>${u.partnerCommission}</b></div>
                </div>
                <button class="btn-blue" style="margin-top:10px; background:#28a745;">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    async function loadFiles() {
        const res = await fetch('/api/partner/files');
        const data = await res.json();
        document.getElementById('trackList').innerHTML = data.map(f => `
            <div class="card">
                <b>${f.studentName}</b><br><small>${f.university}</small><br>
                <small>Status: ${f.status} | Visa: ${f.visaStatus}</small>
            </div>
        `).join('');
    }

    const user = JSON.parse(localStorage.getItem('pUser'));
    if(user) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('navbar').style.display = 'flex';
    }
</script>
</body>
</html>
