<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard - IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-indigo-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">IHP CRM</h1>
            <div class="flex items-center gap-4">
                <span id="partnerNameDisplay" class="font-medium bg-indigo-700 px-3 py-1 rounded">Loading...</span>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-4">Quick Links</h2>
                <div class="space-y-2">
                    <button onclick="showSection('overview')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition">Overview</button>
                    <button onclick="showSection('students')" class="w-full text-left px-4 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600 transition">My Students</button>
                </div>
            </div>
            <div class="md:col-span-2 bg-white p-8 rounded-xl shadow-sm border border-gray-100 min-h-[400px]">
                <div id="overview" class="section">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Welcome Back!</h2>
                    <p class="text-gray-600">Track your student applications and commissions here.</p>
                </div>
                <div id="students" class="section hidden">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">My Students</h2>
                    <p class="text-gray-600 italic text-sm">No student data found yet.</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const partnerData = JSON.parse(localStorage.getItem('partnerData'));
            if (partnerData && partnerData.name) {
                document.getElementById('partnerNameDisplay').innerText = partnerData.name;
            } else {
                window.location.href = 'index.html';
            }
        });
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
        }
        function logout() {
            localStorage.removeItem('partnerData');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
