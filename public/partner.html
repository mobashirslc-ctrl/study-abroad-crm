<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .section { display: none; }
        .active-section { display: block; }
        .nav-link { cursor: pointer; padding: 10px 15px; border-radius: 5px; color: #cbd5e1; }
        .active-tab { background: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-slate-900 p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <h1 class="font-bold text-xl uppercase">Partner <span class="text-blue-500">Master</span></h1>
            <div class="flex space-x-2">
                <span class="nav-link active-tab" onclick="showTab('assessment', this)">Smart Assessment</span>
                <span class="nav-link" onclick="showTab('tracking', this)">File Tracking</span>
                <span class="nav-link" onclick="showTab('finance', this)">Withdraw & Package</span>
            </div>
            <button onclick="location.href='/login'" class="bg-red-600 px-4 py-1 rounded text-sm font-bold">LOGOUT</button>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div id="assessment" class="section active-section">
            <div class="bg-white p-6 rounded shadow-lg">
                <h2 class="font-bold mb-4 text-blue-700 uppercase border-b pb-2">Smart Assessment Tool</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <select id="country" class="border p-2 rounded"><option>Australia</option><option>UK</option><option>USA</option><option>Canada</option></select>
                    <select id="degree" class="border p-2 rounded"><option>Ug</option><option>Pg</option><option>Diploma</option><option>Foundation</option><option>PhD</option></select>
                    <select id="lang" class="border p-2 rounded"><option>IELTS</option><option>PTE</option><option>DUOLINGO</option></select>
                    <button onclick="searchUni()" class="bg-blue-600 text-white font-bold rounded">SEARCH UNIVERSITY</button>
                </div>
                <div id="searchResult" class="overflow-x-auto mt-4">
                    </div>
            </div>
        </div>

        <div id="tracking" class="section">
            <div class="bg-white p-6 rounded shadow">
                <h2 class="font-bold mb-4 text-blue-700 uppercase">Student File Tracking</h2>
                <table class="w-full text-sm">
                    <thead class="bg-gray-200">
                        <tr><th>Student</th><th>Contact</th><th>University</th><th>PDF</th><th>Visa Status</th><th>Compliance</th><th>Date</th></tr>
                    </thead>
                    <tbody id="fileTable"></tbody>
                </table>
            </div>
        </div>

        <div id="finance" class="section">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-blue-800 text-white p-6 rounded-lg shadow-xl">
                    <h3 class="text-sm uppercase font-bold">Total Commission</h3>
                    <p class="text-3xl font-bold mt-2">$ <span id="totalAmt">0.00</span></p>
                </div>
                <div class="bg-white p-6 rounded shadow border">
                    <h3 class="font-bold border-b mb-4">Request Withdraw</h3>
                    <select class="w-full p-2 border mb-2"><option>Bkash</option><option>Nagad</option><option>Bank Account</option></select>
                    <input type="number" placeholder="Amount" class="w-full p-2 border mb-2">
                    <button class="w-full bg-green-600 text-white py-2 font-bold rounded">WITHDRAW NOW</button>
                </div>
                <div class="bg-white p-6 rounded shadow border">
                    <h3 class="font-bold text-red-600 border-b mb-4">Subscription Status</h3>
                    <p class="text-sm">Expire Date: <span id="expDate" class="font-bold text-blue-600">Pending</span></p>
                    <p class="text-xs text-gray-400 mt-2 italic">*Auto-block on expiration.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-section');
            el.classList.add('active-tab');
        }

        async function searchUni() {
            const data = { country: document.getElementById('country').value, degree: document.getElementById('degree').value, languageType: document.getElementById('lang').value };
            const res = await fetch('/api/uni-search', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            const unis = await res.json();
            document.getElementById('searchResult').innerHTML = `
                <table class="w-full text-xs">
                    <thead class="bg-gray-100"><tr><th>Uni Name</th><th>Course</th><th>Intake</th><th>Fee</th><th>Commission</th><th>Action</th></tr></thead>
                    <tbody>${unis.map(u => `<tr><td>${u.uniName}</td><td>${u.courseName}</td><td>${u.intake}</td><td>${u.semesterFee}</td><td>${u.partnerCommission}</td><td><button class="bg-blue-500 text-white px-2 py-1 rounded">Apply</button></td></tr>`).join('')}</tbody>
                </table>`;
        }
    </script>
</body>
</html>
