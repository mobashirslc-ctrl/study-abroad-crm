<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | Mobashir Ahmed Nasrullah</title>
    <style>
        :root {
            --primary-blue: #0047AB;
            --deep-navy: #002366;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, var(--deep-navy), var(--primary-blue));
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .container { padding: 20px; }
        
        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: var(--primary-blue);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover { background: #0056d2; }

        /* Commission Badge */
        .commission-tag {
            background: #28a745;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .upload-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center;">
            <img src="YOUR_LOGO_URL_HERE" alt="Logo" style="height: 50px;">
            <h2>Partner Dashboard</h2>
        </div>

        <div class="glass-card">
            <h3>Student Assessment Details</h3>
            <div id="assessment-result" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                </div>
            <hr style="border: 0.5px solid var(--glass-border); margin: 20px 0;">
            
            <div style="text-align: right;">
                <span style="font-size: 1.1rem;">Estimated Commission: </span>
                <span class="commission-tag" id="bdt-display">৳ 0.00</span>
            </div>
        </div>

        <div class="glass-card">
            <h3>Required Documents (PDF Only)</h3>
            <form id="upload-form" onsubmit="handleUpload(event)">
                <div class="upload-section">
                    <div>
                        <label>Passport Copy:</label><br>
                        <input type="file" accept=".pdf" id="pdf-passport" required>
                    </div>
                    <div>
                        <label>Academic Certificates:</label><br>
                        <input type="file" accept=".pdf" id="pdf-academic" required>
                    </div>
                    <div>
                        <label>IELTS/Language Prof.:</label><br>
                        <input type="file" accept=".pdf" id="pdf-language">
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 20px;">Submit Full Application</button>
            </form>
        </div>
    </div>

    <footer>
        © 2026 <strong>MOBASHIR AHMED NASRULLAH</strong>. All Rights Reserved.
    </footer>

    <script>
        // Logic to preserve existing data and calculate BDT
        function calculateCommission(dollarAmount, sharePct, rate) {
            const partnerShare = dollarAmount * (sharePct / 100);
            return (partnerShare * rate).toLocaleString('en-BD');
        }

        // Module 1 Functionality: Handle PDF Submission
        function handleUpload(event) {
            event.preventDefault();
            // Your existing Cloudinary or Server Logic here
            alert("Application Submitted Successfully with PDFs!");
        }

        // Initialize BDT Display (Example logic - will sync with Module 2)
        document.getElementById('bdt-display').innerText = "৳ " + calculateCommission(2000, 70, 120);
    </script>
</body>
</html>
