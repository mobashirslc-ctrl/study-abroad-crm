<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-search { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #666; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: #1a73e8; }
        .result-item { border-left: 5px solid #1a73e8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="assess-view">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="country" placeholder="Country Name">
            <select id="degree">
                <option>UG</option><option>PG</option><option>DIPLOMA</option><option>PHD</option>
            </select>
            <select id="lang">
                <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
            </select>
            <input type="text" placeholder="Academic & Language Score">
            <button class="btn-search" onclick="searchUni()">SEARCH UNIVERSITY</button>
        </div>
        <div id="results"></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active"><i class="fas fa-search"></i><br>Assessment</div>
    <div class="nav-item"><i class="fas fa-wallet"></i><br>Withdraw</div>
</div>

<script>
    async function searchUni() {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "Searching...";
        const c = document.getElementById('country').value;
        const d = document.getElementById('degree').value;
        const l = document.getElementById('lang').value;

        const res = await fetch(`/api/search-uni?country=${c}&degree=${d}&language=${l}`);
        const data = await res.json();
        
        if(data.length === 0) { resDiv.innerHTML = "No matches found."; return; }

        resDiv.innerHTML = data.map(u => `
            <div class="card result-item">
                <div style="font-weight:bold; color:#1a73e8; font-size:18px;">${u.uniName}</div>
                <div style="font-size:12px; color:#666;">${u.course || 'N/A'} - ${u.intake || 'N/A'}</div>
                <hr style="opacity:0.2;">
                <div style="font-size:13px; line-height:1.6;">
                    Fee: ${u.fee || '0'} ${u.currency || ''} | Bank Req: ${u.bankBalance || '0'}<br>
                    <b>Bank BD:</b> ${u.bankNameSuggestion || 'Contact Admin'}<br>
                    <b>Loan Amount:</b> ${u.loanAmount || 'Not Specified'}<br>
                    <b>Commission:</b> <span style="color:green;">${u.partnerCommission || '0'}</span>
                </div>
                <button class="btn-search" style="margin-top:10px; background:#28a745; padding:10px;">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
