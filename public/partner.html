<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --bg: #060212; --border: rgba(46, 204, 113, 0.2); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 75px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; flex-shrink: 0; }
        .nav-item { color: #555; font-size: 20px; margin-bottom: 30px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }

        /* Main Area */
        .main { flex: 1; overflow-y: auto; padding: 30px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

        /* Dashboard Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); }

        /* Form Styling */
        .form-box input { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        .file-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .file-input { border: 1px dashed var(--border); padding: 10px; text-align: center; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .file-input input { display: none; }

        .btn { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--accent); font-size: 12px; padding: 12px; border-bottom: 2px solid var(--border); }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .section { display: none; } .section.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="tab('home', this)"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="tab('track', this)"><i class="fas fa-file-invoice"></i></div>
        <div class="nav-item" onclick="logout()" style="margin-top:auto; color:#ff4757;"><i class="fas fa-power-off"></i></div>
    </div>

    <div class="main">
        <div class="header">
            <img src="logo.jpeg" height="40">
            <div>
                <span id="partnerName" style="color:var(--accent); font-weight:bold;">GORUN LTD.</span><br>
                <small id="userMail" style="color:#777"></small>
            </div>
        </div>

        <section id="home" class="section active">
            <div class="grid">
                <div class="card">
                    <small>WALLET BALANCE</small>
                    <h2 style="color:var(--accent); margin:10px 0;">৳ 0.00</h2>
                </div>
                <div class="card">
                    <small>APPLICATION STATUS</small>
                    <h2 style="color:#3498db; margin:10px 0;">ACTIVE</h2>
                </div>
            </div>

            <div class="card form-box">
                <h3 style="margin-top:0"><i class="fas fa-plus-circle"></i> New Student Submission</h3>
                <input type="text" id="sName" placeholder="Student Full Name">
                <input type="text" id="sPass" placeholder="Passport Number">
                
                <div class="file-grid">
                    <label class="file-input">
                        <i class="fas fa-upload"></i><br>Passport PDF
                        <input type="file" id="pdf1" accept=".pdf">
                    </label>
                    <label class="file-input">
                        <i class="fas fa-upload"></i><br>Academic PDF
                        <input type="file" id="pdf2" accept=".pdf">
                    </label>
                    <label class="file-input">
                        <i class="fas fa-upload"></i><br>Language PDF
                        <input type="file" id="pdf3" accept=".pdf">
                    </label>
                </div>
                <button class="btn" onclick="submitApp()">Submit to Compliance</button>
            </div>
        </section>

        <section id="track" class="section">
            <div class="card">
                <h3><i class="fas fa-sync"></i> Real-time Application Tracking</h3>
                <table>
                    <thead>
                        <tr><th>Student Name</th><th>Passport</th><th>Status</th><th>Staff</th></tr>
                    </thead>
                    <tbody id="trackTable">
                        <tr><td colspan="4" style="text-align:center">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="msgModal" class="modal">
        <div style="background:#fff; color:#000; padding:40px; border-radius:20px; text-align:center; width:300px;">
            <i class="fas fa-check-circle" style="font-size:50px; color:var(--accent)"></i>
            <h3>Submitted!</h3>
            <p id="confirmName"></p>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0;"></div>
            <button class="btn" onclick="location.reload()">Done</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userMail').innerText = user.email;
                syncData();
            } else {
                window.location.href = 'index.html';
            }
        });

        // Tab Switch
        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // Real-time Database Sync
        function syncData() {
            db.ref('applications').on('value', snap => {
                const table = document.getElementById('trackTable');
                table.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    table.innerHTML += `
                        <tr>
                            <td>${d.studentName}</td>
                            <td>${d.passport}</td>
                            <td style="color:var(--accent); font-weight:bold">${d.compliance || 'IN QUEUE'}</td>
                            <td>${d.handledBy || 'Wait...'}</td>
                        </tr>`;
                });
            });
        }

        // Submit Application
        function submitApp() {
            const name = document.getElementById('sName').value;
            const pass = document.getElementById('sPass').value;
            if(!name || !pass) return alert("Fill Name and Passport!");

            const id = Date.now();
            db.ref('applications/' + id).set({
                studentName: name,
                passport: pass,
                compliance: "UNCLAIMED",
                partner: "GORUN LTD.",
                timestamp: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('msgModal').style.display = 'flex';
                document.getElementById('confirmName').innerText = name;
                new QRCode(document.getElementById("qrcode"), { text: pass, width: 100, height: 100 });
            });
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
