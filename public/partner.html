<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #0b012d; --darker: #080120; --card-bg: rgba(255, 255, 255, 0.03); }
        body { margin: 0; display: flex; background-color: var(--bg); font-family: 'Poppins', sans-serif; color: white; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 70px; background: var(--darker); display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); transition: 0.3s; z-index: 100; }
        .sidebar:hover { width: 200px; align-items: flex-start; padding-left: 15px; }
        .sidebar img.logo { width: 40px; background: white; border-radius: 5px; margin-bottom: 30px; }
        .nav-links { list-style: none; padding: 0; width: 100%; flex-grow: 1; }
        .nav-links li { padding: 15px; cursor: pointer; color: #bdc3c7; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .nav-links li span { display: none; white-space: nowrap; font-size: 14px; }
        .sidebar:hover .nav-links li span { display: inline; }
        .nav-links li:hover, .nav-links li.active { color: var(--gold); background: rgba(255, 204, 0, 0.05); }

        /* Main Content */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; padding-bottom: 100px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Fixed Top Stats */
        .top-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: linear-gradient(135deg, #1c1145, #080120); padding: 15px; border-radius: 10px; border: 1px solid var(--gold); }
        .stat-box small { font-size: 9px; color: #aaa; text-transform: uppercase; display: block; }
        .stat-box .amount { font-size: 20px; font-weight: bold; color: var(--gold); }
        .condition { font-size: 8px; color: #ff5e5e; margin-top: 5px; line-height: 1.2; }

        /* Assessment Grid (11 Fields) */
        .card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .grid-11 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        label { font-size: 9px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { background: #050118; border: 1px solid #333; padding: 10px; color: white; border-radius: 5px; width: 100%; box-sizing: border-box; outline: none; font-size: 12px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        th { text-align: left; color: var(--gold); padding: 12px; border-bottom: 2px solid var(--gold); }
        td { padding: 12px; border-bottom: 1px solid #222; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #160a3d; padding: 25px; border-radius: 15px; width: 450px; border: 1px solid var(--gold); overflow-y: auto; max-height: 90vh; }
        .file-upload-group { margin-bottom: 15px; border: 1px dashed rgba(255,204,0,0.3); padding: 10px; border-radius: 5px; }
        
        #qrcode { display: none; }
    </style>
</head>
<body>

    <div id="qrcode"></div>

    <div class="sidebar">
        <img src="logo.jpeg" class="logo" id="portalLogo">
        <ul class="nav-links">
            <li class="active" onclick="showTab('dashboard')"><i class="fa-solid fa-gauge-high"></i> <span>Dashboard</span></li>
            <li onclick="showTab('tracking')"><i class="fa-solid fa-folder-tree"></i> <span>File Tracking</span></li>
            <li onclick="showTab('wallet')"><i class="fa-solid fa-wallet"></i> <span>Wallet</span></li>
            <li onclick="showTab('profile')"><i class="fa-solid fa-id-card"></i> <span>Profile Edit</span></li>
        </ul>
        <div class="logout-btn" onclick="location.href='login.html'"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></div>
    </div>

    <div class="main-container">
        
        <div class="top-stats">
            <div class="stat-box"><small>Estimated Pending</small><div class="amount">৳ 0.00</div><div class="condition">* Depend on student payment.</div></div>
            <div class="stat-box"><small>Available Wallet</small><div class="amount">৳ 0.00</div></div>
            <div class="stat-box"><small>Subscription</small><div class="amount" style="font-size: 14px; color: #00ff00;">ACTIVE PREMIUM</div></div>
        </div>

        <div id="dashboard" class="section active">
            <div class="card">
                <h3>Smart Assessment</h3>
                <div class="grid-11">
                    <div><label>Preferred Country</label><input type="text" placeholder="UK/USA/CAN"></div>
                    <div><label>Degree Level</label><select><option>UG</option><option>PG</option><option>Diploma</option><option>PhD</option></select></div>
                    <div><label>GPA / Academic Score</label><input type="text"></div>
                    <div><label>Language Test</label><select><option>IELTS</option><option>PTE</option><option>Duolingo</option></select></div>
                    <div><label>Test Score</label><input type="text"></div>
                    <div><label>Gap Years</label><input type="number"></div>
                    <div><label>Budget Range</label><input type="text"></div>
                    <div><label>Desired Subject</label><input type="text"></div>
                    <div><label>Last Qualification</label><input type="text"></div>
                    <div><label>Work Experience</label><input type="text"></div>
                    <div><label>Preferred Intake</label><input type="text"></div>
                </div>
                <button class="btn-gold" style="margin-top:15px;" onclick="document.getElementById('searchRes').style.display='block'">SEARCH UNIVERSITIES</button>
            </div>

            <div class="card" id="searchRes" style="display:none;">
                <table>
                    <thead><tr><th>University</th><th>Course</th><th>Commission</th><th>Action</th></tr></thead>
                    <tbody>
                        <tr><td>Hertfordshire University</td><td>MSc CS</td><td>৳ 75,000</td><td><button class="btn-gold" style="padding:5px 10px;" onclick="openApp('Hertfordshire')">APPLY</button></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="tracking" class="section"></div>
        <div id="wallet" class="section"></div>
        <div id="profile" class="section"></div>
    </div>

    <div id="appModal" class="modal">
        <div class="modal-content">
            <h3 id="mTitle" style="color:var(--gold); margin-top:0;">Apply</h3>
            <label>Student Full Name</label><input type="text" id="sName" style="margin-bottom:12px;">
            <label>Passport Number</label><input type="text" id="sPass" style="margin-bottom:12px;">
            
            <div class="file-upload-group">
                <label><i class="fa-solid fa-file-pdf"></i> Passport Copy (PDF)</label>
                <input type="file" accept=".pdf" id="pdf1">
            </div>
            <div class="file-upload-group">
                <label><i class="fa-solid fa-file-pdf"></i> Academic Certificates (PDF)</label>
                <input type="file" accept=".pdf" id="pdf2">
            </div>
            <div class="file-upload-group">
                <label><i class="fa-solid fa-file-pdf"></i> Language Proficiency (PDF)</label>
                <input type="file" accept=".pdf" id="pdf3">
            </div>

            <button class="btn-gold" style="width:100%" onclick="submitFinal()">SUBMIT APPLICATION</button>
            <button class="btn-gold" style="width:100%; background:#444; color:#fff; margin-top:10px;" onclick="document.getElementById('appModal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <script>
        let curUni = "";
        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openApp(u) { curUni = u; document.getElementById('mTitle').innerText = u; document.getElementById('appModal').style.display = 'flex'; }

        function submitFinal() {
            const name = document.getElementById('sName').value;
            const pass = document.getElementById('sPass').value;
            const f1 = document.getElementById('pdf1').files[0];
            const f2 = document.getElementById('pdf2').files[0];
            const f3 = document.getElementById('pdf3').files[0];

            if(!name || !pass || !f1 || !f2 || !f3) return alert("Please fill all fields and upload all 3 PDF documents!");

            // QR Tracking Link
            const trackURL = "https://study-abroad-crm.onrender.com/track.html?id=" + pass;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: trackURL, width: 128, height: 128 });

            setTimeout(() => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const logo = document.getElementById('portalLogo');

                // Official Header
                doc.setFillColor(11, 1, 45); doc.rect(0, 0, 210, 50, 'F');
                try { doc.addImage(logo, 'JPEG', 15, 12, 25, 25); } catch(e){}
                doc.setTextColor(255, 204, 0); doc.setFontSize(22); doc.setFont(undefined, 'bold');
                doc.text("STUDENT CAREER CONSULTANCY", 110, 28, null, null, "center");
                doc.setFontSize(10); doc.setTextColor(255, 255, 255);
                doc.text("OFFICIAL ACKNOWLEDGMENT SLIP", 110, 38, null, null, "center");

                doc.setTextColor(0,0,0); doc.setFontSize(12);
                doc.text("Student: " + name, 20, 70);
                doc.text("Passport: " + pass, 20, 80);
                doc.text("University: " + curUni, 20, 90);
                
                const qrImg = document.querySelector("#qrcode img").src;
                doc.addImage(qrImg, 'PNG', 85, 130, 40, 40);
                doc.text("Scan to Track Status", 105, 175, null, null, "center");

                doc.save(`SCC_Slip_${pass}.pdf`);
                document.getElementById('appModal').style.display = 'none';
                alert("Application Submitted Successfully with Documents!");
            }, 800);
        }
    </script>
</body>
</html>
