<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .main-content { margin-left: 260px; padding: 32px; width: calc(100% - 260px); }
        .nav-item { padding: 12px 24px; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: all 0.3s; cursor: pointer; border-radius: 8px; margin: 4px 16px; }
        .nav-item:hover, .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body>

    <div class="sidebar glass flex flex-col">
        <div class="p-8 border-b border-white/5">
            <h2 class="text-xl font-bold tracking-tighter text-blue-400">IHP PARTNER</h2>
        </div>
        
        <nav class="mt-8 flex-1">
            <div class="nav-item active"><span>🔍</span> Smart Assessment</div>
            <div class="nav-item"><span>📂</span> File Tracking</div>
            <div class="nav-item"><span>💳</span> Withdraw & Sub</div>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="location.href='/login'" class="nav-item w-full text-red-400 hover:bg-red-500/10 text-left">
                <span>🚪</span> Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold">Hello, <span id="partnerDisplayName" class="text-blue-400">...</span></h1>
                <p class="text-slate-400 text-sm italic">"Assessment logic is now active & locked"</p>
            </div>
            <div class="glass px-8 py-4 rounded-2xl text-center border-emerald-500/20">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 mb-1">Wallet Balance</p>
                <p class="text-3xl font-mono font-bold text-emerald-400">$<span id="walletVal">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-sm font-bold text-blue-300 mb-4 uppercase tracking-wider">Search Filters</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Destination</label>
                            <select id="fCountry" class="w-full p-2.5 rounded mt-1">
                                <option value="">Select Country</option>
                                <option value="UK">United Kingdom</option>
                                <option value="USA">USA</option>
                                <option value="Canada">Canada</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Degree Type</label>
                            <select id="fDegree" class="w-full p-2.5 rounded mt-1">
                                <option value="Bachelors">Undergraduate (UG)</option>
                                <option value="Masters">Postgraduate (PG)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Language Score</label>
                            <input type="text" id="fLang" placeholder="e.g. 6.5" class="w-full p-2.5 rounded mt-1">
                        </div>
                        <button onclick="runAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold shadow-lg shadow-blue-900/40 transition-all mt-4">
                            SEARCH NOW
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="resGrid" class="space-y-4">
                    <div class="text-center py-24 glass rounded-2xl border-dashed border-white/10">
                        <p class="text-slate-500">Enter student criteria to see matching results.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('partnerDisplayName').innerText = localStorage.getItem('partnerName') || 'Partner';
        let currentWallet = 0;

        async function runAssessment() {
            const grid = document.getElementById('resGrid');
            grid.innerHTML = '<div class="text-center py-20 text-blue-400 animate-pulse">Scanning Matches...</div>';

            try {
                const res = await fetch('/api/universities');
                const unis = await res.json();
                const country = document.getElementById('fCountry').value;
                const filtered = country ? unis.filter(u => u.country === country) : unis;

                if(filtered.length === 0) {
                    grid.innerHTML = '<div class="glass p-10 text-center rounded-2xl">No matching universities found.</div>';
                    return;
                }

                grid.innerHTML = filtered.map(u => `
                    <div class="glass p-6 rounded-2xl border-l-4 border-blue-500 hover:bg-white/[0.05] transition-all mb-4">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-xl font-bold">${u.uniName}</h3>
                                <p class="text-blue-400 text-sm font-medium">${u.courseName} (${u.degreeType})</p>
                            </div>
                            <div class="text-right">
                                <span class="bg-emerald-500/10 text-emerald-400 text-[10px] px-3 py-1 rounded-full font-bold border border-emerald-500/20 uppercase">Commission: $${u.partnerCommission}</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 text-xs border-t border-white/5 pt-6">
                            <div><p class="text-slate-500 uppercase mb-1">Intake</p><p class="font-semibold">${u.intake || 'N/A'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Location</p><p class="font-semibold">${u.location || 'N/A'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Semester Fee</p><p class="font-semibold text-blue-300 font-mono">${u.semesterFee || '0'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Total Fee</p><p class="font-semibold text-blue-300 font-mono">${u.totalFee || '0'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Bank BD</p><p class="font-semibold">${u.bankNameBD || 'N/A'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Loan Amount</p><p class="font-semibold">${u.loanAmount || 'No'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Marital Status</p><p class="font-semibold">${u.maritalStatus || 'Single'}</p></div>
                            <div><p class="text-slate-500 uppercase mb-1">Language Req</p><p class="font-semibold text-orange-400">${u.ieltsScore || '6.0'}</p></div>
                        </div>
                        <button onclick="addCommission('${u.partnerCommission}', this)" class="w-full mt-8 bg-white/5 hover:bg-blue-600 py-2.5 rounded-lg text-[10px] font-bold tracking-widest transition-all border border-white/10 uppercase">
                            Open File & Add Commission
                        </button>
                    </div>
                `).join('');
            } catch(e) {
                grid.innerHTML = '<p class="text-red-400 text-center">Failed to load data.</p>';
            }
        }

        function addCommission(amt, btn) {
            const amount = parseFloat(amt);
            if(!isNaN(amount)) {
                currentWallet += amount;
                document.getElementById('walletVal').innerText = currentWallet.toFixed(2);
                btn.innerText = "✓ FILE OPENED - COMMISSION ADDED";
                btn.disabled = true;
                btn.className = "w-full mt-8 bg-emerald-600/20 text-emerald-400 py-2.5 rounded-lg text-[10px] font-bold cursor-not-allowed border border-emerald-500/20";
            }
        }
    </script>
</body>
</html>
