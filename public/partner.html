<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Dashboard | IHP CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
        }
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }
        .main-content {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 2rem;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        input, select {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            outline: none;
        }
        .nav-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            transition: 0.3s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border-right: 3px solid #3b82f6;
        }
        @media (max-width: 1024px) {
            .sidebar { width: 80px; }
            .sidebar span, .sidebar h2 { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-6">
            <h2 class="text-xl font-bold tracking-tighter text-blue-400">IHP CRM</h2>
        </div>
        <nav class="mt-4">
            <div class="nav-item active"><i class="fas fa-search"></i> <span>Assessment</span></div>
            <div class="nav-item"><i class="fas fa-users"></i> <span>My Students</span></div>
            <div class="nav-item"><i class="fas fa-wallet"></i> <span>Earnings</span></div>
            <div class="nav-item"><i class="fas fa-headset"></i> <span>Support</span></div>
            <div class="mt-20 px-6">
                <button onclick="localStorage.clear(); location.href='/login'" class="text-sm text-red-400 flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </button>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="flex justify-between items-center mb-8 glass-panel p-6">
            <div>
                <h1 class="text-2xl font-bold">Welcome, <span id="partnerNameDisplay" class="text-blue-400">Partner</span></h1>
                <p class="text-slate-400 text-sm">Real-time University Assessment System</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase tracking-widest">Wallet Balance</p>
                <p class="text-3xl font-mono font-bold text-emerald-400">$<span id="walletBal">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-panel p-6 h-fit">
                <h2 class="text-lg font-semibold mb-6 border-b border-white/10 pb-2 flex items-center">
                    <i class="fas fa-sliders-h text-blue-400 mr-2"></i> Smart Filters
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400">Preferred Country</label>
                        <select id="sCountry" class="w-full p-3 rounded-lg mt-1">
                            <option value="UK">United Kingdom</option>
                            <option value="USA">USA</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Select Degree</label>
                        <select id="sDegree" class="w-full p-3 rounded-lg mt-1">
                            <option value="PG">PG (Post Graduate)</option>
                            <option value="UG">UG (Under Graduate)</option>
                            <option value="DIPLOMA">DIPLOMA</option>
                            <option value="FOUNDATION">FOUNDATION</option>
                            <option value="PHD">PHD</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-slate-400">Language Test</label>
                        <select id="sLang" class="w-full p-3 rounded-lg mt-1">
                            <option value="IELTS">IELTS</option>
                            <option value="PTE">PTE</option>
                            <option value="DUOLINGO">DUOLINGO</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-slate-400">Lang Score</label>
                            <input type="text" id="sScore" placeholder="6.5" class="w-full p-3 rounded-lg mt-1">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400">GPA</label>
                            <input type="text" id="sGpa" placeholder="3.50" class="w-full p-3 rounded-lg mt-1">
                        </div>
                    </div>
                    <button onclick="runAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold mt-4 transition-all shadow-lg shadow-blue-500/30 uppercase tracking-widest">
                        Find Universities
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 glass-panel p-6 min-h-[500px]">
                <h2 class="text-lg font-semibold mb-6 border-b border-white/10 pb-2">Matching Results</h2>
                <div id="resultsArea" class="space-y-4">
                    <div class="text-center py-24 text-slate-500">
                        <i class="fas fa-university text-5xl mb-4 opacity-20"></i>
                        <p>Enter details and click search to fetch results.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[200]">
        <div class="glass-panel p-8 w-full max-w-md border-t-4 border-emerald-500">
            <h2 class="text-2xl font-bold mb-1">Open Student File</h2>
            <p id="targetUni" class="text-sm text-blue-400 mb-6 font-medium"></p>
            <div class="space-y-4">
                <input type="text" id="stName" placeholder="Student Full Name" class="w-full p-3 rounded-lg">
                <input type="text" id="stContact" placeholder="Phone Number" class="w-full p-3 rounded-lg">
                <div class="p-4 bg-emerald-500/10 rounded-lg border border-emerald-500/20">
                    <p class="text-xs text-emerald-200 uppercase tracking-tighter">Instant Commission:</p>
                    <p class="text-3xl font-bold text-emerald-400" id="commLabel">$0</p>
                </div>
                <button onclick="submitStudentFile()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-bold uppercase transition-all">
                    Submit & Add Earnings
                </button>
                <button onclick="document.getElementById('fileModal').classList.add('hidden')" class="w-full text-slate-400 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentUni = null;

        window.onload = async () => {
            const name = localStorage.getItem('partnerName');
            const pId = localStorage.getItem('partnerId');
            if(!pId) return location.href = '/login';
            
            document.getElementById('partnerNameDisplay').innerText = name || 'Partner';
            refreshWallet();
        };

        async function refreshWallet() {
            try {
                const res = await fetch(`/api/partner/details/${localStorage.getItem('partnerId')}`);
                const data = await res.json();
                document.getElementById('walletBal').innerText = (data.walletBalance || 0).toFixed(2);
            } catch(e) { console.log("Refresh failed"); }
        }

        async function runAssessment() {
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.innerHTML = '<div class="text-center py-20 animate-pulse text-blue-400 font-bold">MATCHING UNIVERSITIES...</div>';

            try {
                const res = await fetch('/api/universities');
                const unis = await res.json();

                const country = document.getElementById('sCountry').value;
                const degree = document.getElementById('sDegree').value;
                
                // MULTI-FILTER LOCK
                const filtered = unis.filter(u => 
                    u.country.toUpperCase() === country.toUpperCase() && 
                    u.degreeType.toUpperCase().includes(degree.toUpperCase())
                );

                if(filtered.length === 0) {
                    resultsArea.innerHTML = '<div class="text-center py-20 text-slate-400">No universities found for this criteria.</div>';
                    return;
                }

                resultsArea.innerHTML = filtered.map(u => `
                    <div class="glass-panel p-6 border-l-4 border-blue-500 hover:bg-white/5 transition-all">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-blue-300 uppercase">${u.uniName}</h3>
                                <p class="text-xs text-slate-400"><i class="fas fa-map-marker-alt mr-1"></i> ${u.location}</p>
                            </div>
                            <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/20">
                                $${u.partnerCommission} COMMISSION
                            </span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-y-3 gap-x-4 text-[11px] text-slate-400 mb-6">
                            <div><p class="text-slate-500 mb-1">INTAKE</p><p class="text-white font-semibold">${u.intake}</p></div>
                            <div><p class="text-slate-500 mb-1">COURSE</p><p class="text-white font-semibold">${u.courseName}</p></div>
                            <div><p class="text-slate-500 mb-1">SEM. FEE</p><p class="text-white font-semibold">${u.semesterFee}</p></div>
                            <div><p class="text-slate-500 mb-1">BANK REQ.</p><p class="text-white font-semibold">${u.bankNameBD}</p></div>
                            <div><p class="text-slate-500 mb-1">MARITAL</p><p class="text-white font-semibold">${u.maritalStatus}</p></div>
                        </div>
                        <button onclick="openForm('${u.uniName}', ${u.partnerCommission})" class="w-full bg-blue-600/20 hover:bg-blue-600 py-3 rounded-lg text-sm font-bold border border-blue-500/30 transition-all uppercase">
                            Open File & Add Earnings
                        </button>
                    </div>
                `).join('');
            } catch(e) {
                resultsArea.innerHTML = '<div class="text-center py-20 text-red-400">Server communication error.</div>';
            }
        }

        function openForm(name, comm) {
            currentUni = { name, comm };
            document.getElementById('targetUni').innerText = "University: " + name;
            document.getElementById('commLabel').innerText = "$" + comm;
            document.getElementById('fileModal').classList.remove('hidden');
        }

        async function submitStudentFile() {
            const stName = document.getElementById('stName').value;
            const stContact = document.getElementById('stContact').value;
            if(!stName || !stContact) return alert("Fill all fields");

            const res = await fetch('/api/partner/submit-file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    partnerId: localStorage.getItem('partnerId'),
                    studentName: stName,
                    contactNo: stContact,
                    uniName: currentUni.name,
                    commission: currentUni.comm
                })
            });

            if(res.ok) {
                alert("CONGRATS! File submitted and commission added.");
                location.reload();
            }
        }
    </script>
</body>
</html>
