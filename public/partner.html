<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Partner Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        .section { display: none; }
        .active-section { display: block !important; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .submitted { background: #3498db; color: white; }
        .verified { background: #2ecc71; color: white; }
        .pending { background: #f1c40f; color: black; }
        .rejected { background: #ff4757; color: white; }
        
        .assessment-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: flex-end; }
        .reg-input { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); background: #e1b400; }
        
        /* Table Styling */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--gold); background: rgba(255,255,255,0.05); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><img src="logo.jpeg" alt="SCC"></div>
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" onclick="showTab('assessment', this)"><i class="fas fa-bolt"></i> Assessment</div>
        <div class="nav-item" onclick="showTab('tracking', this)"><i class="fas fa-search-location"></i> Tracking</div>
        <div class="nav-item" onclick="showTab('withdraw', this)"><i class="fas fa-wallet"></i> Earning</div>
    </div>

    <div class="wrapper">
        <div class="top-bar" style="display: flex; justify-content: space-between; padding: 15px 30px; background: var(--glass); border-bottom: 1px solid var(--border);">
            <div>Welcome, <span id="welcomeName" style="color:var(--gold); font-weight:bold;">Partner</span></div>
            <button onclick="logout()" style="background:#ff4757; color:white; padding:5px 15px; border:none; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="main" style="padding: 20px;">
            <div id="home" class="section active-section">
                <div class="wallet-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div class="wallet-box" style="background:var(--glass); padding:20px; border-radius:15px; border:1px solid var(--border);"><p>PENDING COMMISSION</p><h2 id="topPending">৳0</h2></div>
                    <div class="wallet-box" style="background:var(--glass); padding:20px; border-radius:15px; border:1px solid var(--border);"><p>FINAL BALANCE</p><h2 id="topFinal">৳0</h2></div>
                </div>
                <div class="card">
                    <h3 style="margin-bottom:15px; color:var(--gold);">Recent Applications</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                            <tbody id="homeTrackingBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="assessment" class="section">
                <div class="card">
                    <h3 style="color:var(--gold); margin-bottom:15px;">Smart Search Filter</h3>
                    <div class="assessment-grid">
                        <div><label style="font-size:10px;color:#aaa">Country</label><input type="text" id="fCountry" placeholder="e.g. UK" class="reg-input"></div>
                        <div><label style="font-size:10px;color:#aaa">Degree</label>
                            <select id="fDegree" class="reg-input">
                                <option value="">Any Degree</option>
                                <option value="Bachelor">Bachelor</option>
                                <option value="Master">Master</option>
                            </select>
                        </div>
                        <button onclick="searchUniversity()" class="btn-gold" style="height:40px;">SEARCH</button>
                    </div>
                </div>
                <div id="searchResultArea" style="display:none; margin-top:20px;" class="card">
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>University</th><th>Degree</th><th>Country</th><th>Commission</th><th>Action</th></tr></thead>
                            <tbody id="uniListContainer"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tracking" class="section">
                <div class="card">
                    <h3 style="color:var(--gold); margin-bottom:15px;">Detailed Application Status</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Student/Uni</th><th>Passport</th><th>Status</th><th>Date</th></tr></thead>
                            <tbody id="sidebarTrackingBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <div class="card" style="width: 450px; background: #1a1a2e; padding: 25px; border-radius: 15px; border: 1px solid var(--gold);">
            <h3 style="color:var(--gold);">Apply for <span id="targetUni"></span></h3>
            <form id="applyForm">
                <input type="text" id="sName" placeholder="Student Full Name" class="reg-input" required style="margin-bottom:15px;">
                <input type="text" id="sPassport" placeholder="Passport Number" class="reg-input" required style="margin-bottom:15px;">
                
                <div style="margin-bottom:15px;">
                    <label style="font-size:12px; color:#aaa;">Upload Passport (PDF)</label>
                    <input type="file" id="pdf1" accept=".pdf" class="reg-input" required>
                </div>
                <div style="margin-bottom:15px;">
                    <label style="font-size:12px; color:#aaa;">Academic Docs (PDF)</label>
                    <input type="file" id="pdf2" accept=".pdf" class="reg-input" required>
                </div>
                
                <div style="display:flex; gap:10px;">
                    <button type="submit" id="submitBtn" class="btn-gold">CONFIRM SUBMISSION</button>
                    <button type="button" onclick="closeModal()" style="background:#333; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk",
            authDomain: "ihp-portal-v3.firebaseapp.com",
            projectId: "ihp-portal-v3",
            storageBucket: "ihp-portal-v3.firebasestorage.app",
            messagingSenderId: "481157902534",
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const partnerEmail = localStorage.getItem('userEmail') || "gorunbangladesh@gmail.com";

        // ১. সরাসরি PDF আপলোড লজিক (Cloudinary)
        async function uploadPDF(file) {
            if(!file) return "";
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'scc_docs'); // আপনার Cloudinary Preset
            const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            return data.secure_url;
        }

        // ২. লাইভ ডাটা ও ব্যালেন্স (Data Vanishing Fix)
        function initLiveUpdates() {
            const q = query(collection(db, "applications"), where("partnerEmail", "==", partnerEmail));
            onSnapshot(q, (snapshot) => {
                let pending = 0, final = 0, rows = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const comm = Number(d.partnerComm || 0);
                    if (d.status === "verified") pending += comm;
                    if (d.walletStatus === "paid") final += comm;

                    rows += `<tr>
                        <td><b>${d.studentName}</b><br><small>${d.university}</small></td>
                        <td>${d.passportNo}</td>
                        <td><span class="status-pill ${d.status}">${d.status}</span></td>
                        <td>${d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString() : 'Just Now'}</td>
                    </tr>`;
                });
                document.getElementById('topPending').innerText = `৳${pending.toLocaleString()}`;
                document.getElementById('topFinal').innerText = `৳${final.toLocaleString()}`;
                document.getElementById('homeTrackingBody').innerHTML = rows || "<tr><td colspan='4'>No applications found.</td></tr>";
                document.getElementById('sidebarTrackingBody').innerHTML = rows;
            });
        }

        // ৩. সার্চ ফিল্টার (Assessment Section)
        window.searchUniversity = async () => {
            const country = document.getElementById('fCountry').value.toLowerCase();
            const degree = document.getElementById('fDegree').value;
            const container = document.getElementById('uniListContainer');
            document.getElementById('searchResultArea').style.display = "block";
            container.innerHTML = "Searching...";

            const snap = await getDocs(collection(db, "universities"));
            let html = "";
            snap.forEach(doc => {
                const u = doc.data();
                if ((!country || u.country.toLowerCase().includes(country)) && (!degree || u.degree === degree)) {
                    html += `<tr>
                        <td>${u.name}</td><td>${u.degree}</td><td>${u.country}</td>
                        <td style="color:var(--gold);">৳${u.partnerComm}</td>
                        <td><button onclick="openApplyModal('${u.name}', '${u.partnerComm}')" class="btn-gold" style="padding:5px;">APPLY</button></td>
                    </tr>`;
                }
            });
            container.innerHTML = html || "<tr><td colspan='5'>No results found</td></tr>";
        };

        // ৪. অ্যাপ্লিকেশন সাবমিট (PDF সহ)
        document.getElementById('applyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "UPLOADING PDF..."; btn.disabled = true;

            try {
                const url1 = await uploadPDF(document.getElementById('pdf1').files[0]);
                const url2 = await uploadPDF(document.getElementById('pdf2').files[0]);

                await addDoc(collection(db, "applications"), {
                    studentName: document.getElementById('sName').value,
                    passportNo: document.getElementById('sPassport').value,
                    university: window.selectedUni,
                    partnerComm: Number(window.selectedComm),
                    partnerEmail: partnerEmail,
                    status: "submitted",
                    pdf1: url1, pdf2: url2,
                    walletStatus: "pending",
                    createdAt: serverTimestamp()
                });
                alert("Submission Successful with PDF Documents!");
                closeModal();
            } catch (err) { alert("Error: " + err.message); }
            btn.innerText = "CONFIRM SUBMISSION"; btn.disabled = false;
        };

        window.openApplyModal = (uni, comm) => {
            document.getElementById('targetUni').innerText = uni;
            document.getElementById('applyModal').style.display = "flex";
            window.selectedUni = uni; window.selectedComm = comm;
        };
        window.closeModal = () => document.getElementById('applyModal').style.display = "none";
        
        window.showTab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };

        window.onload = initLiveUpdates;
    </script>
</body>
</html>
