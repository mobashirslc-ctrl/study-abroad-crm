<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .welcome-bar { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; color: #1a73e8; font-weight: bold; }
        .track-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #28a745; position: relative; }
        .status-badge { position: absolute; top: 15px; right: 15px; background: orange; color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #777; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-bar"><i class="fas fa-user-circle"></i> <span id="pName">Welcome, Partner</span></div>

    <div class="card" id="sub-card">
        <h4 style="margin:0; color:#333;">Subscription Details</h4>
        <div style="font-size:12px; color:#666; margin-top:5px;">
            Package: <b id="pPkg">Pro</b> | Expire: <b id="pExp">2026-12-31</b>
        </div>
    </div>

    <div id="assessment-page" class="page">
        <div class="card">
            <h3>🔍 Smart Assessment</h3>
            <input type="text" id="sCountry" placeholder="Enter Country">
            <select id="sDegree">
                <option value="">Select Degree</option>
                <option>UG</option><option>PG</option><option>DIPLOMA</option>
                <option>FOUNDATION</option><option>RESEARCH</option>
            </select>
            <select id="sLang">
                <option value="">Select Language Test</option>
                <option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
            </select>
            <input type="text" id="sScore" placeholder="Language Score (e.g. 6.5)">
            <button class="btn-blue" onclick="runSearch()">SEARCH UNIVERSITY</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="tracking-page" class="page" style="display:none;">
        <h3>📁 My Tracking Files</h3>
        <div id="trackList"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showP('assessment-page', this)"><i class="fas fa-search"></i><br>Search</div>
    <div class="nav-item" onclick="showP('tracking-page', this); loadMyTracking()"><i class="fas fa-tasks"></i><br>Tracking</div>
</div>

<script>
    function showP(id, el) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function runSearch() {
        const res = await fetch(`/api/search-uni?country=${document.getElementById('sCountry').value}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.map(u => `
            <div class="card">
                <b>${u.uniName}</b><br><small>Fee: ${u.fee} | Comm: ${u.partnerCommission}</small>
                <button class="btn-blue" style="margin-top:10px; background:#28a745;" onclick="submitFile('${u.uniName}')">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    async function submitFile(uni) {
        const name = prompt("Enter Student Name:");
        if(!name) return;
        const payload = {
            studentName: name, university: uni,
            degree: document.getElementById('sDegree').value,
            language: document.getElementById('sLang').value,
            langScore: document.getElementById('sScore').value,
            complianceInfo: { name: "IHP Admin", id: "IHP-001" }
        };
        await fetch('/api/open-file', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("File Submitted Successfully!");
    }

    async function loadMyTracking() {
        const res = await fetch('/api/admin/files');
        const data = await res.json();
        document.getElementById('trackList').innerHTML = data.map(f => `
            <div class="track-card">
                <span class="status-badge">${f.status}</span>
                <b>${f.studentName}</b><br>
                <small>${f.university} | ${f.language}: ${f.langScore}</small><br>
                <a href="${f.pdfUrl}" target="_blank">
                    <button style="margin-top:10px; cursor:pointer;">Download PDF</button>
                </a>
            </div>
        `).join('');
    }
</script>
</body>
</html>
