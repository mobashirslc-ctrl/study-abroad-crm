<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-5">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-blue-900">Smart Assessment Portal</h1>
        
        <div class="bg-white p-6 rounded shadow-lg grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-10">
            <input type="text" id="searchCountry" placeholder="Country" class="border p-2 rounded">
            <select id="searchDegree" class="border p-2 rounded">
                <option value="All">All Degrees</option><option>UG</option><option>PG</option><option>DIPLOMA</option>
            </select>
            <input type="text" id="searchAcademic" placeholder="My CGPA" class="border p-2 rounded">
            <input type="text" id="searchLangScore" placeholder="My Score" class="border p-2 rounded">
            <input type="text" id="searchGap" placeholder="My Study Gap" class="border p-2 rounded">
            <button onclick="search()" class="bg-blue-600 text-white font-bold p-2 rounded">SEARCH</button>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <script>
        async function search() {
            const country = document.getElementById('searchCountry').value;
            const degree = document.getElementById('searchDegree').value;
            const res = await fetch(`/api/search-uni?country=${country}&degree=${degree}`);
            const data = await res.json();
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            data.forEach(uni => {
                resultsDiv.innerHTML += `
                    <div class="bg-white p-5 rounded shadow border-l-4 border-blue-500">
                        <h2 class="text-xl font-bold">${uni.uniName}</h2>
                        <p class="text-gray-600 mb-2">${uni.courseName} (${uni.degree})</p>
                        <hr class="my-2">
                        <div class="grid grid-cols-2 text-sm gap-2">
                            <div>Intake: <b>${uni.intake}</b></div>
                            <div>Fee: <b>${uni.semesterFee} ${uni.currency}</b></div>
                            <div>Bank Suggest BD: <b class="text-red-600">${uni.bankNameBD}</b></div>
                            <div>Loan: <b>${uni.loanAmount}</b></div>
                            <div>Study Gap: <b>${uni.studyGap}</b></div>
                            <div>Marital: <b>${uni.maritalStatus}</b></div>
                        </div>
                        <button class="w-full mt-4 bg-gray-800 text-white p-2 rounded">OPEN STUDENT FILE</button>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
