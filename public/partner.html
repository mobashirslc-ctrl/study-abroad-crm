<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-blue { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%); background: white; display: flex; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 11px; color: #888; cursor: pointer; }
        .active { color: #1a73e8; font-weight: bold; }
        .page { display: none; } .active-page { display: block; }
    </style>
</head>
<body>

<div class="container" id="main">
    <div id="auth-section" class="card">
        <h2 id="atitle">Partner Registration</h2>
        <div id="regBox"><input type="text" id="pName" placeholder="Full Name"></div>
        <input type="email" id="pEmail" placeholder="Email">
        <input type="password" id="pPass" placeholder="Password">
        <button class="btn-blue" onclick="handleAuth()" id="abtn">REGISTER</button>
        <p onclick="toggleA()" style="text-align:center; font-size:12px; cursor:pointer;">Login / Register</p>
    </div>

    <div id="dash-section" style="display:none;">
        <div id="p-search" class="page active-page">
            <div class="card">
                <h3>🔍 Smart Assessment</h3>
                <input type="text" id="sCountry" placeholder="Country">
                <select id="sDegree">
                    <option>Degree</option><option>UG</option><option>PG</option><option>DIPLOMA</option><option>FOUNDATION</option><option>RESEARCH</option><option>PHD</option>
                </select>
                <select id="sLang">
                    <option>Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                </select>
                <input type="text" id="sAcad" placeholder="Academic CGPA/GPA">
                <button class="btn-blue" onclick="runSearch()">SEARCH UNIVERSITY</button>
            </div>
            <div id="results"></div>
        </div>

        <div id="p-track" class="page">
            <h3>📁 Student File Tracking</h3>
            <div id="trackList"></div>
        </div>

        <div id="p-wallet" class="page">
            <div class="card" style="background:#1a73e8; color:white;">
                <p>Wallet Balance</p><h2>৳ 0.00</h2>
            </div>
            <div class="card">
                <h3>Withdraw</h3>
                <select id="wM"><option>Bkash</option><option>Nagad</option><option>Bank</option></select>
                <input type="number" id="wA" placeholder="Amount">
                <button class="btn-blue" onclick="alert('Withdraw Request Sent!')">SEND REQUEST</button>
            </div>
        </div>
    </div>
</div>

<div class="nav-bar" id="navbar" style="display:none;">
    <div class="nav-item active" onclick="showP('p-search', this)"><i class="fas fa-search"></i><br>Search</div>
    <div class="nav-item" onclick="showP('p-track', this); loadT()"><i class="fas fa-tasks"></i><br>Tracking</div>
    <div class="nav-item" onclick="showP('p-wallet', this)"><i class="fas fa-wallet"></i><br>Wallet</div>
</div>

<script>
    let isL = false;
    function toggleA() { isL = !isL; document.getElementById('atitle').innerText = isL ? "Login" : "Register"; document.getElementById('regBox').style.display = isL ? "none" : "block"; }

    async function handleAuth() {
        const body = { name: document.getElementById('pName').value, email: document.getElementById('pEmail').value, pass: document.getElementById('pPass').value };
        const res = await fetch(isL ? '/api/auth/login' : '/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const d = await res.json();
        if(d.success && isL) { localStorage.setItem('pUser', JSON.stringify(d.user)); location.reload(); } else alert(d.message);
    }

    function showP(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    async function runSearch() {
        const res = await fetch(`/api/search-uni?country=${document.getElementById('sCountry').value}&degree=${document.getElementById('sDegree').value}&language=${document.getElementById('sLang').value}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.map(u => `
            <div class="card">
                <b>${u.uniName}</b> | ${u.country}
                <div class="res-grid">
                    <div>Fee: <b>${u.fee} ${u.currency}</b></div><div>Bank: <b>${u.bankBalance}</b></div>
                    <div>BD Bank: <b>${u.bankNameBD}</b></div><div>Loan: <b>${u.loanAmount}</b></div>
                    <div>Comm: <b>${u.partnerCommission}</b></div><div>Marital: <b>${u.maritalStatus}</b></div>
                </div>
                <button class="btn-blue" style="margin-top:10px; background:#28a745;" onclick="openF('${u.uniName}')">OPEN STUDENT FILE</button>
            </div>
        `).join('');
    }

    async function openF(uni) {
        const studentName = prompt("Student Name:");
        if(!studentName) return;
        await fetch('/api/open-file', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ studentName, university: uni }) });
        alert("File Opened!");
    }

    async function loadT() {
        const res = await fetch('/api/all-files');
        const data = await res.json();
        document.getElementById('trackList').innerHTML = data.map(f => `<div class="card"><b>${f.studentName}</b><br><small>${f.university} - ${f.status}</small></div>`).join('');
    }

    if(localStorage.getItem('pUser')) { document.getElementById('auth-section').style.display='none'; document.getElementById('dash-section').style.display='block'; document.getElementById('navbar').style.display='flex'; }
</script>
</body>
</html>
