<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Partner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.section { display: none; } .active { display: block; } th, td { padding: 12px; border: 1px solid #eee; font-size: 11px; }</style>
</head>
<body class="bg-gray-50 flex" onload="loadDashboard()">
    <div class="w-64 bg-[#0f172a] h-screen text-white p-6 sticky top-0 shadow-2xl">
        <h1 class="text-xl font-bold mb-10 text-blue-500 text-center uppercase tracking-widest">Partner Master</h1>
        <nav class="space-y-4">
            <button onclick="showTab('assessment')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition border-b border-slate-800">Smart Assesment</button>
            <button onclick="showTab('tracking')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition border-b border-slate-800">File Tracking</button>
            <button onclick="showTab('finance')" class="w-full text-left py-3 px-4 hover:bg-slate-800 rounded-lg transition">Finance & Subscription</button>
        </nav>
    </div>

    <div class="flex-1 p-10">
        <div id="assessment" class="section active bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 class="font-bold mb-6 text-gray-700 uppercase">Assessment Tool</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
                <input type="text" id="sCountry" placeholder="Country" class="border p-2 rounded">
                <select id="sDegree" class="border p-2 rounded">
                    <option value="">Degree</option><option>Ug</option><option>Pg</option><option>Diploma</option><option>PhD</option>
                </select>
                <select id="sLang" class="border p-2 rounded">
                    <option value="">Language</option><option>IELTS</option><option>PTE</option><option>DUOLINGO</option>
                </select>
                <input type="text" id="sAcad" placeholder="Academic Score" class="border p-2 rounded">
                <input type="text" id="sLangScore" placeholder="Lang Score" class="border p-2 rounded">
                <button onclick="searchUni()" class="bg-blue-600 text-white rounded font-bold uppercase py-2">Search</button>
            </div>
            <div id="results" class="overflow-x-auto"></div>
        </div>

        <div id="tracking" class="section bg-white p-6 rounded-xl shadow-sm">
            <h2 class="font-bold mb-4 uppercase">Real-time Tracking</h2>
            <table class="w-full text-left">
                <thead class="bg-gray-50 uppercase text-[10px]">
                    <tr><th>Student</th><th>University</th><th>Status</th><th>Compliance Member</th><th>Date</th></tr>
                </thead>
                <tbody id="trackBody"></tbody>
            </table>
        </div>

        <div id="finance" class="section">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-blue-900 text-white p-8 rounded-2xl">
                    <h4 class="text-xs opacity-70 mb-4 uppercase">Wallet Summary</h4>
                    <p>Total Balance: $ <span id="wallet">0.00</span></p>
                    <p>Subscription Status: <span class="text-green-400 font-bold" id="subStatus">Active</span></p>
                    <p class="text-[10px]">Expires: <span id="expireDate">--/--/--</span></p>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow border">
                    <h3 class="font-bold mb-4 uppercase text-sm">Withdraw Funds</h3>
                    <input type="text" id="accNo" placeholder="Account No (Bkash/Nagad/Bank)" class="w-full border p-2 mb-3 rounded">
                    <input type="number" id="wAmount" placeholder="Amount to Withdraw" class="w-full border p-2 mb-4 rounded">
                    <button id="withdrawBtn" disabled class="w-full bg-gray-400 text-white py-3 rounded-lg font-bold">LOCKED</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        async function searchUni() {
            // Search logic mapping same fields...
        }
        async function loadDashboard() {
            // API calls to load wallet, files, and subscription info...
        }
    </script>
</body>
</html>
