<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Track Your Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg-dark: #070014; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #f1c40f; --success: #2ecc71; }
        body { background: linear-gradient(145deg, var(--bg-dark), var(--primary)); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .tracker-container { max-width: 500px; width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; }
        .logo { max-height: 60px; margin-bottom: 20px; background: white; padding: 10px; border-radius: 8px; }
        
        h2 { margin-bottom: 10px; color: var(--accent); }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 15px 15px 15px 45px; border-radius: 10px; color: white; font-size: 1rem; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }

        .btn-track { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-track:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3); }

        /* Status Result Section */
        #result-area { display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); text-align: left; animation: fadeIn 0.5s ease; }
        .status-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; }
        .status-badge { background: var(--success); color: black; padding: 5px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { margin-top: 30px; font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>

    <div class="tracker-container">
        <img src="logo.jpeg" alt="SCC Logo" class="logo">
        <h2>Track Your File</h2>
        <p>Enter your contact number to check your application status.</p>

        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="text" id="phone_input" placeholder="e.g. 017XXXXXXXX">
        </div>

        <button class="btn-track" onclick="trackFile()">Check Status</button>

        <div id="result-area">
            <div class="status-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                    <div>
                        <h3 id="st_name" style="margin:0;">Student Name</h3>
                        <small id="st_uni" style="color:var(--accent);">University of Greenwich</small>
                    </div>
                    <span class="status-badge" id="st_status">In Progress</span>
                </div>
                <div style="font-size: 0.85rem; color: #ccc;">
                    <p style="margin: 5px 0;"><i class="fas fa-calendar-check"></i> Last Updated: 11 March 2026</p>
                    <p style="margin: 5px 0;"><i class="fas fa-info-circle"></i> Remark: Document verification under process.</p>
                </div>
            </div>
        </div>

        <footer>
            &copy; 2026 <strong>Gorun Ltd.</strong> | All Rights Reserved.
        </footer>
    </div>

    <script>
        function trackFile() {
            const phone = document.getElementById('phone_input').value;
            if(phone.length < 11) {
                alert("Please enter a valid phone number.");
                return;
            }

            // UI Feedback
            document.querySelector('.btn-track').innerText = "Searching...";
            
            // Simulating Database Fetch
            setTimeout(() => {
                document.getElementById('result-area').style.display = 'block';
                document.querySelector('.btn-track').innerText = "Check Status";
                
                // Demo Data
                document.getElementById('st_name').innerText = "Ariful Islam";
                document.getElementById('st_uni').innerText = "University of Portsmouth";
                document.getElementById('st_status').innerText = "Offer Letter Issued";
            }, 1000);
        }
    </script>
</body>
</html>
