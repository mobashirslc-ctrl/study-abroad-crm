<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compliance Dashboard | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p-green: #2ecc71; 
            --gold: #f1c40f; /* ইমেজের গোল্ডেন কালার */
            --bg-deep: #12001a; 
        }
        body { background: var(--bg-deep); color: #fff; font-family: sans-serif; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { 
            width: 260px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); 
            height: 100vh; border-right: 1px solid rgba(241, 196, 15, 0.1); 
            display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar-item { padding: 15px; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .sidebar-item.active { background: rgba(255,255,255,0.05); color: #fff; border-radius: 8px; }

        .main { flex: 1; padding: 30px; }

        /* Top Header Area */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .staff-id { background: var(--gold); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        /* Search Bar */
        .search-university {
            border: 1.5px solid var(--gold);
            background: rgba(255,255,255,0.05);
            border-radius: 10px; display: flex; overflow: hidden; margin: 20px 0;
        }
        .search-btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }

        /* Active File Queue Table */
        .queue-container { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .table-title { color: var(--gold); font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .glass-table { width: 100%; border-collapse: collapse; }
        .glass-table th { color: var(--gold); border-bottom: 1px solid rgba(241, 196, 15, 0.3); padding: 15px; text-align: left; font-size: 12px; }
        .glass-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        /* Buttons */
        .claim-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .status-unclaimed { color: var(--gold); font-weight: bold; }
        .status-processing { color: var(--p-green); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="background: white; padding: 10px; border-radius: 5px; margin-bottom: 30px;">
            <img src="logo.png" alt="Logo" style="width: 100%;">
        </div>
        <div class="sidebar-item active"><i class="fas fa-list"></i> Incoming Files</div>
        <div class="sidebar-item"><i class="fas fa-history"></i> My History</div>
        <div class="sidebar-item"><i class="fas fa-user"></i> Profile</div>
        <div class="sidebar-item" style="margin-top: auto; color: #ff4757;"><i class="fas fa-sign-out-alt"></i> Logout Staff</div>
    </div>

    <div class="main">
        <div class="top-header">
            <h2 style="font-weight: 300;">Compliance Dashboard</h2>
            <div class="staff-id"><i class="fas fa-shield-alt"></i> STAFF_ID: #01 (MOBASHIR)</div>
        </div>

        <div class="queue-container">
            <div class="table-title"><i class="fas fa-folder-open"></i> Active File Queue</div>
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>STUDENT NAME</th>
                        <th>AGENCY</th>
                        <th>CURRENT STATUS</th>
                        <th>HANDLED BY</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // আপনার Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // রিয়েল টাইম ডাটা লোড
        function loadQueue() {
            db.ref('applications').on('value', (snapshot) => {
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = "";
                
                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    
                    const statusClass = (data.compliance === 'Unclaimed' || !data.compliance) ? 'status-unclaimed' : 'status-processing';
                    
                    const row = `
                        <tr>
                            <td>${data.studentName}</td>
                            <td>${data.partnerOrg || 'Agency Name'}</td>
                            <td><span class="${statusClass}">${data.compliance || 'UNCLAIMED'}</span></td>
                            <td style="color:#888;">${data.handledBy || 'No one yet'}</td>
                            <td>
                                <button class="claim-btn" onclick="openReviewFlow('${id}')">Claim & Review</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });
        }

        // ক্লেইম এবং স্ট্যাটাস চেঞ্জ লজিক
        function openReviewFlow(id) {
            const stages = [
                "Pending Review", "SOP/GS Under Review", "Correction Required",
                "File Received", "Application Submitted", "Visa Applied",
                "Visa Approved", "Visa Rejection", "Ready to Collect", "Paid", "Refund Processed"
            ];

            let menu = "Select New Status (Type the number):\n";
            stages.forEach((s, i) => menu += `${i+1}. ${s}\n`);

            const choice = prompt(menu);
            if(choice && stages[choice-1]) {
                const newStatus = stages[choice-1];
                
                // আপডেট লজিক
                db.ref('applications/' + id).update({
                    compliance: newStatus,
                    handledBy: "Mobashir" // Staff Name
                }).then(() => {
                    alert("Status successfully updated to: " + newStatus);
                });
            }
        }

        window.onload = loadQueue;
    </script>
</body>
</html>
