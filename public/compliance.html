<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Compliance Dashboard 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style-compliance.css">
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Securing Staff Session...</p>
    </div>

    <div class="sidebar">
        <div class="logo-box"><img src="logo.jpeg" alt="SCC"></div>
        <div onclick="showTab('incoming', this)" class="nav-item active"><i class="fas fa-file-import"></i> Incoming Files</div>
        <div onclick="showTab('history', this)" class="nav-item"><i class="fas fa-user-clock"></i> Staff History</div>
        <div onclick="showTab('profile', this)" class="nav-item"><i class="fas fa-id-badge"></i> Staff Profile</div>
        <div style="margin-top:auto; padding:20px;">
            <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h2>Compliance Management</h2>
            <div class="staff-badge">
                <i class="fas fa-user-shield"></i> <span id="staffDisplay">Loading...</span>
            </div>
        </div>

        <div id="incoming" class="content-section active">
            <div class="card">
                <h3><i class="fas fa-list"></i> Incoming File Queue</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Student & Partner</th>
                                <th>Passport No</th>
                                <th>Docs</th>
                                <th>Status</th>
                                <th>Handled By</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="incomingTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="history" class="content-section">
            <div class="stat-grid">
                <div class="stat-box"><h3>Total Served</h3><h2 id="hTotal">0</h2></div>
                <div class="stat-box"><h3>Visa Success</h3><h2 id="hSuccess">0</h2></div>
                <div class="stat-box"><h3>Partners Served</h3><h2 id="hPartners">0</h2></div>
            </div>
        </div>

        <div id="profile" class="content-section">
            <div class="card" style="max-width: 600px;">
                <h3>Staff Profile Setup</h3>
                <div class="form-grid">
                    <label>Full Name</label><input type="text" id="profName" class="inp">
                    <label>Organization</label><input type="text" id="profOrg" class="inp">
                    <label>Experience</label><input type="text" id="profExp" class="inp">
                    <button id="saveProfileBtn" class="btn-claim">Save Profile</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reviewSlider" class="slider">
        <button class="close-btn" onclick="closeSlider()">&times;</button>
        <h2 id="targetStudent" style="color:var(--accent);">Student Name</h2>
        <p id="targetComm" style="font-weight:bold;"></p>
        <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
        
        <label>Update Status</label>
        <select id="statusSelect" class="inp" style="margin-bottom:20px;">
            <option value="pending">PENDING (Neutral)</option>
            <option value="verified">VERIFIED (Add to Pending Wallet)</option>
            <option value="uni_apply">UNIVERSITY APPLIED</option>
            <option value="offer_done">OFFER LETTER DONE</option>
            <option value="doc_missing">DOCUMENTS MISSING</option>
            <option value="visa_apply">APPLYING VISA</option>
            <option value="visa_rejected">VISA REJECTED (Minus from Wallet)</option>
            <option value="visa_success">VISA SUCCESS</option>
            <option value="student_paid">STUDENT PAID TO UNI (Move to Final)</option>
        </select>

        <div id="docLinksArea" style="margin-bottom:20px;"></div>

        <button id="updateStatusBtn" class="btn-claim" style="width:100%;">APPLY STATUS & SYNC WALLET</button>
    </div>

    <script type="module" src="compliance-logic.js"></script>
    <script>
        function showTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
