<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Portal | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-green: #2ecc71;
            --brand-purple: #2c003e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(46, 204, 113, 0.2);
        }

        body {
            background: #12001a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            border-bottom: 2px solid var(--brand-green);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
        }

        .staff-card {
            border-left: 5px solid var(--brand-green);
            background: rgba(255,255,255,0.03);
            margin-bottom: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .approve-btn {
            background: var(--brand-green);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .input-group input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
        }

        .input-group input:focus { border-color: var(--brand-green); outline: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 style="color: var(--brand-green);">Compliance Management</h1>
            <div class="staff-badge" style="border: 1px solid var(--brand-green); padding: 5px 15px; border-radius: 20px;">Staff Access</div>
        </header>

        <div class="glass-panel">
            <h3>Pending Applications</h3>
            <div class="staff-card">
                <div>
                    <strong>Student ID: 8849</strong><br>
                    <span>Partner: Global Education</span>
                </div>
                <button class="approve-btn">Approve File</button>
            </div>
        </div>
    </div>
</body>
</html>
