<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Compliance Hub 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg: #070014; --gold: #f1c40f; --border: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        .top-bar { padding: 20px 40px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .container { padding: 40px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--gold); border-bottom: 2px solid var(--border); font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a2e; padding: 30px; border-radius: 15px; border: 1px solid var(--gold); width: 400px; }
        
        .reg-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><img src="logo.jpeg" alt="SCC" width="80"></div>
        <div>Staff: <span id="staffDisplay" style="color:var(--gold);">Loading...</span></div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Incoming Applications & Status Update</h3>
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Passport</th>
                        <th>Current Status</th>
                        <th>Handled By</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="incomingTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold);">Update Student Status</h3>
            <p id="reviewStudentName" style="font-size:14px;"></p>
            
            <label style="font-size:12px; color:#aaa;">Select New Status:</label>
            <select id="statusSelect" class="reg-input">
                <option value="submitted">Submitted</option>
                <option value="document_pending">Document Pending</option>
                <option value="under_review">Under Review</option>
                <option value="conditional_offer">Conditional Offer</option>
                <option value="unconditional_offer">Unconditional Offer</option>
                <option value="tuition_fee_paid">Tuition Fee Paid</option>
                <option value="cas_issued">CAS / COE Issued</option>
                <option value="visa_applied">Visa Applied</option>
                <option value="visa_granted">Visa Granted</option>
                <option value="visa_refused">Visa Refused</option>
                <option value="refund_process">Refund Process</option>
                <option value="verified">Verified (Add to Wallet)</option>
            </select>

            <button onclick="updateStatusNow()" class="btn-action" style="width:100%;">UPDATE STATUS</button>
            <button onclick="closeModal()" style="background:transparent; color:red; border:none; margin-top:10px; cursor:pointer; width:100%;">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk", 
            authDomain: "ihp-portal-v3.firebaseapp.com", 
            projectId: "ihp-portal-v3", 
            storageBucket: "ihp-portal-v3.firebasestorage.app", 
            messagingSenderId: "481157902534", 
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const staffEmail = localStorage.getItem('userEmail') || "staff@scc.com";

        document.getElementById('staffDisplay').innerText = staffEmail.split('@')[0].toUpperCase();

        onSnapshot(collection(db, "applications"), (snap) => {
            const tbody = document.getElementById('incomingTableBody');
            let html = "";
            snap.forEach(dSnap => {
                const d = dSnap.data();
                const id = dSnap.id;
                html += `
                    <tr>
                        <td><b>${d.studentName}</b></td>
                        <td>${d.passportNo}</td>
                        <td><span class="status-pill">${d.status.replace('_', ' ')}</span></td>
                        <td>${d.handledBy ? d.handledBy.split('@')[0] : 'Waiting'}</td>
                        <td><button class="btn-action" onclick="openReview('${id}', '${d.studentName}')">REVIEW</button></td>
                    </tr>`;
            });
            tbody.innerHTML = html;
        });

        window.openReview = (id, name) => {
            window.currentAppId = id;
            document.getElementById('reviewStudentName').innerText = "Student: " + name;
            document.getElementById('reviewModal').style.display = "flex";
        };

        window.closeModal = () => document.getElementById('reviewModal').style.display = "none";

        window.updateStatusNow = async () => {
            const newStatus = document.getElementById('statusSelect').value;
            const docRef = doc(db, "applications", window.currentAppId);
            
            // "verified" status dilei kebol wallet-e taka add hobe
            const isVerified = (newStatus === "verified");

            try {
                await updateDoc(docRef, {
                    status: newStatus,
                    isVerified: isVerified,
                    handledBy: staffEmail,
                    updatedAt: serverTimestamp()
                });
                alert("Status Updated Successfully!");
                closeModal();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
