<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compliance Dashboard | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p-green: #2ecc71; 
            --gold: #f1c40f;
            --bg-deep: #12001a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(46, 204, 113, 0.15);
        }
        
        body { background: var(--bg-deep); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; color: #ccc; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; border-left: 3px solid var(--gold); }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        
        .top-info { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .staff-badge { background: var(--gold); color: #000; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 5px; }

        .queue-card { background: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; color: var(--gold); font-size: 18px; font-weight: bold; }

        .glass-table { width: 100%; border-collapse: collapse; }
        .glass-table th { text-align: left; color: var(--gold); font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .glass-table td { padding: 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: #eee; }

        .claim-btn { background: var(--gold); color: #000; border: none; padding: 8px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .claim-btn:hover { transform: scale(1.05); }

        .status-tag { font-weight: bold; font-size: 11px; color: var(--gold); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="logo.png" style="height: 40px; margin-bottom: 40px;">
        <div class="nav-item active"><i class="fas fa-folder-open"></i> Incoming Files</div>
        <div class="nav-item"><i class="fas fa-history"></i> Processed History</div>
        <div class="nav-item" style="margin-top: auto; color: #ff4757;"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </aside>

    <div class="main">
        <div class="top-info">
            <div class="staff-badge"><i class="fas fa-shield-alt"></i> COMPLIANCE_OFFICER: MOBASHIR</div>
        </div>

        <div class="queue-card">
            <div class="card-header"><i class="fas fa-folder"></i> Active File Queue</div>
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>Student Information</th>
                        <th>Partner Agency</th>
                        <th>Compliance Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ১. ডাটা লোড করা
        function fetchQueue() {
            db.ref('applications').on('value', (snapshot) => {
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = "";
                
                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    
                    const row = `
                        <tr>
                            <td><b>${data.studentName}</b><br><small>${data.passport}</small></td>
                            <td>${data.partnerOrg}</td>
                            <td class="status-tag">${data.compliance || 'Pending'}</td>
                            <td>
                                <button class="claim-btn" onclick="updateFlow('${id}')">Claim & Review</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });
        }

        // ২. স্ট্যাটাস আপডেট ফ্লো (আপনার দেওয়া ৫টি স্টেজ অনুযায়ী)
        function updateFlow(id) {
            const options = [
                "Pending Review",
                "SOP/GS Under Review",
                "Correction Required",
                "File Received",
                "Application Submitted",
                "Visa Applied",
                "Visa Approved",
                "Visa Rejection",
                "Ready to Collect",
                "Paid",
                "Refund Processed"
            ];

            let msg = "Select New Status (Type number):\n";
            options.forEach((opt, idx) => msg += `${idx + 1}. ${opt}\n`);

            const choice = prompt(msg);
            if (choice && options[choice - 1]) {
                const newStatus = options[choice - 1];
                
                // ডাটাবেজ আপডেট
                db.ref('applications/' + id).update({
                    compliance: newStatus,
                    handledBy: "Mobashir"
                }).then(() => {
                    alert("Status changed to: " + newStatus);
                });
            }
        }

        window.onload = fetchQueue;
    </script>
</body>
</html>
