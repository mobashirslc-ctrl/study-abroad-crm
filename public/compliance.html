<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Compliance Hub 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg: #070014; --gold: #f1c40f; --border: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        .top-bar { padding: 20px 40px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .container { padding: 40px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--gold); border-bottom: 2px solid var(--border); font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .verified { background: #2ecc71; color: white; }
        .submitted { background: #3498db; color: white; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { transform: scale(1.05); }
        .btn-locked { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><img src="logo.jpeg" alt="SCC" width="80"></div>
        <div>Staff: <span id="staffDisplay" style="color:var(--gold); font-weight:bold;">Loading...</span></div>
        <button onclick="location.href='index.html'" style="background:#ff4757; border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer;">Logout</button>
    </div>

    <div class="container">
        <div class="card">
            <h3><i class="fas fa-file-import"></i> Incoming Applications</h3>
            <table>
                <thead>
                    <tr>
                        <th>Student Info</th>
                        <th>Agency/Partner</th>
                        <th>Passport</th>
                        <th>Status</th>
                        <th>Handled By</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="incomingTableBody">
                    <tr><td colspan="6" style="text-align:center;">Fetching data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = { 
            apiKey: "AIzaSyDonKHMydghjn3nAwjtsvQFDyT-70DGqOk", 
            authDomain: "ihp-portal-v3.firebaseapp.com", 
            projectId: "ihp-portal-v3", 
            storageBucket: "ihp-portal-v3.firebasestorage.app", 
            messagingSenderId: "481157902534", 
            appId: "1:481157902534:web:2d9784032fbf0f2f7fe7c7" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const staffEmail = localStorage.getItem('userEmail') || "staff@scc.com";

        // ১. স্ট্যাফ প্রোফাইল সেটআপ
        document.getElementById('staffDisplay').innerText = staffEmail.split('@')[0].toUpperCase();

        // ২. লাইভ ডাটা লোডিং
        const q = query(collection(db, "applications"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snap) => {
            const tbody = document.getElementById('incomingTableBody');
            let html = "";
            
            snap.forEach(dSnap => {
                const d = dSnap.data();
                const id = dSnap.id;
                // যদি অন্য কেউ হ্যান্ডেল করে তবে লক দেখাবে
                const isLocked = d.handledBy && d.handledBy !== staffEmail;
                const handlerName = d.handledBy ? d.handledBy.split('@')[0].toUpperCase() : 'WAITING';

                html += `
                    <tr style="${isLocked ? 'opacity: 0.5;' : ''}">
                        <td><b>${d.studentName}</b><br><small>${d.university}</small></td>
                        <td style="color:#a29bfe;">${d.partnerEmail ? d.partnerEmail.split('@')[0].toUpperCase() : 'N/A'}</td>
                        <td>${d.passportNo}</td>
                        <td><span class="status-pill ${d.status}">${d.status.toUpperCase()}</span></td>
                        <td style="font-size:12px; font-weight:bold;">${isLocked ? '<i class="fas fa-lock"></i> ' : ''}${handlerName}</td>
                        <td>
                            <button class="btn-action ${isLocked ? 'btn-locked' : ''}" 
                                onclick="window.verifyApp('${id}', '${d.studentName}')" 
                                ${isLocked || d.isVerified ? 'disabled' : ''}>
                                ${d.isVerified ? 'VERIFIED' : 'VERIFY NOW'}
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html || "<tr><td colspan='6' style='text-align:center;'>No records found.</td></tr>";
        });

        // ৩. ভেরিফিকেশন লজিক (এটি পার্টনার ওয়ালেটকে ট্রিগার করবে)
        window.verifyApp = async (id, name) => {
            if(!confirm(`Confirm verification for ${name}?`)) return;
            
            const docRef = doc(db, "applications", id);
            try {
                // isVerified: true হলে পার্টনারের পেন্ডিং ওয়ালেটে টাকা যাবে
                await updateDoc(docRef, {
                    isVerified: true,
                    status: "verified",
                    handledBy: staffEmail,
                    updatedAt: serverTimestamp()
                });
                alert("Verification Successful!");
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

    </script>
</body>
</html>
