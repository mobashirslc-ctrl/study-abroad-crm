<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Partner Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p-green: #2ecc71; }
        body { background: #12001a; color: #fff; font-family: sans-serif; margin: 0; display: flex; }
        .sidebar { width: 260px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); height: 100vh; border-right: 1px solid rgba(46, 204, 113, 0.2); }
        .main { flex: 1; padding: 30px; }
        /* সার্চ বার যা ভিডিওতে হলুদ ছিল */
        .search-university {
            border: 1.5px solid var(--p-green);
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            margin: 20px 0;
        }
        .search-btn { background: var(--p-green); color: #000; border: none; padding: 10px 20px; font-weight: bold; }
        .glass-table {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border-collapse: collapse;
        }
        .glass-table th { color: var(--p-green); border-bottom: 1px solid var(--p-green); padding: 15px; text-align: left; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main">
        <div class="search-university">
            <input type="text" style="flex:1; background:transparent; border:none; color:white; padding:10px;" placeholder="Search University...">
            <button class="search-btn">SEARCH</button>
        </div>
        <table class="glass-table">
            <thead>
                <tr><th>University Name</th><th>Commission</th><th>Action</th></tr>
            </thead>
            <tbody>
                <tr><td>University of East London</td><td style="color:var(--p-green);">£ 15,000</td><td><button class="search-btn" style="padding:5px 10px;">OPEN FILE</button></td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
