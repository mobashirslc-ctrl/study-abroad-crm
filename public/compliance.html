<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Portal | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-green: #2ecc71; }
        body { background: radial-gradient(circle at top right, #3d005e, #1a0026); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 40px; }
        .glass-panel { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(46, 204, 113, 0.3); border-radius: 20px; padding: 30px; }
        .header { border-bottom: 2px solid var(--brand-green); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; }
        .file-card { background: rgba(255,255,255,0.04); border-left: 5px solid var(--brand-green); padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-approve { background: var(--brand-green); color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="header">
            <h1>Compliance Management</h1>
            <span style="border:1px solid var(--brand-green); padding:5px 15px; border-radius:20px; color:var(--brand-green);">Staff Only</span>
        </div>
        <div class="file-card">
            <div><strong>Application #8849</strong><br><small>Verification Pending</small></div>
            <button class="btn-approve">Verify Now</button>
        </div>
    </div>
</body>
</html>
