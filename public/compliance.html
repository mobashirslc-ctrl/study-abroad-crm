<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compliance Dashboard | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p-green: #2ecc71; 
            --gold: #f1c40f;
            --bg-deep: #12001a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(46, 204, 113, 0.15);
        }
        
        body { background: var(--bg-deep); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); height: 100vh; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; color: #ccc; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; border-left: 3px solid var(--gold); }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        
        /* সার্চ বার যা ভিডিওতে হলুদ ছিল */
        .search-university {
            border: 1.5px solid var(--p-green);
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            overflow: hidden;
            margin: 20px 0;
        }
        .search-btn { background: var(--p-green); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }

        /* Queue Card & Table */
        .queue-card { background: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--gold); font-size: 18px; font-weight: bold; }

        .glass-table {
            width: 100%;
            background: transparent;
            border-collapse: collapse;
        }
        .glass-table th { color: var(--gold); border-bottom: 1px solid var(--p-green); padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        .glass-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }

        .claim-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .status-text { font-weight: bold; color: var(--p-green); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="padding: 20px 0; font-weight: bold; color: var(--gold); font-size: 20px;">SCC ADMIN</div>
        <div class="nav-item active"><i class="fas fa-folder-open"></i> Active Queue</div>
        <div class="nav-item"><i class="fas fa-history"></i> My History</div>
        <div class="nav-item" style="margin-top: auto; color: #ff4757;"><i class="fas fa-sign-out-alt"></i> Logout Staff</div>
    </aside>

    <div class="main">
        <div class="search-university">
            <input type="text" style="flex:1; background:transparent; border:none; color:white; padding:10px;" placeholder="Search Student or Passport...">
            <button class="search-btn">SEARCH</button>
        </div>

        <div class="queue-card">
            <div class="card-header"><i class="fas fa-list-ul"></i> Active Application Queue</div>
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Passport</th>
                        <th>Agency</th>
                        <th>Compliance Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxIzx-mzvUNdywOz5xxSPS9FQYynLHJlg",
            authDomain: "scc-partner-portal.firebaseapp.com",
            projectId: "scc-partner-portal",
            databaseURL: "https://scc-partner-portal-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function fetchQueue() {
            db.ref('applications').on('value', (snapshot) => {
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = "";
                
                snapshot.forEach((child) => {
                    const data = child.val();
                    const id = child.key;
                    
                    const row = `
                        <tr>
                            <td>${data.studentName}</td>
                            <td>${data.passport}</td>
                            <td>${data.partnerOrg}</td>
                            <td><span class="status-text">${data.compliance || 'Pending'}</span></td>
                            <td>
                                <button class="claim-btn" onclick="updateStatusFlow('${id}')">Claim & Review</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });
        }

        function updateStatusFlow(id) {
            const stages = [
                "Pending Review", "SOP/GS Under Review", "Correction Required",
                "File Received", "Application Submitted", "Visa Applied",
                "Visa Approved", "Visa Rejection", "Ready to Collect", "Paid", "Refund Processed"
            ];

            let menu = "Select New Status (Enter Number):\n";
            stages.forEach((s, i) => menu += `${i+1}. ${s}\n`);

            const choice = prompt(menu);
            if(choice && stages[choice-1]) {
                const newStatus = stages[choice-1];
                db.ref('applications/' + id).update({ compliance: newStatus })
                .then(() => alert("Updated to: " + newStatus));
            }
        }

        window.onload = fetchQueue;
    </script>
</body>
</html>
