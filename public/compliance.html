<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Compliance Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg: #070014; --gold: #f1c40f; --border: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; height: 100vh; background: rgba(255,255,255,0.03); border-right: 1px solid var(--border); padding: 25px; position: fixed; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; color: #ccc; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; border-left: 4px solid var(--gold); }
        .nav-item i { margin-right: 12px; width: 20px; }

        /* Main Content */
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: var(--gold); border-bottom: 2px solid var(--border); font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.1); }
        .btn-action { background: var(--gold); border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 500px; }
        .doc-link { display: block; background: rgba(255,255,255,0.05); padding: 10px; margin: 10px 0; color: var(--gold); text-decoration: none; border-radius: 5px; border: 1px solid var(--border); }
        .doc-link:hover { background: rgba(255,255,255,0.1); }
        textarea { width: 100%; background: #070014; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="logo.jpeg" width="100" style="margin-bottom: 40px;">
        <div class="nav-item active" onclick="switchTab('queue', this)"><i class="fas fa-layer-group"></i> Incoming Files</div>
        <div class="nav-item" onclick="switchTab('history', this)"><i class="fas fa-check-double"></i> Verified History</div>
        
        <div style="position: absolute; bottom: 30px; width: 210px;">
            <p style="font-size: 12px; color: var(--gold);">Logged in as:</p>
            <p id="staffName" style="font-size: 14px; margin-top: -10px;">...</p>
            <button onclick="localStorage.clear(); window.location.href='index.html';" style="width: 100%; padding: 10px; background: transparent; border: 1px solid red; color: red; cursor: pointer; border-radius: 5px;">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div id="queueSection" class="card tab-content">
            <h3><i class="fas fa-hourglass-half"></i> Compliance Application Queue</h3>
            <table id="complianceTable">
                <thead>
                    <tr><th>Student</th><th>University</th><th>Commission</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="complianceTableBody"></tbody>
            </table>
        </div>

        <div id="historySection" class="card tab-content" style="display:none;">
            <h3><i class="fas fa-history"></i> My Processed History</h3>
            <table id="historyTable">
                <thead>
                    <tr><th>Student</th><th>University</th><th>Decision</th><th>Date</th></tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3 id="revStudentName">Review Application</h3>
            <hr border="1" style="border-color: var(--border);">
            
            <p>Documents (Click to verify):</p>
            <div id="docLinksArea"></div>

            <textarea id="complianceNote" placeholder="Add compliance notes or reason for rejection..."></textarea>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="updateAppStatus('VERIFIED')" style="flex:1; background:#2ecc71; color:white; border:none; padding:12px; border-radius:5px; cursor:pointer;">APPROVE & VERIFY</button>
                <button onclick="updateAppStatus('REJECTED')" style="flex:1; background:#e74c3c; color:white; border:none; padding:12px; border-radius:5px; cursor:pointer;">REJECT FILE</button>
            </div>
            <button onclick="closeModal()" style="width:100%; background:transparent; color:gray; border:none; margin-top:10px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const staffEmail = localStorage.getItem('userEmail') || "compliance@scc.com";
        document.getElementById('staffName').innerText = staffEmail.split('@')[0].toUpperCase();
        let currentAppId = null;

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId + 'Section').style.display = 'block';
            el.classList.add('active');
            if(tabId === 'history') fetchHistory();
        }

        async function fetchApplications() {
            try {
                const res = await fetch('/api/applications');
                const apps = await res.json();
                const pendingApps = apps.filter(a => a.status === 'PENDING' || a.status === 'UNDER_REVIEW');
                
                let html = "";
                pendingApps.forEach(d => {
                    html += `<tr>
                        <td><b>${d.studentName}</b></td>
                        <td>${d.university}</td>
                        <td style="color:var(--gold)">৳${(d.commissionBDT || 0).toLocaleString()}</td>
                        <td><span class="status-pill">${d.status}</span></td>
                        <td>
                            <button class="btn-action" onclick='openReview(${JSON.stringify(d)})'>REVIEW</button>
                        </td>
                    </tr>`;
                });
                document.getElementById('complianceTableBody').innerHTML = html || "<tr><td colspan='5'>No pending files.</td></tr>";
            } catch (e) { console.error(e); }
        }

        window.openReview = (app) => {
            currentAppId = app._id;
            document.getElementById('revStudentName').innerText = "Review: " + app.studentName;
            
            let docHtml = "";
            if(app.pdf1) docHtml += `<a href="${app.pdf1}" target="_blank" class="doc-link"><i class="fas fa-file-pdf"></i> Passport/Photo</a>`;
            if(app.pdf2) docHtml += `<a href="${app.pdf2}" target="_blank" class="doc-link"><i class="fas fa-file-pdf"></i> Academic Docs</a>`;
            if(app.pdf3) docHtml += `<a href="${app.pdf3}" target="_blank" class="doc-link"><i class="fas fa-file-pdf"></i> IELTS/Language</a>`;
            
            document.getElementById('docLinksArea').innerHTML = docHtml || "No documents uploaded.";
            document.getElementById('reviewModal').style.display = 'flex';
        };

        async function updateAppStatus(newStatus) {
            const note = document.getElementById('complianceNote').value;
            try {
                const res = await fetch('/api/update-application-status', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        appId: currentAppId, 
                        status: newStatus, 
                        note: note,
                        staff: staffEmail 
                    })
                });
                if(res.ok) {
                    alert("Status Updated to " + newStatus);
                    closeModal();
                    fetchApplications();
                }
            } catch (e) { alert("Error updating status"); }
        }

        async function fetchHistory() {
            try {
                const res = await fetch('/api/applications');
                const apps = await res.json();
                const myHistory = apps.filter(a => a.complianceMember === staffEmail);
                
                let html = "";
                myHistory.forEach(d => {
                    html += `<tr>
                        <td>${d.studentName}</td>
                        <td>${d.university}</td>
                        <td><span style="color:${d.status === 'VERIFIED' ? '#2ecc71' : 'red'}">${d.status}</span></td>
                        <td>${new Date(d.timestamp).toLocaleDateString()}</td>
                    </tr>`;
                });
                document.getElementById('historyTableBody').innerHTML = html || "<tr><td colspan='4'>No history found.</td></tr>";
            } catch (e) { }
        }

        window.closeModal = () => { document.getElementById('reviewModal').style.display = 'none'; };

        setInterval(fetchApplications, 15000);
        fetchApplications();
    </script>
</body>
</html>
