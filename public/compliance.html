<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC | Compliance Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2b0054; --bg: #070014; --gold: #f1c40f; --border: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; }
        .sidebar { width: 260px; height: 100vh; background: rgba(255,255,255,0.03); border-right: 1px solid var(--border); padding: 25px; position: fixed; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; color: #ccc; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; border-left: 4px solid var(--gold); }
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: var(--gold); border-bottom: 2px solid var(--border); font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: var(--gold); }
        .btn-action { background: var(--gold); border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 500px; }
        .doc-link { display: block; background: rgba(255,255,255,0.05); padding: 12px; margin: 8px 0; color: var(--gold); text-decoration: none; border-radius: 5px; border: 1px solid var(--border); font-size: 13px; transition: 0.2s; }
        .doc-link:hover { background: rgba(241, 196, 15, 0.1); }
        select, textarea { width: 100%; background: #070014; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="sidebar">
        <img src="logo.jpeg" width="100" style="margin-bottom: 40px;">
        <div class="nav-item active" onclick="switchTab('queue', this)"><i class="fas fa-layer-group"></i> Incoming Files</div>
        <div class="nav-item" onclick="switchTab('history', this)"><i class="fas fa-check-double"></i> Verified History</div>
        
        <div style="position: absolute; bottom: 30px; width: 210px;">
            <p style="font-size: 12px; color: var(--gold);">Compliance Staff:</p>
            <p id="staffName" style="font-size: 14px; margin-top: -10px; font-weight: bold;">...</p>
            <button onclick="localStorage.clear(); window.location.href='index.html';" style="width: 100%; padding: 10px; background: transparent; border: 1px solid red; color: red; cursor: pointer; border-radius: 5px;">Logout</button>
        </div>
    </div>

    <div class="main-content">
        <div id="queueSection" class="card tab-content">
            <h3><i class="fas fa-hourglass-half"></i> Compliance Queue</h3>
            <table>
                <thead>
                    <tr><th>Student</th><th>University</th><th>Commission</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="complianceTableBody"></tbody>
            </table>
        </div>

        <div id="historySection" class="card tab-content" style="display:none;">
            <h3><i class="fas fa-history"></i> Processed History</h3>
            <table>
                <thead>
                    <tr><th>Student</th><th>University</th><th>Decision</th><th>Date</th></tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <h3 id="revStudentName">Review Application</h3>
            <p style="font-size: 12px; color: #888;">Review student documents and update tracking status.</p>
            
            <div id="docLinksArea"></div>

            <label style="font-size: 12px; color: var(--gold);">Tracking Update:</label>
            <select id="trackingStatusUpdate">
                <option value="UNDER_REVIEW">Under Review</option>
                <option value="DOC_VERIFIED">Documents Verified (Add to Payment)</option>
                <option value="OFFER_LETTER_AWAITED">Offer Letter Awaited</option>
                <option value="VISA_PROCESSING">Visa Processing</option>
                <option value="REJECTED">File Rejected</option>
            </select>

            <textarea id="complianceNote" placeholder="Add compliance notes..."></textarea>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="saveReviewBtn" onclick="updateAppStatus()" style="flex:1; background:#2ecc71; color:white; border:none; padding:12px; border-radius:5px; cursor:pointer; font-weight:bold;">SAVE REVIEW</button>
                <button onclick="closeModal()" style="flex:1; background:transparent; color:gray; border:1px solid #444; border-radius:5px; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const staffEmail = localStorage.getItem('userEmail') || "compliance@scc.com";
        document.getElementById('staffName').innerText = staffEmail.split('@')[0].toUpperCase();
        
        let currentAppId = null;
        let pendingAppsList = []; 

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId + 'Section').style.display = 'block';
            el.classList.add('active');
            if(tabId === 'history') fetchHistory();
        }

        async function fetchApplications() {
            try {
                const res = await fetch('/api/applications');
                const apps = await res.json();
                pendingAppsList = apps.filter(a => a.status !== 'DOC_VERIFIED' && a.status !== 'REJECTED' && a.status !== 'PAID');
                
                let html = "";
                pendingAppsList.forEach((d, index) => {
                    html += `<tr>
                        <td><b>${d.studentName}</b></td>
                        <td>${d.university}</td>
                        <td style="color:var(--gold)">৳${(d.commissionBDT || 0).toLocaleString()}</td>
                        <td><span class="status-pill">${d.status}</span></td>
                        <td><button class="btn-action" onclick="openReviewByIndex(${index})">REVIEW</button></td>
                    </tr>`;
                });
                document.getElementById('complianceTableBody').innerHTML = html || "<tr><td colspan='5'>No pending files.</td></tr>";
            } catch (e) { console.error("Fetch Error:", e); }
        }

        window.openReviewByIndex = (index) => {
            const app = pendingAppsList[index];
            if(!app) return alert("No data found!");

            currentAppId = app._id;
            document.getElementById('revStudentName').innerText = "Review: " + app.studentName;
            
            console.log("Full Application Data:", app);

            let docHtml = "";
            const fileKeys = ['pdf1', 'pdf2', 'pdf3', 'passport', 'academic', 'language', 'passportCopy'];
            
            fileKeys.forEach(key => {
                if (app[key] && app[key] !== "null" && app[key] !== "") {
                    docHtml += `<a href="${app[key]}" target="_blank" class="doc-link">
                        <i class="fas fa-file-pdf"></i> View ${key.toUpperCase()}
                    </a>`;
                }
            });

            if (docHtml === "") {
                const availableKeys = Object.keys(app).filter(k => 
                    String(app[k]).includes('http') || 
                    k.toLowerCase().includes('pdf') || 
                    k.toLowerCase().includes('doc')
                );
                docHtml = `<p style="color:orange; font-size:12px;">⚠️ No standard PDF keys found.</p>`;
                if(availableKeys.length > 0) {
                    docHtml += `<p style="font-size:10px;">Available fields: ${availableKeys.join(', ')}</p>`;
                }
            }
            
            document.getElementById('docLinksArea').innerHTML = docHtml;
            document.getElementById('reviewModal').style.display = 'flex';
        };

        async function updateAppStatus() {
            const status = document.getElementById('trackingStatusUpdate').value;
            const note = document.getElementById('complianceNote').value;
            const btn = document.getElementById('saveReviewBtn');

            if(!currentAppId) return alert("Please select an application first.");

            try {
                btn.innerText = "Saving...";
                btn.disabled = true;

                const payload = { 
                    appId: currentAppId, 
                    status: status, 
                    note: note || "Reviewed by compliance", 
                    isVerified: (status === 'DOC_VERIFIED'),
                    staff: staffEmail 
                };

                const res = await fetch('/api/update-application-status', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert("✅ Success: Status updated successfully.");
                    closeModal();
                    fetchApplications();
                } else {
                    const errData = await res.json();
                    alert("❌ Failed: " + (errData.message || "Server Error"));
                }
            } catch (e) { 
                console.error("Update Error:", e);
                alert("❌ Error: Backend server is not responding."); 
            } finally {
                btn.innerText = "SAVE REVIEW";
                btn.disabled = false;
            }
        }

        async function fetchHistory() {
            try {
                const res = await fetch('/api/applications');
                const apps = await res.json();
                const myHistory = apps.filter(a => a.status === 'DOC_VERIFIED' || a.status === 'REJECTED' || a.status === 'PAID');
                let html = "";
                myHistory.forEach(d => {
                    html += `<tr><td>${d.studentName}</td><td>${d.university}</td><td>${d.status}</td><td>${d.updatedAt ? new Date(d.updatedAt).toLocaleDateString() : 'N/A'}</td></tr>`;
                });
                document.getElementById('historyTableBody').innerHTML = html || "<tr><td colspan='4'>No history found.</td></tr>";
            } catch (e) { console.error("History Fetch Error:", e); }
        }

        window.closeModal = () => { 
            document.getElementById('reviewModal').style.display = 'none';
            document.getElementById('complianceNote').value = "";
            currentAppId = null;
        };

        fetchApplications();
    </script>
</body>
</html>
