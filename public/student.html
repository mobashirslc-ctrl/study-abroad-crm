<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Tracking | Passport Search</title>
    <style>
        /* আপনার গ্লাস-মরফিজম ডিজাইন মেইনটেইন করা হয়েছে */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white;
            width: 90%;
            max-width: 400px;
        }

        h2 { margin-bottom: 20px; font-weight: 500; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label { display: block; margin-bottom: 8px; font-size: 14px; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.7); }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ffffff;
            color: #764ba2;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        #statusMessage {
            margin-top: 20px;
            font-size: 14px;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Track Application</h2>
        <p style="font-size: 13px; margin-bottom: 25px; opacity: 0.8;">Enter your details to see real-time status</p>
        
        <div class="input-group">
            <label for="passportNumber">Passport Number</label>
            <input type="text" id="passportNumber" placeholder="Ex: A12345678" required>
        </div>

        <button class="btn" onclick="handleTracking()">Track Now</button>

        <div id="statusMessage"></div>
    </div>

    <script>
        function handleTracking() {
            const passport = document.getElementById('passportNumber').value;
            const display = document.getElementById('statusMessage');

            if (!passport) {
                alert("Please enter your Passport Number");
                return;
            }

            // আগামীকাল এখানে রিয়েল ডাটাবেজ কানেক্ট হবে
            display.innerHTML = `Searching for Passport: <b>${passport}</b>...`;
            console.log("Tracking Request for:", passport);
        }
    </script>
</body>
</html>
