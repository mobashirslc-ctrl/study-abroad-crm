<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Application Tracking</title>
    <style>
        /* আপনার বর্তমান গ্লাস-মরফিজম ডিজাইন অক্ষুণ্ণ থাকবে */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .tracking-card {
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
        }
        .tracking-input {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }
        .track-btn {
            padding: 12px 30px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .track-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="tracking-card">
        <h2>Track Your Application</h2>
        <p>Enter your details below to check real-time status</p>
        
        <input type="text" id="passportNumber" placeholder="Enter Passport Number" class="tracking-input">
        
        <br>
        <button onclick="trackStatus()" class="track-btn">Track Now</button>

        <div id="statusResult" style="margin-top: 20px; font-weight: bold; color: #333;"></div>
    </div>

    <script>
        function trackStatus() {
            const passport = document.getElementById('passportNumber').value;
            const resultDiv = document.getElementById('statusResult');

            if(passport === "") {
                alert("Please enter your Passport Number to track.");
                return;
            }

            // আগামীকাল এখানে আমরা রিয়েল ডেটা কানেকশন দেব
            resultDiv.innerHTML = "Searching for Passport: " + passport + "...";
            console.log("Tracking request sent for:", passport);
        }
    </script>
</body>
</html>
