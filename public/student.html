<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your File | SCC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b012d; /* Your Dark background */
            font-family: 'Poppins', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 30px;
        }

        .logo-box img {
            height: 50px; /* Adjust based on your logo */
        }

        h2 {
            color: #ffcc00; /* Yellow title */
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-container {
            position: relative;
            margin-bottom: 25px;
        }

        .input-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffcc00;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: #1a0b3c;
            border: 1px solid #33235d;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #ffcc00;
            color: #0b012d;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e6b800;
        }

        .footer-text {
            margin-top: 30px;
            color: #777;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-box">
            <img src="https://i.ibb.co/VWV0Vp7/scc-logo.png" alt="SCC Logo">
        </div>

        <h2>Track Your File</h2>
        <p>Enter your passport number to check your application status.</p>

        <div class="input-container">
            <i class="fa-solid fa-passport"></i>
            <input type="text" id="passportNumber" placeholder="e.g. A01234567" required>
        </div>

        <button class="btn" onclick="checkStatus()">Check Status</button>

        <div class="footer-text">
            © 2026 Gorun Ltd. | All Rights Reserved.
        </div>
    </div>

    <script>
        function checkStatus() {
            const passport = document.getElementById('passportNumber').value;
            if(!passport) {
                alert("Please enter your Passport Number");
                return;
            }
            alert("Searching for Passport: " + passport);
        }
    </script>
</body>
</html>
