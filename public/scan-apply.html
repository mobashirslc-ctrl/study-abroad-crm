<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Assessment | SCC Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #f1c40f; --white: rgba(255, 255, 255, 0.1); }
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            color: white;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%; max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }
        h2 { color: var(--gold); margin-bottom: 25px; font-weight: 600; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        input, select {
            width: 100%; padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: white;
            box-sizing: border-box; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255, 255, 255, 0.2); }
        .btn-submit {
            background: var(--gold); color: #000; border: none;
            padding: 15px; width: 100%; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4); }
        
        /* Result Card Area */
        #resultArea { display: none; margin-top: 20px; }
        .slc-promo {
            background: rgba(241, 196, 15, 0.1);
            border: 1px dashed var(--gold);
            padding: 15px; border-radius: 10px; margin-top: 15px;
        }
        #qrcode-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="glass-card" id="mainCard">
    <div id="formSection">
        <h2>Study Abroad Assessment</h2>
        <form id="assessmentForm">
            <div class="input-group">
                <input type="text" id="name" placeholder="Student Full Name" required>
            </div>
            <div class="input-group">
                <input type="text" id="phone" placeholder="Contact Number" required>
            </div>
            <div class="input-group">
                <input type="text" id="passport" placeholder="Passport Number (Optional)">
            </div>
            <div class="input-group">
                <select id="degree">
                    <option value="">Expected Degree</option>
                    <option value="Bachelor">Bachelor</option>
                    <option value="Master">Master</option>
                    <option value="Diploma">Diploma</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="country" placeholder="Expected Country">
            </div>
            <div class="input-group">
                <input type="text" id="uni" placeholder="Preferred University (If any)">
            </div>
            <div class="input-group">
                <select id="langScore" onchange="checkLanguage()">
                    <option value="">Language Proficiency</option>
                    <option value="IELTS">IELTS</option>
                    <option value="Duolingo">Duolingo</option>
                    <option value="MOI">MOI</option>
                    <option value="PREP">Preparation nibe (Need Training)</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="academic" placeholder="Last Academic Score (GPA)">
            </div>
            <button type="submit" class="btn-submit">Submit Assessment</button>
        </form>
    </div>

    <div id="resultArea">
        <h2 style="color: #2ecc71;">Application Submitted!</h2>
        <p style="font-size: 14px;">আমাদের টিম খুব দ্রুত আপনার প্রোফাইলটি যাচাই করে রেজাল্ট প্রদান করবে।</p>
        
        <div id="slcContact" class="slc-promo" style="display: none;">
            <h4 style="margin:0; color: var(--gold);">Need Language Training?</h4>
            <p style="font-size: 12px; margin: 5px 0;"><b>Name:</b> Student Language Consultant (SLC)</p>
            <p style="font-size: 12px; margin: 5px 0;"><b>Web:</b> <a href="https://slc.education/" style="color:white;">slc.education</a></p>
            <p style="font-size: 12px; margin: 5px 0;"><b>Contact:</b> +8801703-523861</p>
        </div>

        <div id="qrcode-container">
            <p style="font-size: 13px; margin-bottom: 10px; color: var(--gold);">Live Tracking QR Code:</p>
            <div id="qrcode"></div>
            <p style="font-size: 11px; margin-top: 10px; opacity: 0.7;">স্ক্যান করে আপনার ফাইল আপডেট দেখুন</p>
        </div>
    </div>
</div>

<script>
    function checkLanguage() {
        const score = document.getElementById('langScore').value;
        const slcDiv = document.getElementById('slcContact');
        slcDiv.style.display = (score === "PREP") ? "block" : "none";
    }

    document.getElementById('assessmentForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // বাটন ডিজেবল করা যাতে বারবার ক্লিক না হয়
    const submitBtn = e.target.querySelector('button');
    submitBtn.innerText = "Submitting...";
    submitBtn.disabled = true;

    const formData = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        passport: document.getElementById('passport').value,
        degree: document.getElementById('degree').value,
        country: document.getElementById('country').value,
        uni: document.getElementById('uni').value,
        lang: document.getElementById('langScore').value,
        gpa: document.getElementById('academic').value,
        refSource: new URLSearchParams(window.location.search).get('ref') || 'Direct'
    };

    try {
        // আপনার ব্যাকএন্ড রাউটটি নিশ্চিত করুন (index.js এ যা আছে)
        const res = await fetch('/api/merchant/submit-scan-lead', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        });

        const result = await res.json();

        if(res.ok) {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            
            // QR Code জেনারেট করার সেফ মেথড
            const qrContainer = document.getElementById("qrcode");
            const trackLink = `https://study-abroad-crm-nine.vercel.app/track.html?passport=${formData.passport}`;
            
            if (typeof QRCode !== "undefined") {
                new QRCode(qrContainer, {
                    text: trackLink,
                    width: 150,
                    height: 150
                });
            } else {
                // যদি লাইব্রেরি কাজ না করে তবে ইমেজ এপিআই ব্যবহার করবে
                qrContainer.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(trackLink)}" />`;
            }
        } else {
            alert("Error: " + (result.error || "Submission failed"));
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Assessment";
        }
    } catch (err) {
        console.error(err);
        alert("Network Error! সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না।");
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Assessment";
    }
};

</script>

</body>
</html>
