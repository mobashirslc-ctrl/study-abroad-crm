<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form | SLC Language Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --secondary: #2ecc71; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .form-container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 10px solid var(--primary); }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { max-width: 150px; }
        .section-title { background: #f8f9fa; padding: 10px; border-left: 4px solid var(--primary); color: var(--primary); font-weight: 600; margin: 25px 0 15px; font-size: 14px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; background: #fff; font-size: 14px; }
        .fee-display { text-align: center; background: #e8f5e9; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-weight: bold; color: #2e7d32; }
        .btn-confirm { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: 600; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-confirm:hover { background: #0d1442; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div style="font-weight: bold; color: var(--primary); font-size: 20px;">SLC LANGUAGE HUB</div>
        <p style="font-size: 12px; color: #666; margin: 5px 0;">Official Student Admission & Language Training Portal</p>
    </div>

    <div class="fee-display">Admission Fee: ৳ <span id="amount">0</span></div>

    <form id="enrollForm">
        <div class="section-title">Personal Information</div>
        <div class="grid">
            <div class="form-group">
                <label>Student Full Name</label>
                <input type="text" name="name" placeholder="As per NID/Passport" required>
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" name="phone" placeholder="017XXXXXXXX" required>
            </div>
            <div class="form-group">
                <label>Guardian Contact</label>
                <input type="tel" name="guardianPhone" placeholder="Parent/Guardian No">
            </div>
            <div class="form-group">
                <label>Occupation</label>
                <select name="occupation">
                    <option value="Student">Student</option>
                    <option value="Job Holder">Job Holder</option>
                    <option value="Business">Business</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>School/College Name</label>
            <input type="text" name="occName" placeholder="Enter Name">
        </div>

        <div class="section-title">Address Details</div>
        <div class="grid">
            <div class="form-group">
                <label>District</label>
                <select id="district" name="district" onchange="loadThanas()" required>
                    <option value="">Select District</option>
                </select>
            </div>
            <div class="form-group">
                <label>Thana/Upazila</label>
                <select id="thana" name="thana" required disabled>
                    <option value="">Select Thana</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Specific Area / Village / House No</label>
            <textarea name="address" rows="2" placeholder="Write your detail address here..."></textarea>
        </div>

        <div class="section-title">Course & Schedule</div>
        <div class="grid">
            <div class="form-group">
                <label>Course</label>
                <select id="courseSelect" name="course" required>
                    <option value="">Choose Course</option>
                </select>
            </div>
            <div class="form-group">
                <label>Batch Time</label>
                <select name="batch">
                    <option value="Morning">Morning (10:00 AM)</option>
                    <option value="Afternoon">Afternoon (03:00 PM)</option>
                    <option value="Evening">Evening (06:00 PM)</option>
                </select>
            </div>
        </div>

        <div class="section-title">Required Documents</div>
        <div class="grid">
            <div class="form-group">
                <label>Student Photo</label>
                <input type="file" name="photo" accept="image/*">
            </div>
            <div class="form-group">
                <label>NID / Birth Certificate</label>
                <input type="file" name="nid" accept="image/*">
            </div>
        </div>

        <input type="hidden" id="refSource" name="refSource" value="Direct">
        <button type="submit" class="btn-confirm">Confirm Admission</button>
    </form>
</div>

<script>
    const bdData = {
        "Dhaka": ["Dhanmondi", "Mirpur", "Uttara", "Gulshan", "Savar", "Keraniganj"],
        "Chittagong": ["Panchlaish", "Halishahar", "Hathazari", "Sitakunda"],
        "Sylhet": ["Sylhet Sadar", "Beanibazar", "Golapganj", "Sreemangal"],
        "Bogura": ["Bogra Sadar", "Sherpur", "Shajahanpur", "Gabatli"]
    };

    function initDistricts() {
        const distSelect = document.getElementById('district');
        Object.keys(bdData).sort().forEach(d => {
            let opt = document.createElement('option');
            opt.value = d; opt.text = d;
            distSelect.appendChild(opt);
        });
    }

    function loadThanas() {
        const district = document.getElementById('district').value;
        const thanaSelect = document.getElementById('thana');
        thanaSelect.innerHTML = '<option value="">Select Thana</option>';
        if (district && bdData[district]) {
            thanaSelect.disabled = false;
            bdData[district].sort().forEach(t => {
                let opt = document.createElement('option');
                opt.value = t; opt.text = t;
                thanaSelect.appendChild(opt);
            });
        } else { thanaSelect.disabled = true; }
    }

    async function loadCourses() {
        try {
            const res = await fetch('/api/courses');
            const courses = await res.json();
            const courseSelect = document.getElementById('courseSelect');
            courseSelect.innerHTML = '<option value="">Choose Course</option>';
            courses.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c.name;
                opt.text = `${c.name} - (৳${c.fee})`;
                opt.dataset.fee = c.fee;
                courseSelect.appendChild(opt);
            });
        } catch (err) { console.error(err); }
    }

    document.getElementById('courseSelect').onchange = function() {
        const selected = this.options[this.selectedIndex];
        document.getElementById('amount').innerText = selected.dataset.fee || 0;
    };

    document.getElementById('enrollForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const res = await fetch('/api/merchant/submit-scan-lead', {
                method: 'POST',
                body: formData // ফাইলসহ পাঠানোর জন্য সরাসরি FormData ব্যবহার করুন
            });
            const result = await res.json();
            if(result.success) {
                alert("Admission Successful!");
                window.location.reload();
            } else { alert("Error: " + result.error); }
        } catch (err) { alert("Server Error!"); }
    };

    window.onload = () => {
        initDistricts();
        loadCourses();
        const params = new URLSearchParams(window.location.search);
        if (params.has('ref')) document.getElementById('refSource').value = params.get('ref');
    };
</script>
</body>
</html>
