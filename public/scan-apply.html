<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form | SLC LANGUAGE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .form-container {
            background: white; max-width: 750px; margin: 0 auto;
            padding: 40px; border-top: 8px solid #1a237e;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-radius: 4px;
        }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 20px; }
        .logo-container { margin-bottom: 10px; }
        .logo-container img { max-width: 120px; height: auto; }
        .header h1 { margin: 0; font-size: 28px; color: #1a237e; letter-spacing: 1px; font-weight: 700; }
        .header p { margin: 5px 0; font-size: 14px; color: #666; }

        .section-title { background: #f8f9fa; padding: 10px; font-weight: bold; margin: 20px 0 15px; border-left: 4px solid #1a237e; font-size: 15px; color: #1a237e; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
        
        .fee-highlight { background: #e8eaf6; padding: 15px; border-radius: 4px; text-align: center; margin: 20px 0; border: 1px dashed #1a237e; }
        .fee-highlight span { font-size: 24px; font-weight: bold; color: #1a237e; }
        .file-input { background: #fafafa; border: 1px dashed #bbb; padding: 10px; cursor: pointer; }

        .btn-submit {
            background: #1a237e; color: white; border: none; padding: 18px; width: 100%;
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #0d1642; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div class="logo-container">
            <img src="logo.jpeg" alt="SLC Logo">
        </div>
        <h1>SLC LANGUAGE HUB</h1>
        <p>Official Student Admission & Language Training Portal</p>
    </div>

    <form id="admissionForm">
        <div class="section-title">Personal Information</div>
        <div class="grid">
            <div class="input-group">
                <label>Student Full Name</label>
                <input type="text" id="name" placeholder="As per NID/Passport" required>
            </div>
            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" id="phone" placeholder="017XXXXXXXX" required>
            </div>
            <div class="input-group">
                <label>Guardian Contact</label>
                <input type="text" id="guardianPhone" placeholder="Parent/Guardian No" required>
            </div>
            <div class="input-group">
                <label>Occupation</label>
                <select id="occupation" onchange="toggleOccupationDetails()">
                    <option value="Student">Student</option>
                    <option value="Job Holder">Job Holder</option>
                    <option value="Business">Business</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div id="occDetails" class="input-group">
            <label id="occLabel">School/College Name</label>
            <input type="text" id="occName" placeholder="Enter Name">
        </div>

        <div class="section-title">Address Details (Permanent/Present)</div>
        <div class="grid">
            <div class="input-group">
                <label>District</label>
                <select id="district" onchange="loadThanas()" required>
                    <option value="">Select District</option>
                </select>
            </div>
            <div class="input-group">
                <label>Thana/Upazila</label>
                <select id="thana" required disabled>
                    <option value="">Select Thana</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Specific Area / Village / House No</label>
            <textarea id="address" rows="2" placeholder="Write your detail address here..."></textarea>
        </div>

        <div class="section-title">Course & Schedule</div>
        <div class="grid">
            <div class="input-group">
                <label>Course</label>
                <select id="courseSelect" onchange="updateCourseInfo()" required>
                    <option value="">Choose Course</option>
                </select>
            </div>
            <div class="input-group">
                <label>Batch Time</label>
                <select id="batch" required>
                    <option value="Morning">Morning (10:00 AM)</option>
                    <option value="Afternoon">Afternoon (04:00 PM)</option>
                    <option value="Evening">Evening (07:00 PM)</option>
                </select>
            </div>
        </div>

        <div id="feeDisplay" class="fee-highlight" style="display:none;">
            Admission Fee: <span>৳ <span id="amount">0</span></span>
        </div>

        <div class="section-title">Required Documents</div>
        <div class="grid">
            <div class="input-group">
                <label>Student Photo</label>
                <input type="file" id="photo" accept="image/*" class="file-input" required>
            </div>
            <div class="input-group">
                <label>NID / Birth Certificate</label>
                <input type="file" id="nid" accept="image/*,application/pdf" class="file-input" required>
            </div>
        </div>

        <input type="hidden" id="refSource">
        <button type="submit" class="btn-submit">CONFIRM ADMISSION</button>
    </form>
</div>

<script>
    // --- District & Thana Data (Sample for performance, you can add more) ---
    const bdData = {
        "Dhaka": ["Dhanmondi", "Mirpur", "Uttara", "Gulshan", "Savar", "Keraniganj"],
        "Chittagong": ["Panchlaish", "Halishahar", "Hathazari", "Fatikchhari", "Sitakunda"],
        "Gazipur": ["Sreepur", "Kaliakair", "Kapasia", "Sadar"],
        "Sylhet": ["Beanibazar", "Golapganj", "Zakiganj", "Sadar"],
        "Bogura": ["Sadar", "Sherpur", "Shajahanpur", "Dhunat"],
        // এভাবেই আপনি ৬৪ জেলা এবং তাদের থানা অবজেক্টে যোগ করতে পারবেন
    };

    // জেলা লোড করা (স্বয়ংক্রিয়ভাবে ৬৪ জেলা যোগ করার ফাংশন)
    const districts = Object.keys(bdData).sort();
    const distSelect = document.getElementById('district');
    districts.forEach(d => {
        let opt = document.createElement('option');
        opt.value = d; opt.text = d;
        distSelect.appendChild(opt);
    });

    function loadThanas() {
        const district = document.getElementById('district').value;
        const thanaSelect = document.getElementById('thana');
        thanaSelect.innerHTML = '<option value="">Select Thana</option>';
        
        if (district && bdData[district]) {
            thanaSelect.disabled = false;
            bdData[district].forEach(t => {
                let opt = document.createElement('option');
                opt.value = t; opt.text = t;
                thanaSelect.appendChild(opt);
            });
        } else {
            thanaSelect.disabled = true;
        }
    }

    // --- অন্যান্য ফাংশন ---
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('refSource').value = urlParams.get('ref') || 'Direct';

    async function loadCourses() {
        const res = await fetch('/api/courses');
        const courses = await res.json();
        const select = document.getElementById('courseSelect');
        courses.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c.name; opt.text = c.name;
            opt.setAttribute('data-fee', c.fee);
            select.appendChild(opt);
        });
    }
    loadCourses();

    function updateCourseInfo() {
        const select = document.getElementById('courseSelect');
        const fee = select.options[select.selectedIndex].getAttribute('data-fee');
        if(fee) {
            document.getElementById('feeDisplay').style.display = 'block';
            document.getElementById('amount').innerText = fee;
        }
    }

    function toggleOccupationDetails() {
        const occ = document.getElementById('occupation').value;
        const label = document.getElementById('occLabel');
        label.innerText = occ === 'Student' ? "School/College Name" : (occ === 'Job Holder' ? "Company Name" : "Business/Org Name");
    }

    document.getElementById('admissionForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        // আগের ফিল্ডগুলোর সাথে নতুন অ্যাড্রেস ফিল্ডগুলো যোগ করা হলো
        formData.append('name', document.getElementById('name').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('district', document.getElementById('district').value);
        formData.append('thana', document.getElementById('thana').value);
        formData.append('address', document.getElementById('address').value);
        formData.append('course', document.getElementById('courseSelect').value);
        formData.append('fee', document.getElementById('amount').innerText);
        // ... বাকি সব ফাইল ও ডাটা আগের মতোই ...
        
        alert("Processing Admission...");
        // Fetch API call logic here
    };
</script>
</body>
</html>
