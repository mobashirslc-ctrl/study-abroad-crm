<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eligibility Check | SCC Group</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f1c40f; --dark: #1a1a2e; --deep: #0f0f1b; }
        body { background: var(--deep); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: var(--dark); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #0b0b15; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .success-box { display: none; padding: 20px; color: var(--gold); }
    </style>
</head>
<body>

<div class="card" id="formContainer">
    <img src="logo.jpeg" style="width: 70px; margin-bottom: 10px;">
    <h2>Start Your Journey</h2>
    <p style="color: #aaa; font-size: 14px;">Fill details for instant assessment.</p>
    
    <input type="text" id="sName" placeholder="Full Name" required>
    <input type="tel" id="sPhone" placeholder="Mobile Number" required>
    <input type="text" id="sPassport" placeholder="Passport Number (For Tracking)">
    <input type="text" id="sGpa" placeholder="HSC GPA / Result">
    
    <input type="hidden" id="merchantId">
    <button onclick="submitLead()">Check Eligibility</button>
</div>

<div class="card success-box" id="successBox">
    <i class="fas fa-check-circle fa-4x"></i>
    <h2>Submission Successful!</h2>
    <p style="color: white;">Our counselor will call you shortly. You can now track your file status live.</p>
    <button onclick="window.location.href='/track'" style="background: white; color: black;">Go to Tracking</button>
</div>

<script>
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        document.getElementById('merchantId').value = params.get('ref') || 'Direct';
    };

    async function submitLead() {
        const payload = {
            name: document.getElementById('sName').value,
            phone: document.getElementById('sPhone').value,
            passport: document.getElementById('sPassport').value,
            gpa: document.getElementById('sGpa').value,
            refSource: document.getElementById('merchantId').value
        };

        if(!payload.name || !payload.phone) return alert("Fill required fields!");

        const res = await fetch('/api/merchant/submit-scan-lead', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successBox').style.display = 'block';
        }
    }
</script>
</body>
</html>
