<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Enrollment | SCC Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #2ecc71; --gold: #f1c40f; }
        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .enroll-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: var(--accent); margin-bottom: 5px; }
        p { font-size: 13px; color: #bbb; margin-bottom: 25px; }
        
        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: white; outline: none; box-sizing: border-box;
        }
        
        .fee-box {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid var(--accent);
            padding: 15px; border-radius: 8px; margin-bottom: 20px;
            display: none; /* শুরুতে লুকানো থাকবে */
        }
        .fee-box span { font-size: 22px; font-weight: bold; color: var(--accent); }

        .btn-submit {
            background: var(--accent); color: white; border: none;
            padding: 15px; width: 100%; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s;
        }
        .btn-submit:hover { background: #27ae60; transform: scale(1.02); }
        
        #successMsg { display: none; }
    </style>
</head>
<body>

<div class="enroll-card">
    <div id="formArea">
        <h2>SCC Learning Hub</h2>
        <p>ভর্তি ফর্মটি নির্ভুলভাবে পূরণ করুন</p>
        
        <form id="enrollForm">
            <input type="text" id="stuName" placeholder="শিক্ষার্থীর পূর্ণ নাম" required>
            <input type="text" id="stuPhone" placeholder="মোবাইল নম্বর" required>
            
            <select id="courseSelect" onchange="updatePrice()" required>
                <option value="">কোর্স পছন্দ করুন</option>
            </select>

            <div id="feeBox" class="fee-box">
                <small style="color: #ccc;">ভর্তি ফি:</small><br>
                ৳ <span id="displayAmount">0</span>
            </div>

            <select id="batch" required>
                <option value="">ব্যাচ সময় নির্বাচন করুন</option>
                <option value="Morning">সকাল (১০টা - ১২টা)</option>
                <option value="Afternoon">বিকাল (৩টা - ৫টা)</option>
                <option value="Evening">সন্ধ্যা (৬টা - ৮টা)</option>
            </select>

            <button type="submit" class="btn-submit" id="submitBtn">ভর্তি নিশ্চিত করুন</button>
        </form>
    </div>

    <div id="successMsg">
        <h2 style="color: var(--gold);">অভিনন্দন!</h2>
        <p>আপনার ভর্তি আবেদনটি সফলভাবে গৃহীত হয়েছে। আমাদের ট্রেইনার খুব শীঘ্রই আপনার সাথে যোগাযোগ করবেন।</p>
        <button onclick="location.reload()" style="background:none; color:white; border:1px solid white; padding:10px; border-radius:5px; cursor:pointer;">আরেকটি ভর্তি করুন</button>
    </div>
</div>

<script>
    // ১. ব্যাকএন্ড থেকে ডায়নামিক কোর্স লিস্ট লোড করা
    async function fetchCourses() {
        try {
            const res = await fetch('/api/courses'); // আপনার index.js এর API
            const courses = await res.json();
            const select = document.getElementById('courseSelect');
            
            courses.forEach(course => {
                const opt = document.createElement('option');
                opt.value = course.name;
                opt.text = course.name;
                opt.setAttribute('data-fee', course.fee);
                select.appendChild(opt);
            });
        } catch (err) {
            console.error("Course load error:", err);
        }
    }
    fetchCourses();

    // ২. কোর্স সিলেক্ট করলে ফি আপডেট করা
    function updatePrice() {
        const select = document.getElementById('courseSelect');
        const selectedOption = select.options[select.selectedIndex];
        const fee = selectedOption.getAttribute('data-fee');
        const feeBox = document.getElementById('feeBox');
        
        if (fee) {
            feeBox.style.display = 'block';
            document.getElementById('displayAmount').innerText = fee;
        } else {
            feeBox.style.display = 'none';
        }
    }

    // ৩. ভর্তি ফর্ম সাবমিট করা
    document.getElementById('enrollForm').onsubmit = async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "Processing...";
        submitBtn.disabled = true;

        const refId = new URLSearchParams(window.location.search).get('ref') || 'Direct';
        
        const payload = {
            name: document.getElementById('stuName').value,
            phone: document.getElementById('stuPhone').value,
            course: document.getElementById('courseSelect').value,
            fee: document.getElementById('displayAmount').innerText,
            batch: document.getElementById('batch').value,
            refSource: refId
        };

        try {
            const res = await fetch('/api/merchant/submit-scan-lead', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                document.getElementById('formArea').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } else {
                alert("ভর্তি ব্যর্থ হয়েছে। আবার চেষ্টা করুন।");
                submitBtn.disabled = false;
                submitBtn.innerText = "ভর্তি নিশ্চিত করুন";
            }
        } catch (err) {
            alert("Network Error!");
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
