<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form | SCC Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .form-container {
            background: white; max-width: 700px; margin: 0 auto;
            padding: 40px; border-top: 8px solid #1a237e;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-radius: 4px;
        }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 30px; padding-bottom: 20px; }
        
        /* লোগোর জন্য নতুন স্টাইল */
        .logo-container { margin-bottom: 15px; }
        .logo-container img { max-width: 100px; height: auto; }
        
        .header h1 { margin: 0; font-size: 24px; color: #1a237e; letter-spacing: 1px; }
        .header p { margin: 5px 0; font-size: 14px; color: #666; }

        .section-title { background: #f8f9fa; padding: 10px; font-weight: bold; margin: 20px 0 15px; border-left: 4px solid #1a237e; font-size: 15px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        
        .fee-highlight { background: #e8eaf6; padding: 15px; border-radius: 4px; text-align: center; margin: 20px 0; border: 1px dashed #1a237e; }
        .fee-highlight span { font-size: 24px; font-weight: bold; color: #1a237e; }

        .file-input { background: #fafafa; border: 1px dashed #bbb; padding: 10px; cursor: pointer; }

        .btn-submit {
            background: #1a237e; color: white; border: none; padding: 15px; width: 100%;
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px;
        }
        .btn-submit:hover { background: #0d1642; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div class="logo-container">
            <img src="logo.jpeg" alt="SCC Group Logo">
        </div>
        
        <h1>SCC STUDENT LEARNING HUB</h1>
        <p>Authorized Admission & Language Training Center</p>
        <p style="font-size: 12px; color: #999;">Application for Admission</p>
    </div>

    <form id="admissionForm">
        <div class="section-title">Personal Information</div>
        <div class="grid">
            <div class="input-group">
                <label>Student Full Name</label>
                <input type="text" id="name" placeholder="As per NID/Passport" required>
            </div>
            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" id="phone" placeholder="017XXXXXXXX" required>
            </div>
            <div class="input-group">
                <label>Guardian Contact Number</label>
                <input type="text" id="guardianPhone" placeholder="Emergency Contact" required>
            </div>
            <div class="input-group">
                <label>Current Occupation</label>
                <select id="occupation" onchange="toggleOccupationDetails()">
                    <option value="Student">Student</option>
                    <option value="Job Holder">Job Holder</option>
                    <option value="Business">Business</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div id="occDetails" class="input-group">
            <label id="occLabel">Institute/Organization Name</label>
            <input type="text" id="occName" placeholder="Enter specific name">
        </div>

        <div class="section-title">Course & Schedule</div>
        <div class="grid">
            <div class="input-group">
                <label>Select Course</label>
                <select id="courseSelect" onchange="updateCourseInfo()" required>
                    <option value="">Choose Course</option>
                    </select>
            </div>
            <div class="input-group">
                <label>Preferred Batch</label>
                <select id="batch" required>
                    <option value="Morning">Morning (10 AM)</option>
                    <option value="Afternoon">Afternoon (4 PM)</option>
                    <option value="Evening">Evening (7 PM)</option>
                </select>
            </div>
        </div>

        <div id="feeDisplay" class="fee-highlight" style="display:none;">
            Total Admission Fee: <span>৳ <span id="amount">0</span></span>
        </div>

        <div class="section-title">Document Upload (Upload clear images/PDF)</div>
        <div class="grid">
            <div class="input-group">
                <label>Student Photo (Passport Size)</label>
                <input type="file" id="photo" accept="image/*" class="file-input" required>
            </div>
            <div class="input-group">
                <label>Student NID/Birth Certificate (PDF/Image)</label>
                <input type="file" id="nid" accept="image/*,application/pdf" class="file-input" required>
            </div>
        </div>

        <input type="hidden" id="refSource">
        <button type="submit" class="btn-submit">Submit Official Admission</button>
    </form>
</div>

<script>
    // জাভাস্ক্রিপ্ট আগের মতোই থাকবে
    const ref = new URLSearchParams(window.location.search).get('ref') || 'Direct';
    document.getElementById('refSource').value = ref;

    async function loadCourses() {
        const res = await fetch('/api/courses');
        const courses = await res.json();
        const select = document.getElementById('courseSelect');
        courses.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c.name;
            opt.text = c.name;
            opt.setAttribute('data-fee', c.fee);
            select.appendChild(opt);
        });
    }
    loadCourses();

    function updateCourseInfo() {
        const select = document.getElementById('courseSelect');
        const fee = select.options[select.selectedIndex].getAttribute('data-fee');
        if(fee) {
            document.getElementById('feeDisplay').style.display = 'block';
            document.getElementById('amount').innerText = fee;
        }
    }

    function toggleOccupationDetails() {
        const occ = document.getElementById('occupation').value;
        const label = document.getElementById('occLabel');
        if(occ === 'Student') label.innerText = "School/College Name";
        else if(occ === 'Job Holder') label.innerText = "Company Name";
        else if(occ === 'Business') label.innerText = "Business Name";
        else label.innerText = "Details";
    }

    document.getElementById('admissionForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('name', document.getElementById('name').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('guardianPhone', document.getElementById('guardianPhone').value);
        formData.append('occupation', document.getElementById('occupation').value);
        formData.append('occName', document.getElementById('occName').value);
        formData.append('course', document.getElementById('courseSelect').value);
        formData.append('fee', document.getElementById('amount').innerText);
        formData.append('batch', document.getElementById('batch').value);
        formData.append('refSource', document.getElementById('refSource').value);
        
        formData.append('photo', document.getElementById('photo').files[0]);
        formData.append('nid', document.getElementById('nid').files[0]);

        const res = await fetch('/api/merchant/submit-scan-lead', {
            method: 'POST',
            body: formData
        });

        if(res.ok) alert("Official Admission Submitted Successfully!");
    };
</script>

</body>
</html>
