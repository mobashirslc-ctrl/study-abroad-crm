<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking - IHP CRM</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4b0082 0%, #6a0dad 100%);
            height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px; width: 90%; max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        img { width: 130px; margin-bottom: 20px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3)); }
        h2 { margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }
        .search-group { display: flex; flex-direction: column; gap: 15px; }
        input {
            padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1); color: white; font-size: 16px; outline: none;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.6); }
        button {
            padding: 15px; border-radius: 10px; border: none;
            background: linear-gradient(to right, #2ecc71, #27ae60);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        #result { margin-top: 25px; text-align: left; background: rgba(0, 0, 0, 0.2); border-radius: 12px; overflow: hidden; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .label { font-weight: bold; color: #2ecc71; font-size: 13px; text-transform: uppercase; }
        .val { font-size: 14px; text-align: right; }
        footer { position: absolute; bottom: 20px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="glass-box">
        <img src="logo.jpeg" alt="IHP Logo">
        <h2>Track Application</h2>
        <p>Enter your Passport Number</p>
        <div class="search-group">
            <input type="text" id="passportInput" placeholder="Ex: A12345678">
            <button id="trackBtn">Track Status Now</button>
        </div>
        <div id="result"></div>
    </div>
    <footer>&copy; 2026 All Rights Reserved GORUN LTD.</footer>
    <script type="module" src="tracking-logic.js"></script>
</body>
</html>
