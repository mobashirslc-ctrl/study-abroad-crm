<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0c24; 
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- 🎨 PURPLE GLASSMORPHISM --- */
        .container {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(162, 155, 254, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            width: 380px;
            text-align: center;
        }

        .logo-box img { 
            max-width: 140px; 
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(162, 155, 254, 0.5));
        }

        h2 { font-size: 14px; letter-spacing: 2px; color: #a29bfe; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #252545;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- ✈️ PLANE ANIMATION --- */
        #result {
            display: none;
            margin-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .track-header {
            position: relative;
            height: 35px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .plane-anim {
            position: absolute;
            left: -50px;
            color: #3498db;
            font-size: 22px;
            animation: flyAcross 4s infinite linear;
        }

        @keyframes flyAcross {
            0% { left: -10%; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { left: 110%; opacity: 0; }
        }

        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;}
        .label { color: #a29bfe; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="SSC Logo">
        </div>
        <h2>LIVE TRACKER</h2>
        <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        <button id="trackBtn">Track Status</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
                <div style="font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 10px;">TRACKING PROGRESS</div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>

</body>
</html>
