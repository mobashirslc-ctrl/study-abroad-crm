<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track File</title>
    <style>
        body { background: #0d0014; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .track-card {
            width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
        }
        .input-track { border: 1px solid #2ecc71; background: transparent; color: white; padding: 12px; border-radius: 8px; width: 100%; margin: 20px 0; }
        .btn-track { background: #2ecc71; color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="track-card">
        <h2 style="color: #2ecc71;">Track Your File</h2>
        <input type="text" class="input-track" placeholder="Passport Number...">
        <button class="btn-track">CHECK STATUS</button>
    </div>
</body>
</html>
