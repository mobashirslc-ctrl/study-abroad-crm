<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 ADVANCED PURPLE GLASSMORPHISM (Based on 1089.jpg) --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0d0c24); 
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(26, 26, 46, 0.85); /* Deep Glass Effect */
            backdrop-filter: blur(15px);
            padding: 40px; /* Boro size */
            border-radius: 28px;
            border: 1px solid rgba(162, 155, 254, 0.3); /* Purple Glow Border */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 450px; /* Aro attractive and boro */
            text-align: center;
        }

        /* SSC Logo Section */
        .logo-box { margin-bottom: 20px; }
        .logo-box img { 
            max-width: 160px; 
            height: auto;
            filter: drop-shadow(0 0 12px rgba(162, 155, 254, 0.6));
        }

        h2 { 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #a29bfe; /* Purple text */
            margin-bottom: 30px; 
        }

        /* Attractive Inputs */
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(37, 37, 69, 0.8);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #a29bfe;
            background: rgba(48, 48, 88, 0.9);
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2ecc71, #27ae60); /* Green button */
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        /* --- ✈️ PLANE ANIMATION (Restored 1069.jpg) --- */
        #result {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.6s ease;
        }

        .track-header {
            position: relative;
            height: 40px;
            overflow: hidden;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(162, 155, 254, 0.2);
        }

        .plane-anim {
            position: absolute;
            left: -50px;
            color: #3498db; /* Plane Blue Color */
            font-size: 24px;
            animation: flyAcross 4s infinite linear;
        }

        @keyframes flyAcross {
            0% { left: -15%; opacity: 0; transform: rotate(0deg); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 115%; opacity: 0; transform: rotate(5deg); }
        }

        /* Result Data Styling */
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
            margin: 12px 0; 
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .label { color: #a29bfe; font-weight: 500; }
        .val { font-weight: bold; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="SSC Logo">
        </div>
        
        <h2>Live Tracker</h2>
        
        <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        <button id="trackBtn">Track Status</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>

</body>
</html>
