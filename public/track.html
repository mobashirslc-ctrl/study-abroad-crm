<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/releases/v6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 EXACT THEME RESTORATION (From 1089.jpg) --- */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0d0c24; 
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* prevents scrollbars on mobile */
        }

        .container {
            background-color: #1a1a2e; 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative; /* for absolute positioning inside */
        }

        .logo-box { margin-bottom: 5px; }
        .logo-box img { max-width: 140px; height: auto; }

        h2 {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
        }

        /* Input styling as per 1089.jpg */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: #252545;
            color: white;
            box-sizing: border-box;
            font-size: 13px;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }

        /* Green Button as per 1089.jpg */
        button {
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        button:hover { background-color: #27ae60; }

        /* --- ✈️ PLANE ANIMATION SECTION --- */
        #result {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.6s ease;
            position: relative; /* needed for absolute positioning within results */
        }

        .track-header {
            position: relative;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 25px;
            text-align: center;
            height: 30px;
            overflow: hidden; /* Hide the plane until it moves in */
        }

        .plane-container {
            position: absolute;
            left: -50px;
            animation: movePlane 4s infinite linear;
            color: #3498db;
            font-size: 20px;
            transform-origin: center; /* helps with rotation smoothness */
        }

        @keyframes movePlane {
            0% { left: -10%; opacity: 0; transform: rotate(0deg); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 110%; opacity: 0; transform: rotate(5deg); }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .label { color: rgba(255,255,255,0.5); }
        .val { font-weight: bold; color: #fff; }

        .status-box {
            margin: 15px 0;
            padding: 15px;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
            border-radius: 12px;
        }
        .estimate-box {
            padding: 12px;
            background: rgba(241, 196, 15, 0.1);
            border-left: 4px solid #f1c40f;
            border-radius: 4px;
            text-align: left;
            margin-top: 10px;
        }

        /* Loading indicator styling */
        #loading {
            display: none;
            font-size: 14px;
            color: #a29bfe; /* Purple */
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Company Logo">
        </div>
        <h2>Live Tracker</h2>
        <input type="text" id="passportInput" placeholder="Enter Passport Number (e.g. A690234)">
        <button id="trackBtn">Track Status</button>
        <div id="loading"><i class="fas fa-spinner fa-spin"></i> Checking Database...</div>
        <div id="result">
            <div class="track-header">
                <div class="plane-container"><i class="fas fa-plane"></i></div>
                <span>LIVE PROGRESS</span>
            </div>
            <div id="data-content"></div>
        </div>
    </div>
    <script type="module" src="tracking-logic.js"></script>
</body>
</html>
