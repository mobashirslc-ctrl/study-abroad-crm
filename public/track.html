<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 DEEP PURPLE GLASSMORPHISM (Reference 1089.jpg) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #090919; /* Ekdom dark background */
            background-image: radial-gradient(circle at 20% 20%, rgba(108, 92, 231, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(108, 92, 231, 0.1) 0%, transparent 40%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- 📏 BIGGER & MORE ATTRACTIVE LAYOUT --- */
        .container {
            background: rgba(30, 30, 60, 0.7); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 60px 45px; /* Size aro boro kora hoyeche */
            border-radius: 35px;
            border: 2px solid rgba(162, 155, 254, 0.5); /* Strong Purple Glow */
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.9), 
                        inset 0 0 30px rgba(162, 155, 254, 0.1);
            width: 100%;
            max-width: 550px; /* Layout boro kora hoyeche */
            text-align: center;
        }

        /* --- 🖼️ LOGO FIX --- */
        .logo-box {
            margin-bottom: 30px;
            min-height: 80px; /* Logo na thakle-o jayga dhore rakhbe */
        }
        .logo-box img { 
            width: 180px; /* Boro logo */
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 15px rgba(162, 155, 254, 0.8));
        }

        h2 { 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            color: #a29bfe; /* Vivid Purple */
            margin-bottom: 40px;
            font-weight: bold;
        }

        /* --- ⌨️ LARGE PURPLE INPUTS --- */
        input {
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 18px;
            border: 1px solid rgba(162, 155, 254, 0.4);
            background: rgba(15, 15, 35, 0.9);
            color: white;
            box-sizing: border-box;
            font-size: 18px; /* Boro font */
            transition: 0.3s;
            text-align: center;
        }
        input:focus {
            border-color: #a29bfe;
            box-shadow: 0 0 25px rgba(162, 155, 254, 0.4);
            outline: none;
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #2ecc71, #27ae60); /* Green */
            color: white;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 12px 25px rgba(46, 204, 113, 0.4);
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(46, 204, 113, 0.5); }

        /* --- ✈️ PLANE ANIMATION --- */
        #result {
            display: none;
            margin-top: 45px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            border: 1px solid rgba(162, 155, 254, 0.2);
        }

        .track-header {
            position: relative;
            height: 60px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .plane-anim {
            position: absolute;
            left: -80px;
            color: #3498db; 
            font-size: 35px; /* Boro biman */
            animation: flyPath 4s infinite linear;
        }

        @keyframes flyPath {
            0% { left: -20%; opacity: 0; transform: translateY(0); }
            15% { opacity: 1; }
            50% { transform: translateY(-15px) rotate(5deg); }
            85% { opacity: 1; }
            100% { left: 120%; opacity: 0; }
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 16px; 
            margin: 18px 0; 
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(162, 155, 254, 0.1);
        }
        .label { color: #a29bfe; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="SSC Logo">
        </div>
        
        <h2>Live Tracker</h2>
        
        <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        <button id="trackBtn">Track My Status</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>

</body>
</html>
