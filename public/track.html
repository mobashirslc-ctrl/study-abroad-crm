<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 DEEP PURPLE PREMIUM THEME --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #090919; /* Very dark purple/black background */
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #090919 70%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- 📏 EXTRA LARGE LAYOUT --- */
        .container {
            background: rgba(25, 25, 50, 0.8); /* Deep Glass Effect */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 50px; /* Maximum padding for a large look */
            border-radius: 40px;
            border: 2px solid rgba(162, 155, 254, 0.5); /* Bright Purple Border */
            box-shadow: 0 25px 100px rgba(0, 0, 0, 0.9);
            width: 100%;
            max-width: 600px; /* Increased width for a bigger appearance */
            text-align: center;
            box-sizing: border-box;
        }

        /* --- 🖼️ LOGO FIX --- */
        .logo-box {
            margin-bottom: 30px;
        }
        .logo-box img { 
            width: 220px; /* Large Logo size */
            height: auto;
            display: block;
            margin: 0 auto;
            /* White background often helps jpeg logos look better on dark themes */
            background: white; 
            padding: 10px;
            border-radius: 15px;
            filter: drop-shadow(0 0 15px rgba(162, 155, 254, 0.6));
        }

        h2 { 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            color: #a29bfe; /* Vivid Purple */
            margin-bottom: 40px;
            font-weight: 800;
        }

        /* --- ⌨️ BIGGER PURPLE INPUTS --- */
        input {
            width: 100%;
            padding: 22px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: 1px solid rgba(162, 155, 254, 0.4);
            background: rgba(15, 15, 35, 0.9);
            color: white;
            box-sizing: border-box;
            font-size: 20px; /* Large font for readability */
            transition: 0.3s;
            text-align: center;
        }
        input:focus {
            border-color: #a29bfe;
            box-shadow: 0 0 30px rgba(162, 155, 254, 0.3);
            outline: none;
        }

        button {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #2ecc71, #27ae60); /* Green button */
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.4);
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.5);
        }

        /* --- ✈️ PLANE ANIMATION --- */
        #result {
            display: none;
            margin-top: 50px;
            padding: 35px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(162, 155, 254, 0.2);
        }

        .track-header {
            position: relative;
            height: 70px;
            overflow: hidden;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(162, 155, 254, 0.2);
        }

        .plane-anim {
            position: absolute;
            left: -100px;
            color: #3498db; 
            font-size: 40px; /* Larger Plane */
            animation: flyAcross 4s infinite linear;
        }

        @keyframes flyAcross {
            0% { left: -25%; opacity: 0; transform: translateY(0); }
            15% { opacity: 1; }
            50% { transform: translateY(-15px) rotate(5deg); }
            85% { opacity: 1; }
            100% { left: 125%; opacity: 0; }
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 18px; 
            margin: 20px 0; 
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .label { color: #a29bfe; font-weight: 600; }
        .val { font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.jpeg" alt="Student Career Consultancy">
        </div>
        
        <h2>Live Tracker</h2>
        
        <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        <button id="trackBtn">Track Status Now</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>

</body>
</html>
