<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Application | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-green: #2ecc71; }
        body {
            background: #0d0014;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .track-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .search-box {
            display: flex;
            margin-top: 30px;
            border: 1px solid var(--brand-green);
            border-radius: 10px;
            overflow: hidden;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px;
            color: #fff;
            outline: none;
        }

        .search-box button {
            background: var(--brand-green);
            border: none;
            padding: 0 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .step-active { color: var(--brand-green) !important; font-weight: bold; }
        .bullet-active { background: var(--brand-green) !important; box-shadow: 0 0 10px var(--brand-green); }
    </style>
</head>
<body>
    <div class="track-card">
        <h2 style="color: var(--brand-green);">Track Application</h2>
        <p>Enter your Passport Number to see live status.</p>
        
        <div class="search-box">
            <input type="text" placeholder="Enter Passport No...">
            <button><i class="fas fa-search"></i> Search</button>
        </div>

        <div style="margin-top: 40px; text-align: left;">
            <div style="margin-bottom: 20px;" class="step-active">
                <span style="display:inline-block; width:12px; height:12px; border-radius:50%;" class="bullet-active"></span>
                File Received & Verified
            </div>
            <div style="opacity: 0.4;">
                <span style="display:inline-block; width:12px; height:12px; border-radius:50%; background: #555;"></span>
                University Assessment
            </div>
        </div>
    </div>
</body>
</html>
