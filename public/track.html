<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking - IHP CRM</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4b0082 0%, #6a0dad 100%);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px; width: 90%; max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center; margin-bottom: 50px;
        }
        img { width: 110px; margin-bottom: 15px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3)); }
        h2 { margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }
        
        .search-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; padding: 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1); color: white; font-size: 16px; outline: none;
        }
        button {
            padding: 15px 25px; border-radius: 10px; border: none;
            background: linear-gradient(to right, #2ecc71, #27ae60);
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }

        /* --- Stepper UI --- */
        .stepper {
            display: flex; justify-content: space-between; margin: 30px 0;
            position: relative;
        }
        .step { position: relative; z-index: 2; text-align: center; flex: 1; }
        .circle {
            width: 35px; height: 35px; background: rgba(255,255,255,0.2);
            border-radius: 50%; margin: 0 auto 8px; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.1); transition: 0.4s;
        }
        .step-label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }
        .step.active .circle { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; border-color: #fff; }
        .step.active .step-label { opacity: 1; font-weight: bold; }
        
        .line {
            position: absolute; top: 17px; left: 10%; right: 10%;
            height: 2px; background: rgba(255,255,255,0.1); z-index: 1;
        }

        #result { margin-top: 25px; background: rgba(0, 0, 0, 0.3); border-radius: 12px; overflow: hidden; display: none;}
        .info-card { padding: 20px; text-align: left; border-top: 3px solid #2ecc71; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .label { color: #2ecc71; font-weight: 600; }
        
        footer { position: fixed; bottom: 20px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="glass-box">
        <img src="logo.jpeg" alt="IHP Logo">
        <h2>Live Tracker</h2>
        <p>Check your application progress in real-time.</p>
        
        <div class="search-group">
            <input type="text" id="passportInput" placeholder="Enter Passport Number">
            <button id="trackBtn">Track</button>
        </div>

        <div id="result">
            <div class="stepper">
                <div class="line"></div>
                <div class="step" id="step-submitted">
                    <div class="circle">1</div>
                    <div class="step-label">Submitted</div>
                </div>
                <div class="step" id="step-compliance">
                    <div class="circle">2</div>
                    <div class="step-label">Compliance</div>
                </div>
                <div class="step" id="step-university">
                    <div class="circle">3</div>
                    <div class="step-label">Processing</div>
                </div>
                <div class="step" id="step-outcome">
                    <div class="circle">4</div>
                    <div class="step-label">Outcome</div>
                </div>
            </div>

            <div id="data-content" class="info-card"></div>
        </div>
    </div>
    <footer>&copy; 2026 GORUN LTD | IHP Processing Hub</footer>
    <script type="module" src="tracking-logic.js"></script>
</body>
</html>
