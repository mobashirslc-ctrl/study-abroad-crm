<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 PREMIUM PURPLE THEME (Reference 1089.jpg) --- */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, #0d0c24); 
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Aro boro layout */
        .container {
            background: rgba(30, 30, 60, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px; /* Boro padding */
            border-radius: 32px;
            border: 1px solid rgba(162, 155, 254, 0.4); /* Purple Glow */
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(162, 155, 254, 0.1);
            width: 100%;
            max-width: 500px; /* Maximum attraction size */
            text-align: center;
            animation: containerEntry 0.8s ease-out;
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Logo add kora hoyeche */
        .logo-box {
            margin-bottom: 25px;
        }
        .logo-box img { 
            max-width: 180px; /* Aro boro logo */
            height: auto;
            filter: drop-shadow(0 0 15px rgba(162, 155, 254, 0.7));
        }

        h2 { 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: #a29bfe; 
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* Large Purple Inputs */
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid rgba(162, 155, 254, 0.3);
            background: rgba(20, 20, 40, 0.8);
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.4s;
            text-align: center;
        }
        input:focus {
            border-color: #a29bfe;
            background: rgba(30, 30, 60, 1);
            box-shadow: 0 0 20px rgba(162, 155, 254, 0.3);
            outline: none;
        }

        /* Green Tracker Button */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: 0.3s;
        }
        button:active { transform: scale(0.98); }

        /* --- ✈️ ADVANCED PLANE ANIMATION (Reference 1069.jpg) --- */
        #result {
            display: none;
            margin-top: 40px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            position: relative;
        }

        .track-header {
            position: relative;
            height: 50px;
            overflow: hidden;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(162, 155, 254, 0.3);
        }

        .plane-anim {
            position: absolute;
            left: -60px;
            color: #3498db; /* Blue Plane */
            font-size: 28px;
            animation: flyPath 4s infinite linear;
        }

        @keyframes flyPath {
            0% { left: -20%; opacity: 0; transform: translateY(0) rotate(0deg); }
            20% { opacity: 1; }
            50% { transform: translateY(-10px) rotate(5deg); }
            80% { opacity: 1; }
            100% { left: 120%; opacity: 0; transform: translateY(0) rotate(0deg); }
        }

        /* Status & Data styling */
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 15px; 
            margin: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        .label { color: #a29bfe; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="SSC Logo">
        </div>
        
        <h2>Live Tracker</h2>
        
        <div class="input-group">
            <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        </div>
        <button id="trackBtn">Track Status Now</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>

</body>
</html>
