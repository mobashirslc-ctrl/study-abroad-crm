<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Application | Student Career Consultancy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b012d;
            font-family: 'Poppins', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .logo-box {
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-box img {
            height: 45px;
            display: block;
        }

        h2 {
            color: #ffcc00;
            margin-bottom: 8px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .desc {
            color: #bdc3c7;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        .input-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffcc00;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 55px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #ffcc00;
            color: #0b012d;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        #resultArea {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffcc00;
            font-size: 14px;
            display: none;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-text {
            margin-top: 30px;
            color: #555;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-box">
            <img src="logo.jpeg" alt="SCC Logo">
        </div>

        <h2>Track Your File</h2>
        <p class="desc">Enter your <b>Passport Number</b> to check status.</p>

        <div class="input-container">
            <i class="fa-solid fa-passport"></i>
            <input type="text" id="passportNumber" placeholder="Ex: A01234567" required>
        </div>

        <button class="btn" onclick="checkStatus()">Check Status</button>

        <div id="resultArea"></div>

        <div class="footer-text">
            © 2026 Gorun Ltd. | Secure System
        </div>
    </div>

    <script>
        function checkStatus() {
            const passport = document.getElementById('passportNumber').value.trim();
            const resultArea = document.getElementById('resultArea');

            if(!passport) {
                alert("Please enter your Passport Number");
                return;
            }

            resultArea.style.display = "block";
            resultArea.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Checking Database for <b>${passport}</b>...`;
            
            setTimeout(() => {
                resultArea.innerHTML = `
                    <div style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 5px;">
                        <i class="fa-solid fa-circle-info"></i> <b>Status:</b> No Record Found
                    </div>
                    <span style="font-size: 12px; color: #bdc3c7;">If you recently submitted, please wait 24-48 hours for data update.</span>
                `;
            }, 1500);
        }
    </script>
</body>
</html>
