<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 DEEP PURPLE PREMIUM THEME --- */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #090919;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #090919 70%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(25, 25, 50, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 40px;
            border: 2px solid rgba(162, 155, 254, 0.5);
            box-shadow: 0 25px 100px rgba(0, 0, 0, 0.9);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .logo-box img { 
            width: 180px; 
            background: white; 
            padding: 10px; 
            border-radius: 15px;
            margin-bottom: 20px;
        }

        h2 { 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: #a29bfe; 
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 1px solid rgba(162, 155, 254, 0.4);
            background: rgba(15, 15, 35, 0.9);
            color: white;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            border: 1px solid rgba(162, 155, 254, 0.2);
        }

        /* Plane Animation */
        .track-header { position: relative; height: 50px; overflow: hidden; margin-bottom: 15px; }
        .plane-anim {
            position: absolute;
            left: -100px;
            color: #3498db; 
            font-size: 30px;
            animation: flyAcross 3s infinite linear;
        }
        @keyframes flyAcross {
            0% { left: -20%; opacity: 0; }
            50% { opacity: 1; transform: translateY(-5px); }
            100% { left: 120%; opacity: 0; }
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 15px; 
            margin: 12px 0; 
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .label { color: #a29bfe; }
        .val { font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.jpeg" alt="SSC Logo">
        </div>
        
        <h2>Live Tracker</h2>
        
        <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        <button id="trackBtn">Track Status Now</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script>
        const passportInput = document.getElementById('passportInput');
        const resultDiv = document.getElementById('result');
        const dataContent = document.getElementById('data-content');
        const trackBtn = document.getElementById('trackBtn');

        trackBtn.addEventListener('click', async () => {
            const inputVal = passportInput.value.trim().toUpperCase();
            if (!inputVal) { 
                alert("Please enter a Passport Number!"); 
                return; 
            }

            // UI Reset
            resultDiv.style.display = "block";
            dataContent.innerHTML = "<p style='text-align:center;'>Searching database...</p>";
            trackBtn.disabled = true;
            trackBtn.innerText = "Searching...";

            try {
                // API কল (আপনার ব্যাকএন্ড রুট অনুযায়ী)
                const response = await fetch(`/api/applications?passportNo=${inputVal}`);
                
                if (!response.ok) throw new Error("Server connection error");
                
                const apps = await response.json();

                // ডেটা ফিল্টার করা
                let appData = null;
                if (Array.isArray(apps)) {
                    appData = apps.find(app => app.passportNo.toUpperCase() === inputVal);
                } else if (apps && apps.passportNo) {
                    appData = apps;
                }

                if (!appData) {
                    dataContent.innerHTML = "<div style='color:#ff4d4d; padding:10px;'>❌ No Record Found.</div>";
                } else {
                    const rawStatus = (appData.status || 'PENDING').toUpperCase();
                    const statusColor = (rawStatus === 'REJECTED' || rawStatus === 'CANCELLED') ? '#ff4d4d' : '#2ecc71';

                    dataContent.innerHTML = `
                        <div style="text-align: left;">
                            <div class="info-row"><span class="label">STUDENT</span> <span class="val">${appData.studentName || 'N/A'}</span></div>
                            <div class="info-row"><span class="label">PASSPORT</span> <span class="val">${appData.passportNo}</span></div>
                        </div>
                        
                        <div style="margin-top:20px; text-align:center; padding:15px; background:rgba(255,255,255,0.03); border:1px solid ${statusColor}; border-radius:20px;">
                            <div style="font-size:10px; color:${statusColor}; font-weight:bold; letter-spacing:2px;">LIVE STATUS</div>
                            <div style="font-size:22px; font-weight:900; color:${statusColor}; margin-top:5px;">${rawStatus}</div>
                        </div>

                        <div style="margin-top: 15px; padding: 12px; background: rgba(52, 152, 219, 0.1); border: 1px solid #3498db; border-radius: 12px; text-align: center;">
                            <div style="font-size: 9px; color: #3498db; font-weight: bold;">UNIVERSITY</div>
                            <div style="font-size: 13px; font-weight: bold; color: #fff; margin-top: 4px;">${appData.university || 'Processing...'}</div>
                        </div>
                    `;
                }
            } catch (e) {
                dataContent.innerHTML = "<div style='color:#ff4d4d;'>❌ Error: Could not connect to server.</div>";
            } finally {
                trackBtn.disabled = false;
                trackBtn.innerText = "Track Status Now";
            }
        });
    </script>
</body>
</html>
