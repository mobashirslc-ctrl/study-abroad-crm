<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/releases/v6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 EXACT THEME RESTORATION (From 1087.jpg) --- */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0d0c24; /* Original background */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1a1a2e; /* Original dark bluish card */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Company Logo styling as per 1087.jpg */
        .logo-box { margin-bottom: 5px; }
        .logo-box img { max-width: 140px; height: auto; }

        h2 {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
        }

        /* Input styling as per 1087.jpg */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: #252545;
            color: white;
            box-sizing: border-box;
            font-size: 13px;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }

        /* Green Button as per 1087.jpg */
        button {
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        button:hover { background-color: #27ae60; }

        /* --- ✈️ PLANE ANIMATION SECTION --- */
        #result {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.6s ease;
        }

        .track-header {
            position: relative;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
            text-align: center;
            height: 30px;
        }

        .plane-container {
            position: absolute;
            left: 0;
            animation: movePlane 4s infinite linear;
            color: #3498db;
            font-size: 20px;
        }

        @keyframes movePlane {
            0% { left: -10%; transform: rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100%; transform: rotate(5deg); opacity: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Data row styling */
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .label { color: rgba(255,255,255,0.5); }
        .val { font-weight: bold; color: #fff; }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.png" alt="Company Logo"> </div>
        
        <h2>Live Tracker</h2>
        
        <input type="text" id="passportInput" placeholder="Enter Passport Number (e.g. A690234)">
        <button id="trackBtn">Track Status</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-container">
                    <i class="fas fa-plane"></i>
                </div>
                <span>LIVE PROGRESS</span>
            </div>
            
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>
</body>
</html>
