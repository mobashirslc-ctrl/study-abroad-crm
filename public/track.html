<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Application | ASG Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand-green: #2ecc71; }
        
        body {
            background: radial-gradient(circle at center, #2c003e, #12001a);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .track-box {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .search-area {
            display: flex;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid var(--brand-green);
            border-radius: 15px;
            margin-top: 35px;
            overflow: hidden;
        }

        .search-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .search-area button {
            background: var(--brand-green);
            border: none;
            padding: 0 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .timeline {
            margin-top: 40px;
            text-align: left;
        }

        .timeline-item {
            position: relative;
            padding-left: 35px;
            margin-bottom: 25px;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }

        .timeline-item.completed {
            border-left: 2px solid var(--brand-green);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #444;
        }

        .timeline-item.completed::before {
            background: var(--brand-green);
            box-shadow: 0 0 12px var(--brand-green);
        }

        .status-label { font-weight: 600; font-size: 15px; }
        .completed .status-label { color: var(--brand-green); }
    </style>
</head>
<body>
    <div class="track-box">
        <h2 style="margin: 0; letter-spacing: 1px;">TRACK YOUR FILE</h2>
        <p style="color: rgba(255,255,255,0.6); margin-top: 10px;">Instant updates via Passport Number</p>

        <div class="search-area">
            <input type="text" placeholder="Enter Passport No (e.g. A0123...)">
            <button><i class="fas fa-search"></i> Search</button>
        </div>

        <div class="timeline">
            <div class="timeline-item completed">
                <div class="status-label">Application Received</div>
                <small style="color: rgba(255,255,255,0.5);">Verified by Compliance Team</small>
            </div>
            <div class="timeline-item">
                <div class="status-label">University Assessment</div>
                <small style="color: rgba(255,255,255,0.5);">Pending review from UK/USA/Canada</small>
            </div>
        </div>
    </div>
</body>
</html>
