<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/releases/v6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0c29; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a2e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; background: #252545; color: white; box-sizing: border-box; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* --- ✈️ PLANE ANIMATION CSS --- */
        #result { margin-top: 25px; display: none; position: relative; animation: fadeInUp 0.5s ease; }
        .track-header { position: relative; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; }
        .track-icon { font-size: 20px; color: #3498db; position: absolute; left: 15px; animation: planeFly 3s infinite linear; }
        
        @keyframes planeFly {
            0% { transform: translateX(0px) translateY(0px) rotate(0deg); }
            25% { transform: translateX(10px) translateY(-2px) rotate(5deg); }
            75% { transform: translateX(-10px) translateY(2px) rotate(-5deg); }
            100% { transform: translateX(0px) translateY(0px) rotate(0deg); }
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .val { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Logo" style="width: 150px; margin-bottom: 10px;">
        <h2>Live Tracker</h2>
        <input type="text" id="passportInput" placeholder="Enter Passport Number (e.g. A690234)">
        <button id="trackBtn">Track Status</button>

        <div id="result">
            <div class="track-header">
                <i class="fas fa-plane-departure track-icon"></i>
                LIVE APPLICATION STATUS
            </div>
            <div id="data-content"></div>
        </div>
    </div>
    <script type="module" src="tracking-logic.js"></script>
</body>
</html>
