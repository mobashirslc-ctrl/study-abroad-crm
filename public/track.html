<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Live Application Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 🎨 DEEP PURPLE GLASS THEME (Reference 1089.jpg) --- */
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #090919; 
            background-image: radial-gradient(circle at 10% 10%, #1e1b4b 0%, transparent 50%),
                              radial-gradient(circle at 90% 90%, #2d1b4b 0%, transparent 50%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- 📏 BIGGER LAYOUT --- */
        .container {
            background: rgba(25, 25, 50, 0.75); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px; 
            border-radius: 35px;
            border: 2px solid rgba(162, 155, 254, 0.4); /* Glow Purple Border */
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 500px; /* Boro and attractive size */
            text-align: center;
        }

        /* --- 🖼️ LOGO INTEGRATION (logo.jpeg) --- */
        .logo-box {
            margin-bottom: 30px;
        }
        .logo-box img { 
            width: 180px; /* Boro logo size */
            height: auto;
            display: block;
            margin: 0 auto;
            filter: drop-shadow(0 0 15px rgba(162, 155, 254, 0.7));
        }

        h2 { 
            font-size: 15px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: #a29bfe; 
            margin-bottom: 35px;
            font-weight: bold;
        }

        /* Large Inputs */
        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 1px solid rgba(162, 155, 254, 0.3);
            background: rgba(15, 15, 35, 0.9);
            color: white;
            box-sizing: border-box;
            font-size: 17px;
            transition: 0.3s;
            text-align: center;
        }
        input:focus {
            border-color: #a29bfe;
            box-shadow: 0 0 20px rgba(162, 155, 254, 0.3);
            outline: none;
        }

        /* Green Tracker Button */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }

        /* --- ✈️ BIMAN (PLANE) FLYING ANIMATION --- */
        #result {
            display: none;
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            position: relative;
        }

        .track-header {
            position: relative;
            height: 50px;
            overflow: hidden;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(162, 155, 254, 0.2);
        }

        .plane-anim {
            position: absolute;
            left: -60px;
            color: #3498db; /* Blue color biman */
            font-size: 30px;
            animation: flyAcross 4s infinite linear;
        }

        @keyframes flyAcross {
            0% { left: -20%; opacity: 0; transform: translateY(0); }
            15% { opacity: 1; }
            50% { transform: translateY(-10px) rotate(5deg); }
            85% { opacity: 1; }
            100% { left: 120%; opacity: 0; }
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 15px; 
            margin: 15px 0; 
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .label { color: #a29bfe; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logo.jpeg" alt="SSC Logo">
        </div>
        
        <h2>Live Application Tracker</h2>
        
        <input type="text" id="passportInput" placeholder="Enter Passport Number...">
        <button id="trackBtn">Track Status Now</button>

        <div id="result">
            <div class="track-header">
                <div class="plane-anim"><i class="fas fa-plane"></i></div>
            </div>
            <div id="data-content"></div>
        </div>
    </div>

    <script type="module" src="tracking-logic.js"></script>

</body>
</html>
