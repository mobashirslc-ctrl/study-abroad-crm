def generate_field_map(fields):
    """
    Generates a field map based on a list of field names.

    Args:
        fields: A list of field names.

    Returns:
        A dictionary mapping the original field names to naturally descriptive phrases or technical terms.
    """
    field_map = {}
    for field in fields:
        # Standardize known abbreviations and special cases
        if field == "hs_code":
            field_map[field] = "HS code"
        elif field == "declaration_id":
            field_map[field] = "declaration ID"
        elif field == "tariff_id":
            field_map[field] = "tariff ID"
        elif field == "tax_id":
            field_map[field] = "tax ID"
        elif field == "co_case_number":
            field_map[field] = "co-case number"
        elif field == "incoterms":
            field_map[field] = "Incoterms" # Keep as proper noun capitalization
        else:
            # Replace underscores with spaces for the rest
            field_map[field] = field.replace("_", " ")
    return field_map
